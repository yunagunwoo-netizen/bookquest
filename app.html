                </div>
              </div>
            ) : null}

            {/* DEBATE-CHOICE — 미니토론 담당 선택 */}
            {battlePhase === "debate-choice" && (
              <div>
                <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 16, padding: 18, marginBottom: 14, textAlign: "center" }}>
                  <div style={{ marginBottom: 10 }}><img src="icons/ui/ui_thought.png" alt="" style={{ width: 40, height: 40, verticalAlign: "middle" }} /></div>
                  <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 6 }}>미니토론은 누가?</div>
                  <div style={{ fontSize: 12, opacity: 0.85, lineHeight: 1.6 }}>
                    Q&A 2라운드는 네가 풀고,<br/>미니토론 1라운드는 담당을 고를 수 있어.
                  </div>
                </div>
                <button onClick={() => launchInteractiveBattle("me")} disabled={battleLoading}
                  style={{ width: "100%", padding: 14, borderRadius: 14, border: "none", background: "linear-gradient(135deg, #22c55e, #059669)", color: "white", fontSize: 15, fontWeight: 800, cursor: "pointer", marginBottom: 10, opacity: battleLoading ? 0.6 : 1 }}>
                  <img src="icons/ui/ui_player.png" alt="" style={{ width: 16, height: 16, verticalAlign: "middle" }} /> 내가 토론할래 (직접 선택)
                </button>
                <button onClick={() => launchInteractiveBattle("ai")} disabled={battleLoading}
                  style={{ width: "100%", padding: 14, borderRadius: 14, border: "1px solid rgba(255,255,255,0.3)", background: "rgba(255,255,255,0.08)", color: "white", fontSize: 15, fontWeight: 800, cursor: "pointer", marginBottom: 10, opacity: battleLoading ? 0.6 : 1 }}>
                  <img src="icons/ui/ui_robot.png" alt="" style={{ width: 16, height: 16, verticalAlign: "middle" }} /> 아바타가 토론할래 (AI 자동)
                </button>
                <button onClick={() => setBattlePhase("gate")} disabled={battleLoading}
                  style={{ width: "100%", padding: 10, borderRadius: 12, border: "none", background: "transparent", color: "white", fontSize: 12, fontWeight: 700, cursor: "pointer", opacity: 0.7 }}>
                  ← 뒤로
                </button>
              </div>
            )}

            {/* PLAY-ROUND — 직접 참여 라운드 진행 */}
            {battlePhase === "play-round" && interactiveRounds && (() => {
              const round = interactiveRounds[interactiveRoundIdx];
              const total = interactiveRounds.length;
              const roundAns = roundAnswers[interactiveRoundIdx];
              const myName = profile?.name || "나";
              const oppName = battleOpponent?.name || "상대";
              const myHPPct = myMaxHP > 0 ? Math.max(0, (myHP / myMaxHP) * 100) : 0;
              const oppHPPct = oppMaxHP > 0 ? Math.max(0, (oppHP / oppMaxHP) * 100) : 0;
              const hpColor = (pct) => pct > 50 ? "#22c55e" : pct > 25 ? "#f59e0b" : "#ef4444";
              const timerDanger = battleTimer <= 3 && battleTimerActive;
              const myAvatarData = AVATAR_DATA.find(a => a.id === sanitizeAvatarId(profile?.avatar)) || AVATAR_DATA[0];
              const oppAvatarData = AVATAR_DATA.find(a => a.id === sanitizeAvatarId(opp?.avatar)) || AVATAR_DATA[0];
              const myAvatarSrc = myAvatarData.cardImg || myAvatarData.iconImg || myAvatarData.img;
              const oppAvatarSrc = oppAvatarData.cardImg || oppAvatarData.iconImg || oppAvatarData.img;
              const myRarity = myAvatarData.rarity || "free";
              const oppRarity = oppAvatarData.rarity || "free";
              const myGrad = myAvatarData.gradient || ["#7c3aed","#a855f7"];
              const oppGrad = oppAvatarData.gradient || ["#ef4444","#dc2626"];
              // 카드 애니메이션 클래스
              const myCardAnim = battleAnim === "hit"
                ? (lastDamage?.oppDmg > 0 ? "bq-card-atk-r" : (lastDamage?.myDmg > 0 ? "bq-card-hurt-l" : "bq-card-idle-l"))
                : myHP <= 0 ? "bq-card-ko" : "bq-card-idle-l";
              const oppCardAnim = battleAnim === "hit"
                ? (lastDamage?.myDmg > 0 ? "bq-card-atk-l" : (lastDamage?.oppDmg > 0 ? "bq-card-hurt-r" : "bq-card-idle-r"))
                : oppHP <= 0 ? "bq-card-ko" : "bq-card-idle-r";

              // 포켓몬카드 스타일 배틀 카드 컴포넌트
              const CARD_TYPE = { free: "노멀", common: "노멀", rare: "레어", epic: "영웅", legendary: "전설", heroic: "영웅", mythic: "신화", hidden: "히든" };
              const CARD_TYPE_ICON = { free: "⭐", common: "⭐", rare: "💎", epic: "🛡️", legendary: "👑", heroic: "🛡️", mythic: "🌙", hidden: "🔮" };
      const CARD_TYPE_IMG = { free: "icons/ui/ui_star_normal.png", common: "icons/ui/ui_star_normal.png", rare: "icons/ui/ui_diamond_rare.png", epic: "icons/ui/ui_shield_heroic.png", legendary: "icons/ui/ui_crown.png", heroic: "icons/ui/ui_shield_heroic.png", mythic: "icons/ui/ui_moon_mythic.png", hidden: "icons/ui/ui_orb_hidden.png" };
              const CARD_SKILL = {
                free: [{ name: "기본 공격", dmg: 10, icon: "📖", skillImg: "icons/skills/cs_basic_attack.png" }, { name: "지식 던지기", dmg: 20, icon: "💡", skillImg: "icons/skills/cs_knowledge_throw.png" }],
                common: [{ name: "퀴즈 어택", dmg: 15, icon: "❓", skillImg: "icons/skills/cs_quiz_attack.png" }, { name: "독서 파워", dmg: 25, icon: "📚", skillImg: "icons/skills/cs_reading_power.png" }],
                rare: [{ name: "논리 공격", dmg: 20, icon: "🧠", skillImg: "icons/skills/cs_logic_attack.png" }, { name: "지혜의 일격", dmg: 30, icon: "✨", skillImg: "icons/skills/cs_wisdom_strike.png" }],
                epic: [{ name: "토론 스매시", dmg: 25, icon: "💬", skillImg: "icons/skills/cs_debate_smash.png" }, { name: "영웅의 각성", dmg: 35, icon: "⚡", skillImg: "icons/skills/cs_hero_awakening.png" }],
                legendary: [{ name: "전설의 서", dmg: 30, icon: "📜", skillImg: "icons/skills/cs_legendary_tome.png" }, { name: "궁극의 지식", dmg: 40, icon: "🔥", skillImg: "icons/skills/cs_ultimate_knowledge.png" }],
                heroic: [{ name: "토론 스매시", dmg: 25, icon: "💬", skillImg: "icons/skills/cs_debate_smash.png" }, { name: "영웅의 각성", dmg: 35, icon: "⚡", skillImg: "icons/skills/cs_hero_awakening.png" }],
                mythic: [{ name: "신의 심판", dmg: 35, icon: "⚡", skillImg: "icons/skills/cs_divine_judgment.png" }, { name: "천상의 지혜", dmg: 45, icon: "🌟", skillImg: "icons/skills/cs_celestial_wisdom.png" }],
                hidden: [{ name: "그림자 일격", dmg: 30, icon: "🌀", skillImg: "icons/skills/cs_shadow_strike.png" }, { name: "비밀의 힘", dmg: 40, icon: "🔮", skillImg: "icons/skills/cs_secret_power.png" }],
              };
              const BattleCard = ({ name, lvl, hp, maxHp, hpPct, avatarSrc, grad, rarity, dmg, isOpp, animClass, title }) => {
                const badge = RARITY_BADGE_STYLE[rarity] || RARITY_BADGE_STYLE.free;
                const badgeColor = badge.color || "#d1d5db";
                const skills = CARD_SKILL[rarity] || CARD_SKILL.free;
                const typeLabel = CARD_TYPE[rarity] || "노멀";
                const typeIcon = CARD_TYPE_ICON[rarity] || "⭐";
                // 아바타 이미지: cardImg 로드 실패 시 iconImg/img 폴백
                const fallbackSrc = avatarSrc?.replace("avatars/card/", "avatars/").replace(".png", "_sm.png") || "avatars/dash.png";
                return (
                  <div className={animClass} style={{ width: 152, borderRadius: 12, position: "relative", transformOrigin: "bottom center" }}>
                    <div style={{ borderRadius: 10, overflow: "hidden", background: `linear-gradient(180deg, ${grad[0]}, ${grad[1]})`, border: `2px solid ${badgeColor}66`, position: "relative" }}>
                      {/* 샤인 오버레이 */}
                      <div style={{ position: "absolute", top: 0, left: "-100%", width: "50%", height: "100%", background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent)", animation: "bq-card-shine 3s infinite", pointerEvents: "none", zIndex: 5 }} />

                      {/* ─ 카드 상단: 이름 + HP ─ */}
                      <div style={{ padding: "5px 7px 3px", display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(0,0,0,0.25)" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                          {CARD_TYPE_IMG[rarity] ? <img src={CARD_TYPE_IMG[rarity]} alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> : <span style={{ fontSize: 10 }}>{typeIcon}</span>}
                          <span style={{ fontSize: 11, fontWeight: 900 }}>{name}</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                          <span style={{ fontSize: 9, opacity: 0.8, fontWeight: 700 }}>HP</span>
                          <span style={{ fontSize: 14, fontWeight: 900, color: badgeColor }}>{hp}</span>
                        </div>
                      </div>

                      {/* ─ 아바타 이미지 영역 ─ */}
                      <div style={{ position: "relative", height: 110, display: "flex", alignItems: "center", justifyContent: "center", background: `linear-gradient(180deg, ${grad[0]}55, ${grad[1]}33)`, overflow: "hidden", margin: "0 6px", borderRadius: 6, marginTop: 4 }}>
                        <img src={avatarSrc} alt={name}
                          style={{ maxWidth: "90%", maxHeight: "100%", objectFit: "contain", filter: hp <= 0 ? "grayscale(1) brightness(0.5)" : `drop-shadow(0 2px 6px rgba(0,0,0,0.5))`, transform: isOpp ? "scaleX(-1)" : "none" }}
                          onError={(e) => { e.target.onerror = null; e.target.src = fallbackSrc; }} />
                        {/* 레어리티 뱃지 */}
                        <div style={{ position: "absolute", bottom: 4, right: 4, fontSize: 7, fontWeight: 900, padding: "1px 5px", borderRadius: 3, letterSpacing: 0.8, ...badge }}>{RARITY_LABEL[rarity]}</div>
                        {/* 레벨 */}
                        <div style={{ position: "absolute", bottom: 4, left: 4, fontSize: 8, fontWeight: 900, padding: "1px 5px", borderRadius: 3, background: "rgba(0,0,0,0.4)" }}>Lv.{lvl}</div>
                      </div>

                      {/* ─ 칭호 ─ */}
                      <div style={{ textAlign: "center", padding: "3px 0 1px", fontSize: 8, fontWeight: 700, color: badgeColor, opacity: 0.9, letterSpacing: 0.5 }}>
                        {title || getTitle(lvl)}
                      </div>

                      {/* ─ 기술 목록 (포켓몬카드 스타일) ─ */}
                      <div style={{ padding: "0 6px 4px" }}>
                        {skills.map((sk, i) => (
                          <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "3px 4px", marginBottom: 1, borderTop: i === 0 ? `1px solid ${badgeColor}33` : "none", borderBottom: `1px solid ${badgeColor}22` }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                              {sk.skillImg ? <img src={sk.skillImg} alt="" style={{ width: 14, height: 14, borderRadius: "50%" }} /> : <span style={{ fontSize: 9 }}>{sk.icon}</span>}
                              <span style={{ fontSize: 9, fontWeight: 700 }}>{sk.name}</span>
                            </div>
                            <span style={{ fontSize: 10, fontWeight: 900, color: "#fde047" }}>{sk.dmg}</span>
                          </div>
                        ))}
                      </div>

                      {/* ─ HP 바 ─ */}
                      <div style={{ padding: "2px 6px 5px" }}>
                        <div style={{ height: 7, background: "rgba(0,0,0,0.4)", borderRadius: 4, overflow: "hidden" }}>
                          <div style={{ width: `${hpPct}%`, height: "100%", borderRadius: 4, background: `linear-gradient(90deg, ${hpColor(hpPct)}, ${hpColor(hpPct)}cc)`, transition: "width 0.8s ease-out", animation: dmg && dmg > 0 ? "bq-hp-flash 0.3s" : "none" }} />
                        </div>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 7, fontWeight: 900, opacity: 0.5, marginTop: 1 }}>
                          <span>{typeLabel} 타입</span><span>{hp}/{maxHp}</span>
                        </div>
                      </div>
                    </div>
                    {/* 데미지 팝업 */}
                    {dmg != null && dmg > 0 && (
                      <div style={{ position: "absolute", top: -10, [isOpp ? "left" : "right"]: -6, fontSize: 16, fontWeight: 900, color: isOpp ? "#22c55e" : "#ef4444", textShadow: "0 2px 6px rgba(0,0,0,0.6)", animation: "bq-damage-pop 0.8s forwards", zIndex: 10 }}>-{dmg}</div>
                    )}
                  </div>
                );
              };

              return (
                <div>
                  {/* ── 카드 대면 영역 ── */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0 8px", position: "relative" }}>
                    <BattleCard
                      name={myName} lvl={level || 1} hp={myHP} maxHp={myMaxHP} hpPct={myHPPct}
                      avatarSrc={myAvatarSrc} grad={myGrad} rarity={myRarity}
                      dmg={lastDamage?.myDmg} isOpp={false} animClass={myCardAnim}
                      title={getTitle(level || 1)}
                    />
                    {/* 중앙 타이머 + 스파크 */}
                    <div style={{ textAlign: "center", zIndex: 5, position: "relative", minWidth: 40 }}>
                      {battleAnim === "hit" && (
                        <div style={{ position: "absolute", left: "50%", top: "50%", width: 50, height: 50, borderRadius: "50%", background: "radial-gradient(circle, rgba(253,224,71,0.7) 0%, rgba(255,165,0,0.3) 40%, transparent 70%)", animation: "bq-clash-spark 0.5s forwards", pointerEvents: "none" }} />
                      )}
                      <div className={timerDanger ? "bq-timer-danger" : ""} style={{ fontSize: 22, fontWeight: 900, color: timerDanger ? "#ef4444" : "#fde047", lineHeight: 1, textShadow: "0 2px 8px rgba(0,0,0,0.4)" }}>{battleTimerActive ? battleTimer : <img src="icons/ui/ui_swords.png" style={{ width: 22, height: 22 }} />}</div>
                      {battleTimerActive && <div style={{ fontSize: 9, opacity: 0.7, fontWeight: 700 }}>초</div>}
                    </div>
                    <BattleCard
                      name={oppName} lvl={opp?.level || 1} hp={oppHP} maxHp={oppMaxHP} hpPct={oppHPPct}
                      avatarSrc={oppAvatarSrc} grad={oppGrad} rarity={oppRarity}
                      dmg={lastDamage?.oppDmg} isOpp={true} animClass={oppCardAnim}
                      title={getTitle(opp?.level || 1)}
                    />
                  </div>

                  {/* 진행 표시 */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, padding: "10px 14px", background: "rgba(255,255,255,0.08)", borderRadius: 12 }}>
                    <div style={{ fontSize: 12, fontWeight: 700 }}>라운드 {interactiveRoundIdx + 1}/{total}</div>
                    <div style={{ fontSize: 11, opacity: 0.8 }}>{round.type === "qa" ? `${round.book || "책 Q&A"}` : round.type === "complete" ? `${round.book || "문장 완성"}` : "미니 토론"}</div>
                  </div>

                  {/* 문제 표시 — Q&A 4지선다 */}
                  {!showRoundResult && round.type === "qa" && (
                    <div>
                      <div style={{ background: "rgba(253,224,71,0.15)", border: "1px solid rgba(253,224,71,0.3)", borderRadius: 14, padding: 16, marginBottom: 14 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: "#fde047", marginBottom: 6 }}><img src="icons/ui/ui_question.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 문제</div>
                        <div style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.6 }}>{round.question}</div>
                      </div>
                      {(round.choices || []).map((c, i) => (
                        <button key={i} onClick={() => submitRoundAnswer(i)} disabled={battleLoading}
                          style={{ width: "100%", padding: "14px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.2)", background: "rgba(255,255,255,0.06)", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 8, textAlign: "left", lineHeight: 1.5 }}>
                          <span style={{ fontWeight: 900, marginRight: 8, color: "#fde047" }}>{String.fromCharCode(65 + i)}.</span>{c}
                        </button>
                      ))}
                    </div>
                  )}

                  {/* 문장 완성형 */}
                  {!showRoundResult && round.type === "complete" && (
                    <div>
                      <div style={{ background: "rgba(96,165,250,0.15)", border: "1px solid rgba(96,165,250,0.3)", borderRadius: 14, padding: 16, marginBottom: 14 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: "#60a5fa", marginBottom: 6 }}><img src="icons/ui/ui_pencil.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 문장을 완성해봐!</div>
                        <div style={{ fontSize: 15, fontWeight: 700, lineHeight: 1.7 }}>
                          {(round.sentence || "").split("___").map((part, idx, arr) =>
                            idx < arr.length - 1
                              ? React.createElement(React.Fragment, { key: idx }, part, React.createElement("span", { style: { display: "inline-block", minWidth: 60, borderBottom: "2px dashed #60a5fa", margin: "0 4px", color: "#60a5fa", fontWeight: 900 } }, " ??? "))
                              : React.createElement(React.Fragment, { key: idx }, part)
                          )}
                        </div>
                      </div>
                      <div style={{ fontSize: 11, opacity: 0.7, textAlign: "center", marginBottom: 10 }}>빈칸에 들어갈 가장 알맞은 답을 골라봐!</div>
                      {(round.completions || []).map((c, i) => (
                        <button key={i} onClick={() => submitRoundAnswer(i)} disabled={battleLoading}
                          style={{ width: "100%", padding: "14px 16px", borderRadius: 12, border: "1px solid rgba(96,165,250,0.3)", background: "rgba(96,165,250,0.08)", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 8, textAlign: "left", lineHeight: 1.5 }}>
                          <span style={{ fontWeight: 900, marginRight: 8, color: "#60a5fa" }}>{String.fromCharCode(65 + i)}.</span>{c}
                        </button>
                      ))}
                    </div>
                  )}

                  {/* 미니토론 (내가 담당) */}
                  {!showRoundResult && round.type === "debate" && miniDebateOwner === "me" && (
                    <div>
                      <div style={{ background: "rgba(168,85,247,0.18)", border: "1px solid rgba(168,85,247,0.4)", borderRadius: 14, padding: 16, marginBottom: 14 }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: "#c4b5fd", marginBottom: 6 }}><img src="icons/ui/ui_thought.png" alt="" style={{ width: 11, height: 11, verticalAlign: "middle" }} /> 주제</div>
                        <div style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.6 }}>{round.topic}</div>
                      </div>
                      <div style={{ fontSize: 12, opacity: 0.8, marginBottom: 10, textAlign: "center" }}>가장 설득력 있는 의견을 골라봐!</div>
                      {(round.myOptions || []).map((opt, i) => (
                        <button key={i} onClick={() => submitRoundAnswer(i)} disabled={battleLoading}
                          style={{ width: "100%", padding: "14px 16px", borderRadius: 12, border: "1px solid rgba(255,255,255,0.2)", background: "rgba(255,255,255,0.06)", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer", marginBottom: 8, textAlign: "left", lineHeight: 1.5 }}>
                          <span style={{ fontWeight: 900, marginRight: 8, color: "#c4b5fd" }}>{String.fromCharCode(65 + i)}.</span>{opt.text}
                        </button>
                      ))}
                    </div>
                  )}

                  {/* 미니토론 (AI 담당) — 자동 실행 중 */}
                  {!showRoundResult && round.type === "debate" && miniDebateOwner === "ai" && (
                    <div style={{ textAlign: "center", padding: 40 }}>
                      <div style={{ marginBottom: 12, animation: "pulse 1s infinite" }}><img src="icons/ui/ui_robot.png" alt="" style={{ width: 48, height: 48 }} /></div>
                      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 6 }}>아바타가 토론 중...</div>
                      <button onClick={() => submitRoundAnswer(0)} disabled={battleLoading}
                        style={{ marginTop: 20, padding: "12px 24px", borderRadius: 12, border: "none", background: "white", color: "#4c1d95", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>
                        결과 보기
                      </button>
                    </div>
                  )}

                  {/* 라운드 결과 */}
                  {showRoundResult && roundAns && (
                    <div>
                      <div style={{ background: roundAns.judge === "my" ? "rgba(34,197,94,0.25)" : roundAns.judge === "opp" ? "rgba(239,68,68,0.25)" : "rgba(255,255,255,0.1)", border: `1px solid ${roundAns.judge === "my" ? "rgba(34,197,94,0.5)" : roundAns.judge === "opp" ? "rgba(239,68,68,0.5)" : "rgba(255,255,255,0.2)"}`, borderRadius: 14, padding: 16, marginBottom: 14, textAlign: "center" }}>
                        <div style={{ marginBottom: 6, lineHeight: 0 }}>
                          <Icon
                            name={roundAns.judge === "my" ? "correct_check" : roundAns.judge === "opp" ? "wrong_cross" : "draw_handshake"}
                            size={44}
                          />
                        </div>
                        <div style={{ fontSize: 16, fontWeight: 900 }}>{roundAns.judge === "my" ? "이 라운드 승!" : roundAns.judge === "opp" ? "이 라운드 패" : "무승부"}</div>
                        {/* 데미지 표시 */}
                        {roundAns.myDmg != null && (
                          <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 8, fontSize: 12 }}>
                            <span>상대에게 <b style={{color:"#22c55e"}}>-{roundAns.oppDmg}</b></span>
                            <span>내가 받은 <b style={{color:"#ef4444"}}>-{roundAns.myDmg}</b></span>
                          </div>
                        )}
                      </div>

                      {roundAns.type === "qa" && (
                        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 12, padding: 14, marginBottom: 12, fontSize: 12, lineHeight: 1.6 }}>
                          <div style={{ marginBottom: 8 }}><b>정답:</b> {String.fromCharCode(65 + roundAns.answerIdx)}. {round.choices[roundAns.answerIdx]}</div>
                          <div style={{ marginBottom: 6, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
                            <span><img src="icons/ui/ui_player.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} /> <b>{myName}</b>: {String.fromCharCode(65 + roundAns.myChoiceIdx)}</span>
                            <Icon name={roundAns.myCorrect ? "correct_check" : "wrong_cross"} size={16} />
                          </div>
                          <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
                            <span><img src="icons/ui/ui_robot.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} /> <b>{oppName}</b>: {String.fromCharCode(65 + roundAns.oppChoiceIdx)}</span>
                            <Icon name={roundAns.oppCorrect ? "correct_check" : "wrong_cross"} size={16} />
                          </div>
                          {roundAns.explanation && <div style={{ padding: 10, background: "rgba(253,224,71,0.12)", borderRadius: 8, fontSize: 11, opacity: 0.95 }}>{<img src="icons/ui/ui_hint.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} />} {roundAns.explanation}</div>}
                        </div>
                      )}

                      {roundAns.type === "complete" && (
                        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 12, padding: 14, marginBottom: 12, fontSize: 12, lineHeight: 1.6 }}>
                          <div style={{ marginBottom: 8 }}><b>완성 문장:</b> {(roundAns.sentence || "").replace("___", roundAns.completions[roundAns.answerIdx])}</div>
                          <div style={{ marginBottom: 6, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
                            <span><img src="icons/ui/ui_player.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} /> <b>{myName}</b>: {String.fromCharCode(65 + roundAns.myChoiceIdx)}. {roundAns.completions[roundAns.myChoiceIdx] || "시간 초과"}</span>
                            <Icon name={roundAns.myCorrect ? "correct_check" : "wrong_cross"} size={16} />
                          </div>
                          <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 4, flexWrap: "wrap" }}>
                            <span><img src="icons/ui/ui_robot.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} /> <b>{oppName}</b>: {String.fromCharCode(65 + roundAns.oppChoiceIdx)}. {roundAns.completions[roundAns.oppChoiceIdx] || "?"}</span>
                            <Icon name={roundAns.oppCorrect ? "correct_check" : "wrong_cross"} size={16} />
                          </div>
                          {roundAns.explanation && <div style={{ padding: 10, background: "rgba(96,165,250,0.12)", borderRadius: 8, fontSize: 11, opacity: 0.95 }}>{<img src="icons/ui/ui_hint.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} />} {roundAns.explanation}</div>}
                        </div>
                      )}

                      {roundAns.type === "debate" && miniDebateOwner === "me" && (
                        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 12, padding: 14, marginBottom: 12, fontSize: 12, lineHeight: 1.6 }}>
                          <div style={{ marginBottom: 8 }}><img src="icons/ui/ui_player.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} /> <b>{myName}</b> ({roundAns.myScore}점): {roundAns.myStance}</div>
                          <div style={{ marginBottom: 10 }}><img src="icons/ui/ui_robot.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} /> <b>{oppName}</b> ({roundAns.oppScore}점): {roundAns.oppStance}</div>
                          {roundAns.reason && <div style={{ padding: 10, background: "rgba(168,85,247,0.15)", borderRadius: 8, fontSize: 11 }}><img src="icons/ui/ui_writing.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> {roundAns.reason}</div>}
                        </div>
                      )}

                      {roundAns.type === "debate" && miniDebateOwner === "ai" && (
                        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 12, padding: 14, marginBottom: 12, fontSize: 12, lineHeight: 1.6 }}>
                          <div style={{ marginBottom: 8 }}><img src="icons/ui/ui_player.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} /> <b>{myName}</b> [{roundAns.myStance}]: {roundAns.myArgument}</div>
                          <div style={{ marginBottom: 10 }}><img src="icons/ui/ui_robot.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} /> <b>{oppName}</b> [{roundAns.oppStance}]: {roundAns.oppArgument}</div>
                          {roundAns.reason && <div style={{ padding: 10, background: "rgba(168,85,247,0.15)", borderRadius: 8, fontSize: 11 }}><img src="icons/ui/ui_writing.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> {roundAns.reason}</div>}
                        </div>
                      )}

                      <button onClick={goToNextRound} disabled={battleLoading}
                        style={{ width: "100%", padding: 14, borderRadius: 14, border: "none", background: "white", color: "#4c1d95", fontSize: 14, fontWeight: 800, cursor: "pointer" }}>
                        {interactiveRoundIdx + 1 < total ? "다음 라운드 →" : "최종 결과 보기"}
                      </button>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* PLAYING — 채팅형 중계 + 카드 헤더 */}
            {battlePhase === "playing" && (() => {
              const myName_p = profile?.name || "나";
              const oppName_p = battleOpponent?.name || "상대";
              const myAvD_p = AVATAR_DATA.find(a => a.id === sanitizeAvatarId(profile?.avatar)) || AVATAR_DATA[0];
              const oppAvD_p = AVATAR_DATA.find(a => a.id === sanitizeAvatarId(battleOpponent?.avatar)) || AVATAR_DATA[0];
              const myAvSrc_p = myAvD_p.cardImg || myAvD_p.iconImg || myAvD_p.img;
              const oppAvSrc_p = oppAvD_p.cardImg || oppAvD_p.iconImg || oppAvD_p.img;
              const myGrad_p = myAvD_p.gradient || ["#7c3aed","#a855f7"];
              const oppGrad_p = oppAvD_p.gradient || ["#ef4444","#dc2626"];
              const myBadge_p = RARITY_BADGE_STYLE[myAvD_p.rarity||"free"] || RARITY_BADGE_STYLE.free;
              const oppBadge_p = RARITY_BADGE_STYLE[oppAvD_p.rarity||"free"] || RARITY_BADGE_STYLE.free;
              return (
              <div>
                {/* 미니 카드 대면 헤더 */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 4px 12px", marginBottom: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 44, height: 44, borderRadius: 8, overflow: "hidden", background: `linear-gradient(135deg, ${myGrad_p[0]}, ${myGrad_p[1]})`, border: `2px solid ${myBadge_p.color}66`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <img src={myAvSrc_p} alt="" style={{ width: "90%", height: "90%", objectFit: "contain" }} onError={(e) => { e.target.onerror=null; e.target.src="avatars/dash.png"; }} />
                    </div>
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 900 }}>{myName_p}</div>
                      <div style={{ fontSize: 8, opacity: 0.7 }}>Lv.{level||1} · {RARITY_LABEL[myAvD_p.rarity||"free"]}</div>
                    </div>
                  </div>
                  <div style={{ fontSize: 16, fontWeight: 900, opacity: 0.4, animation: "pulse 2s infinite" }}><img src="icons/ui/ui_swords.png" alt="" style={{ width: 16, height: 16 }} /></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 11, fontWeight: 900 }}>{oppName_p}</div>
                      <div style={{ fontSize: 8, opacity: 0.7 }}>Lv.{battleOpponent?.level||1} · {RARITY_LABEL[oppAvD_p.rarity||"free"]}</div>
                    </div>
                    <div style={{ width: 44, height: 44, borderRadius: 8, overflow: "hidden", background: `linear-gradient(135deg, ${oppGrad_p[0]}, ${oppGrad_p[1]})`, border: `2px solid ${oppBadge_p.color}66`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <img src={oppAvSrc_p} alt="" style={{ width: "90%", height: "90%", objectFit: "contain", transform: "scaleX(-1)" }} onError={(e) => { e.target.onerror=null; e.target.src="avatars/dash.png"; }} />
                    </div>
                  </div>
                </div>

                {/* 채팅 메시지 */}
                {battleMessages.map((m, i) => {
                  if (m.kind === "banner") return (
                    <div key={i} style={{ textAlign: "center", fontSize: 11, fontWeight: 800, letterSpacing: 1, opacity: 0.6, margin: "14px 0 10px" }}>{m.text}</div>
                  );
                  if (m.kind === "narration") return (
                    <div key={i} style={{ textAlign: "center", fontSize: 12, fontStyle: "italic", opacity: 0.85, margin: "10px 0", padding: "8px 12px", background: "rgba(255,255,255,0.05)", borderRadius: 10 }}>{m.text}</div>
                  );
                  if (m.kind === "system") return (
                    <div key={i} style={{ textAlign: "center", fontSize: 13, fontWeight: 700, margin: "10px 0", padding: "10px 14px", background: "rgba(253,224,71,0.18)", color: "#fde047", borderRadius: 12 }}>{m.text}</div>
                  );
                  if (m.kind === "judge") return (
                    <div key={i} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, margin: "10px 0", padding: "10px 14px", background: "rgba(34,197,94,0.15)", border: "1px solid rgba(34,197,94,0.3)", borderRadius: 12 }}>{m.text}</div>
                  );
                  if (m.kind === "me") return (
                    <div key={i} style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
                      <div style={{ maxWidth: "78%", background: "linear-gradient(135deg, #a855f7, #7c3aed)", padding: "10px 14px", borderRadius: "14px 14px 4px 14px" }}>
                        <div style={{ fontSize: 10, opacity: 0.8, fontWeight: 700, marginBottom: 2 }}>{m.name}</div>
                        <div style={{ fontSize: 13, lineHeight: 1.5 }}>{m.text}</div>
                      </div>
                    </div>
                  );
                  if (m.kind === "opp") return (
                    <div key={i} style={{ display: "flex", justifyContent: "flex-start", marginBottom: 8 }}>
                      <div style={{ maxWidth: "78%", background: "rgba(255,255,255,0.12)", padding: "10px 14px", borderRadius: "14px 14px 14px 4px" }}>
                        <div style={{ fontSize: 10, opacity: 0.8, fontWeight: 700, marginBottom: 2 }}>{m.name}</div>
                        <div style={{ fontSize: 13, lineHeight: 1.5 }}>{m.text}</div>
                      </div>
                    </div>
                  );
                  return null;
                })}
                {battleLoading && (
                  <div style={{ textAlign: "center", padding: 20, opacity: 0.7, fontSize: 12 }}><img src="icons/ui/ui_lightning.png" alt="" style={{ width: 12, height: 12, verticalAlign: "middle" }} /> 아바타가 생각 중...</div>
                )}
              </div>
              );
            })()}

            {/* RESULT */}
            {battlePhase === "result" && (() => {
              const myHPPct = myMaxHP > 0 ? Math.max(0, (myHP / myMaxHP) * 100) : 0;
              const oppHPPct = oppMaxHP > 0 ? Math.max(0, (oppHP / oppMaxHP) * 100) : 0;
              const hpColor = (pct) => pct > 50 ? "#22c55e" : pct > 25 ? "#f59e0b" : "#ef4444";
              const myName = profile?.name || "나";
              const oppName = battleOpponent?.name || "상대";
              const myAvD = AVATAR_DATA.find(a => a.id === sanitizeAvatarId(profile?.avatar)) || AVATAR_DATA[0];
              const oppAvD = AVATAR_DATA.find(a => a.id === sanitizeAvatarId(opp?.avatar)) || AVATAR_DATA[0];
              const myAvSrc = myAvD.cardImg || myAvD.iconImg || myAvD.img;
              const oppAvSrc = oppAvD.cardImg || oppAvD.iconImg || oppAvD.img;
              const myGrad = myAvD.gradient || ["#7c3aed","#a855f7"];
              const oppGrad = oppAvD.gradient || ["#ef4444","#dc2626"];
              const myBadge = RARITY_BADGE_STYLE[myAvD.rarity||"free"] || RARITY_BADGE_STYLE.free;
              const oppBadge = RARITY_BADGE_STYLE[oppAvD.rarity||"free"] || RARITY_BADGE_STYLE.free;
              const CARD_TYPE_R = { free: "노멀", common: "노멀", rare: "레어", epic: "영웅", legendary: "전설", heroic: "영웅", mythic: "신화", hidden: "히든" };
              const CARD_TYPE_ICON_R = { free: "⭐", common: "⭐", rare: "💎", epic: "🛡️", legendary: "👑", heroic: "🛡️", mythic: "🌙", hidden: "🔮" };
              const CARD_TYPE_IMG_R = { free: "icons/ui/ui_star_normal.png", common: "icons/ui/ui_star_normal.png", rare: "icons/ui/ui_diamond_rare.png", epic: "icons/ui/ui_shield_heroic.png", legendary: "icons/ui/ui_crown.png", heroic: "icons/ui/ui_shield_heroic.png", mythic: "icons/ui/ui_moon_mythic.png", hidden: "icons/ui/ui_orb_hidden.png" };
              const CARD_SKILL_R = {
                free: [{ name: "기본 공격", dmg: 10, icon: "📖", skillImg: "icons/skills/cs_basic_attack.png" }, { name: "지식 던지기", dmg: 20, icon: "💡", skillImg: "icons/skills/cs_knowledge_throw.png" }],
                common: [{ name: "퀴즈 어택", dmg: 15, icon: "❓", skillImg: "icons/skills/cs_quiz_attack.png" }, { name: "독서 파워", dmg: 25, icon: "📚", skillImg: "icons/skills/cs_reading_power.png" }],
                rare: [{ name: "논리 공격", dmg: 20, icon: "🧠", skillImg: "icons/skills/cs_logic_attack.png" }, { name: "지혜의 일격", dmg: 30, icon: "✨", skillImg: "icons/skills/cs_wisdom_strike.png" }],
                epic: [{ name: "토론 스매시", dmg: 25, icon: "💬", skillImg: "icons/skills/cs_debate_smash.png" }, { name: "영웅의 각성", dmg: 35, icon: "⚡", skillImg: "icons/skills/cs_hero_awakening.png" }],
                legendary: [{ name: "전설의 서", dmg: 30, icon: "📜", skillImg: "icons/skills/cs_legendary_tome.png" }, { name: "궁극의 지식", dmg: 40, icon: "🔥", skillImg: "icons/skills/cs_ultimate_knowledge.png" }],
                heroic: [{ name: "토론 스매시", dmg: 25, icon: "💬", skillImg: "icons/skills/cs_debate_smash.png" }, { name: "영웅의 각성", dmg: 35, icon: "⚡", skillImg: "icons/skills/cs_hero_awakening.png" }],
                mythic: [{ name: "신의 심판", dmg: 35, icon: "⚡", skillImg: "icons/skills/cs_divine_judgment.png" }, { name: "천상의 지혜", dmg: 45, icon: "🌟", skillImg: "icons/skills/cs_celestial_wisdom.png" }],
                hidden: [{ name: "그림자 일격", dmg: 30, icon: "🌀", skillImg: "icons/skills/cs_shadow_strike.png" }, { name: "비밀의 힘", dmg: 40, icon: "🔮", skillImg: "icons/skills/cs_secret_power.png" }],
              };

              // 포켓몬카드 스타일 결과 카드
              const ResultCard = ({ name, lvl, hp, maxHp, avatarSrc, grad, rarity, badge, isWinner, isOpp }) => {
                const hpPctVal = maxHp > 0 ? Math.max(0, hp/maxHp*100) : 0;
                const badgeColor = badge?.color || "#d1d5db";
                const skills = CARD_SKILL_R[rarity] || CARD_SKILL_R.free;
                const typeLabel = CARD_TYPE_R[rarity] || "노멀";
                const typeIcon = CARD_TYPE_ICON_R[rarity] || "⭐";
                const fallbackSrc = avatarSrc?.replace("avatars/card/", "avatars/").replace(".png", "_sm.png") || "avatars/dash.png";
                const loser = !isWinner && battleWinner !== "draw";
                return (
                <div className={isWinner ? "bq-bounce-win" : loser ? "bq-grayscale" : ""} style={{ width: 130, borderRadius: 10, transformOrigin: "bottom center", border: isWinner ? "2px solid #fde047" : "none" }}>
                  <div style={{ borderRadius: 8, overflow: "hidden", background: `linear-gradient(180deg, ${grad[0]}, ${grad[1]})`, border: `1.5px solid ${badgeColor}66`, position: "relative" }}>
                    {/* 상단: 이름 + HP */}
                    <div style={{ padding: "4px 6px 2px", display: "flex", justifyContent: "space-between", alignItems: "center", background: "rgba(0,0,0,0.25)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
                        {CARD_TYPE_IMG_R[rarity] ? <img src={CARD_TYPE_IMG_R[rarity]} alt="" style={{ width: 12, height: 12, verticalAlign: "middle" }} /> : <span style={{ fontSize: 8 }}>{typeIcon}</span>}
                        <span style={{ fontSize: 9, fontWeight: 900 }}>{name}</span>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
                        <span style={{ fontSize: 7, opacity: 0.8, fontWeight: 700 }}>HP</span>
                        <span style={{ fontSize: 11, fontWeight: 900, color: badgeColor }}>{hp}</span>
                      </div>
                    </div>
                    {/* 아바타 */}
                    <div style={{ position: "relative", height: 80, display: "flex", alignItems: "center", justifyContent: "center", background: `linear-gradient(180deg, ${grad[0]}55, ${grad[1]}33)`, overflow: "hidden", margin: "0 4px", borderRadius: 5, marginTop: 3 }}>
                      <img src={avatarSrc} alt={name}
                        style={{ maxWidth: "85%", maxHeight: "95%", objectFit: "contain", filter: loser ? "grayscale(0.8) brightness(0.5)" : isWinner ? `drop-shadow(0 0 8px ${grad[0]}aa)` : `drop-shadow(0 2px 4px rgba(0,0,0,0.5))`, transform: isOpp ? "scaleX(-1)" : "none" }}
                        onError={(e) => { e.target.onerror = null; e.target.src = fallbackSrc; }} />
                      <div style={{ position: "absolute", bottom: 3, right: 3, fontSize: 6, fontWeight: 900, padding: "1px 4px", borderRadius: 3, letterSpacing: 0.5, ...badge }}>{RARITY_LABEL[rarity||"free"]}</div>
                      <div style={{ position: "absolute", bottom: 3, left: 3, fontSize: 7, fontWeight: 900, padding: "1px 4px", borderRadius: 3, background: "rgba(0,0,0,0.4)" }}>Lv.{lvl}</div>
                    </div>
                    {/* 칭호 */}
                    <div style={{ textAlign: "center", padding: "2px 0 1px", fontSize: 7, fontWeight: 700, color: badgeColor, opacity: 0.9, letterSpacing: 0.4 }}>
                      {getTitle(lvl)}
                    </div>
                    {/* 고유 스킬 + 기술 */}
                    <div style={{ padding: "0 4px 3px" }}>
                      {/* 고유 스킬 */}
                      <div style={{ display: "flex", alignItems: "center", gap: 2, padding: "2px 3px", borderTop: `1px solid ${badgeColor}33`, background: "rgba(251,191,36,0.1)" }}>
                        {(() => { const sk = isOpp ? getAvatarSkill(opp?.avatar) : getAvatarSkill(profile?.avatar); return sk?.skillImg ? <img src={sk.skillImg} alt="" style={{ width: 14, height: 14, borderRadius: "50%" }} /> : <span style={{ fontSize: 8 }}>{sk?.icon || "⭐"}</span>; })()}
                        <span style={{ fontSize: 7, fontWeight: 800, color: "#fde047" }}>{(isOpp ? getAvatarSkill(opp?.avatar) : getAvatarSkill(profile?.avatar))?.name || "기본"}</span>
                      </div>
                      {skills.map((sk, i) => (
                        <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "2px 3px", borderBottom: `1px solid ${badgeColor}22` }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
                            {sk.skillImg ? <img src={sk.skillImg} alt="" style={{ width: 12, height: 12, borderRadius: "50%" }} /> : <span style={{ fontSize: 7 }}>{sk.icon}</span>}
                            <span style={{ fontSize: 7, fontWeight: 700 }}>{sk.name}</span>
                          </div>
                          <span style={{ fontSize: 8, fontWeight: 900, color: "#fde047" }}>{sk.dmg}</span>
                        </div>
                      ))}
                    </div>
                    {/* HP 바 */}
                    <div style={{ padding: "1px 4px 4px" }}>
                      <div style={{ height: 5, background: "rgba(0,0,0,0.4)", borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: `${hpPctVal}%`, height: "100%", borderRadius: 3, background: `linear-gradient(90deg, ${hpColor(hpPctVal)}, ${hpColor(hpPctVal)}cc)`, transition: "width 0.5s" }} />
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 6, fontWeight: 900, opacity: 0.5, marginTop: 1 }}>
                        <span>{typeLabel} 타입</span><span>{hp}/{maxHp}</span>
                      </div>
                    </div>
                  </div>
                  {/* 승리 크라운 */}
                  {isWinner && <div style={{ textAlign: "center", marginTop: 4, fontSize: 16 }}><img src="icons/ui/ui_crown.png" alt="" style={{ width: 20, height: 20 }} /></div>}
                </div>
                );
              };

              // 폭죽 파티클 생성
              const confettiColors = ["#fde047","#22c55e","#60a5fa","#f472b6","#a78bfa","#fb923c"];
              const confettiParticles = battleWinner === "my" ? Array.from({length: 24}, (_, i) => ({
                left: Math.random() * 100,
                delay: Math.random() * 1.5,
                duration: 1.5 + Math.random() * 1.5,
                color: confettiColors[i % confettiColors.length],
                size: 4 + Math.random() * 6,
                rotate: Math.random() * 360,
              })) : [];

              return (
              <div style={{ position: "relative", overflow: "hidden" }}>
                {/* 승리 폭죽 파티클 */}
                {confettiParticles.map((p, i) => (
                  <div key={i} style={{
                    position: "absolute", top: -10, left: `${p.left}%`, width: p.size, height: p.size,
                    background: p.color, borderRadius: p.size > 7 ? "1px" : "50%",
                    animation: `bq-confetti ${p.duration}s ease-in ${p.delay}s forwards`,
                    transform: `rotate(${p.rotate}deg)`, zIndex: 20, pointerEvents: "none",
                  }} />
                ))}

                <div style={{ textAlign: "center", padding: "24px 12px", background: battleWinner === "my" ? "linear-gradient(135deg, rgba(34,197,94,0.3), rgba(16,185,129,0.2))" : battleWinner === "opp" ? "linear-gradient(135deg, rgba(239,68,68,0.3), rgba(220,38,38,0.2))" : "rgba(255,255,255,0.1)", borderRadius: 16, marginBottom: 16, position: "relative" }}>

                  {/* 결과 타이틀 — 드라마틱 등장 */}
                  <div style={{ animation: "bq-fade-up 0.6s ease-out both", marginBottom: 12 }}>
                    <div style={{
                      fontSize: battleWinner === "draw" ? 22 : 28, fontWeight: 900,
                      animation: battleWinner === "my" ? "bq-victory-pulse 1.5s ease-in-out infinite" : battleWinner === "opp" ? "bq-defeat-shake 0.5s ease-in-out 1" : "none",
                      color: battleWinner === "my" ? "#fde047" : battleWinner === "opp" ? "#fca5a5" : "#e2e8f0",
                    }}>
                      {battleWinner === "my" ? <><img src="icons/ui/ui_trophy.png" alt="" style={{ width: 28, height: 28, verticalAlign: "middle" }} /> 승리!</> : battleWinner === "opp" ? <><img src="icons/ui/ui_skull.png" alt="" style={{ width: 28, height: 28, verticalAlign: "middle" }} /> 패배...</> : <><img src="icons/ui/ui_handshake.png" alt="" style={{ width: 28, height: 28, verticalAlign: "middle" }} /> 무승부</>}
                    </div>
                    {battleWinner === "my" && (
                      <div style={{ fontSize: 11, color: "#86efac", fontWeight: 700, marginTop: 4, animation: "bq-fade-up 0.8s ease-out 0.3s both" }}>
                        +5 코인 획득!
                      </div>
                    )}
                  </div>

                  {/* 카드 대면 결과 — 승자 카드 강조 */}
                  <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-end", gap: 10, marginBottom: 10 }}>
                    <div className={battleWinner === "my" ? "bq-result-card-win" : "bq-result-card-lose"}>
                      <ResultCard name={myName} lvl={level||1} hp={myHP} maxHp={myMaxHP} avatarSrc={myAvSrc} grad={myGrad} rarity={myAvD.rarity} badge={myBadge} isWinner={battleWinner==="my"} isOpp={false} />
                    </div>
                    <div style={{ fontSize: 20, fontWeight: 900, opacity: 0.4, animation: "bq-fade-up 0.5s ease-out 0.2s both", marginBottom: 50 }}><img src="icons/ui/ui_swords.png" alt="" style={{ width: 16, height: 16 }} /></div>
                    <div className={battleWinner === "opp" ? "bq-result-card-win" : "bq-result-card-lose"}>
                      <ResultCard name={oppName} lvl={opp?.level||1} hp={oppHP} maxHp={oppMaxHP} avatarSrc={oppAvSrc} grad={oppGrad} rarity={oppAvD.rarity} badge={oppBadge} isWinner={battleWinner==="opp"} isOpp={true} />
                    </div>
                  </div>

                  {/* 내러티브 — 지연 페이드 */}
                  {battleNarration && <div style={{ fontSize: 12, opacity: 0.9, marginTop: 8, lineHeight: 1.6, animation: "bq-fade-up 0.6s ease-out 1s both", fontStyle: "italic" }}><img src="icons/ui/ui_clapper.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> {battleNarration}</div>}
                </div>

                {/* 라운드별 데미지 로그 */}
                {battleRounds && battleRounds.map((r, i) => (
                  <div key={i} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: 12, marginBottom: 10, fontSize: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <div style={{ fontWeight: 800, opacity: 0.9 }}>라운드 {i + 1} · {r.type === "qa" ? (r.book || "책 Q&A") : r.type === "complete" ? (r.book || "문장 완성") : "미니 토론"}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        {(() => { const sk = getAvatarSkill(profile?.avatar); return sk?.skillImg ? <img src={sk.skillImg} alt="" style={{ width: 16, height: 16, borderRadius: "50%", opacity: 0.8 }} /> : <span style={{ fontSize: 9, opacity: 0.6 }}>{sk?.icon}</span>; })()}
                        <div style={{ fontWeight: 800, color: r.judge === "my" ? "#22c55e" : r.judge === "opp" ? "#ef4444" : "#fde047" }}>{r.judge === "my" ? "승" : r.judge === "opp" ? "패" : "무"}</div>
                      </div>
                    </div>
                    {r.myDmg != null && (
                      <div style={{ display: "flex", gap: 12, fontSize: 11, opacity: 0.8 }}>
                        <span>나 받은 데미지: <b style={{color:"#ef4444"}}>-{r.myDmg}</b></span>
                        <span>상대 받은 데미지: <b style={{color:"#22c55e"}}>-{r.oppDmg}</b></span>
                      </div>
                    )}
                    {r.reason && <div style={{ opacity: 0.7, lineHeight: 1.5, marginTop: 4 }}>{r.reason}</div>}
                  </div>
                ))}
                {/* 🎮 스킬 정보 표시 */}
                <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: 12, marginBottom: 10, display: "flex", gap: 12, alignItems: "center" }}>
                  {(() => {
                    const mSkill = getAvatarSkill(profile?.avatar);
                    const oSkill = getAvatarSkill(battleOpponent?.avatar);
                    return (<>
                      <div style={{ flex: 1, textAlign: "center" }}>
                        <div style={{ fontSize: 10, opacity: 0.7, fontWeight: 700, marginBottom: 4 }}>내 스킬</div>
                        <div>{mSkill.skillImg ? <img src={mSkill.skillImg} alt="" style={{ width: 36, height: 36, borderRadius: "50%" }} /> : <span style={{ fontSize: 18 }}>{mSkill.icon}</span>}</div>
                        <div style={{ fontSize: 10, fontWeight: 800, marginTop: 2 }}>{mSkill.name}</div>
                        <div style={{ fontSize: 8, opacity: 0.7 }}>{mSkill.desc}</div>
                      </div>
                      <div style={{ fontSize: 12, opacity: 0.3, fontWeight: 900 }}>VS</div>
                      <div style={{ flex: 1, textAlign: "center" }}>
                        <div style={{ fontSize: 10, opacity: 0.7, fontWeight: 700, marginBottom: 4 }}>상대 스킬</div>
                        <div>{oSkill.skillImg ? <img src={oSkill.skillImg} alt="" style={{ width: 36, height: 36, borderRadius: "50%" }} /> : <span style={{ fontSize: 18 }}>{oSkill.icon}</span>}</div>
                        <div style={{ fontSize: 10, fontWeight: 800, marginTop: 2 }}>{oSkill.name}</div>
                        <div style={{ fontSize: 8, opacity: 0.7 }}>{oSkill.desc}</div>
                      </div>
                    </>);
                  })()}
                </div>

                {/* <img src="icons/ui/ui_roulette.png" alt="" style={{ width: 16, height: 16, verticalAlign: "middle" }} /> 승리 보상 룰렛 */}
                {showRoulette && battleWinner === "my" && (() => {
                  const handleSpin = () => {
                    if (rouletteSpinning) return;
                    setRouletteSpinning(true);
                    // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> 룰렛 스핀 효과음
                    try { getBattleSound().sfx.rouletteSpin(); } catch(e) {}
                    const result = spinRoulette();
                    // 스킬 보상 배율 적용
                    const myRSkill = getAvatarSkill(profile?.avatar);
                    let rewardMult = 1;
                    if (myRSkill?.effect?.type === "reward_mult") rewardMult = myRSkill.effect.value;
                    if (myRSkill?.effect?.type === "double_coin") rewardMult = 2;
                    // 아레나 3배 보상
                    if (bookArenaActive) rewardMult *= 3;
                    // 라이벌 2배 보상
                    if (battleOpponent?.uid && rivalData[battleOpponent.uid]) rewardMult *= 2;
                    // 복수전 1.5배 보상
                    if (rematchData?.oppUid === battleOpponent?.uid) rewardMult *= 1.5;

                    const finalResult = { ...result };
                    if (result.reward.type === "coin") finalResult.reward = { ...result.reward, value: Math.round(result.reward.value * rewardMult) };
                    if (result.reward.type === "xp") finalResult.reward = { ...result.reward, value: Math.round(result.reward.value * rewardMult * xpMultiplier) };

                    // 애니메이션: 2초 스핀 후 결과
                    setRouletteAngle(prev => prev + 1440 + Math.random() * 360);
                    setTimeout(() => {
                      setRouletteResult(finalResult);
                      setRouletteSpinning(false);
                      // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> 룰렛 결과 효과음
                      try { getBattleSound().sfx.rouletteResult(); } catch(e) {}
                      // 보상 적용
                      if (finalResult.reward.type === "coin") setCoins(c => (c || 0) + finalResult.reward.value);
                      if (finalResult.reward.type === "xp") setXp(x => (x || 0) + finalResult.reward.value);
                      if (finalResult.reward.type === "xp_mult") setXpMultiplier(finalResult.reward.value);
                      if (finalResult.reward.type === "title") setCurrentTitle(finalResult.reward.value);
                      // 🎁 랜덤 아이템 보상
                      if (finalResult.reward.type === "random_item" || finalResult.reward.type === "random_item_x2") {
                        const count = finalResult.reward.type === "random_item_x2" ? 2 : 1;
                        const unowned = SHOP_ITEMS.filter(i => !ownedItems.includes(i.id));
                        const picked = [];
                        for (let i = 0; i < count && unowned.length > 0; i++) {
                          const idx = Math.floor(Math.random() * unowned.length);
                          picked.push(unowned.splice(idx, 1)[0]);
                        }
                        if (picked.length > 0) {
                          setOwnedItems(prev => [...prev, ...picked.map(p => p.id)]);
                          finalResult.label = picked.map(p => p.name).join(" + ") + " 획득!";
                          finalResult.icon = "✨";
                        } else {
                          // 모든 아이템 보유 시 코인으로 대체
                          const bonusCoin = 80;
                          setCoins(c => (c || 0) + bonusCoin);
                          finalResult.label = "아이템 올클리어! +" + bonusCoin + " 코인";
                          finalResult.icon = "💰";
                        }
                      }
                      // 🦄 랜덤 아바타 보상
                      if (finalResult.reward.type === "random_avatar") {
                        const unownedAvatars = AVATAR_DATA.filter(a => !a.free && !ownedAvatars.includes(a.id));
                        if (unownedAvatars.length > 0) {
                          const picked = unownedAvatars[Math.floor(Math.random() * unownedAvatars.length)];
                          setOwnedAvatars(prev => prev.includes(picked.id) ? prev : [...prev, picked.id]);
                          finalResult.label = picked.name + " 아바타 획득!";
                          finalResult.icon = "🦄";
                        } else {
                          // 모든 아바타 보유 시 대박 코인
                          const bonusCoin = 300;
                          setCoins(c => (c || 0) + bonusCoin);
                          finalResult.label = "아바타 올클리어! +" + bonusCoin + " 코인";
                          finalResult.icon = "👑";
                        }
                      }
                      // 결과를 보여준 뒤 확인 버튼으로 닫도록 setShowRoulette(false) 제거
                    }, 2200);
                  };
                  return (
                    <div style={{ background: "linear-gradient(135deg, rgba(234,179,8,0.3), rgba(251,191,36,0.2))", borderRadius: 16, padding: 16, marginBottom: 12, textAlign: "center", border: "1px solid rgba(251,191,36,0.4)" }}>
                      <div style={{ fontSize: 14, fontWeight: 900, color: "#fde047", marginBottom: 10 }}><img src="icons/ui/ui_roulette.png" alt="" style={{ width: 16, height: 16, verticalAlign: "middle" }} /> 승리 보상 룰렛!</div>
                      {!rouletteResult ? (
                        <div>
                          <div style={{
                            width: 80, height: 80, margin: "0 auto 12px", borderRadius: "50%",
                            background: "conic-gradient(#fde047, #22c55e, #60a5fa, #f472b6, #a78bfa, #fb923c, #fde047)",
                            transform: `rotate(${rouletteAngle}deg)`,
                            transition: rouletteSpinning ? "transform 2s cubic-bezier(0.17, 0.67, 0.12, 0.99)" : "none",
                            display: "flex", alignItems: "center", justifyContent: "center",
                            boxShadow: "0 0 20px rgba(251,191,36,0.5)"
                          }}>
                            <div style={{ width: 30, height: 30, borderRadius: "50%", background: "#1e1b4b", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}><img src="icons/ui/ui_roulette.png" alt="" style={{ width: 24, height: 24 }} /></div>

                <span style={{ display: "flex", alignItems: "center", gap: 4 }}><img src={PNG_ICONS.stat_trophy} style={{ width: 16, height: 16 }} /> 획득한 배지: {earnedBadges.length}개 / {BADGES.length}개</span>
              </div>
            )}
          </div>

          <button onClick={() => {
            setProfileForm({ name: profile.name || "", school: profile.school || "", grade: profile.grade || "6", avatar: profile.avatar || "dash" });
            setEditingProfile(true);

            style={{ width: "100%", marginTop: 16, padding: "12px", borderRadius: 12, border: "2px solid #eee", background: "white", color: "#888", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
            <img src="icons/ui/ui_pencil.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 프로필 수정
          </button>

          {/* 빠른 학년 변경 위젯 — 관리자 전용 (테스트용) */}
          {isAdmin && (
          <div style={{ marginTop: 12, background: "white", borderRadius: 12, padding: 16, border: "2px solid #eee", overflow: "hidden" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#555", marginBottom: 8, display: "flex", alignItems: "center", gap: 4 }}>
              <img src="icons/ui/ui_books.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 학년 빠른 변경 <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 6, background: "#fef3c7", color: "#b45309", marginLeft: 4 }}>관리자</span> <span style={{ fontSize: 11, color: "#667eea", fontWeight: 700 }}>({profile?.grade ? (["1","2","3","4","5","6"].includes(profile.grade) ? `초등 ${profile.grade}학년` : `${profile.grade}학년`) : "미설정"})</span>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {["1", "2", "3", "4", "5", "6", "중1", "중2", "중3"].map(g => (
                <button key={g} onClick={() => { setProfile(prev => ({ ...prev, grade: g })); setProfileForm(prev => ({ ...prev, grade: g })); }}
                  style={{
                    padding: "7px 14px", borderRadius: 20, border: "2px solid",
                    borderColor: profile?.grade === g ? "#667eea" : "#eee",
                    background: profile?.grade === g ? "#667eea" : "white",
                    color: profile?.grade === g ? "white" : "#666",
                    fontSize: 12, fontWeight: 600, cursor: "pointer"
                  }}>
                  {["1","2","3","4","5","6"].includes(g) ? `초${g}` : g}
                </button>
              ))}
            </div>
          </div>
          )}

          {/* <img src="icons/ui/ui_key.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 복구 PIN 설정/변경 */}
          <div style={{ marginTop: 12, background: "white", borderRadius: 12, padding: 16, border: "2px solid #eee", overflow: "hidden" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#555", marginBottom: 8, display: "flex", alignItems: "center", gap: 4 }}>
              <img src="icons/ui/ui_key.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 복구 PIN {recoveryPin ? <span style={{ fontSize: 11, color: "#22c55e", fontWeight: 700 }}>(설정됨)</span> : <span style={{ fontSize: 11, color: "#ef4444", fontWeight: 700 }}>(미설정)</span>}
            </div>
            <div style={{ fontSize: 11, color: "#aaa", marginBottom: 10 }}>앱 재설치 시 데이터 복구에 사용됩니다</div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <input
                id="pinSettingInput"
                type="tel" inputMode="numeric" maxLength={4}
                placeholder={recoveryPin ? "●●●●" : "숫자 4자리"}
                style={{ flex: 1, minWidth: 0, padding: "10px 12px", borderRadius: 10, border: "2px solid #eee", fontSize: 16, textAlign: "center", letterSpacing: 6, outline: "none", fontWeight: 700, boxSizing: "border-box" }}
              />
              <button onClick={() => {
                const input = document.getElementById("pinSettingInput");
                const val = input.value.replace(/[^0-9]/g, "");
                if (val.length === 4) {
                  setRecoveryPin(val);
                  input.value = "";
                  alert("복구 PIN이 설정되었어요!");
                } else {
                  alert("4자리 숫자를 입력해주세요.");
                }
              }}
                style={{ padding: "10px 16px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #667eea, #764ba2)", color: "white", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
                {recoveryPin ? "변경" : "설정"}
              </button>
            </div>
          </div>

          {/* <img src="icons/ui/ui_import.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 데이터 가져오기 + 백업 상태 */}
          <button onClick={() => setShowImportModal(true)}
            style={{
              width: "100%", marginTop: 12, padding: "12px", borderRadius: 12, border: "2px solid #667eea",
              background: "#667eea08", color: "#667eea", fontSize: 13, fontWeight: 700, cursor: "pointer", boxSizing: "border-box"
            }}>
            <img src="icons/ui/ui_import.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 데이터 가져오기
          </button>
          <div style={{ fontSize: 11, color: "#aaa", textAlign: "center", marginTop: 6 }}>
            자동 백업: {lastBackupDate ? `${lastBackupDate.slice(5).replace("-","/")} 완료` : "아직 없음"} · 매일 자동 저장
          </div>

          {/* <img src="icons/ui/ui_gear.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 앱 정보 + 관리자 (하나로 묶어서 접기/펼치기) */}
          <div style={{ marginTop: 24, padding: 16, background: "white", borderRadius: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
            <button onClick={() => toggleSection("profApp")}
              style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", background: "none", border: "none", padding: 0, cursor: "pointer", marginBottom: collapsedSections.profApp ? 0 : 12 }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: "#1a1a2e" }}><img src="icons/ui/ui_gear.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 앱 정보 & 관리</span>
              <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: "#999", fontWeight: 600 }}>v{APP_VERSION}</span>
                <span style={{ fontSize: 14, color: "#888", transition: "transform 0.2s", transform: collapsedSections.profApp ? "rotate(-90deg)" : "rotate(0deg)" }}>▼</span>
              </span>
            </button>
            {!collapsedSections.profApp && (<>
              <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                <button onClick={() => setShowChangelog(true)}
                  style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: "1.5px solid #667eea", background: "#667eea08", color: "#667eea", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                  <img src="icons/ui/ui_clipboard.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 업데이트 노트
                </button>
                <button onClick={() => setShowRollback(true)}
                  style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: "1.5px solid #f59e0b", background: "#f59e0b08", color: "#f59e0b", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                  <img src="icons/ui/ui_rewind.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 이전 버전 복원
                </button>
              </div>
              <button onClick={() => isAdmin ? setScreen("admin") : setShowAdminLogin(true)}
                style={{ width: "100%", padding: "12px", borderRadius: 10, border: "1.5px solid #ef4444", background: isAdmin ? "#ef4444" : "#ef444408", color: isAdmin ? "white" : "#ef4444", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                {isAdmin ? "관리자 패널 열기" : "관리자 모드"}
              </button>
            </>)}
          </div>
        </div>
        );
      };

      // ═══════════════════════════════════════
      // <img src="icons/ui/ui_import.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 데이터 가져오기 모달
      // ═══════════════════════════════════════
      const ImportDataModal = () => {
        const [step, setStep] = useState("form"); // form | pin | loading | success | notfound | selectBackup
        const [impName, setImpName] = useState("");
        const [impSchool, setImpSchool] = useState("");
        const [impPin, setImpPin] = useState("");
        const [impError, setImpError] = useState("");
        const [impLoading, setImpLoading] = useState(false);
        const [impMatches, setImpMatches] = useState([]);
        const [impSelected, setImpSelected] = useState(null);
        const [impBackups, setImpBackups] = useState([]);

        if (!showImportModal) return null;

        const closeModal = () => {
          setShowImportModal(false);
          setStep("form"); setImpName(""); setImpSchool(""); setImpPin("");
          setImpError(""); setImpMatches([]); setImpSelected(null); setImpBackups([]);
        };

        const handleSearch = async () => {
          if (!impName.trim()) return;
          setImpLoading(true); setImpError("");
          const matches = await FirestoreService.findUsersForRecovery(impName.trim(), impSchool.trim());
          setImpLoading(false);
          if (matches.length === 0) {
            setStep("notfound");
          } else {
            const withPin = matches.filter(m => m.recoveryPin);
            if (withPin.length === 0) {
              setImpError("이 계정에는 복구 PIN이 설정되어 있지 않아요.");
              setStep("notfound");
            } else {
              setImpMatches(withPin);
              setImpSelected(withPin[0]);
              setStep("pin");
            }
          }
        };

        const handlePinVerify = async () => {
          if (!impSelected || impPin.length !== 4) return;
          if (impPin !== impSelected.recoveryPin) {
            setImpError("PIN이 일치하지 않아요.");
            return;
          }
          setImpError("");
          setImpLoading(true);
          // 백업 목록 조회
          try {
            const snaps = await db.collection("users").doc(impSelected.uid)
              .collection("backups").orderBy("backupDate", "desc").limit(7).get();
            const backups = [];
            snaps.forEach(doc => {
              const d = doc.data();
              backups.push({ id: doc.id, ...d });
            });
            setImpBackups(backups);
            setImpLoading(false);
            if (backups.length > 0) {
              setStep("selectBackup");
            } else {
              // 백업 없으면 현재 데이터에서 바로 복구
              handleRestoreFromMain();
            }
          } catch (e) {
            console.error("백업 조회 실패:", e);
            setImpLoading(false);
            // 백업 조회 실패해도 메인 데이터에서 복구 시도
            handleRestoreFromMain();
          }
        };

        const handleRestoreFromMain = () => {
          FirestoreService.restoreUid(impSelected.uid);
          setStep("success");
        };

        const handleRestoreFromBackup = async (backup) => {
          setImpLoading(true);
          try {
            // 현재 UID의 메인 데이터를 백업 데이터로 덮어쓰기
            const uid = FirestoreService.getUserId();
            const { backupDate, backupTime, ...restoreData } = backup;
            await db.collection("users").doc(uid).set({
              ...restoreData,
              restoredFrom: impSelected.uid,
              restoredBackupDate: backupDate,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: false });
            setImpLoading(false);
            setStep("success");
          } catch (e) {
            console.error("백업 복원 실패:", e);
            setImpLoading(false);
            setImpError("복원 중 오류가 발생했어요.");
          }
        };

        return (
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
            onClick={closeModal}>
            <div style={{ background: "white", borderRadius: 20, padding: 24, width: "100%", maxWidth: 360 }}
              onClick={e => e.stopPropagation()}>

              {step === "form" && (<>
                <h3 style={{ fontSize: 18, fontWeight: 800, textAlign: "center", marginBottom: 4 }}><img src="icons/ui/ui_import.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 데이터 가져오기</h3>
                <p style={{ fontSize: 12, color: "#888", textAlign: "center", marginBottom: 20 }}>다른 기기나 이전 데이터를 불러옵니다</p>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>이름 *</label>
                  <input value={impName} onChange={e => setImpName(e.target.value)}
                    placeholder="가입 시 입력한 이름"
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 12, border: "2px solid #eee", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>
                <div style={{ marginBottom: 18 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>학교</label>
                  <input value={impSchool} onChange={e => setImpSchool(e.target.value)}
                    placeholder="학교 이름"
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 12, border: "2px solid #eee", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>
                <button onClick={handleSearch} disabled={!impName.trim() || impLoading}
                  style={{
                    width: "100%", padding: "13px", borderRadius: 14, border: "none",
                    background: impName.trim() ? "linear-gradient(135deg, #667eea, #764ba2)" : "#ddd",
                    color: "white", fontSize: 15, fontWeight: 700, cursor: impName.trim() ? "pointer" : "default"
                  }}>
                  {impLoading ? "검색 중..." : "계정 찾기"}
                </button>
              </>)}

              {step === "pin" && impSelected && (<>
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  <AvatarIcon avatarId={impSelected.avatar} size={56} />
                  <div style={{ fontSize: 15, fontWeight: 700, marginTop: 6 }}>{impSelected.name}</div>
                  <div style={{ fontSize: 12, color: "#888" }}>
                    {impSelected.school ? impSelected.school + " · " : ""}Lv.{impSelected.level} · {impSelected.coins} 코인
                  </div>
                </div>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>복구 PIN</label>
                  <input value={impPin} onChange={e => { setImpError(""); setImpPin(e.target.value.replace(/[^0-9]/g, "").slice(0, 4)); }}
                    placeholder="●●●●" maxLength={4} type="tel" inputMode="numeric"
                    style={{ width: "100%", padding: "12px", borderRadius: 12, border: "2px solid #eee", fontSize: 22, textAlign: "center", letterSpacing: 10, outline: "none", boxSizing: "border-box", fontWeight: 700 }} />
                </div>
                {impError && <div style={{ color: "#ef4444", fontSize: 12, textAlign: "center", marginBottom: 10 }}>{impError}</div>}
                <button onClick={handlePinVerify} disabled={impPin.length !== 4 || impLoading}
                  style={{
                    width: "100%", padding: "13px", borderRadius: 14, border: "none",
                    background: impPin.length === 4 ? "linear-gradient(135deg, #667eea, #764ba2)" : "#ddd",
                    color: "white", fontSize: 15, fontWeight: 700, cursor: impPin.length === 4 ? "pointer" : "default"
                  }}>
                  {impLoading ? "확인 중..." : "확인"}
                </button>
                {impMatches.length > 1 && (
                  <div style={{ marginTop: 10, fontSize: 12, color: "#888", textAlign: "center" }}>
                    {impMatches.length}개 계정 ·
                    <button onClick={() => {
                      const idx = impMatches.indexOf(impSelected);
                      setImpSelected(impMatches[(idx + 1) % impMatches.length]);
                      setImpPin(""); setImpError("");
                    }} style={{ background: "none", border: "none", color: "#667eea", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                      다른 계정
                    </button>
                  </div>
                )}
              </>)}

              {step === "selectBackup" && (<>
                <h3 style={{ fontSize: 16, fontWeight: 800, textAlign: "center", marginBottom: 4 }}>백업 선택</h3>
                <p style={{ fontSize: 12, color: "#888", textAlign: "center", marginBottom: 16 }}>복원할 백업을 선택하세요</p>
                <div style={{ maxHeight: 280, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8 }}>
                  {/* 최신 데이터 (현재) */}
                  <button onClick={() => handleRestoreFromMain()}
                    style={{
                      width: "100%", padding: "12px 14px", borderRadius: 12, border: "2px solid #667eea",
                      background: "#667eea08", textAlign: "left", cursor: "pointer"
                    }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#667eea" }}>최신 데이터 (현재)</div>
                    <div style={{ fontSize: 11, color: "#888" }}>Lv.{impSelected.level} · {impSelected.coins} 코인 · 연속 {impSelected.streak}일</div>
                  </button>
                  {/* 백업 목록 */}
                  {impBackups.map(b => (
                    <button key={b.id} onClick={() => handleRestoreFromBackup(b)}
                      disabled={impLoading}
                      style={{
                        width: "100%", padding: "12px 14px", borderRadius: 12, border: "2px solid #eee",
                        background: "white", textAlign: "left", cursor: "pointer"
                      }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#1a1a2e" }}>{b.backupDate} 백업</div>
                      <div style={{ fontSize: 11, color: "#888" }}>Lv.{b.level || 1} · {b.coins || 0} 코인 · 연속 {b.streak || 0}일</div>
                    </button>
                  ))}
                </div>
              </>)}

              {step === "success" && (<>
                <div style={{ textAlign: "center", padding: "16px 0" }}>
                  <div style={{ marginBottom: 12 }}><img src="icons/ui/ui_party.png" alt="" style={{ width: 48, height: 48, verticalAlign: "middle" }} /></div>
                  <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 8 }}>가져오기 완료!</div>
                  <div style={{ fontSize: 13, color: "#888" }}>앱을 다시 시작하면 데이터가 적용됩니다.</div>
                </div>
                <button onClick={() => window.location.reload()}
                  style={{
                    width: "100%", padding: "13px", borderRadius: 14, border: "none",
                    background: "linear-gradient(135deg, #667eea, #764ba2)",
                    color: "white", fontSize: 15, fontWeight: 700, cursor: "pointer"
                  }}>
                  앱 다시 시작
                </button>
              </>)}

              {step === "notfound" && (<>
                <div style={{ textAlign: "center", padding: "16px 0" }}>
                  <div style={{ marginBottom: 8 }}><img src="icons/ui/ui_droplet.png" alt="" style={{ width: 40, height: 40 }} /></div>
                  <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>계정을 찾을 수 없어요</div>
                  <div style={{ fontSize: 13, color: "#888" }}>{impError || "입력한 정보와 일치하는 계정이 없습니다."}</div>
                </div>
                <button onClick={() => { setStep("form"); setImpError(""); setImpName(""); setImpSchool(""); }}
                  style={{
                    width: "100%", padding: "12px", borderRadius: 14, border: "2px solid #667eea",
                    background: "white", color: "#667eea", fontSize: 14, fontWeight: 700, cursor: "pointer"
                  }}>
                  다시 검색하기
                </button>
              </>)}

              <button onClick={closeModal}
                style={{ width: "100%", padding: "10px", background: "none", border: "none", color: "#aaa", fontSize: 13, cursor: "pointer", marginTop: 12 }}>
                닫기
              </button>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🔒 Admin Panel
