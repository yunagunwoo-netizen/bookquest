      const fetchRanking = async () => {
        setRankingLoading(true);
        setRankingError(null);
        setRankingPage(0);
        try {
          // 1) localStorage 캐시 확인 (15분)
          const cached = (() => {
            try {
              const raw = localStorage.getItem(RANKING_CACHE_KEY);
              if (!raw) return null;
              const parsed = JSON.parse(raw);
              if (!parsed || !parsed.ts || !Array.isArray(parsed.items)) return null;
              if (Date.now() - parsed.ts > RANKING_CACHE_TTL_MS) return null;
              return parsed;
            } catch (e) { return null; }
          })();
          if (cached && cached.weekStart === getWeekStartDate()) {
            setRankingData(cached.items);
            setRankingLoading(false);
            return;
          }
          // 2) Firestore 전체 유저 조회
          const snap = await db.collection("users").get();
          const currentWeek = getWeekStartDate();
          const items = [];
          snap.forEach(doc => {
            const d = doc.data() || {};
            const name = d.profile && d.profile.name;
            const avatar = (d.profile && d.profile.avatar) || "dash";
            const userWeekStart = d.weekStartDate;
            // 주가 같은 유저만 이번 주 점수 인정, 다른 주는 0
            const weekly = (userWeekStart === currentWeek) ? (d.weeklyReadCount || 0) : 0;
            const weeklyWins = (userWeekStart === currentWeek) ? (d.weeklyBattleWins || 0) : 0;
            if (!name) return; // 프로필 없는 유저 제외
            // Phase 5b: 랭킹 점수 = 완독 × 1.0 + 배틀승 × 0.3 (배틀 3승 ≈ 1권)
            const score = weekly + weeklyWins * 0.3;
            items.push({
              uid: doc.id,
              name,
              avatar,
              weekly,
              weeklyWins,
              score,
              streak: d.streak || 0,
              level: d.level || 1,
            });
          });
          items.sort((a, b) => b.score - a.score || b.weekly - a.weekly || b.weeklyWins - a.weeklyWins || b.streak - a.streak || b.level - a.level);
          try {
            localStorage.setItem(RANKING_CACHE_KEY, JSON.stringify({
              ts: Date.now(),
              weekStart: currentWeek,
              items,
            }));
          } catch (e) { /* 저장 실패 무시 */ }
          setRankingData(items);
        } catch (e) {
          console.error("랭킹 로드 실패:", e);
          setRankingError("랭킹을 불러오지 못했어. 잠시 후 다시 시도해줘.");
        } finally {
          setRankingLoading(false);
        }
      };

      // 랭킹 화면 진입 시 자동 로드
      useEffect(() => {
        if (screen === "ranking" && dataLoaded && !rankingData && !rankingLoading) {
          fetchRanking();
        }
      }, [screen, dataLoaded]);

      // ═══════════════════════════════════════
      // ⚔️ Phase 5b: 아바타 배틀 시스템
      // - 스킬 선택식(가위바위보) 배틀
      // - 랜덤 매칭 (비슷한 레벨 우선)
      // - 승리 시 weeklyBattleWins +1 → 랭킹 점수에 가점
      // ═══════════════════════════════════════
      const BATTLE_SKILLS = [
        {
          id: "knowledge",
          emoji: "🔥",
          name: "독서의 기운",
          desc: "책 속에서 쌓은 지식의 불꽃. 상상의 날개를 태워버린다.",
          color: "#ef4444",
          gradient: "linear-gradient(135deg, #ef4444, #f97316)",
          beats: "imagination"
        },
        {
          id: "focus",
          emoji: "💎",
          name: "집중의 힘",
          desc: "흔들림 없는 집중력. 독서의 기운을 차분히 이겨낸다.",
          color: "#3b82f6",
          gradient: "linear-gradient(135deg, #3b82f6, #6366f1)",
          beats: "knowledge"
        },
        {
          id: "imagination",
          emoji: "🌬️",
          name: "상상의 날개",
          desc: "자유로운 상상력. 집중의 벽을 가볍게 뛰어넘는다.",
          color: "#10b981",
          gradient: "linear-gradient(135deg, #10b981, #14b8a6)",
          beats: "focus"
        }
      ];

      // 배틀 매칭 — 비슷한 레벨 ±2 우선, 없으면 전체 랜덤
      const pickBattleOpponent = (myUid, myLevel, pool) => {
        const candidates = (pool || []).filter(u => u.uid !== myUid);
        if (candidates.length === 0) return null;
        const near = candidates.filter(u => Math.abs((u.level || 1) - (myLevel || 1)) <= 2);
        const target = near.length > 0 ? near : candidates;
        return target[Math.floor(Math.random() * target.length)];
      };

      // AI 스킬 선택 — 기본 랜덤, 레벨 차이에 따라 약간의 카운터 경향
      const pickOpponentSkill = (mySkillId, myLevel, oppLevel) => {
        // 레벨 차이에 따라 카운터 확률 조정 (최대 50%)
        const levelDiff = (oppLevel || 1) - (myLevel || 1);
        const counterChance = Math.min(0.5, Math.max(0.1, 0.25 + levelDiff * 0.05));
        if (mySkillId && Math.random() < counterChance) {
          // 내 스킬을 이기는 스킬 선택
          const counter = BATTLE_SKILLS.find(s => s.beats === mySkillId);
          if (counter) return counter.id;
        }
        // 랜덤
        return BATTLE_SKILLS[Math.floor(Math.random() * BATTLE_SKILLS.length)].id;
      };

      // 승패 판정
      const resolveBattle = (mySkillId, oppSkillId) => {
        if (mySkillId === oppSkillId) return "draw";
        const my = BATTLE_SKILLS.find(s => s.id === mySkillId);
        if (!my) return "draw";
        return my.beats === oppSkillId ? "win" : "lose";
      };

      // 배틀 화면 진입 시 매칭 시작
      useEffect(() => {
        if (screen !== "battle") return;
        if (battleStep !== "matching") return;
        // rankingData 없으면 먼저 로드
        if (!rankingData) {
          fetchRanking();
          return;
        }
        const myUid = FirestoreService.getUserId();
        // 약간의 딜레이로 '매칭 중' 연출
        const t = setTimeout(() => {
          const opp = pickBattleOpponent(myUid, level, rankingData);
          if (!opp) {
            setBattleOpponent(null);
            setBattleStep("empty");
          } else {
            setBattleOpponent(opp);
            setBattleStep("ready");
          }
        }, 900);
        return () => clearTimeout(t);
      }, [screen, battleStep, rankingData, level]);

      const startBattle = () => {
        // 다시 매칭
        setBattleOpponent(null);
        setBattleMySkill(null);
        setBattleOppSkill(null);
        setBattleResult(null);
        setBattleStep("matching");
      };

      const selectBattleSkill = (skillId) => {
        if (battleStep !== "ready" || !battleOpponent) return;
        const oppSkillId = pickOpponentSkill(skillId, level, battleOpponent.level);
        const result = resolveBattle(skillId, oppSkillId);
        setBattleMySkill(skillId);
        setBattleOppSkill(oppSkillId);
        setBattleStep("reveal");
        // 0.9초 후 결과 화면으로 전환 + 기록 반영
        setTimeout(() => {
          if (result === "win") {
            setBattleWins(w => w + 1);
            setWeeklyBattleWins(w => w + 1);
            setCoins(c => c + 5); // 승리 시 5코인 보상
          } else if (result === "lose") {
            setBattleLosses(l => l + 1);
          } else {
            setBattleDraws(d => d + 1);
          }
          setBattleResult(result);
          setBattleLog(prev => [
            { ts: Date.now(), opponent: battleOpponent?.name, result, mySkill: skillId, oppSkill: oppSkillId },
            ...prev
          ].slice(0, 5));
          setBattleStep("result");
          // 랭킹 캐시 무효화 (내 승수가 반영되려면)
          try { localStorage.removeItem(RANKING_CACHE_KEY); } catch (e) {}
        }, 900);
      };

      const exitBattle = () => {
        setBattleStep("matching");
        setBattleOpponent(null);
        setBattleMySkill(null);
        setBattleOppSkill(null);
        setBattleResult(null);
        setScreen("ranking");
      };

      // ═══════════════════════════════════════
      // ⚔️ Phase 5b v2: AI 토론 배틀 (Gemini 2.5 Flash)
      // ═══════════════════════════════════════
      const getKstToday = () => {
        const now = new Date();
        const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
        return kst.toISOString().slice(0, 10);
      };

      const canBattleToday = () => {
        if (isAdmin) return true; // 관리자는 무제한
        const today = getKstToday();
        if (lastBattleDate !== today) return true;
        return (battleTodayCount || 0) < 1;
      };

      const BATTLE_PLAY_COIN_COST = 50;
      const BATTLE_PLAY_DAILY_LIMIT = 2;

      // ⚔️ 배틀 v2: HP 시스템 상수
      const BATTLE_V2 = {
        BASE_HP: 100,
        BOOK_HP_BONUS: 5,       // 완독 1권당
        MAX_BOOK_BONUS: 50,
        LEVEL_HP_BONUS: 3,      // 레벨당
        MAX_LEVEL_BONUS: 30,
        DMG_STRONG: [20, 30],   // 정답 강공격 범위
        DMG_WEAK: [5, 10],      // 오답 약공격 범위
        DMG_ULTIMATE_HIT: [40, 50],
        DMG_ULTIMATE_MISS: 10,
        DOMAIN_STRONG_MULT: 1.5,
        DOMAIN_WEAK_MULT: 0.7,
        TIMER_SECONDS: 10,
        TIMER_ULTIMATE: 30,
        ROUNDS: 5,
      };


      // ═══════════════════════════════════════
      // <img src="icons/ui/ui_book_open.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 책 기반 배틀 맵 (아레나) 시스템
      // ═══════════════════════════════════════
      const getWeeklyArenaBook = () => {
        // 주간 추천 책 — 완독률 기준 자동 선정 (매주 월요일 변경)
        const weekNum = Math.floor((Date.now() - new Date("2026-01-05").getTime()) / (7 * 24 * 60 * 60 * 1000));
        const completedBooks = ALL_BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100);
        if (completedBooks.length === 0) return null;
        return completedBooks[weekNum % completedBooks.length];
      };

      const canEnterArena = () => {
        const arenaBook = getWeeklyArenaBook();
        if (!arenaBook) return false;
        return (bookProgress[arenaBook.id] || 0) >= 100;
      };

      const ARENA_BADGE = { name: "아레나 챔피언", icon: "🏟️", desc: "책 아레나 승리" };

      const calcMaxHP = (booksCompleted, playerLevel) => {
        const bookBonus = Math.min((booksCompleted || 0) * BATTLE_V2.BOOK_HP_BONUS, BATTLE_V2.MAX_BOOK_BONUS);
        const lvlBonus = Math.min((playerLevel || 1) * BATTLE_V2.LEVEL_HP_BONUS, BATTLE_V2.MAX_LEVEL_BONUS);
        return BATTLE_V2.BASE_HP + bookBonus + lvlBonus;
      };

      const rollDamage = (range) => {
        if (typeof range === "number") return range;
        return Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
      };
      const RARITY_LABEL = { free: "BASIC", common: "COMMON", rare: "RARE", epic: "EPIC", legendary: "LEGEND", heroic: "HEROIC", mythic: "MYTHIC", hidden: "HIDDEN" };
      const RARITY_BADGE_STYLE = {
        free: { background: "rgba(156,163,175,0.3)", color: "#d1d5db" },
        common: { background: "rgba(34,197,94,0.3)", color: "#4ade80" },
        rare: { background: "rgba(59,130,246,0.3)", color: "#60a5fa" },
        epic: { background: "rgba(168,85,247,0.3)", color: "#c084fc" },
        legendary: { background: "rgba(234,179,8,0.3)", color: "#fde047" },
        heroic: { background: "rgba(59,130,246,0.3)", color: "#60a5fa" },
        mythic: { background: "rgba(236,72,153,0.3)", color: "#f472b6" },
        hidden: { background: "rgba(139,92,246,0.3)", color: "#a78bfa" },
      };
      const remainingPlayCount = () => {
        if (isAdmin) return 999;
        const today = getKstToday();
        if (lastBattlePlayDate !== today) return BATTLE_PLAY_DAILY_LIMIT;
        return Math.max(0, BATTLE_PLAY_DAILY_LIMIT - (battleTodayPlayCount || 0));
      };
      const canPlayToday = () => remainingPlayCount() > 0;
      const canAffordPlay = () => isAdmin || (coins || 0) >= BATTLE_PLAY_COIN_COST;

      // 관리자 켜지면 배틀 에러 자동 삭제
      useEffect(() => {
        if (isAdmin && battleError) setBattleError("");
      }, [isAdmin]);

      const resetBattleSession = () => {
        setBattlePhase("gate");
        setBattleMode(null);
        setBattleMessages([]);
        setBattleRounds(null);
        setBattleWinner(null);
        setBattleNarration("");
        setBattleLoading(false);
        setBattleError("");
        // v2 HP reset
        setMyHP(100); setOppHP(100); setMyMaxHP(100); setOppMaxHP(100);
        setLastDamage(null); setBattleAnim(null);
        setBattleTimer(0); setBattleTimerActive(false);
        if (battleTimerRef.current) clearInterval(battleTimerRef.current);
        // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> BGM 정지
        try { getBattleSound().stopBgm(); } catch(e) {}
      };

      const exitBattleV2 = () => {
        resetBattleSession();
        setBattleOpponent(null);
        setScreen("ranking");
      };

      const launchBattle = async (mode) => {
        if (!canBattleToday()) {
          setBattleError("오늘 배틀 기회를 이미 사용했어요. 내일 다시 도전해줘!");
          return;
        }
        setBattleMode(mode);
        setBattleError("");
        setBattleLoading(true);
        setBattlePhase("playing");
        // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> 배틀 BGM + 시작 효과음
        try { const bs = getBattleSound(); bs.sfx.battleStart(); setTimeout(() => bs.startBgm(), 500); } catch(e) {}
        setBattleMessages([{ kind: "banner", text: mode === "watch" ? "관전 모드 — 내 아바타와 상대가 토론합니다" : "자동진행 모드 — 아바타가 자동으로 싸웁니다" }]);

        try {
          const myUid = FirestoreService.getUserId();
          const opp = battleOpponent || pickBattleOpponent(myUid, level, rankingData);
          if (!opp) throw new Error("상대를 찾지 못했어요. 잠시 후 다시 시도해줘!");
          setBattleOpponent(opp);

          const myAvatarId = sanitizeAvatarId(profile?.avatar);
          const oppAvatarId = sanitizeAvatarId(opp.avatar);
          const myPack = getAvatarKnowledgePack(myAvatarId, bookProgress, { battleWins, battleLosses, level });
          const oppPack = getAvatarKnowledgePack(oppAvatarId, {}, { battleWins: opp.battleWins || 0, battleLosses: opp.battleLosses || 0, level: opp.level || 1 });
          const myName = profile?.name || "나";
          const oppName = opp.name || "상대";

          setBattleMessages(prev => [...prev, { kind: "narration", text: "양쪽 아바타가 입장했어요!" }]);

          const result = await CloudAPI.runAvatarBattle({
            myUid, oppUid: opp.uid, myPack, oppPack, myName, oppName, mode
          });

          setBattleRounds(result.rounds);
          setBattleWinner(result.winner);
          setBattleNarration(result.narration || "");
          await streamBattleMessages(result);
          // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> 관전 모드 배틀 종료: BGM 정지 + 결과 효과음
          try {
            const bs = getBattleSound();
            bs.stopBgm();
            setTimeout(() => { if (result.winner === "my") bs.sfx.victory(); else if (result.winner === "opp") bs.sfx.defeat(); }, 300);
          } catch(e) {}

          // Firestore 저장 + 로컬 통계 업데이트 (관리자는 일일 카운트 증가 안 함)
          if (!isAdmin) {
            const today = getKstToday();
            const nextCount = lastBattleDate === today ? (battleTodayCount || 0) + 1 : 1;
            setLastBattleDate(today);
            setBattleTodayCount(nextCount);
          }
          if (result.winner === "my") {
            setBattleWins(w => w + 1);
            setWeeklyBattleWins(w => w + 1);
          } else if (result.winner === "opp") {
            setBattleLosses(l => l + 1);
          } else {
            setBattleDraws(d => d + 1);
          }
          setBattlePhase("result");
        } catch (e) {
          console.error("launchBattle 실패:", e);
          setBattleError(e.message || "배틀 생성에 실패했어요.");
          setBattlePhase("ready");
        } finally {
          setBattleLoading(false);
        }
      };

      const streamBattleMessages = async (replay) => {
        const wait = (ms) => new Promise(r => setTimeout(r, ms));
        const myName = profile?.name || "나";
        const oppName = battleOpponent?.name || "상대";
        for (let i = 0; i < replay.rounds.length; i++) {
          const r = replay.rounds[i];
          const header = r.type === "qa"
            ? `— 라운드 ${i + 1} · 책 Q&A (${r.book || "책"}) —`
            : r.type === "complete"
            ? `— 라운드 ${i + 1} · 문장 완성 (${r.book || "책"}) —`
            : `— 라운드 ${i + 1} · 미니 토론 —`;
          setBattleMessages(prev => [...prev, { kind: "banner", text: header }]);
          await wait(700);
          if (r.type === "qa") {
            setBattleMessages(prev => [...prev, { kind: "system", text: `${r.question}` }]);
            await wait(900);
            setBattleMessages(prev => [...prev, { kind: "me", name: myName, text: r.myAnswer }]);
            await wait(800);
            setBattleMessages(prev => [...prev, { kind: "opp", name: oppName, text: r.oppAnswer }]);
          } else if (r.type === "complete") {
            setBattleMessages(prev => [...prev, { kind: "system", text: `${r.sentence}` }]);
            await wait(900);
            const myAns = r.completions?.[r.myChoiceIdx] || "?";
            const oppAns = r.completions?.[r.oppChoiceIdx] || "?";
            setBattleMessages(prev => [...prev, { kind: "me", name: myName, text: myAns }]);
            await wait(800);
            setBattleMessages(prev => [...prev, { kind: "opp", name: oppName, text: oppAns }]);
          } else {
            setBattleMessages(prev => [...prev, { kind: "system", text: `주제: ${r.topic}` }]);
            await wait(900);
            setBattleMessages(prev => [...prev, { kind: "me", name: myName, text: `[${r.myStance}] ${r.myArgument}` }]);
            await wait(800);
            setBattleMessages(prev => [...prev, { kind: "opp", name: oppName, text: `[${r.oppStance}] ${r.oppArgument}` }]);
          }
          await wait(700);
          const judgeText = r.judge === "my" ? `판정: ${myName} 승 — ${r.reason}`
            : r.judge === "opp" ? `판정: ${oppName} 승 — ${r.reason}`
            : `판정: 무승부 — ${r.reason}`;
          setBattleMessages(prev => [...prev, { kind: "judge", text: judgeText }]);
          await wait(900);
        }
        if (replay.narration) {
          setBattleMessages(prev => [...prev, { kind: "narration", text: `${replay.narration}` }]);
        }
      };

      // ⚔️ 직접 참여 배틀 모드
      const launchInteractiveBattle = async (debateOwner) => {
        if (!canPlayToday()) {
          setBattleError(`오늘 직접 참여 기회를 모두 썼어요. (${BATTLE_PLAY_DAILY_LIMIT}회/일)`);
          return;
        }
        if (!canAffordPlay()) {
          setBattleError(`코인이 부족해요. ${BATTLE_PLAY_COIN_COST}코인 필요`);
          return;
        }
        setBattleMode("play");
        setMiniDebateOwner(debateOwner);
        setBattleError("");
        setBattleLoading(true);
        setRoundAnswers([]);
        setInteractiveRoundIdx(0);
        setShowRoundResult(false);
        setLastDamage(null);
        setBattleAnim(null);
        // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> 배틀 BGM + 시작 효과음
        try { const bs = getBattleSound(); bs.sfx.battleStart(); setTimeout(() => bs.startBgm(), 500); } catch(e) {}

        try {
          const myUid = FirestoreService.getUserId();
          const opp = battleOpponent || pickBattleOpponent(myUid, level, rankingData);
          if (!opp) throw new Error("상대를 찾지 못했어요. 잠시 후 다시 시도해줘!");
          setBattleOpponent(opp);

          // v2: HP 초기화 (아바타 스킬 보너스 포함)
          const completedBooks = BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100);
          let mHP = calcMaxHP(completedBooks.length, level);
          let oHP = calcMaxHP(0, opp.level || 1);
          // 🎮 스킬 HP 보너스 적용
          const myBattleSkill = getAvatarSkill(profile?.avatar);
          const oppBattleSkill = getAvatarSkill(opp.avatar);
          if (myBattleSkill?.effect?.type === "hp_boost") mHP += myBattleSkill.effect.value;
          if (myBattleSkill?.effect?.type === "dual_boost" && myBattleSkill.effect.value.hp) mHP += myBattleSkill.effect.value.hp;
          if (oppBattleSkill?.effect?.type === "hp_boost") oHP += oppBattleSkill.effect.value;
          if (oppBattleSkill?.effect?.type === "dual_boost" && oppBattleSkill.effect.value.hp) oHP += oppBattleSkill.effect.value.hp;
          setMyHP(mHP); setMyMaxHP(mHP);
          setOppHP(oHP); setOppMaxHP(oHP);
          // 스킬 상태 리셋
          setActiveSkillUsed(false); setSkillActivated(false); setOppSkillSealed(false); setReviveUsed(false);

          const myAvatarId = sanitizeAvatarId(profile?.avatar);
          const oppAvatarId = sanitizeAvatarId(opp.avatar);
          const myPack = getAvatarKnowledgePack(myAvatarId, bookProgress, { battleWins, battleLosses, level });
          const oppPack = getAvatarKnowledgePack(oppAvatarId, {}, { battleWins: opp.battleWins || 0, battleLosses: opp.battleLosses || 0, level: opp.level || 1 });
          const myName = profile?.name || "나";
          const oppName = opp.name || "상대";

          const result = await CloudAPI.runInteractiveBattle({
            myUid, oppUid: opp.uid, myPack, oppPack, myName, oppName, miniDebateOwner: debateOwner
          });

          setInteractiveBattleId(result.battleId);
          setInteractiveRounds(result.rounds);

          // 코인 차감 (관리자 제외)
          if (!isAdmin) {
            setCoins(c => Math.max(0, (c || 0) - BATTLE_PLAY_COIN_COST));
            const today = getKstToday();
            const nextCount = lastBattlePlayDate === today ? (battleTodayPlayCount || 0) + 1 : 1;
            setLastBattlePlayDate(today);
            setBattleTodayPlayCount(nextCount);
          }

          setBattlePhase("play-round");

          // 첫 라운드 타이머 시작 (스킬 시간 보너스 포함)
          const timeSkill = getAvatarSkill(profile?.avatar);
          const timeBonus = (timeSkill?.effect?.type === "time_bonus") ? timeSkill.effect.value
            : (timeSkill?.effect?.type === "multi_hint" && timeSkill.effect.value.time) ? timeSkill.effect.value.time
            : (timeSkill?.effect?.type === "mega_buff" && timeSkill.effect.value.time) ? timeSkill.effect.value.time : 0;
          const firstRound = result.rounds[0];
          if (firstRound?.type === "qa" || firstRound?.type === "complete") {
            setTimeout(() => startBattleTimer(BATTLE_V2.TIMER_SECONDS + timeBonus), 300);
          } else if (firstRound?.type === "debate" && debateOwner === "me") {
            setTimeout(() => startBattleTimer(BATTLE_V2.TIMER_ULTIMATE + timeBonus), 300);
          }
        } catch (e) {
          console.error("launchInteractiveBattle 실패:", e);
          setBattleError(e.message || "배틀 생성에 실패했어요.");
          setBattlePhase("ready");
        } finally {
          setBattleLoading(false);
        }
      };

      const submitRoundAnswer = async (choiceIdx) => {
        if (!interactiveRounds) return;
        const round = interactiveRounds[interactiveRoundIdx];
        let roundResult;

        if (round.type === "qa") {
          // 4지선다 — 정답 맞추면 승
          const myCorrect = choiceIdx === round.answerIdx;
          const oppCorrect = round.oppChoiceIdx === round.answerIdx;
          let judge;
          if (myCorrect && !oppCorrect) judge = "my";
          else if (!myCorrect && oppCorrect) judge = "opp";
          else if (myCorrect && oppCorrect) judge = "draw"; // 둘 다 정답 → 무승부
          else judge = "draw"; // 둘 다 오답 → 무승부
          roundResult = {
            type: "qa",
            myChoiceIdx: choiceIdx,
            oppChoiceIdx: round.oppChoiceIdx,
            answerIdx: round.answerIdx,
            myCorrect,
            oppCorrect,
            judge,
            question: round.question,
            choices: round.choices,
            explanation: round.explanation,
            book: round.book,
          };
        } else if (round.type === "complete") {
          // 문장 완성형 — 정답 맞추면 승
          const myCorrect = choiceIdx === round.answerIdx;
          const oppCorrect = round.oppChoiceIdx === round.answerIdx;
          let judge;
          if (myCorrect && !oppCorrect) judge = "my";
          else if (!myCorrect && oppCorrect) judge = "opp";
          else if (myCorrect && oppCorrect) judge = "draw";
          else judge = "draw";
          roundResult = {
            type: "complete",
            myChoiceIdx: choiceIdx,
            oppChoiceIdx: round.oppChoiceIdx,
            answerIdx: round.answerIdx,
            myCorrect,
            oppCorrect,
            judge,
            sentence: round.sentence,
            completions: round.completions,
            explanation: round.explanation,
            book: round.book,
          };
        } else {
          // 미니토론 (내가 담당) — 옵션 점수 vs 상대 점수
          if (miniDebateOwner === "me") {
            const myOpt = round.myOptions[choiceIdx];
            const myScore = myOpt?.score ?? 0;
            const oppScore = round.oppScore ?? 0;
            let judge;
            if (myScore > oppScore) judge = "my";
            else if (myScore < oppScore) judge = "opp";
            else judge = "draw";
            roundResult = {
              type: "debate",
              topic: round.topic,
              myChoiceIdx: choiceIdx,
              myStance: myOpt?.text || "",
              myScore,
              oppStance: round.oppStance,
              oppScore,
              judge,
              reason: round.reason || "양쪽 주장을 비교한 결과예요.",
            };
          } else {
            // AI 담당 토론은 서버 결과 그대로 사용
            roundResult = {
              type: "debate",
              topic: round.topic,
              myStance: round.myStance,
              myArgument: round.myArgument,
              oppStance: round.oppStance,
              oppArgument: round.oppArgument,
              judge: round.judge,
              reason: round.reason,
            };
          }
        }

        // ── HP 데미지 계산 (스킬 적용) ──
        let myDmg = 0;   // 내가 받는 데미지
        let oppDmg = 0;  // 상대가 받는 데미지
        const mySkill = getAvatarSkill(profile?.avatar);
        const oppSkillData = oppSkillSealed ? null : getAvatarSkill(battleOpponent?.avatar);
        const isDebateRound = roundResult.type === "debate";

        if (roundResult.type === "qa" || roundResult.type === "complete") {
          oppDmg = roundResult.myCorrect
            ? rollDamage(BATTLE_V2.DMG_STRONG)
            : rollDamage(BATTLE_V2.DMG_WEAK);
          myDmg = roundResult.oppCorrect
            ? rollDamage(BATTLE_V2.DMG_STRONG)
            : rollDamage(BATTLE_V2.DMG_WEAK);
        } else {
          if (roundResult.judge === "my") {
            oppDmg = rollDamage(BATTLE_V2.DMG_STRONG);
            myDmg = rollDamage(BATTLE_V2.DMG_WEAK);
          } else if (roundResult.judge === "opp") {
            oppDmg = rollDamage(BATTLE_V2.DMG_WEAK);
            myDmg = rollDamage(BATTLE_V2.DMG_STRONG);
          } else {
            oppDmg = rollDamage(BATTLE_V2.DMG_WEAK);
            myDmg = rollDamage(BATTLE_V2.DMG_WEAK);
          }
        }

        // 🎮 내 패시브 스킬 적용
        if (mySkill?.skillType === "passive") {
          const e = mySkill.effect;
          if (e.type === "dmg_boost") oppDmg = Math.round(oppDmg * (1 + e.value));
          if (e.type === "correct_dmg_boost" && roundResult.myCorrect) oppDmg = Math.round(oppDmg * (1 + e.value));
          if (e.type === "correct_flat_bonus" && roundResult.myCorrect) oppDmg += e.value;
          if (e.type === "shield") myDmg = Math.round(myDmg * (1 - e.value));
          if (e.type === "wrong_shield" && !roundResult.myCorrect) myDmg = Math.round(myDmg * (1 - e.value));
          if (e.type === "opp_dmg_boost") oppDmg = Math.round(oppDmg * (1 + e.value));
          if (e.type === "debate_dmg_boost" && isDebateRound) oppDmg = Math.round(oppDmg * (1 + e.value));
          if (e.type === "draw_bonus_atk" && roundResult.judge === "draw") oppDmg += e.value;
          if (e.type === "draw_to_win" && roundResult.judge === "draw") { roundResult.judge = "my"; oppDmg += 10; }
          if (e.type === "streak_double" && roundAnswers.length > 0 && roundAnswers[roundAnswers.length-1].judge === "my" && roundResult.judge === "my") oppDmg *= 2;
          if (e.type === "last_stand") {
            const curHP = myHP - myDmg; // 예상 남은 HP
            const threshold = myMaxHP * 0.3;
            if (curHP <= threshold && curHP > 0) oppDmg = Math.round(oppDmg * e.value);
          }
          if (e.type === "regen") setMyHP(prev => Math.min(myMaxHP, prev + e.value));
          if (e.type === "lifesteal") { const steal = Math.round(oppDmg * e.value); setMyHP(prev => Math.min(myMaxHP, prev + steal)); }
          if (e.type === "debate_lifesteal" && isDebateRound && roundResult.judge === "my") setMyHP(prev => Math.min(myMaxHP, prev + e.value));
          if (e.type === "double_strike" && roundResult.myCorrect) oppDmg = Math.round(oppDmg * 2);
          if (e.type === "dual_boost") {
            if (e.value.dmg) oppDmg = Math.round(oppDmg * (1 + e.value.dmg));
            if (e.value.shield) myDmg = Math.round(myDmg * (1 - e.value.shield));
          }
          if (e.type === "opp_correct_nerf" && roundResult.oppCorrect) myDmg = Math.round(myDmg * (1 - e.value));
          if (e.type === "pierce") {} // 상대 방어 무시 (상대 shield 무효화는 위에서 이미 처리)
        }

        // 🎮 상대 패시브 스킬 적용 (봉인 안 된 경우)
        if (oppSkillData?.skillType === "passive") {
          const e = oppSkillData.effect;
          if (e.type === "shield") oppDmg = Math.round(oppDmg * (1 - e.value));
          if (e.type === "dmg_boost") myDmg = Math.round(myDmg * (1 + e.value));
          if (e.type === "regen") setOppHP(prev => Math.min(oppMaxHP, prev + e.value));
        }

        // 책 아레나 보상 배율
        if (bookArenaActive) {
          oppDmg = Math.round(oppDmg * 1.2); // 아레나에서 공격력 20% 증가
        }

        // HP 적용 (0 이하로 내려가지 않게)
        setMyHP(prev => Math.max(0, prev - myDmg));
        setOppHP(prev => Math.max(0, prev - oppDmg));

        // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> 정답/오답 + 데미지 효과음
        try {
          const bs = getBattleSound();
          if (roundResult.type === "qa" || roundResult.type === "complete") {
            if (roundResult.myCorrect) bs.sfx.correct(); else bs.sfx.wrong();
          } else {
            if (roundResult.judge === "my") bs.sfx.correct(); else if (roundResult.judge === "opp") bs.sfx.wrong();
          }
          setTimeout(() => bs.sfx.damage(), 200);
        } catch(e) {}

        // 데미지 표시용 상태
        setLastDamage({ myDmg, oppDmg, judge: roundResult.judge });

        // 애니메이션 트리거
        setBattleAnim("hit");
        setTimeout(() => setBattleAnim(null), 600);

        // roundResult에 데미지 정보 추가
        roundResult.myDmg = myDmg;
        roundResult.oppDmg = oppDmg;

        const nextAnswers = [...roundAnswers, roundResult];
        setRoundAnswers(nextAnswers);

        // 타이머 정지
        setBattleTimerActive(false);
        if (battleTimerRef.current) clearInterval(battleTimerRef.current);

        setShowRoundResult(true);
      };

      // 타이머 시작 함수
      const startBattleTimer = (seconds) => {
        if (battleTimerRef.current) clearInterval(battleTimerRef.current);
        setBattleTimer(seconds);
        setBattleTimerActive(true);
        battleTimerRef.current = setInterval(() => {
          setBattleTimer(prev => {
            if (prev <= 1) {
              clearInterval(battleTimerRef.current);
              battleTimerRef.current = null;
              setBattleTimerActive(false);
              return 0;
            }
            // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> 타이머 긴급음 (5초 이하)
            try { if (prev <= 6) { const bs = getBattleSound(); prev <= 3 ? bs.sfx.timerUrgent() : bs.sfx.timerTick(); } } catch(e) {}
            return prev - 1;
          });
        }, 1000);
      };

      // 타이머 0 도달 시 자동 오답 제출 (타이머가 실제로 돌다가 0이 된 경우만)
      const battleTimerWasActive = useRef(false);
      React.useEffect(() => {
        if (battleTimerActive) {
          battleTimerWasActive.current = true;
        }
        if (battleTimer === 0 && !battleTimerActive && battleTimerWasActive.current && battlePhase === "play-round" && !showRoundResult && interactiveRounds) {
          battleTimerWasActive.current = false;
          const round = interactiveRounds[interactiveRoundIdx];
          if (round && (round.type === "qa" || round.type === "complete")) {
            // 타임아웃 → 오답으로 처리 (존재하지 않는 인덱스)
            submitRoundAnswer(-1);
          }
        }
      }, [battleTimer, battleTimerActive]);

      const goToNextRound = async () => {
        setShowRoundResult(false);
        setLastDamage(null);
        const nextIdx = interactiveRoundIdx + 1;
        // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> 라운드 전환 효과음
        try { getBattleSound().sfx.roundTransition(); } catch(e) {}

        // HP가 0인 쪽이 있으면 즉시 종료
        if (myHP <= 0 || oppHP <= 0) {
          await finalizeInteractiveBattle();
          return;
        }

        if (nextIdx < (interactiveRounds?.length || 0)) {
          setInteractiveRoundIdx(nextIdx);
          // 다음 라운드 타이머 시작 (스킬 보너스)
          const nextRound = interactiveRounds[nextIdx];
          const tSkill = getAvatarSkill(profile?.avatar);
          const tBonus = (tSkill?.effect?.type === "time_bonus") ? tSkill.effect.value
            : (tSkill?.effect?.type === "multi_hint" && tSkill.effect.value.time) ? tSkill.effect.value.time
            : (tSkill?.effect?.type === "mega_buff" && tSkill.effect.value.time) ? tSkill.effect.value.time : 0;
          if (nextRound.type === "qa" || nextRound.type === "complete") {
            startBattleTimer(BATTLE_V2.TIMER_SECONDS + tBonus);
          } else if (nextRound.type === "debate" && miniDebateOwner === "me") {
            startBattleTimer(BATTLE_V2.TIMER_ULTIMATE + tBonus);
          }
          // AI가 미니토론 담당이면 자동 처리
          if (nextRound.type === "debate" && miniDebateOwner === "ai") {
            await submitRoundAnswer(0); // AI 담당은 선택 없이 자동
          }
        } else {
          // 전체 종료 → 결과 집계
          await finalizeInteractiveBattle();
        }
      };

      const finalizeInteractiveBattle = async () => {
        const myWins = roundAnswers.filter(r => r.judge === "my").length;
        const oppWins = roundAnswers.filter(r => r.judge === "opp").length;

        // HP 기반 승리 판정 (v2)
        let winner;
        if (myHP > oppHP) winner = "my";
        else if (myHP < oppHP) winner = "opp";
        else {
          // HP 동점이면 라운드 승수로 판정
          if (myWins > oppWins) winner = "my";
          else if (myWins < oppWins) winner = "opp";
          else winner = "draw";
        }

        setBattleWinner(winner);
        setBattleRounds(roundAnswers);
        // <img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /> BGM 정지 + 승리/패배 효과음
        try {
          const bs = getBattleSound();
          bs.stopBgm();
          setTimeout(() => {
            if (winner === "my") bs.sfx.victory();
            else if (winner === "opp") bs.sfx.defeat();
            else bs.sfx.roundTransition();
          }, 300);
        } catch(e) {}

        // 내러티브 생성 (HP 표시 포함)
        const myName = profile?.name || "나";
        const oppName = battleOpponent?.name || "상대";
        const narration = winner === "my"
          ? `${myName}의 집중력이 ${oppName}를 이겼어요! HP ${myHP} vs ${oppHP} `
          : winner === "opp"
          ? `${oppName}가 HP ${oppHP} vs ${myHP}로 앞섰어요. 다음엔 꼭 복수하자!`
          : `HP ${myHP} vs ${oppHP}, 팽팽한 무승부!`;
        setBattleNarration(narration);

        try {
          const myUid = FirestoreService.getUserId();
          const opp = battleOpponent;
          if (interactiveBattleId && opp) {
            await CloudAPI.submitInteractiveResult({
              myUid, oppUid: opp.uid, battleId: interactiveBattleId, winner, roundResults: roundAnswers
            });
          }
        } catch (e) {
          console.error("submitInteractiveResult 실패:", e);
        }

        if (winner === "my") {
          setBattleWins(w => w + 1);
          setWeeklyBattleWins(w => w + 1);
          // <img src="icons/ui/ui_roulette.png" alt="" style={{ width: 16, height: 16, verticalAlign: "middle" }} /> 승리 룰렛 활성화
          setShowRoulette(true);
        } else if (winner === "opp") {
          setBattleLosses(l => l + 1);
          // 🔁 복수전 등록
          if (battleOpponent) {
            setRematchData({
              oppUid: battleOpponent.uid,
              oppName: battleOpponent.name,
              ts: Date.now(),
              multiplier: 1.5
            });
          }
        } else {
          setBattleDraws(d => d + 1);
        }

        // 🔁 라이벌 체크 — 같은 상대 3회 이상 대전
        if (battleOpponent?.uid) {
          const oppUid = battleOpponent.uid;
          setBattleHistory(prev => {
            const newHist = [...prev, { oppUid, oppName: battleOpponent.name, winner, ts: Date.now() }].slice(-50);
            const vsCount = newHist.filter(h => h.oppUid === oppUid).length;
            if (vsCount >= 3) {
              setRivalData(rd => ({
                ...rd,
                [oppUid]: { name: battleOpponent.name, count: vsCount, since: rd[oppUid]?.since || Date.now() }
              }));
            }
            return newHist;
          });
        }

        // 스킬 관련 리셋
        setActiveSkillUsed(false);
        setSkillActivated(false);
        setOppSkillSealed(false);
        setReviveUsed(false);
        setBookArenaActive(false);

        setBattlePhase("result");
      };

      const BattleScreen = () => {
        const winRate = (battleWins + battleLosses) > 0
          ? Math.round(battleWins * 100 / (battleWins + battleLosses)) : 0;
        const opp = battleOpponent;

        // <img src="icons/ui/ui_clapper.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 다이나믹 배경 — phase별 마법 장면
        const battleBg = (battlePhase === "playing" || battlePhase === "play-round")
          ? "icons/v1/backgrounds/bg_battle_active.jpg"
          : battlePhase === "result"
          ? "icons/v1/backgrounds/bg_battle_result.jpg"
          : "icons/v1/backgrounds/bg_battle_lobby.jpg";

        return (
          <div style={{
            padding: "16px 16px 100px",
            minHeight: "100vh",
            color: "white",
            position: "relative",
            background: `linear-gradient(180deg, rgba(30,27,75,0.72) 0%, rgba(49,46,129,0.58) 30%, rgba(76,29,149,0.80) 100%), url("${battleBg}") center/cover no-repeat fixed`,
            backgroundBlendMode: "multiply"
          }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
              <div onClick={exitBattleV2} style={{ cursor: "pointer", fontSize: 14, fontWeight: 700, opacity: 0.85 }}>← 나가기</div>
              <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1.2, opacity: 0.8 }}><img src="icons/ui/ui_swords.png" alt="" style={{ width: 16, height: 16, verticalAlign: "middle" }} /> 아바타 토론배틀{isAdmin && " · 관리자"}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span onClick={() => { setBattleSoundMuted(m => { const next = !m; try { getBattleSound().setVolume(next ? 0 : 0.3); if (next) getBattleSound().stopBgm(false); } catch(e) {} return next; }); }}
                  style={{ cursor: "pointer", fontSize: 16, opacity: 0.85 }}>{battleSoundMuted ? <img src="icons/ui/ui_mute.png" style={{ width: 16, height: 16 }} /> : <img src="icons/ui/ui_speaker.png" style={{ width: 16, height: 16 }} />}</span>
                <span style={{ fontSize: 11, opacity: 0.85, fontWeight: 700 }}>{battleWins}승 {battleLosses}패</span>
              </div>
            </div>

            <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 16, padding: "12px 14px", marginBottom: 16, border: "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 10, opacity: 0.7, fontWeight: 700 }}>이번 주 승수</div>
                  <div style={{ fontSize: 26, fontWeight: 900 }}>{weeklyBattleWins}<span style={{ fontSize: 12, opacity: 0.7 }}>승</span></div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 10, opacity: 0.7, fontWeight: 700 }}>승률</div>
                  <div style={{ fontSize: 20, fontWeight: 900 }}>{winRate}%</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 10, opacity: 0.7, fontWeight: 700 }}>랭킹 가점</div>
                  <div style={{ fontSize: 20, fontWeight: 900, color: "#fde047" }}>+{(weeklyBattleWins * 0.3).toFixed(1)}</div>
                </div>
              </div>
            </div>

            {/* 🎰 룰렛 보상 업그레이드 공지 */}
            {battlePhase === "gate" && (
              <div style={{ background: "linear-gradient(135deg, rgba(251,191,36,0.25), rgba(168,85,247,0.25))", borderRadius: 14, padding: "10px 14px", marginBottom: 14, border: "1px solid rgba(251,191,36,0.4)", position: "relative" }}>
                <div style={{ fontSize: 12, fontWeight: 900, color: "#fde047", marginBottom: 4 }}><img src="icons/ui/ui_roulette.png" alt="" style={{ width: 16, height: 16, verticalAlign: "middle" }} /> 승리 룰렛 보상 대폭 UP!</div>
                <div style={{ fontSize: 10, color: "#e2e8f0", lineHeight: 1.5 }}>
                  <img src="icons/ui/ui_coins.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 코인·XP 3~4배 상향 | <img src="icons/ui/ui_sparkle.png" alt="" style={{ width: 12, height: 12, verticalAlign: "middle" }} /> 랜덤 아이템 드랍<br/>
                  <img src="icons/ui/ui_unicorn.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> <span style={{ color: "#e879f9", fontWeight: 700 }}>전설 등급: 레어 아바타 획득 찬스!</span> (확률 3%)
                </div>
              </div>

            {/* GATE — 일1회 소진 (but 직접 참여는 가능) */}
            {battlePhase === "gate" && !canBattleToday() && !canPlayToday() && (
              <div style={{ textAlign: "center", padding: "50px 20px" }}>
                <div style={{ fontSize: 56, marginBottom: 14 }}><img src="icons/ui/ui_hourglass.png" alt="" style={{ width: 40, height: 40 }} /></div>
                <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 8 }}>오늘 배틀은 끝!</div>
                <div style={{ fontSize: 13, opacity: 0.8, lineHeight: 1.6 }}>관전/자동진행 1회 + 배틀시작 {BATTLE_PLAY_DAILY_LIMIT}회 모두 썼어요.<br />내일 다시 만나요</div>
                <button onClick={exitBattleV2} style={{ marginTop: 22, padding: "10px 22px", borderRadius: 12, border: "none", background: "white", color: "#4c1d95", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>랭킹으로 돌아가기</button>
              </div>
            )}

            {/* GATE — 관람/대리는 썼지만 직접 참여는 가능 */}
            {battlePhase === "gate" && !canBattleToday() && canPlayToday() && (
              <div>
                <div style={{ textAlign: "center", padding: "20px 20px 10px" }}>
                  <div style={{ fontSize: 44, marginBottom: 10 }}><img src="icons/ui/ui_swords.png" alt="" style={{ width: 40, height: 40 }} /></div>
                  <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 6 }}>관람/대리 배틀은 끝!</div>
                  <div style={{ fontSize: 12, opacity: 0.85, lineHeight: 1.6 }}>배틀시작 아직 {remainingPlayCount()}회 남았어요.<br/>코인 {BATTLE_PLAY_COIN_COST}개로 도전 가능!</div>
                </div>
                {battleError && !isAdmin && (
                  <div style={{ background: "rgba(239,68,68,0.2)", border: "1px solid rgba(239,68,68,0.5)", borderRadius: 12, padding: 12, fontSize: 12, margin: "12px 0" }}>{battleError}</div>
                )}
                <button
                  onClick={() => {
                    if (!canAffordPlay()) { setBattleError(`코인이 부족해요. ${BATTLE_PLAY_COIN_COST}코인 필요`); return; }
                    setBattlePhase("debate-choice");
                  }}
                  disabled={battleLoading}
                  style={{ width: "100%", padding: "14px 16px", borderRadius: 14, border: "2px solid #fde047", background: "linear-gradient(135deg, #f59e0b, #dc2626)", color: "white", fontSize: 15, fontWeight: 800, cursor: "pointer", marginTop: 14, opacity: battleLoading ? 0.6 : 1, display:"flex", alignItems:"center", justifyContent:"flex-start", gap:10 }}>
                  <img src="icons/battle-direct.png" alt="" style={{width:40,height:40,objectFit:"contain",flexShrink:0}} /> 배틀시작 ({BATTLE_PLAY_COIN_COST}코인 · {remainingPlayCount()}/{BATTLE_PLAY_DAILY_LIMIT})
                </button>
                <button onClick={exitBattleV2} style={{ width: "100%", marginTop: 10, padding: "10px 22px", borderRadius: 12, border: "none", background: "rgba(255,255,255,0.1)", color: "white", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>랭킹으로 돌아가기</button>
              </div>
            )}

            {/* READY — 모드 선택 */}
            {(battlePhase === "gate" && canBattleToday()) || battlePhase === "ready" ? (
              <div>
                {opp && (
                  <div style={{ background: "rgba(255,255,255,0.1)", borderRadius: 16, padding: 16, marginBottom: 16, textAlign: "center" }}>
                    <div style={{ fontSize: 11, opacity: 0.7, fontWeight: 700, marginBottom: 8 }}>오늘의 상대</div>
                    <div style={{ fontSize: 18, fontWeight: 900, marginBottom: 4 }}>{opp.name}</div>
                    <div style={{ fontSize: 11, opacity: 0.75 }}>Lv.{opp.level || 1} · {opp.battleWins || 0}승 {opp.battleLosses || 0}패</div>

                <div style={{ fontSize: 13, opacity: 0.85, textAlign: "center", marginBottom: 14, lineHeight: 1.7 }}>

                </div>
                {battleError && !isAdmin && (
                  <div style={{ background: "rgba(239,68,68,0.2)", border: "1px solid rgba(239,68,68,0.5)", borderRadius: 12, padding: 12, fontSize: 12, marginBottom: 12 }}>{battleError}</div>

                {/* <img src="icons/ui/ui_book_open.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 책 아레나 */}
                {(() => {
                  const arenaBook = getWeeklyArenaBook();
                  const eligible = canEnterArena();

                  return (
                    <div style={{ background: eligible ? "linear-gradient(135deg, rgba(34,197,94,0.25), rgba(16,185,129,0.15))" : "rgba(255,255,255,0.05)", borderRadius: 14, padding: 12, marginBottom: 14, border: eligible ? "1px solid rgba(34,197,94,0.4)" : "1px solid rgba(255,255,255,0.1)" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>

                          <div style={{ fontSize: 12, fontWeight: 900, color: "#22c55e" }}>이번 주 책 아레나</div>

                        </div>
                      </div>
                      {eligible ? (
                        <button onClick={() => { setBookArenaActive(true); setBookArenaBook(arenaBook); setBattlePhase("debate-choice"); }}
                          style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #22c55e, #16a34a)", color: "white", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>
                          {<img src="icons/ui/ui_arena.png" alt="" style={{ width: 16, height: 16, verticalAlign: "middle" }} />} 아레나 입장 (보상 3배!)

                      )}
                    </div>
                  );
                })()}

                <button onClick={() => launchBattle("watch")} disabled={battleLoading}
                  style={{ width: "100%", padding: "14px 16px", borderRadius: 14, border: "none", background: "linear-gradient(135deg, #a855f7, #7c3aed)", color: "white", fontSize: 15, fontWeight: 800, cursor: "pointer", marginBottom: 10, opacity: battleLoading ? 0.6 : 1, display:"flex", alignItems:"center", justifyContent:"flex-start", gap:10 }}>

                </button>
                <button
                  onClick={() => {
                    if (!canPlayToday()) { setBattleError(`오늘 직접 참여 기회를 모두 썼어요. (${BATTLE_PLAY_DAILY_LIMIT}회/일)`); return; }
                    if (!canAffordPlay()) { setBattleError(`코인이 부족해요. ${BATTLE_PLAY_COIN_COST}코인 필요`); return; }
                    setBattlePhase("debate-choice");
                  }}
                  disabled={battleLoading}
                  style={{ width: "100%", padding: "14px 16px", borderRadius: 14, border: "2px solid #fde047", background: "linear-gradient(135deg, #f59e0b, #dc2626)", color: "white", fontSize: 15, fontWeight: 800, cursor: "pointer", opacity: battleLoading ? 0.6 : 1, display:"flex", alignItems:"center", justifyContent:"flex-start", gap:10 }}>
                  <img src="icons/battle-direct.png" alt="" style={{width:40,height:40,objectFit:"contain",flexShrink:0}} /> 배틀시작 ({BATTLE_PLAY_COIN_COST}코인 · {remainingPlayCount()}/{BATTLE_PLAY_DAILY_LIMIT})
                </button>
                <div style={{ fontSize: 10, opacity: 0.7, textAlign: "center", marginTop: 8, lineHeight: 1.5 }}>
