          {/* 📚 학년 변경 */}
          <div style={{ marginTop: 12, background: "white", borderRadius: 12, padding: 16, border: "2px solid #eee", overflow: "hidden" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#555", marginBottom: 8, display: "flex", alignItems: "center", gap: 4 }}>
              📚 학년 <span style={{ fontSize: 11, color: "#667eea", fontWeight: 700 }}>({profile?.grade ? (["4","5","6"].includes(profile.grade) ? `초등 ${profile.grade}학년` : `${profile.grade}학년`) : "미설정"})</span>
            </div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {["4", "5", "6", "중1"].map(g => (
                <button key={g} onClick={() => { setProfile(prev => ({ ...prev, grade: g })); setProfileForm(prev => ({ ...prev, grade: g })); }}
                  style={{
                    padding: "7px 14px", borderRadius: 20, border: "2px solid",
                    borderColor: profile?.grade === g ? "#667eea" : "#eee",
                    background: profile?.grade === g ? "#667eea" : "white",
                    color: profile?.grade === g ? "white" : "#666",
                    fontSize: 12, fontWeight: 600, cursor: "pointer"
                  }}>
                  {["4","5","6"].includes(g) ? `초${g}` : g}
                </button>
              ))}
            </div>
          </div>

          {/* 🔑 복구 PIN 설정/변경 */}
          <div style={{ marginTop: 12, background: "white", borderRadius: 12, padding: 16, border: "2px solid #eee", overflow: "hidden" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#555", marginBottom: 8, display: "flex", alignItems: "center", gap: 4 }}>
              🔑 복구 PIN {recoveryPin ? <span style={{ fontSize: 11, color: "#22c55e", fontWeight: 700 }}>(설정됨)</span> : <span style={{ fontSize: 11, color: "#ef4444", fontWeight: 700 }}>(미설정)</span>}
            </div>
            <div style={{ fontSize: 11, color: "#aaa", marginBottom: 10 }}>앱 재설치 시 데이터 복구에 사용됩니다</div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <input
                id="pinSettingInput"
                type="tel" inputMode="numeric" maxLength={4}
                placeholder={recoveryPin ? "●●●●" : "숫자 4자리"}
                style={{ flex: 1, minWidth: 0, padding: "10px 12px", borderRadius: 10, border: "2px solid #eee", fontSize: 16, textAlign: "center", letterSpacing: 6, outline: "none", fontWeight: 700, boxSizing: "border-box" }}
              />
              <button onClick={() => {
                const input = document.getElementById("pinSettingInput");
                const val = input.value.replace(/[^0-9]/g, "");
                if (val.length === 4) {
                  setRecoveryPin(val);
                  input.value = "";
                  alert("복구 PIN이 설정되었어요!");
                } else {
                  alert("4자리 숫자를 입력해주세요.");
                }
              }}
                style={{ padding: "10px 16px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #667eea, #764ba2)", color: "white", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
                {recoveryPin ? "변경" : "설정"}
              </button>
            </div>
          </div>

          {/* 📥 데이터 가져오기 + 백업 상태 */}
          <button onClick={() => setShowImportModal(true)}
            style={{
              width: "100%", marginTop: 12, padding: "12px", borderRadius: 12, border: "2px solid #667eea",
              background: "#667eea08", color: "#667eea", fontSize: 13, fontWeight: 700, cursor: "pointer", boxSizing: "border-box"
            }}>
            📥 데이터 가져오기
          </button>
          <div style={{ fontSize: 11, color: "#aaa", textAlign: "center", marginTop: 6 }}>
            자동 백업: {lastBackupDate ? `${lastBackupDate.slice(5).replace("-","/")} 완료` : "아직 없음"} · 매일 자동 저장
          </div>

          {/* ⚙️ 앱 정보 + 관리자 (하나로 묶어서 접기/펼치기) */}
          <div style={{ marginTop: 24, padding: 16, background: "white", borderRadius: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
            <button onClick={() => toggleSection("profApp")}
              style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", background: "none", border: "none", padding: 0, cursor: "pointer", marginBottom: collapsedSections.profApp ? 0 : 12 }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: "#1a1a2e" }}>⚙️ 앱 정보 & 관리</span>
              <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, color: "#999", fontWeight: 600 }}>v{APP_VERSION}</span>
                <span style={{ fontSize: 14, color: "#888", transition: "transform 0.2s", transform: collapsedSections.profApp ? "rotate(-90deg)" : "rotate(0deg)" }}>▼</span>
              </span>
            </button>
            {!collapsedSections.profApp && (<>
              <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                <button onClick={() => setShowChangelog(true)}
                  style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: "1.5px solid #667eea", background: "#667eea08", color: "#667eea", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                  📋 업데이트 노트
                </button>
                <button onClick={() => setShowRollback(true)}
                  style={{ flex: 1, padding: "10px 0", borderRadius: 10, border: "1.5px solid #f59e0b", background: "#f59e0b08", color: "#f59e0b", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                  ⏪ 이전 버전 복원
                </button>
              </div>
              <button onClick={() => isAdmin ? setScreen("admin") : setShowAdminLogin(true)}
                style={{ width: "100%", padding: "12px", borderRadius: 10, border: "1.5px solid #ef4444", background: isAdmin ? "#ef4444" : "#ef444408", color: isAdmin ? "white" : "#ef4444", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
                {isAdmin ? "🔓 관리자 패널 열기" : "🔒 관리자 모드"}
              </button>
            </>)}
          </div>
        </div>
        );
      };

      // ═══════════════════════════════════════
      // 📥 데이터 가져오기 모달
      // ═══════════════════════════════════════
      const ImportDataModal = () => {
        const [step, setStep] = useState("form"); // form | pin | loading | success | notfound | selectBackup
        const [impName, setImpName] = useState("");
        const [impSchool, setImpSchool] = useState("");
        const [impPin, setImpPin] = useState("");
        const [impError, setImpError] = useState("");
        const [impLoading, setImpLoading] = useState(false);
        const [impMatches, setImpMatches] = useState([]);
        const [impSelected, setImpSelected] = useState(null);
        const [impBackups, setImpBackups] = useState([]);

        if (!showImportModal) return null;

        const closeModal = () => {
          setShowImportModal(false);
          setStep("form"); setImpName(""); setImpSchool(""); setImpPin("");
          setImpError(""); setImpMatches([]); setImpSelected(null); setImpBackups([]);
        };

        const handleSearch = async () => {
          if (!impName.trim()) return;
          setImpLoading(true); setImpError("");
          const matches = await FirestoreService.findUsersForRecovery(impName.trim(), impSchool.trim());
          setImpLoading(false);
          if (matches.length === 0) {
            setStep("notfound");
          } else {
            const withPin = matches.filter(m => m.recoveryPin);
            if (withPin.length === 0) {
              setImpError("이 계정에는 복구 PIN이 설정되어 있지 않아요.");
              setStep("notfound");
            } else {
              setImpMatches(withPin);
              setImpSelected(withPin[0]);
              setStep("pin");
            }
          }
        };

        const handlePinVerify = async () => {
          if (!impSelected || impPin.length !== 4) return;
          if (impPin !== impSelected.recoveryPin) {
            setImpError("PIN이 일치하지 않아요.");
            return;
          }
          setImpError("");
          setImpLoading(true);
          // 백업 목록 조회
          try {
            const snaps = await db.collection("users").doc(impSelected.uid)
              .collection("backups").orderBy("backupDate", "desc").limit(7).get();
            const backups = [];
            snaps.forEach(doc => {
              const d = doc.data();
              backups.push({ id: doc.id, ...d });
            });
            setImpBackups(backups);
            setImpLoading(false);
            if (backups.length > 0) {
              setStep("selectBackup");
            } else {
              // 백업 없으면 현재 데이터에서 바로 복구
              handleRestoreFromMain();
            }
          } catch (e) {
            console.error("백업 조회 실패:", e);
            setImpLoading(false);
            // 백업 조회 실패해도 메인 데이터에서 복구 시도
            handleRestoreFromMain();
          }
        };

        const handleRestoreFromMain = () => {
          FirestoreService.restoreUid(impSelected.uid);
          setStep("success");
        };

        const handleRestoreFromBackup = async (backup) => {
          setImpLoading(true);
          try {
            // 현재 UID의 메인 데이터를 백업 데이터로 덮어쓰기
            const uid = FirestoreService.getUserId();
            const { backupDate, backupTime, ...restoreData } = backup;
            await db.collection("users").doc(uid).set({
              ...restoreData,
              restoredFrom: impSelected.uid,
              restoredBackupDate: backupDate,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: false });
            setImpLoading(false);
            setStep("success");
          } catch (e) {
            console.error("백업 복원 실패:", e);
            setImpLoading(false);
            setImpError("복원 중 오류가 발생했어요.");
          }
        };

        return (
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
            onClick={closeModal}>
            <div style={{ background: "white", borderRadius: 20, padding: 24, width: "100%", maxWidth: 360 }}
              onClick={e => e.stopPropagation()}>

              {step === "form" && (<>
                <h3 style={{ fontSize: 18, fontWeight: 800, textAlign: "center", marginBottom: 4 }}>📥 데이터 가져오기</h3>
                <p style={{ fontSize: 12, color: "#888", textAlign: "center", marginBottom: 20 }}>다른 기기나 이전 데이터를 불러옵니다</p>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>이름 *</label>
                  <input value={impName} onChange={e => setImpName(e.target.value)}
                    placeholder="가입 시 입력한 이름"
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 12, border: "2px solid #eee", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>
                <div style={{ marginBottom: 18 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>학교</label>
                  <input value={impSchool} onChange={e => setImpSchool(e.target.value)}
                    placeholder="학교 이름"
                    style={{ width: "100%", padding: "11px 14px", borderRadius: 12, border: "2px solid #eee", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>
                <button onClick={handleSearch} disabled={!impName.trim() || impLoading}
                  style={{
                    width: "100%", padding: "13px", borderRadius: 14, border: "none",
                    background: impName.trim() ? "linear-gradient(135deg, #667eea, #764ba2)" : "#ddd",
                    color: "white", fontSize: 15, fontWeight: 700, cursor: impName.trim() ? "pointer" : "default"
                  }}>
                  {impLoading ? "검색 중..." : "계정 찾기"}
                </button>
              </>)}

              {step === "pin" && impSelected && (<>
                <div style={{ textAlign: "center", marginBottom: 16 }}>
                  <AvatarIcon avatarId={impSelected.avatar} size={56} />
                  <div style={{ fontSize: 15, fontWeight: 700, marginTop: 6 }}>{impSelected.name}</div>
                  <div style={{ fontSize: 12, color: "#888" }}>
                    {impSelected.school ? impSelected.school + " · " : ""}Lv.{impSelected.level} · {impSelected.coins} 코인
                  </div>
                </div>
                <div style={{ marginBottom: 14 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>복구 PIN</label>
                  <input value={impPin} onChange={e => { setImpError(""); setImpPin(e.target.value.replace(/[^0-9]/g, "").slice(0, 4)); }}
                    placeholder="●●●●" maxLength={4} type="tel" inputMode="numeric"
                    style={{ width: "100%", padding: "12px", borderRadius: 12, border: "2px solid #eee", fontSize: 22, textAlign: "center", letterSpacing: 10, outline: "none", boxSizing: "border-box", fontWeight: 700 }} />
                </div>
                {impError && <div style={{ color: "#ef4444", fontSize: 12, textAlign: "center", marginBottom: 10 }}>{impError}</div>}
                <button onClick={handlePinVerify} disabled={impPin.length !== 4 || impLoading}
                  style={{
                    width: "100%", padding: "13px", borderRadius: 14, border: "none",
                    background: impPin.length === 4 ? "linear-gradient(135deg, #667eea, #764ba2)" : "#ddd",
                    color: "white", fontSize: 15, fontWeight: 700, cursor: impPin.length === 4 ? "pointer" : "default"
                  }}>
                  {impLoading ? "확인 중..." : "확인"}
                </button>
                {impMatches.length > 1 && (
                  <div style={{ marginTop: 10, fontSize: 12, color: "#888", textAlign: "center" }}>
                    {impMatches.length}개 계정 ·
                    <button onClick={() => {
                      const idx = impMatches.indexOf(impSelected);
                      setImpSelected(impMatches[(idx + 1) % impMatches.length]);
                      setImpPin(""); setImpError("");
                    }} style={{ background: "none", border: "none", color: "#667eea", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                      다른 계정
                    </button>
                  </div>
                )}
              </>)}

              {step === "selectBackup" && (<>
                <h3 style={{ fontSize: 16, fontWeight: 800, textAlign: "center", marginBottom: 4 }}>백업 선택</h3>
                <p style={{ fontSize: 12, color: "#888", textAlign: "center", marginBottom: 16 }}>복원할 백업을 선택하세요</p>
                <div style={{ maxHeight: 280, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8 }}>
                  {/* 최신 데이터 (현재) */}
                  <button onClick={() => handleRestoreFromMain()}
                    style={{
                      width: "100%", padding: "12px 14px", borderRadius: 12, border: "2px solid #667eea",
                      background: "#667eea08", textAlign: "left", cursor: "pointer"
                    }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: "#667eea" }}>최신 데이터 (현재)</div>
                    <div style={{ fontSize: 11, color: "#888" }}>Lv.{impSelected.level} · {impSelected.coins} 코인 · 연속 {impSelected.streak}일</div>
                  </button>
                  {/* 백업 목록 */}
                  {impBackups.map(b => (
                    <button key={b.id} onClick={() => handleRestoreFromBackup(b)}
                      disabled={impLoading}
                      style={{
                        width: "100%", padding: "12px 14px", borderRadius: 12, border: "2px solid #eee",
                        background: "white", textAlign: "left", cursor: "pointer"
                      }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#1a1a2e" }}>{b.backupDate} 백업</div>
                      <div style={{ fontSize: 11, color: "#888" }}>Lv.{b.level || 1} · {b.coins || 0} 코인 · 연속 {b.streak || 0}일</div>
                    </button>
                  ))}
                </div>
              </>)}

              {step === "success" && (<>
                <div style={{ textAlign: "center", padding: "16px 0" }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
                  <div style={{ fontSize: 18, fontWeight: 800, marginBottom: 8 }}>가져오기 완료!</div>
                  <div style={{ fontSize: 13, color: "#888" }}>앱을 다시 시작하면 데이터가 적용됩니다.</div>
                </div>
                <button onClick={() => window.location.reload()}
                  style={{
                    width: "100%", padding: "13px", borderRadius: 14, border: "none",
                    background: "linear-gradient(135deg, #667eea, #764ba2)",
                    color: "white", fontSize: 15, fontWeight: 700, cursor: "pointer"
                  }}>
                  앱 다시 시작
                </button>
              </>)}

              {step === "notfound" && (<>
                <div style={{ textAlign: "center", padding: "16px 0" }}>
                  <div style={{ fontSize: 40, marginBottom: 8 }}>😢</div>
                  <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>계정을 찾을 수 없어요</div>
                  <div style={{ fontSize: 13, color: "#888" }}>{impError || "입력한 정보와 일치하는 계정이 없습니다."}</div>
                </div>
                <button onClick={() => { setStep("form"); setImpError(""); setImpName(""); setImpSchool(""); }}
                  style={{
                    width: "100%", padding: "12px", borderRadius: 14, border: "2px solid #667eea",
                    background: "white", color: "#667eea", fontSize: 14, fontWeight: 700, cursor: "pointer"
                  }}>
                  다시 검색하기
                </button>
              </>)}

              <button onClick={closeModal}
                style={{ width: "100%", padding: "10px", background: "none", border: "none", color: "#aaa", fontSize: 13, cursor: "pointer", marginTop: 12 }}>
                닫기
              </button>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🔒 Admin Panel
      // ═══════════════════════════════════════
      const AdminLoginModal = () => {
        if (!showAdminLogin) return null;
        return (
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center" }}
            onClick={() => { setShowAdminLogin(false); setAdminPin(""); setAdminPinError(false); }}>
            <div style={{ background: "white", borderRadius: 20, padding: 24, width: "85%", maxWidth: 320, textAlign: "center" }}
              onClick={e => e.stopPropagation()}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>🔒</div>
              <h3 style={{ fontSize: 16, fontWeight: 800, color: "#1a1a2e", marginBottom: 4 }}>관리자 모드</h3>
              <p style={{ fontSize: 12, color: "#888", marginBottom: 16 }}>관리자 비밀번호를 입력하세요</p>
              <input
                type="password"
                value={adminPin}
                onChange={e => { setAdminPin(e.target.value); setAdminPinError(false); }}

      const AskBookScreen = () => {
        // 읽은 책 데이터를 문자열로 변환
        const getBookDataString = () => {
          const completedBooks = BOOKS.filter(b => {
            const progress = bookProgress[b.id] || 0;
            return progress > 0;
          });
          if (completedBooks.length === 0) return "아직 읽은 책이 없습니다.";
          return completedBooks.map(b =>
            `📖 "${b.title}" (${b.author})\n요약: ${b.summary}\n핵심포인트: ${b.keyPoints.join(", ")}\n챕터: ${b.chapters.map(c => c.title).join(", ")}`
          ).join("\n\n");
        };

        const sendAskMessage = async (messageText = null) => {
          const text = messageText || askInput.trim();
          if (!text || askLoading) return;
          setAskInput("");
          try { getAppSound().sfx.chat_send(); } catch(e) {}
          setAskMessages(prev => [...prev, { role: "user", text }]);
          setAskLoading(true);

          const answer = await CloudAPI.askBook(text, getBookDataString(), askMessages.slice(-6), profile?.name);
          setAskMessages(prev => [...prev, { role: "ai", text: answer, expression: "speaking" }]);
          try { getAppSound().sfx.chat_receive(); } catch(e) {}
          setAskLoading(false);
          completeMissionByTrigger("question");

          setIsSpeaking(true);
          VoiceService.speak(answer, () => { setIsSpeaking(false); });
        };

        const startAskListening = () => {
          if (!voiceSupported || askListening) return;
          askRecRef.current = VoiceService.createRecognizer();
          const rec = askRecRef.current;
          if (!rec) return;
          setAskListening(true);
          askListeningRef.current = true;
          setAskInput("");

          rec.onresult = (event) => {
            let finalText = "", interimText = "";
            for (let i = 0; i < event.results.length; i++) {
              if (event.results[i].isFinal) finalText += event.results[i][0].transcript;
              else interimText += event.results[i][0].transcript;
            }
            const full = (finalText + interimText).trim();
            if (full) setAskInput(full);
          };
          rec.onerror = (e) => { if (e.error !== 'no-speech') { setAskListening(false); askListeningRef.current = false; } };
          rec.onend = () => { if (askListeningRef.current) { try { rec.start(); } catch(e) { setAskListening(false); askListeningRef.current = false; } } };
          try { rec.start(); } catch(e) { setAskListening(false); askListeningRef.current = false; }
        };

        const finishAskListening = () => {
          setAskListening(false);
          askListeningRef.current = false;
          if (askRecRef.current) { try { askRecRef.current.stop(); } catch(e) {} askRecRef.current = null; }
          const text = askInput.trim();
          if (text) setTimeout(() => sendAskMessage(text), 300);
        };

        return (
          <div style={{ display: "flex", flexDirection: "column", height: "100vh", paddingBottom: 70 }}>
            <div style={{ padding: "16px 20px", background: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)", color: "white", flexShrink: 0 }}>

              <div style={{ fontSize: 12, opacity: 0.9, marginTop: 4 }}>읽은 책 내용을 바탕으로 궁금한 걸 물어봐!</div>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: 16, background: "#f7f7fa", display: "flex", flexDirection: "column" }}>
              {askMessages.map((msg, i) => (
                <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 10, alignItems: "flex-end", gap: 6 }}>
                  {msg.role === "ai" && (
                    <img src={BOOK_HELPER.expressions[msg.expression] || BOOK_HELPER.expressions.default}
                      alt={BOOK_HELPER.shortName}
                      style={{ width: 36, height: 36, borderRadius: "50%", border: `2px solid ${BOOK_HELPER.color}`, flexShrink: 0, objectFit: "cover" }} />
                  )}
                  <div style={{
                    maxWidth: "75%", padding: "10px 14px",
                    borderRadius: msg.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                    background: msg.role === "user" ? "#f5576c" : "white",
                    color: msg.role === "user" ? "white" : "#333",
                    fontSize: 13, lineHeight: 1.6, boxShadow: "0 1px 4px rgba(0,0,0,0.06)"
                  }}>
                    {msg.role === "ai" && <span style={{ fontSize: 11, color: BOOK_HELPER.color, fontWeight: 600, display: "block", marginBottom: 2 }}>{BOOK_HELPER.name}</span>}
                    {msg.text}
                  </div>
                </div>
              ))}
              {askLoading && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <img src={BOOK_HELPER.expressions.thinking} alt={BOOK_HELPER.shortName}
                    style={{ width: 36, height: 36, borderRadius: "50%", border: `2px solid ${BOOK_HELPER.color}`, objectFit: "cover" }} />
                  <span style={{ fontSize: 12, color: "#666", fontStyle: "italic" }}>책을 찾아보는 중...</span>
                </div>
              )}
              {isSpeaking && <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 20 }}>🔊</span>
                <span style={{ fontSize: 12, color: "#666", fontStyle: "italic" }}>AI가 말하는 중...</span>
                <button onClick={() => { VoiceService.stopSpeaking(); setIsSpeaking(false); }}
                  style={{ marginLeft: "auto", padding: "4px 12px", borderRadius: 8, border: "1.5px solid #667eea", background: "white", color: "#667eea", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                  ⏭️ 건너뛰기
                </button>
              </div>}
              <div ref={askEndRef} />
            </div>

            <div style={{ padding: 16, background: "white", borderTop: "1px solid #eee", flexShrink: 0 }}>
              {askListening && askInput && (
                <div style={{ padding: "8px 12px", marginBottom: 8, borderRadius: 12, background: "#fff0f3", border: "2px solid #f5576c", fontSize: 13, maxHeight: 80, overflowY: "auto" }}>
                  <span style={{ fontSize: 11, color: "#f5576c", fontWeight: 600 }}>내 질문:</span>
                  <div style={{ marginTop: 2 }}>{askInput}</div>
                </div>
              )}
              <div style={{ display: "flex", gap: 8 }}>
                {!askListening ? (
                  <button onClick={startAskListening} disabled={askLoading}
                    style={{ padding: "14px 20px", borderRadius: 20, border: "none", background: "#f5576c", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, opacity: askLoading ? 0.5 : 1, whiteSpace: "nowrap", flexShrink: 0 }}>
                    <span>🎤</span> 질문하기
                  </button>
                ) : (

      // ═══════════════════════════════════════
      // 💬 Phase 2: 내 아바타와 대화 화면

      // ═══════════════════════════════════════
      const AvatarChatScreen = () => {
        const avatarProfile = getAvatarProfile(profile?.avatar);
        const avatarData = AVATAR_DATA.find(a => a.id === profile?.avatar) || AVATAR_DATA[0];
        const rarityInfo = RARITY_INFO[avatarProfile.rarity] || RARITY_INFO.free;

          .map(id => DOMAIN_META.find(d => d.id === id))
          .filter(Boolean).map(d => `${d.emoji}${d.name}`).join(" ");

          const text = messageText || avatarChatInput.trim();

          setAvatarChatInput("");

          setAvatarChatMessages(prev => [...prev, { role: "user", text }]);
          setAvatarChatLoading(true);

          const answer = await CloudAPI.askBook(text, knowledgePack, avatarChatMessages.slice(-6), profile?.name);

          try { getAppSound().sfx.chat_receive(); } catch(e) {}
          setAvatarChatLoading(false);
          completeMissionByTrigger("question");

                "넌 어떤 초능력을 갖고 싶어?",

      // ═══════════════════════════════════════
      const RecommendScreen = () => {
        const getReadBooks = () => {
          return BOOKS.filter(b => (bookProgress[b.id] || 0) > 0).map(b => ({
            title: b.title,
            summary: b.summary,
            keywords: b.keyPoints.slice(0, 3)
          }));
        };

          const readBooks = getReadBooks();

      // ═══════════════════════════════════════
      // 🛍️ Shop Modal (대규모 개선 - 카테고리 탭 + 아바타 구매)
      // ═══════════════════════════════════════
      const ShopModal = () => {
        if (!showShop) return null;
        // 아바타는 희귀도/가격순으로 정렬
        // (무료 → 영웅 1200 → 한국영웅 1500 → 전설 2500 → 신화 3500)
        // storeHidden=true인 아바타는 상점에서 제외 (히든 탭에서는 별도 처리)
        const RARITY_ORDER = { free: 0, common: 1, rare: 2, epic: 3, legendary: 4 };
        const isHiddenTab = shopCategory === "avatar" && avatarRarityFilter === "hidden";
        // 히든 탭: HIDDEN_UNLOCK_RULES 기준 12종만 (조건+진행도 표시)
        const hiddenAvatars = HIDDEN_UNLOCK_RULES.map(rule => {
          const av = AVATAR_DATA.find(a => a.id === rule.id);
          if (!av) return null;
          const completedBookList = BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100);
          const totalBattles = (battleWins || 0) + (battleLosses || 0) + (battleDraws || 0);
          const ctx = {
            completedBookList,
            streak: streak || 0,
            battleWins: battleWins || 0,
            weeklyBattleWins: weeklyBattleWins || 0,
            totalBattles,
          };
          return {
            ...av, _rule: rule,
            _progress: rule.progress(ctx),
            _target: rule.target,
            _unlocked: rule.check(ctx) || ownedAvatars.includes(rule.id),
          };
        }).filter(Boolean);
        // 일반 탭: storeHidden=false
        const sortedAvatars = [...AVATAR_DATA]
          .filter(a => !a.storeHidden)
          .sort((a, b) => {
            const ro = (RARITY_ORDER[a.rarity] ?? 9) - (RARITY_ORDER[b.rarity] ?? 9);
            if (ro !== 0) return ro;
            return (a.price ?? 0) - (b.price ?? 0);
          });
        const isAvatarTab = shopCategory === "avatar";
        // Tier 기반 필터
        const matchTier = (a, tier) => {
          if (tier === "all") return true;
          if (tier === "free") return a.rarity === "free";
          if (tier === "hero") return (a.rarity === "epic" && a.price <= 1200) || a.rarity === "heroic";
          if (tier === "legendary") return a.rarity === "legendary" && a.price <= 2500;
          if (tier === "mythic") return a.rarity === "legendary" && a.price >= 3500;
          return a.rarity === tier;
        };
        const rarityFilteredAvatars = isHiddenTab
          ? hiddenAvatars
          : (avatarRarityFilter === "all" ? sortedAvatars : sortedAvatars.filter(a => matchTier(a, avatarRarityFilter)));
        // 페이지네이션 (아바타 탭만): 페이지당 12개
        const AVATAR_PAGE_SIZE = 12;
        const totalPages = Math.max(1, Math.ceil(rarityFilteredAvatars.length / AVATAR_PAGE_SIZE));
        const safePage = Math.min(avatarPage, totalPages - 1);
        const pagedAvatars = isAvatarTab
          ? rarityFilteredAvatars.slice(safePage * AVATAR_PAGE_SIZE, (safePage + 1) * AVATAR_PAGE_SIZE)
          : [];
        const filteredItems = isAvatarTab
          ? pagedAvatars
          : SHOP_ITEMS.filter(item => item.category === shopCategory);
        // 카운터는 상점 진열 대상(storeHidden=false)만 기준으로 표시
        const visibleAvatarIds = new Set(AVATAR_DATA.filter(a => !a.storeHidden).map(a => a.id));
        const ownedAvatarCount = ownedAvatars.filter(id => visibleAvatarIds.has(id)).length;
        const totalAvatarCount = visibleAvatarIds.size;
        const RARITY_TABS = [
          { id: "all",       label: "전체",   color: "#667eea" },
          { id: "free",      label: "무료",   color: "#10b981" },
          { id: "hero",      label: "영웅",   color: "#a855f7" },
          { id: "legendary", label: "전설",   color: "#f59e0b" },
          { id: "mythic",    label: "신화",   color: "#dc2626" },
          { id: "hidden",    label: "🔓히든", color: "#ec4899" },
        ];
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 }}
            onClick={() => setShowShop(false)}>
            <div style={{ background: "white", borderRadius: "24px 24px 0 0", padding: "16px 16px 20px", maxHeight: "92vh", width: "100%", display: "flex", flexDirection: "column", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              {/* 상점 헤더: 큰 아바타 프리뷰 + 타이틀 */}
              <div style={{ textAlign: "center", padding: "8px 0 4px", position: "relative" }}>
                <div style={{ display: "flex", justifyContent: "flex-end", position: "absolute", top: 0, right: 0, gap: 12, alignItems: "center" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 14, fontWeight: 700, color: "#667eea" }}>
                    <img src={PNG_ICONS.coin} style={{ width: 18, height: 18 }} /> {coins}
                  </span>
                  <button onClick={() => setShowShop(false)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", padding: 0 }}>✕</button>

                    const count = rt.id === "all"
                      ? sortedAvatars.length
                      : rt.id === "hidden"
                        ? hiddenAvatars.filter(h => h._unlocked).length + "/" + hiddenAvatars.length
                        : sortedAvatars.filter(a => matchTier(a, rt.id)).length;

                    return (
                      <button key={rt.id} onClick={() => { setAvatarRarityFilter(rt.id); setAvatarPage(0); }}

                    const owned = ownedAvatars.includes(avatar.id);
                    const equipped = profile?.avatar === avatar.id;
                    const rarity = RARITY_INFO[avatar.rarity] || RARITY_INFO.free;

                    // 🔒 히든 탭: 해금 조건 + 진행도만 표시 (코인 구매 불가)
                    // 자동 해금(checkHiddenUnlocks useEffect)이 조건 만족 시 ownedAvatars에 자동 추가함
                    if (isHiddenTab) {
                      const progress = avatar._progress || 0;
                      const target = avatar._target || 1;
                      const progressPct = Math.min(100, Math.round((progress / target) * 100));
                      const hint = avatar._rule?.hint || "";

                        <div key={avatar.id} style={{ background: owned ? "#fdf2f8" : "#f9fafb", borderRadius: 14, padding: 10, textAlign: "center", border: equipped ? "2px solid #667eea" : owned ? "1px solid #f9a8d4" : "1px solid #e5e7eb", position: "relative" }}>

                        <img src={avatar.img} style={{ width: 56, height: 56, borderRadius: "50%", objectFit: "cover", marginBottom: 4, marginTop: 8, filter: owned ? "none" : "grayscale(0.6) brightness(0.85)" }} />

                          <button style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: "#667eea", color: "white", fontSize: 11, fontWeight: 600 }}>

                          </button>
                        ) : owned ? (
                          <button onClick={() => { setProfile(prev => ({...prev, avatar: avatar.id})); setProfileForm(prev => ({...prev, avatar: avatar.id})); }}

                              setOwnedAvatars(prev => [...prev, avatar.id]);

                            style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: canAfford ? "#667eea" : "#ddd", color: "white", fontSize: 11, fontWeight: 600, cursor: canAfford ? "pointer" : "default" }}>

                          </button>

                      </div>

                  }) : filteredItems.map(item => {

                    const equipped = equippedItems[cat] === item.id;

                      <div key={item.id} style={{ background: "white", borderRadius: 14, padding: 12, textAlign: "center", border: equipped ? "2px solid #667eea" : "1px solid #eee" }}>

                          {(() => {
                            const avId = sanitizeAvatarId(profile?.avatar);
                            const av = AVATAR_DATA.find(a => a.id === avId);
                            const comboSrc = getComboImagePath(avId, item.id);
                            const imgSrc = comboSrc || (av?.img) || "avatars/dash.png";
                            const itemIconSrc = getItemIconPath(cat, item.id);
                            // 프레임/오라 프리뷰용 CSS (실제 효과 그대로 미니 스케일)
                            const frameCss = cat === "frame" ? (FRAME_STYLES[item.id] || {}) : {};
                            const auraCss  = cat === "aura"  ? (AURA_STYLES_PREVIEW[item.id] || {}) : {};
                            const effectCss = { ...frameCss, ...auraCss };
                            const isVisualEffect = cat === "frame" || cat === "aura";
                            return (
                              <>
                                <img src={imgSrc} style={{ width: 64, height: 64, borderRadius: "50%", objectFit: "cover", ...effectCss }}

                                  <img src={itemIconSrc} style={{ position: "absolute", right: -2, bottom: -2, width: 28, height: 28, objectFit: "contain" }}
                                    onError={(e) => { e.target.style.display = "none"; }} />
                                )}
                                {!comboSrc && !itemIconSrc && !isVisualEffect && CATEGORY_EMOJIS[cat] && (

                            {ITEM_EFFECTS[cat].icon} {ITEM_EFFECTS[cat].label}
                          </div>

                        <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>{item.price} 코인</div>

                          <button onClick={() => {
                            if (coins >= item.price) {
                              setCoins(prev => prev - item.price);
                              setOwnedItems(prev => [...prev, item.id]);
                              setEquippedItems(prev => ({...prev, [cat]: item.id}));
                              showCoinGain(-item.price, `${item.name} 구매!`);
                              try { getAppSound().sfx.purchase(); } catch(e) {}
                            }

                            disabled={coins < item.price}

                            구매
                          </button>

                          <button onClick={() => setEquippedItems(prev => { const n = {...prev}; delete n[cat]; return n; })}

                            장착
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
                {isAvatarTab && totalPages > 1 && (
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "12px 0 4px", flexShrink: 0 }}>
                    <button onClick={() => setAvatarPage(Math.max(0, safePage - 1))}

                      style={{ padding: "6px 12px", borderRadius: 10, border: "none", background: safePage === 0 ? "#eee" : "#667eea", color: safePage === 0 ? "#aaa" : "white", fontSize: 12, fontWeight: 700, cursor: safePage === 0 ? "default" : "pointer" }}>

                    </button>
                    <div style={{ display: "flex", gap: 4 }}>
                      {Array.from({ length: totalPages }, (_, i) => (

                          {i + 1}
                        </button>

                    <button onClick={() => setAvatarPage(Math.min(totalPages - 1, safePage + 1))}

                  <div style={{ textAlign: "center", fontSize: 10, color: "#aaa", paddingTop: 4, paddingBottom: 4 }}>
                    {rarityFilteredAvatars.length}개 중 {safePage * 12 + 1}–{Math.min((safePage + 1) * 12, rarityFilteredAvatars.length)}번째
                  </div>
                )}
              </div>
            </div>
          </div>

            <div style={{ fontSize: 48, marginBottom: 16, animation: "pop 0.5s ease" }}>📚</div>
            <div style={{ color: "white", fontSize: 18, fontWeight: 800 }}>BookQuest</div>
            <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 14 }}>데이터 불러오는 중...</div>

          {!profile && ProfileSetupScreen()}
          {profile && screen === "home" && HomeScreen()}
          {profile && screen === "book" && BookScreen()}
          {profile && screen === "discussion" && DiscussionScreen()}
          {profile && screen === "aiHub" && AIHubScreen()}
          {profile && screen === "askbook" && AskBookScreen()}
          {profile && screen === "avatarChat" && AvatarChatScreen()}
          {profile && screen === "recommend" && RecommendScreen()}
          {profile && screen === "avatar" && AvatarScreen()}
          {profile && screen === "ranking" && RankingScreen()}
          {profile && screen === "battle" && BattleScreen()}
          {profile && screen === "schedule" && ScheduleScreen()}
          {profile && screen === "admin" && isAdmin && <AdminPanel />}

          <TabBar />
          <RewardModal />
          <QuizResultModal />
          <ShopModal />
          <ChangelogModal />
          <RollbackModal />
          <AdminLoginModal />

          <AvatarDetailModal />

          {/* 프로필 편집 모달 */}

            <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
              onClick={() => setEditingProfile(false)}>
              <div style={{ background: "white", borderRadius: 20, padding: 24, width: "100%", maxWidth: 360, maxHeight: "85vh", overflowY: "auto" }}
                onClick={e => e.stopPropagation()}>

                <div style={{ marginBottom: 16 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>이름 *</label>
                  <input value={profileForm.name} onChange={e => setProfileForm(p => ({ ...p, name: e.target.value }))}
                    placeholder="이름을 입력하세요"
                    style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: "2px solid #eee", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>

                <div style={{ marginBottom: 16 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>학교</label>
                  <input value={profileForm.school} onChange={e => setProfileForm(p => ({ ...p, school: e.target.value }))}
                    placeholder="학교 이름 (선택)"
                    style={{ width: "100%", padding: "12px 14px", borderRadius: 12, border: "2px solid #eee", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
                </div>

                <div style={{ marginBottom: 20 }}>
                  <label style={{ fontSize: 13, fontWeight: 600, color: "#555", display: "block", marginBottom: 6 }}>학년</label>

                    {["4", "5", "6", "중1"].map(g => (
                      <button key={g} onClick={() => setProfileForm(p => ({ ...p, grade: g }))}
                        style={{
                          padding: "8px 16px", borderRadius: 20, border: "2px solid",
                          borderColor: profileForm.grade === g ? "#667eea" : "#eee",
                          background: profileForm.grade === g ? "#667eea" : "white",
                          color: profileForm.grade === g ? "white" : "#666",
                          fontSize: 13, fontWeight: 600, cursor: "pointer"

                          width: "100%", padding: "8px 0", borderRadius: 16, border: "3px solid",
                          borderColor: profileForm.avatar === a.id ? "#667eea" : "#f0f0f0",

                <button onClick={() => {
                  if (profileForm.name.trim()) {
                    setProfile(prev => ({ ...prev, name: profileForm.name.trim(), school: profileForm.school.trim(), grade: profileForm.grade, avatar: profileForm.avatar }));
                    setEditingProfile(false);
                  }

                  disabled={!profileForm.name.trim()}
                  style={{
                    width: "100%", padding: "14px", borderRadius: 14, border: "none",
                    background: profileForm.name.trim() ? "linear-gradient(135deg, #667eea, #764ba2)" : "#ddd",
                    color: "white", fontSize: 15, fontWeight: 700, cursor: profileForm.name.trim() ? "pointer" : "default"

            </div>

              color: "white", fontWeight: 700, fontSize: 14

            }}>

              }}>

                <div style={{ color: "#fbbf24", fontWeight: 800, fontSize: 17, marginBottom: 10 }}>

  <script>
    if ('serviceWorker' in navigator) {
      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      });

      navigator.serviceWorker.register('./sw.js').then(reg => {
        setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const installing = reg.installing;
          if (!installing) return;
          installing.addEventListener('statechange', () => {
            if (installing.state === 'installed' && navigator.serviceWorker.controller) {
              installing.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(() => {});
    }
