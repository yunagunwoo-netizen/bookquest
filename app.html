  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      overflow-x: hidden;
      width: 100%;
    }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f7f7fa;
      color: #1a1a2e;
    }

    #root {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      background: #f7f7fa;
      min-height: 100vh;
    }

    input {
      font-family: inherit;
      font-size: 16px;
    }

    input:focus {
      outline: none;
      border-color: #667eea !important;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 4px;
    }

    @keyframes pop {
      0% {
        transform: scale(0.8);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
      }
      50% {
        box-shadow: 0 0 0 20px rgba(102, 126, 234, 0);
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .loader {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    .mic-button-active {
      animation: pulse 1.5s infinite;
    }
  </style>
  <style>
    /* 💎 히든 전설 홀로그래픽 셔머 — V3.6 아바타 전용 */
    @keyframes bq-holo-shine {
      0%   { background-position: -200% 50%; }
      100% { background-position:  200% 50%; }
    }
    @keyframes bq-holo-pulse {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 1.00; transform: scale(1.03); }
    }
    .bq-holo-wrap {
      position: relative;
      display: inline-block;
      border-radius: 50%;
      overflow: hidden;
      isolation: isolate;
    }
    .bq-holo-wrap > img {
      display: block;
      position: relative;
      z-index: 1;
    }
    .bq-holo-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(115deg,
        transparent 25%,
        rgba(255, 255, 255, 0.12) 40%,
        rgba(255, 215, 0, 0.35) 50%,
        rgba(180, 220, 255, 0.28) 58%,
        rgba(255, 100, 200, 0.22) 66%,
        transparent 80%);
      background-size: 260% 260%;
      mix-blend-mode: overlay;
      animation: bq-holo-shine 3.5s linear infinite;
      pointer-events: none;
      z-index: 2;
    }
    .bq-holo-wrap::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      box-shadow: 0 0 0 2px rgba(252, 211, 77, 0.55),
                  0 0 22px 2px rgba(167, 139, 250, 0.55),
                  inset 0 0 14px rgba(252, 211, 77, 0.18);
      animation: bq-holo-pulse 2.8s ease-in-out infinite;
      pointer-events: none;
      z-index: 3;
    }
  </style>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ═══════════════════════════════════════
    // ☁️ Cloud Functions API 서비스
    // ═══════════════════════════════════════
    const FUNCTIONS_BASE = "https://us-central1-bookquest-f9720.cloudfunctions.net";
    const ASKBOOK_URL = "https://askbook-xufrgr5zva-uc.a.run.app";

    const CloudAPI = {
      async askBook(question, bookData, chatHistory = [], studentName) {
        try {
          const res = await fetch(ASKBOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, bookData, chatHistory, studentName })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          return data.answer;
        } catch (e) {
          console.error("askBook 실패:", e);
          return "죄송해요, 지금 답변을 할 수 없어요. 잠시 후 다시 시도해주세요! 🙏";
        }
      },

      async discussionCoach(userAnswer, topic, bookTitle, bookSummary, isDeep, studentName, chatHistory, roundNumber) {
        try {
          const res = await fetch(`${FUNCTIONS_BASE}/discussionCoach`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userAnswer, topic, bookTitle, bookSummary, isDeep, studentName, chatHistory, roundNumber })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          return data.feedback;
        } catch (e) {
          console.error("discussionCoach 실패:", e);
          return "좋은 생각이에요! 조금 더 깊이 생각해보면 좋겠어요. 🌟";
        }
      },

      async recommendBooks(readBooks, interests = "") {
        try {
          const res = await fetch(`${FUNCTIONS_BASE}/recommendBooks`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ readBooks, interests })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          return data.recommendations || [];
        } catch (e) {
          console.error("recommendBooks 실패:", e);
          return [];
        }
      },

      async runAvatarBattle({ myUid, oppUid, myPack, oppPack, myName, oppName, mode }) {
        const res = await fetch(`${FUNCTIONS_BASE}/runAvatarBattle`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ myUid, oppUid, myPack, oppPack, myName, oppName, mode })
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || ("HTTP " + res.status));
        return data;
      },

      async runInteractiveBattle({ myUid, oppUid, myPack, oppPack, myName, oppName, miniDebateOwner }) {
        const res = await fetch(`${FUNCTIONS_BASE}/runInteractiveBattle`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ myUid, oppUid, myPack, oppPack, myName, oppName, miniDebateOwner })
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || ("HTTP " + res.status));
        return data;
      },

      async submitInteractiveResult({ myUid, oppUid, battleId, winner, roundResults }) {
        const res = await fetch(`${FUNCTIONS_BASE}/submitInteractiveResult`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ myUid, oppUid, battleId, winner, roundResults })
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || ("HTTP " + res.status));
        return data;
      }
    };

    // ═══════════════════════════════════════
    // 🔥 Firestore 데이터 서비스
    // ═══════════════════════════════════════
    const FirestoreService = {
      _LOCAL_KEY: "bookquest_backup",
      _saveFailCount: 0,
      _onSaveError: null, // 콜백: 저장 실패 시 UI 알림용

      // 유저 ID 생성/가져오기 (기기별 고유)
      getUserId() {
        let uid = localStorage.getItem("bookquest_uid");
        if (!uid) {
          uid = "user_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
          localStorage.setItem("bookquest_uid", uid);
        }
        return uid;
      },

      // localStorage 백업 저장
      _saveToLocal(data) {
        try {
          localStorage.setItem(this._LOCAL_KEY, JSON.stringify({
            ...data,
            _backupTime: new Date().toISOString()
          }));
        } catch (e) {
          console.warn("⚠️ localStorage 백업 실패:", e);
        }
      },

      // localStorage 백업 로드
      _loadFromLocal() {
        try {
          const raw = localStorage.getItem(this._LOCAL_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (e) {
          console.warn("⚠️ localStorage 백업 로드 실패:", e);
          return null;
        }
      },

      // 유저 데이터 저장 (Firestore + localStorage 이중 백업)
      async saveUserData(data) {
        // 항상 localStorage에 백업
        this._saveToLocal(data);

        try {
          const uid = this.getUserId();
          await db.collection("users").doc(uid).set({
            ...data,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          this._saveFailCount = 0;
          console.log("✅ Firestore 저장 완료");
          return true;
        } catch (e) {
          this._saveFailCount++;
          console.error("❌ Firestore 저장 실패:", e);
          if (this._saveFailCount >= 2 && this._onSaveError) {
            this._onSaveError("저장 중 오류가 발생했어요. 인터넷 연결을 확인해주세요.");
          }
          return false;
        }
      },

      // 복구용: 이름+학교로 Firestore에서 기존 유저 검색
      async findUsersForRecovery(name, school) {
        try {
          const snap = await db.collection("users").get();
          const matches = [];
          snap.forEach(doc => {
            const d = doc.data();
            if (!d.profile || !d.profile.name) return;
            const nameMatch = d.profile.name.trim() === name.trim();
            const schoolMatch = (d.profile.school || "").trim() === (school || "").trim();
            if (nameMatch && schoolMatch) {
              matches.push({
                uid: doc.id,
                name: d.profile.name,
                school: d.profile.school || "",
                grade: d.profile.grade || "",
                avatar: d.profile.avatar || "dash",
                recoveryPin: d.recoveryPin || null,
                level: d.level || 1,
                xp: d.xp || 0,
                coins: d.coins || 0,
                streak: d.streak || 0,
              });
            }
          });
          return matches;
        } catch (e) {
          console.error("복구 검색 실패:", e);
          return [];
        }
      },

      // 복구: 기존 UID로 교체하여 데이터 연결 복원
      restoreUid(oldUid) {
        localStorage.setItem("bookquest_uid", oldUid);
        console.log("✅ UID 복원:", oldUid);
      },

      // 유저 데이터 불러오기 (Firestore 우선, 실패 시 localStorage 폴백)
      async loadUserData() {
        try {
          const uid = this.getUserId();
          const doc = await db.collection("users").doc(uid).get();
          if (doc.exists) {
            console.log("✅ Firestore 데이터 로드 완료");
            const data = doc.data();
            // 성공 시 localStorage도 갱신
            this._saveToLocal(data);
            return data;
          }
          // Firestore에 데이터 없으면 localStorage 폴백 시도
          const local = this._loadFromLocal();
          if (local) {
            console.log("📦 localStorage 백업에서 복원");
            return local;
          }
          return null;
        } catch (e) {
          console.error("❌ Firestore 로드 실패, localStorage 폴백 시도:", e);
          const local = this._loadFromLocal();
          if (local) {
            console.log("📦 오프라인 — localStorage 백업에서 복원");
            return local;
          }
          return null;
        }
      }
    };

    const DOMAIN_IDS = DOMAIN_META.map(d => d.id);

    // 희귀도별 성장 프로필 (베이스 IQ 보너스 + 성장 배수)
    const RARITY_PROFILE = {
      free:      { iqBase: 0,  bookIQMult: 1.00, quizMult: 1.0, strongBonus: 1.4, weakPenalty: 0.75, label: "평범한 재능" },
      common:    { iqBase: 3,  bookIQMult: 1.10, quizMult: 1.1, strongBonus: 1.5, weakPenalty: 0.70, label: "재능의 싹" },
      rare:      { iqBase: 8,  bookIQMult: 1.20, quizMult: 1.2, strongBonus: 1.7, weakPenalty: 0.65, label: "특별한 재능" },
      epic:      { iqBase: 15, bookIQMult: 1.35, quizMult: 1.3, strongBonus: 1.9, weakPenalty: 0.55, label: "비범한 재능" },
      legendary: { iqBase: 25, bookIQMult: 1.50, quizMult: 1.5, strongBonus: 2.2, weakPenalty: 0.50, label: "전설의 재능" },
    };

    // 문자열 → 안정적 해시 (아바타별 고정된 강/약점 도메인 결정용)
    const _hashStr = (str) => {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = ((h * 33) ^ str.charCodeAt(i)) >>> 0;
      return h;
    };

    // 아바타 고유 프로필: 강점 도메인 2, 약점 도메인 2, 나머지 4는 보통
    const getAvatarProfile = (avatarId) => {
      const avatar = AVATAR_DATA.find(a => a.id === avatarId) || AVATAR_DATA[0];
      const rarity = avatar.rarity || "free";
      const rp = RARITY_PROFILE[rarity] || RARITY_PROFILE.free;

      // 아바타 ID 해시 → 도메인 순열 (결정론적 섞기)
      const seed = _hashStr(avatarId || "default");
      const rot = DOMAIN_IDS.slice();
      for (let i = rot.length - 1; i > 0; i--) {
        const j = Math.floor(((seed >>> (i % 24)) * (i + 1)) % (i + 1));
        const tmp = rot[i]; rot[i] = rot[j]; rot[j] = tmp;
      }
      const strongDomains = [rot[0], rot[1]];
      const weakDomains = [rot[rot.length - 1], rot[rot.length - 2]];

      const multipliers = {};
      DOMAIN_IDS.forEach(d => {
        if (strongDomains.includes(d)) multipliers[d] = rp.strongBonus;
        else if (weakDomains.includes(d)) multipliers[d] = rp.weakPenalty;
        else multipliers[d] = 1.0;
      });

      return {
        avatarId: avatar.id,
        name: avatar.name,
        rarity,
        iqBase: rp.iqBase,
        bookIQMult: rp.bookIQMult,
        quizMult: rp.quizMult,
        label: rp.label,
        strongDomains,
        weakDomains,
        multipliers
      };
    };

    // 독서 진행도 + 퀴즈 정답 + 토론 별점 + 아바타 프로필 → 아바타 스탯 환산
    const computeAvatarStats = (bookProgress, quizState, discussionStarState, avatarId) => {
      const profile = getAvatarProfile(avatarId);
      const domains = {};
      DOMAIN_IDS.forEach(d => { domains[d] = 0; });
      const stats = {
        iq: 100 + profile.iqBase,
        domains,
        debateScore: 0,
        creativity: 0,
        booksCompleted: [],
        booksStarted: 0,
        quizCorrect: 0,
        profile
      };

      BOOKS.forEach(book => {
        const progress = (bookProgress && bookProgress[book.id]) || 0;
        if (progress <= 0) return;
        stats.booksStarted += 1;
        const bookDomains = book.domains || [];
        const completionRatio = Math.min(1, progress / 100);

        // 완독이면 1, 부분이면 비례
        const iqGain = 10 * profile.bookIQMult * completionRatio;
        stats.iq += Math.round(iqGain);
        if (progress >= 100) stats.booksCompleted.push(book.id);

        // 도메인별 성장 (아바타 강/약점 적용)
        bookDomains.forEach(d => {
          if (!(d in stats.domains)) return;
          const domGain = 3 * profile.multipliers[d] * completionRatio;
          stats.domains[d] += Math.round(domGain);
        });
      });

      // 퀴즈 정답 → IQ 보너스 (아바타 퀴즈 배수 적용)
      if (quizState) {
        Object.values(quizState).forEach(q => {
          if (q && q.correct) {
            stats.iq += Math.round(2 * profile.quizMult);
            stats.quizCorrect += 1;
          }
        });
      }

      // 토론 별점 → 토론/창의력
      if (discussionStarState) {
        Object.values(discussionStarState).forEach(s => {
          if (!s) return;
          if (s.completed) stats.debateScore += 1;
          if (s.bestStars >= 3) stats.creativity += 1;
        });
      }

      return stats;
    };

    const getAvatarKnowledgePack = (avatarId, bookProgress, stats) => {
      const profile = getAvatarProfile(avatarId);
      const strongDomainNames = profile.strongDomains
        .map(id => DOMAIN_META.find(d => d.id === id))
        .filter(Boolean)
        .map(d => d.name).join(", ");
      const weakDomainNames = profile.weakDomains
        .map(id => DOMAIN_META.find(d => d.id === id))
        .filter(Boolean)
        .map(d => d.name).join(", ");

      const completedBooks = BOOKS.filter(b => {
        const progress = (bookProgress && bookProgress[b.id]) || 0;
        return progress >= 100;
      });
      const readingBooks = BOOKS.filter(b => {
        const progress = (bookProgress && bookProgress[b.id]) || 0;
        return progress > 0 && progress < 100;
      });

      const personaHeader =
`[너의 정체성]
너는 이 사용자가 선택한 "${profile.name}" 아바타야. 사용자의 분신이자 독서 친구로서 1인칭("나")으로 말해.

• 강점 분야: ${strongDomainNames} (이 분야 질문엔 자신감 있고 깊이 있게 답해)
• 약한 분야: ${weakDomainNames} (이 분야는 솔직하게 "잘 모르겠어"라고 하거나, 사용자와 함께 배우자고 제안해)
• 총 AVATAR IQ: ${stats ? stats.iq : "측정 중"}

[말투 규칙]
- 어린이 친구에게 말하듯 반말, 짧고 또렷하게. 이름을 부를 때는 "건우야", "지민아"처럼 친근하게 불러.
- 책에서 읽은 내용을 자연스럽게 인용하고 연결해.
- 강한 분야에는 "~거든!", "~라고!" 처럼 확신 있게, 약한 분야에는 "흠...", "같이 알아볼까?" 처럼 겸손하게.

[내가 함께 읽은 책들 (${completedBooks.length}권 완독, ${readingBooks.length}권 읽는 중)]`;

      const bookSummaries = completedBooks.slice(0, 6).map(b => {
        const domains = (b.domains || [])
          .map(id => DOMAIN_META.find(d => d.id === id))
          .filter(Boolean)
          .map(d => d.name).join("/");
        const keyPoints = (b.keyPoints || []).slice(0, 4).join(" / ");
        return `📖 "${b.title}" (${b.author}) [${domains}]
요약: ${b.summary}
핵심: ${keyPoints}`;
      }).join("\n\n");

      const readingList = readingBooks.slice(0, 3).map(b =>
        `📖 "${b.title}" (${b.author}) - 아직 읽는 중`
      ).join("\n");

      return [
        personaHeader,

    // YYYY-MM-DD 문자열 두 개의 일수 차이 (b - a)
    const daysBetweenDateStrings = (dateStrA, dateStrB) => {
      if (!dateStrA || !dateStrB) return null;
      const a = new Date(dateStrA + "T00:00:00");
      const b = new Date(dateStrB + "T00:00:00");
      if (isNaN(a.getTime()) || isNaN(b.getTime())) return null;
      return Math.round((b - a) / (1000 * 60 * 60 * 24));

    // YYYY-MM-DD 문자열을 받아서 그 주의 월요일 YYYY-MM-DD 리턴
    // (일요일은 이전 주 월요일 기준으로 간주)
    const getWeekStartDate = (dateStr) => {
      const ds = dateStr || getTodayString();
      const d = new Date(ds + "T00:00:00");
      if (isNaN(d.getTime())) return ds;
      const day = d.getDay();                // 0=일 … 6=토
      const diff = day === 0 ? -6 : 1 - day; // 월요일까지의 오프셋
      d.setDate(d.getDate() + diff);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

        else pool = ROULETTE_REWARDS.filter(r => r.tier === "legendary");

    const VoiceService = {

      preloadVoice() {
        if (!this.SpeechSynthesis) return;
        const tryLoad = () => {
          const voices = this.SpeechSynthesis.getVoices();
          if (voices.length === 0) return;
          this._voicesLoaded = true;
          const koVoices = voices.filter(v => v.lang.startsWith('ko'));
          const premium = koVoices.find(v => /samsung|heami|yuna|sora|jian|sunhi|premium|enhanced|natural/i.test(v.name));
          const google = koVoices.find(v => /google/i.test(v.name));
          const msOnline = koVoices.find(v => /online|neural/i.test(v.name));
          this._cachedVoice = premium || google || msOnline || koVoices[0] || null;
          if (this._cachedVoice) console.log('[TTS] 폴백 음성:', this._cachedVoice.name);
        };
        tryLoad();
        if (!this._voicesLoaded && this.SpeechSynthesis) {
          this.SpeechSynthesis.onvoiceschanged = tryLoad;
        }

      createRecognizer() {
        if (!this.SpeechRecognition) return null;
        const rec = new this.SpeechRecognition();
        rec.lang = 'ko-KR';
        rec.continuous = false;
        rec.interimResults = true;

      // TTS용 텍스트 정리 (이모지, 마크다운, 특수문자 제거)
      cleanForTTS(text) {
        return text
          .replace(/[\u{1F300}-\u{1FAFF}]|[\u{2600}-\u{27BF}]|[\u{FE00}-\u{FE0F}]|[\u{200D}]|[\u{20E3}]|[\u{E0020}-\u{E007F}]|✅|❌|⭐|⚡|☀|☁|☂|❤|♥|♡|★|☆/gu, '')
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          .replace(/\*([^*]+)\*/g, '$1')
          .replace(/^#+\s*/gm, '')
          .replace(/https?:\/\/[^\s]+/g, '')
          .replace(/\([A-Z]{2,}\)/g, '')
          .replace(/\n+/g, '. ')
          .replace(/\s{2,}/g, ' ')
          .trim();
      },

      _elevenLabsKey: "sk_388ce66cbc9cc07e7280f28c0c78271176a5e3fdaaf362a9",

      async speakElevenLabs(text, callback, voiceType) {
        const cleanText = this.cleanForTTS(text);

            body: JSON.stringify({
              text: cleanText,
              model_id: this._elevenLabsModel,
              voice_settings: { ...vp.settings, use_speaker_boost: true }
            })
          });
          if (!res.ok) { const e = await res.text(); throw new Error(`ElevenLabs ${res.status}: ${e.slice(0,200)}`); }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          this._currentAudio = audio;
          console.log(`[TTS] \uC5D4\uC9C4: elevenlabs | \uC74C\uC131: ${vp.name} (${cleanText.length}\uC790)`);
          // 📱 모바일 안전 폴백: Audio 정리 + 50ms 지연 후 다음 엔진
          const safeFallback = (reason) => {

            this._currentAudio = null;
            URL.revokeObjectURL(url);
            setTimeout(() => this.speakCloud(text, callback, vp.chirp), 50);
          };
          audio.onended = () => { this._currentAudio = null; URL.revokeObjectURL(url); if (callback) callback(true); };
          audio.onerror = () => safeFallback("\uC7AC\uC0DD \uC2E4\uD328, Cloud TTS\uB85C \uD3F4\uBC31");
          audio.play().catch(() => safeFallback("play() \uCC28\uB2E8, Cloud TTS\uB85C \uD3F4\uBC31"));

      // \u2601\ufe0f Google Cloud TTS (2\uC21C\uC704 \u2014 Cloud Function \uACBD\uC720)
      async speakCloud(text, callback, voice) {
        const cleanText = this.cleanForTTS(text);
        if (!cleanText) { if (callback) callback(true); return; }

        try {
          const body = { text: cleanText };
          if (voice) body.voice = voice;
          const res = await fetch(`${FUNCTIONS_BASE}/textToSpeech`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          if (data.engine) console.log(`[TTS] 엔진: ${data.engine} (${data.textLength}자)`);

          // Base64 MP3를 Audio로 재생
          const audio = new Audio("data:audio/mp3;base64," + data.audio);
          this._currentAudio = audio;

          audio.onended = () => {
            this._currentAudio = null;
            if (callback) callback(true);
          };
          audio.onerror = () => {
            console.warn("[Cloud TTS] 재생 실패, 폴백으로 전환");
            this._currentAudio = null;
            setTimeout(() => this.speakLocal(text, callback), 50);
          };
          audio.play().catch(() => {
            // 자동 재생 차단 시 폴백 (모바일 지연)
            this._currentAudio = null;
            setTimeout(() => this.speakLocal(text, callback), 50);
          });
        } catch (e) {
          console.warn("[Cloud TTS] API 실패, 폴백으로 전환:", e.message);
          this.speakLocal(text, callback);
        }
      },

      // 🔊 브라우저 내장 TTS (폴백)
      speakLocal(text, callback) {
        if (!this.SpeechSynthesis) {
          if (callback) callback(false);
          return;
        }

        this.SpeechSynthesis.cancel();
        const cleanText = this.cleanForTTS(text);
        if (!cleanText) { if (callback) callback(true); return; }

        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'ko-KR';
        utterance.rate = 0.92;
        utterance.pitch = 1.0;
        utterance.volume = 1;

        if (this._cachedVoice) {
          utterance.voice = this._cachedVoice;
        }

        utterance.onend = () => { if (callback) callback(true); };
        utterance.onerror = () => { if (callback) callback(false); };
        this.SpeechSynthesis.speak(utterance);
      },

      // 메인 speak 함수: Cloud TTS 우선, 실패 시 로컬 폴백
      // voice: 선택적 음성 (예: "ko-KR-Neural2-A" 여성)

        this.speakElevenLabs(text, callback, voiceType);

      stopSpeaking() {

        if (this.SpeechSynthesis) {

    // 🕸️ 8각형 레이더 차트 (아바타 도메인 지식 시각화)
    // ═══════════════════════════════════════
    const RadarChart = ({ domains, size = 240, maxValue = 12 }) => {
      const cx = size / 2;
      const cy = size / 2;
      const radius = size * 0.35;
      const axes = DOMAIN_META;
      const n = axes.length;

      // 각 축의 좌표 (12시 방향부터 시계방향)
      const axisPoint = (i, r) => {
        const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
        return { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
      };

      // 배경 그리드 (4단계)
      const gridLevels = [0.25, 0.5, 0.75, 1];

      // 데이터 폴리곤 포인트
      const dataPoints = axes.map((ax, i) => {
        const value = Math.min(maxValue, domains[ax.id] || 0);
        const r = (value / maxValue) * radius;
        return axisPoint(i, r);
      });
      const polyPath = dataPoints.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");

      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block", margin: "0 auto" }}>
          {/* 그리드 다각형 */}
          {gridLevels.map((lvl, gi) => {
            const pts = axes.map((_, i) => axisPoint(i, radius * lvl));
            return (
              <polygon key={gi}
                points={pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ")}
                fill="none" stroke="#e5e7eb" strokeWidth={1} />
            );
          })}
          {/* 축선 */}
          {axes.map((_, i) => {
            const p = axisPoint(i, radius);
            return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#e5e7eb" strokeWidth={1} />;
          })}
          {/* 데이터 영역 */}
          <polygon
            points={polyPath}
            fill="rgba(102,126,234,0.25)"
            stroke="#667eea"
            strokeWidth={2}
          />
          {/* 데이터 포인트 */}
          {dataPoints.map((p, i) => (
            <circle key={i} cx={p.x} cy={p.y} r={3} fill="#667eea" />
          ))}
          {/* 축 레이블 (이모지 + 수치) */}
          {axes.map((ax, i) => {
            const labelPt = axisPoint(i, radius + 18);
            const value = domains[ax.id] || 0;
            return (
              <g key={ax.id}>
                <image href={ax.icon} x={labelPt.x - 10} y={labelPt.y - 12}
                  width={20} height={20} preserveAspectRatio="xMidYMid meet" />
                <text x={labelPt.x} y={labelPt.y + 14}
                  textAnchor="middle" fontSize={10} fill="#555" fontWeight={600} dominantBaseline="middle">
                  {ax.name} {value}
                </text>
              </g>
            );
          })}
        </svg>
      );
    };

        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const masterGain = ctx.createGain();
          masterGain.gain.value = 0.3;
          masterGain.connect(ctx.destination);

          // ── BGM 생성: 에너제틱 치프튠 루프 ──
          let bgmInterval = null;
          let bgmPlaying = false;
          const bgmGain = ctx.createGain();
          bgmGain.gain.value = 0.15;
          bgmGain.connect(masterGain);

          const playNote = (freq, startTime, dur, type = "square", gainNode = bgmGain, vol = 0.3) => {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            g.gain.setValueAtTime(vol, startTime);
            g.gain.exponentialRampToValueAtTime(0.01, startTime + dur * 0.9);
            osc.connect(g);
            g.connect(gainNode);
            osc.start(startTime);
            osc.stop(startTime + dur);
          };

          // 배틀 BGM 멜로디 패턴 (16비트 루프, 약 2초)
          const BPM = 140;
          const beatDur = 60 / BPM;
          const sixteenth = beatDur / 4;

          const bgmMelody = [
            // bar 1 - 상승 에너지
            [0, 523.25], [2, 587.33], [4, 659.25], [6, 783.99],
            [8, 659.25], [10, 783.99], [12, 880.00], [14, 783.99],
            // bar 2 - 하강 텐션
            [16, 783.99], [18, 698.46], [20, 659.25], [22, 587.33],
            [24, 523.25], [26, 587.33], [28, 659.25], [30, 523.25],
          ];

          const bgmBass = [
            [0, 130.81], [4, 130.81], [8, 164.81], [12, 164.81],
            [16, 174.61], [20, 174.61], [24, 130.81], [28, 130.81],
          ];

          const loopDur = 32 * sixteenth;
          let bgmStartTime = 0;

          const scheduleBgmLoop = () => {
            if (!bgmPlaying) return;
            const now = ctx.currentTime;
            if (bgmStartTime < now) bgmStartTime = now + 0.05;

            bgmMelody.forEach(([pos, freq]) => {
              playNote(freq, bgmStartTime + pos * sixteenth, sixteenth * 1.8, "square", bgmGain, 0.2);
            });
            bgmBass.forEach(([pos, freq]) => {
              playNote(freq, bgmStartTime + pos * sixteenth, sixteenth * 3.5, "sawtooth", bgmGain, 0.12);
            });
            // 드럼 킥 (노이즈 시뮬)
            [0, 8, 16, 24].forEach(pos => {
              const t = bgmStartTime + pos * sixteenth;
              const osc = ctx.createOscillator();
              const g = ctx.createGain();
              osc.type = "sine";
              osc.frequency.setValueAtTime(150, t);
              osc.frequency.exponentialRampToValueAtTime(30, t + 0.08);
              g.gain.setValueAtTime(0.4, t);
              g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
              osc.connect(g);
              g.connect(bgmGain);
              osc.start(t);
              osc.stop(t + 0.12);
            });
            // 하이햇
            [4, 12, 20, 28].forEach(pos => {
              const t = bgmStartTime + pos * sixteenth;
              const bufSize = ctx.sampleRate * 0.03;
              const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
              const data = buf.getChannelData(0);
              for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
              const src = ctx.createBufferSource();
              const g = ctx.createGain();
              src.buffer = buf;
              g.gain.setValueAtTime(0.15, t);
              g.gain.exponentialRampToValueAtTime(0.01, t + 0.03);
              src.connect(g);
              g.connect(bgmGain);
              src.start(t);
            });

            bgmStartTime += loopDur;
          };

          const startBgm = () => {
            if (ctx.state === "suspended") ctx.resume();
            bgmPlaying = true;
            bgmGain.gain.value = 0.15;
            scheduleBgmLoop();
            bgmInterval = setInterval(() => { if (bgmPlaying) scheduleBgmLoop(); }, loopDur * 900);
          };

          const stopBgm = (fadeOut = true) => {
            bgmPlaying = false;
            if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
            if (fadeOut) {
              bgmGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
            }
          };

          // ── 효과음 함수들 ──

              });
            },

            : `안녕 ${_nick}! 나는 ${ap.name}이야. 아직 같이 읽은 책이 없으니까 책부터 읽고 오면 더 깊이 이야기해줄게!`;
          setAvatarChatMessages([{ role: "ai", text: greeting }]);
        }
      }, [screen]);

      // RecommendScreen 자동 로드
      useEffect(() => {
        if (screen === "recommend" && !recLoaded) {
          const readBooks = BOOKS.filter(b => (bookProgress[b.id] || 0) > 0);
          if (readBooks.length > 0) {
            (async () => {
              setRecLoading(true);
              const recs = await CloudAPI.recommendBooks(readBooks.map(b => ({
                title: b.title, summary: b.summary, keywords: b.keyPoints.slice(0, 3)
              })));
              setRecommendations(recs);
              setRecLoading(false);
              setRecLoaded(true);
            })();
          }
        }
      }, [screen]);

      const getLevel = (xpVal) => Math.min(Math.floor(xpVal / 100) + 1, 10);
      const getTitle = (lvl) => TITLES_LIST[Math.min(lvl - 1, TITLES_LIST.length - 1)];
      const xpToNext = (xpVal) => 100 - (xpVal % 100);

      // 레벨업 아이템 보상 테이블 (특정 레벨에 랜덤 아이템 지급)
      const LEVEL_ITEM_REWARDS = { 3: "frame", 5: "hat", 7: "pet", 10: "weapon", 13: "face", 15: "aura" };

      const grantRandomItem = (category) => {
        const available = SHOP_ITEMS.filter(i => i.category === category && !ownedItems.includes(i.id));
        if (available.length === 0) return null;
        const item = available[Math.floor(Math.random() * available.length)];
        setOwnedItems(prev => [...prev, item.id]);
        return item;
      };

      // 코디 슬롯 전환
      const switchOutfitSlot = (slotIdx) => {
        if (slotIdx === activeOutfitSlot) return;
        // 현재 슬롯에 현재 장착 아이템 저장
        setOutfitSlots(prev => {
          const updated = [...prev];
          updated[activeOutfitSlot] = { ...updated[activeOutfitSlot], equippedItems: { ...equippedItems } };
          return updated;
        });
        // 새 슬롯의 아이템으로 교체
        setEquippedItems(outfitSlots[slotIdx].equippedItems || {});
        setActiveOutfitSlot(slotIdx);
      };

      // 현재 코디를 슬롯에 저장
      const saveCurrentOutfit = () => {
        setOutfitSlots(prev => {
          const updated = [...prev];
          updated[activeOutfitSlot] = { ...updated[activeOutfitSlot], equippedItems: { ...equippedItems } };
          return updated;
        });
      };

      // 세트 보너스 체크: 같은 테마 접두어 아이템이 3개 이상이면 보너스
      const SET_THEMES = [
        { prefix: "deco_frame_fire|deco_aura_fire|deco_hat_fire|deco_face_fire|deco_pet_fire|deco_weapon_fire|deco_wing_fire|deco_emote_fire", name: "불꽃 세트", bonus: 2 },
        { prefix: "deco_frame_ice|deco_aura_ice|deco_hat_ice|deco_face_ice|deco_pet_ice|deco_weapon_ice|deco_wing_ice|deco_emote_ice", name: "얼음 세트", bonus: 2 },
        { prefix: "deco_frame_dragon|deco_aura_dark|deco_hat_devil|deco_weapon_sword|deco_wing_bat", name: "다크 세트", bonus: 3 },
        { prefix: "deco_frame_flower|deco_aura_light|deco_hat_halo|deco_pet_rabbit|deco_wing_angel", name: "천사 세트", bonus: 3 },
        { prefix: "deco_frame_neon|deco_aura_electric|deco_hat_headphones|deco_face_vr|deco_wing_jetpack", name: "사이버 세트", bonus: 3 },
        { prefix: "deco_frame_space|deco_aura_galaxy|deco_hat_astronaut|deco_pet_alien|deco_wing_rocket", name: "우주 세트", bonus: 3 }
      ];

      const getActiveSetBonus = () => {
        const equippedIds = Object.values(equippedItems);
        if (equippedIds.length < 3) return null;
        for (const set of SET_THEMES) {
          const setItems = set.prefix.split("|");
          const matched = equippedIds.filter(id => setItems.includes(id));
          if (matched.length >= 3) return { name: set.name, bonus: set.bonus, count: matched.length };
        }
        return null;
      };

      const addXp = (amount) => {
        const newXp = xp + amount;
        const newLevel = getLevel(newXp);
        if (newLevel > level) {
          const levelUpCoins = 20 + (newLevel * 5);
          setCoins(prev => prev + levelUpCoins);

          // 레벨업 아이템 보상 체크
          let bonusItem = null;
          const rewardCat = LEVEL_ITEM_REWARDS[newLevel];
          if (rewardCat) {
            bonusItem = grantRandomItem(rewardCat);
          }

          setRewardInfo({
            type: "levelup", level: newLevel, title: getTitle(newLevel), coins: levelUpCoins,
            bonusItem: bonusItem ? bonusItem.name : null
          });
          setShowReward(true);
          try { getAppSound().sfx.level_up(); } catch(e) {}
          setLevel(newLevel);
          setCurrentTitle(getTitle(newLevel));
        }
        setXp(newXp);
      };

      // 배지 → 아바타 해금 매핑
      // ※ spike는 히든 브롤이라 HIDDEN_UNLOCK_RULES로 이관됨 (200쪽 5권 조건)
      const BADGE_AVATAR_REWARDS = {
        "첫 발걸음": "brock",    // 첫 토론 완료 → 브록 해금
        "호기심 대장": "piper",  // 3개 토론 → 파이퍼 해금
        "깊은 생각": "mortis",   // 심화 토론 → 모티스 해금
        "연속 달성": "sandy",    // 3일 연속 → 샌디 해금
        "완전 정복": "amber"     // 3권 완독 → 앰버 해금
      };

      // 배지 체크 & 자동 부여
      const checkBadges = () => {
        if (!dataLoaded || !profile) return;
        const newBadges = [];
        const totalDiscussions = Object.values(discussionState).filter(v => v && v.completed).length;
        const deepDiscussions = Object.values(discussionState).filter(v => v && v.completed && v.deep).length;
        const completedBooks = BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100).length;

        const checks = [
          { name: "첫 발걸음", condition: totalDiscussions >= 1 },
          { name: "호기심 대장", condition: totalDiscussions >= 3 },
          { name: "깊은 생각", condition: deepDiscussions >= 1 },
          { name: "책벌레", condition: completedBooks >= 1 },
          { name: "연속 달성", condition: streak >= 3 },
          { name: "완전 정복", condition: completedBooks >= 3 }
        ];

        checks.forEach(({ name, condition }) => {
          if (condition && !earnedBadges.some(b => b.name === name)) {
            const badge = BADGES.find(b => b.name === name);
            if (badge) {
              newBadges.push({ name, date: new Date().toISOString() });
              // 배지 → 아바타 해금
              const avatarReward = BADGE_AVATAR_REWARDS[name];
              if (avatarReward && !ownedAvatars.includes(avatarReward)) {
                setOwnedAvatars(prev => [...prev, avatarReward]);
                const avatarInfo = AVATAR_DATA.find(a => a.id === avatarReward);
                setTimeout(() => {
                  showCoinGain(0, `배지 보상: ${avatarInfo?.name || avatarReward} 아바타 해금!`);
                }, 1500);
              }
            }
          }
        });

        if (newBadges.length > 0) {
          setEarnedBadges(prev => [...prev, ...newBadges]);
          try { getAppSound().sfx.badge_earn(); } catch(e) {}
        }
      };

      // ═══════════════════════════════════════
      // 🔓 히든 아바타 해금 체크 (12종)
      // ═══════════════════════════════════════
      const checkHiddenUnlocks = () => {
        if (!dataLoaded || !profile) return;
        const completedBookList = BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100);
        const totalBattles = (battleWins || 0) + (battleLosses || 0) + (battleDraws || 0);
        const ctx = {
          completedBookList,
          streak: streak || 0,
          battleWins: battleWins || 0,
          weeklyBattleWins: weeklyBattleWins || 0,
          totalBattles,
          ownedAvatars: ownedAvatars || [],
        };
        HIDDEN_UNLOCK_RULES.forEach(rule => {
          if (ownedAvatars.includes(rule.id)) return; // 이미 보유
          if (!rule.check(ctx)) return;
          // 해금!
          setOwnedAvatars(prev => prev.includes(rule.id) ? prev : [...prev, rule.id]);
          const avatarInfo = AVATAR_DATA.find(a => a.id === rule.id);
          try { getAppSound().sfx.hidden_unlock(); } catch(e) {}
          setTimeout(() => {
            showCoinGain(0, `🎉 히든 해금: ${avatarInfo?.name || rule.label}! (${rule.hint})`);
          }, 1200);
        });
      };

      // 히든 조건 변화를 감지해 자동 해금
      useEffect(() => {
        checkHiddenUnlocks();
      }, [dataLoaded, bookProgress, streak, battleWins, weeklyBattleWins, battleLosses, battleDraws]);

      // 코디 슬롯 자동 동기화 (아이템 장착 변경 시 현재 슬롯 업데이트)
      useEffect(() => {
        if (!dataLoaded) return;
        setOutfitSlots(prev => {
          const updated = [...prev];
          updated[activeOutfitSlot] = { ...updated[activeOutfitSlot], equippedItems: { ...equippedItems } };
          return updated;
        });
      }, [equippedItems]);

      // 배지 자동 체크 (상태 변경 시)
      useEffect(() => {
        checkBadges();
      }, [discussionState, bookProgress, streak, dataLoaded]);

      const startDiscussion = (book, idx, deep = false) => {
        try { getAppSound().sfx.discussion_start(); } catch(e) {}
        setActiveDiscussionBook(book);
        setActiveDiscussionIdx(idx);
        setIsDeep(deep);
        const topics = deep ? book.deepTopics : book.discussionTopics;
        const topic = topics[idx];

        // 코치 캐릭터가 인사 + 토론 진행
        // 프로필 이름에서 성 제거 (예: 김건우 → 건우)
        const koreanSurnames = ["김","이","박","최","정","강","조","윤","장","임","한","오","서","신","권","황","안","송","류","유","홍","전","고","문","양","손","배","백","허","노","남","하","곽","성","차","주","우","민","구","나","진","천","원","심","방","공","염","여","추","도","석","선","설","마","길","연","위","표","명","기","반","왕","금","옥","육","인","맹","제","모","탁","국","어","은","편"];
        const fullName = profile?.name || "친구";
        const firstName = fullName.length >= 3 && koreanSurnames.includes(fullName.charAt(0)) ? fullName.slice(1) : fullName;
        const _lc = firstName.charAt(firstName.length - 1);
        const _hb = _lc && ((_lc.charCodeAt(0) - 0xAC00) % 28 !== 0);
        const friendlyName = firstName + (_hb ? "아" : "야");

        const initialMessages = [
          { role: "ai", text: COACH.greeting, expression: "default" },
          { role: "ai", text: `📚 "${book.title}" ${deep ? "심화" : ""} 토론 ${idx + 1}번째 주제야!`, expression: "speaking" },
          { role: "ai", text: topic.q, expression: "thinking" },
          { role: "ai", text: `💡 힌트: ${topic.hint}`, expression: "thinking" },
          { role: "ai", text: `${friendlyName}, 네 생각을 말해 봐! 🎤`, expression: "default" }
        ];

        setChatMessages(initialMessages);
        setChatInput("");
        setShowKeyboard(false);
        setScreen("discussion");

        setTimeout(() => {
          setIsSpeaking(true);
          VoiceService.speak(topic.q, () => {
            setIsSpeaking(false);
          });
        }, 500);
      };

      // 누적 텍스트 저장용 ref
      const accumulatedTextRef = useRef("");

      const startListening = () => {
        if (!voiceSupported || isListening) return;

        setIsListening(true);
        isListeningRef.current = true;
        accumulatedTextRef.current = "";
        chatInputRef.current = "";
        setChatInput("");

        const startNewSession = () => {
          const recognizer = VoiceService.createRecognizer();
          if (!recognizer) return;
          recognizerRef.current = recognizer;

          recognizer.onresult = (event) => {
            let sessionFinal = "";
            let sessionInterim = "";
            for (let i = 0; i < event.results.length; i++) {
              if (event.results[i].isFinal) {
                sessionFinal += event.results[i][0].transcript;
              } else {
                sessionInterim += event.results[i][0].transcript;
              }
            }
            const display = (accumulatedTextRef.current + " " + sessionFinal + sessionInterim).trim();
            if (display) {
              setChatInput(display);
              chatInputRef.current = display;
            }
          };

          recognizer.onerror = (e) => {
            if (e.error !== 'no-speech' && e.error !== 'aborted') {
              setIsListening(false);
              isListeningRef.current = false;
            }
          };

          recognizer.onend = () => {
            if (isListeningRef.current) {
              // 현재까지의 텍스트를 누적하고 새 세션 시작
              accumulatedTextRef.current = chatInputRef.current;
              setTimeout(() => {
                if (isListeningRef.current) startNewSession();
              }, 100);
            }
          };

          try { recognizer.start(); } catch(e) {
            setIsListening(false);
            isListeningRef.current = false;
          }
        };

        startNewSession();
      };

      const stopListening = () => {
        setIsListening(false);
        isListeningRef.current = false;
        if (recognizerRef.current) {
          try { recognizerRef.current.stop(); } catch(e) {}
          recognizerRef.current = null;
        }
      };

      const finishVoiceInput = () => {
        stopListening();
        const text = chatInput.trim();
        if (text) {
          setTimeout(() => sendChat(text), 300);
        }
      };

      const chatSendingRef = useRef(false);
      const currentSpeakIdRef = useRef(0);
      const sendChat = async (messageText = null) => {
        const text = messageText || chatInput.trim();
        if (!text) return;

        // 중복 호출 방지
        if (chatSendingRef.current) return;
        chatSendingRef.current = true;

        // 이전 AI 음성이 재생 중이면 즉시 중단
        mobileLog("sendChat 시작");
        VoiceService.stopSpeaking();
        setIsSpeaking(false);

        setChatInput("");
        try { getAppSound().sfx.chat_send(); } catch(e) {}
        const userMsg = text;
        const newMsgs = [...chatMessages, { role: "user", text: userMsg }];
        setChatMessages(newMsgs);

        try {
        const topics = isDeep ? activeDiscussionBook.deepTopics : activeDiscussionBook.discussionTopics;
        const topic = topics[activeDiscussionIdx];

        // 실제 Claude AI로 피드백 받기
        setIsSpeaking(true);
        // 이전 대화에서 user/ai 메시지만 추출 (시스템 메시지 제외)
        const history = newMsgs
          .filter(m => m.role === "user" || m.role === "ai")
          .slice(0, -1)  // 현재 방금 보낸 메시지는 제외 (userAnswer로 별도 전송)
          .map(m => ({ role: m.role, text: m.text }));
        const roundNumber = newMsgs.filter(m => m.role === "user").length; // 1, 2, 3...

        mobileLog("API 호출 시작...");
        const aiResponse = await CloudAPI.discussionCoach(
          userMsg, topic, activeDiscussionBook.title, activeDiscussionBook.summary, isDeep, profile?.name || "친구", history, roundNumber
        );
        mobileLog("API 응답: " + aiResponse.substring(0, 30) + "...");
        setChatMessages(prev => [...prev, { role: "ai", text: aiResponse, expression: "speaking" }]);
        mobileLog("AI 응답 표시 완료");
        try { getAppSound().sfx.chat_receive(); } catch(e) {}

        // AI 피드백 TTS
        const speakId = Date.now();
        currentSpeakIdRef.current = speakId;
        setTimeout(() => {
          try {
            VoiceService.speak(aiResponse, () => {
              if (currentSpeakIdRef.current === speakId) {
                setIsSpeaking(false);
              }
            });
          } catch(ttsErr) {
            setIsSpeaking(false);
          }
        }, 200);

        // 이 토론에서 유저 답변 횟수 카운트 (방금 보낸 것 포함)
        const userMsgCount = newMsgs.filter(m => m.role === "user").length;
        const key = `${activeDiscussionBook.id}-${isDeep ? "deep" : "disc"}-${activeDiscussionIdx}`;
        const isFirstAnswer = userMsgCount === 1 && !discussionState[key];
        const COMPLETE_ANSWER_COUNT = 3; // 3번 답변하면 토론 완료
        const isLastAnswer = userMsgCount === COMPLETE_ANSWER_COUNT;

        // 보상 지급 함수
        const giveReward = (isBonus) => {
          const answerLength = userMsg.trim().length;
          let stars = 1;
          if (answerLength >= 20 && answerLength < 80) stars = 2;
          else if (answerLength >= 80) stars = 3;

          const discXpBase = isDeep ? 30 : 20;
          const hatBonus = getItemBonus(equippedItems, "discussionXp");
          addXp(Math.round(discXpBase * (1 + hatBonus)));

          const baseCoin = 5;
          const starBonus = stars === 3 ? 5 : stars === 2 ? 2 : 0;
          const deepBonus = isDeep ? 3 : 0;
          const weaponBonus = (stars >= 2) ? getItemBonus(equippedItems, "starCoin") : 0;
          const totalCoin = baseCoin + starBonus + deepBonus + weaponBonus;
          setCoins(prev => prev + totalCoin);

          const rewardLabel = isBonus ? "토론 완료 보너스" : "첫 답변 보상";
          const complimentMsg = `🌟 ${rewardLabel}: ${discXpBase}XP와 ${totalCoin}코인을 획득했어요!`;
          setChatMessages(prev => [...prev, { role: "ai", text: complimentMsg, expression: "praise" }]);
          try { getAppSound().sfx.star_rating(); getAppSound().sfx.coin_earn(); } catch(e) {}

          return stars;
        };

        // 📱 모바일 크래시 방지: 보상 처리를 지연 실행
        const REWARD_DELAY = 800; // ms — TTS 시작 후 충분한 여유
        mobileLog("isFirstAnswer=" + isFirstAnswer + " isLastAnswer=" + isLastAnswer);

        // 첫 번째 답변: 기본 보상 (지연 실행)
        if (isFirstAnswer) {
          setTimeout(() => {
            try {
            mobileLog("보상 처리 시작");
            const stars = giveReward(false);

            setDiscussionStarState(prev => {
              const existing = prev[key] || { completed: false, stars: 0, bestStars: 0 };
              const newBestStars = Math.max(existing.bestStars || 0, stars);
              return { ...prev, [key]: { completed: true, stars, bestStars: newBestStars } };
            });
            setDiscussionState(prev => ({ ...prev, [key]: true }));

            completeMissionByTrigger(isDeep ? "deep_discussion" : "discussion");

            // 🕐 북 프로그레스 관련은 추가 지연 (배지/히든 useEffect 연쇄 분산)
            setTimeout(() => {
              try {
              const bookId = activeDiscussionBook.id;
              const oldProgress = bookProgress[bookId] || 0;
              const newProgress = Math.min(100, oldProgress + (isDeep ? 15 : 10));
              setBookProgress(prev => ({ ...prev, [bookId]: newProgress }));

              if (oldProgress < 50 && newProgress >= 50) {
                setCoins(prev => prev + 10);
                showCoinGain(10, `📚 ${activeDiscussionBook.title} 50% 달성!`);
                try { getAppSound().sfx.half_progress(); } catch(e) {}
              } else if (oldProgress < 100 && newProgress >= 100) {
                setCoins(prev => prev + 25);
                try { getAppSound().sfx.book_complete(); setTimeout(() => getAppSound().sfx.quest_complete(), 600); } catch(e) {}
                const ap = getAvatarProfile(profile?.avatar);
                const iqGain = Math.round(10 * ap.bookIQMult);
                const bookDomains = activeDiscussionBook.domains || [];
                const domainLabel = bookDomains.length
                  ? bookDomains.map(d => {
                      const meta = DOMAIN_META.find(x => x.id === d);
                      if (!meta) return "";
                      const gain = Math.round(3 * (ap.multipliers[d] || 1));
                      return `${meta.emoji}${meta.name}+${gain}`;
                    }).filter(Boolean).join(" ")
                  : "";
                showCoinGain(25, `📚 ${activeDiscussionBook.title} 완독! IQ+${iqGain} ${domainLabel}`);

                // 🔥 Phase 4: 독서 스트릭 갱신 (완독 기준, 1일 유예)
                const todayStr = getTodayString();
                const diff = daysBetweenDateStrings(lastCompletionDate, todayStr);
                let newStreak;
                if (diff === null) {
                  newStreak = 1;
                } else if (diff <= 0) {
                  newStreak = streak;
                } else if (diff === 1 || diff === 2) {
                  newStreak = (streak || 0) + 1;
                } else {
                  newStreak = 1;
                }
                setStreak(newStreak);
                setLastCompletionDate(todayStr);

                const milestone = STREAK_MILESTONES.find(m => m.days === newStreak);
                if (milestone && !achievedMilestones.includes(milestone.days)) {
                  setAchievedMilestones(prev => [...prev, milestone.days]);
                  setTimeout(() => {
                    setCoins(prev => prev + milestone.coins);
                    showCoinGain(milestone.coins, `${milestone.emoji} ${newStreak}일 연속 독서! "${milestone.label}" 달성!`);
                    try { getAppSound().sfx.streak_milestone(); } catch(e) {}
                  }, 1200);
                }

                // Phase 5a: 주간 완독 수 집계 (랭킹용)
                const currentWeekStart = getWeekStartDate(todayStr);
                if (weekStartDate === currentWeekStart) {
                  setWeeklyReadCount(prev => (prev || 0) + 1);
                } else {
                  setWeeklyReadCount(1);
                  setWeekStartDate(currentWeekStart);
                }
              }
              } catch(e) { console.error("bookProgress 보상 오류:", e); }
            }, 400); // 북 프로그레스는 보상 후 추가 400ms 지연

          }, REWARD_DELAY);
        }

        // 마지막 답변(3번째): 추가 보너스 보상 (지연 실행)
        if (isLastAnswer) {
          setTimeout(() => { try { giveReward(true); } catch(e) { console.error("보너스 보상 오류:", e); } }, REWARD_DELAY);
        }
        } catch (err) {
          console.error("sendChat 에러:", err);
          mobileLog("sendChat 에러: " + err.message);
          VoiceService.stopSpeaking();
          setIsSpeaking(false);
          setChatMessages(prev => [...prev, {

            expression: "default" 
          }]);

          chatSendingRef.current = false;

      // ═══════════════════════════════════════
      // 🏆 Ranking Screen (Phase 5a v1)
      // ═══════════════════════════════════════
      const fetchRanking = async () => {
        setRankingLoading(true);
        setRankingError(null);
        setRankingPage(0);
        try {
          // 1) localStorage 캐시 확인 (15분)
          const cached = (() => {
            try {
              const raw = localStorage.getItem(RANKING_CACHE_KEY);
              if (!raw) return null;
              const parsed = JSON.parse(raw);
              if (!parsed || !parsed.ts || !Array.isArray(parsed.items)) return null;
              if (Date.now() - parsed.ts > RANKING_CACHE_TTL_MS) return null;
              return parsed;
            } catch (e) { return null; }
          })();
          if (cached && cached.weekStart === getWeekStartDate()) {
            setRankingData(cached.items);
            setRankingLoading(false);
            return;
          }
          // 2) Firestore 전체 유저 조회
          const snap = await db.collection("users").get();
          const currentWeek = getWeekStartDate();
          const items = [];
          snap.forEach(doc => {
            const d = doc.data() || {};
            const name = d.profile && d.profile.name;
            const avatar = (d.profile && d.profile.avatar) || "dash";
            const userWeekStart = d.weekStartDate;
            // 주가 같은 유저만 이번 주 점수 인정, 다른 주는 0
            const weekly = (userWeekStart === currentWeek) ? (d.weeklyReadCount || 0) : 0;
            const weeklyWins = (userWeekStart === currentWeek) ? (d.weeklyBattleWins || 0) : 0;
            if (!name) return; // 프로필 없는 유저 제외
            // Phase 5b: 랭킹 점수 = 완독 × 1.0 + 배틀승 × 0.3 (배틀 3승 ≈ 1권)
            const score = weekly + weeklyWins * 0.3;
            items.push({
              uid: doc.id,
              name,
              avatar,
              weekly,
              weeklyWins,
              score,
              streak: d.streak || 0,
              level: d.level || 1,
            });
          });
          items.sort((a, b) => b.score - a.score || b.weekly - a.weekly || b.weeklyWins - a.weeklyWins || b.streak - a.streak || b.level - a.level);
          try {
            localStorage.setItem(RANKING_CACHE_KEY, JSON.stringify({
              ts: Date.now(),
              weekStart: currentWeek,
              items,
            }));
          } catch (e) { /* 저장 실패 무시 */ }
          setRankingData(items);
        } catch (e) {
          console.error("랭킹 로드 실패:", e);
          setRankingError("랭킹을 불러오지 못했어. 잠시 후 다시 시도해줘.");
        } finally {
          setRankingLoading(false);
        }
      };

      // 랭킹 화면 진입 시 자동 로드
      useEffect(() => {
        if (screen === "ranking" && dataLoaded && !rankingData && !rankingLoading) {

      // ═══════════════════════════════════════
      // ⚔️ Phase 5b: 아바타 배틀 시스템
      // - 스킬 선택식(가위바위보) 배틀
      // - 랜덤 매칭 (비슷한 레벨 우선)
      // - 승리 시 weeklyBattleWins +1 → 랭킹 점수에 가점
      // ═══════════════════════════════════════
      const BATTLE_SKILLS = [
        {
          id: "knowledge",
          emoji: "🔥",
          name: "독서의 기운",
          desc: "책 속에서 쌓은 지식의 불꽃. 상상의 날개를 태워버린다.",

          color: "#3b82f6",
          gradient: "linear-gradient(135deg, #3b82f6, #6366f1)",
          beats: "knowledge"
        },
        {
          id: "imagination",
          emoji: "🌬️",
          name: "상상의 날개",
          desc: "자유로운 상상력. 집중의 벽을 가볍게 뛰어넘는다.",
          color: "#10b981",
          gradient: "linear-gradient(135deg, #10b981, #14b8a6)",
          beats: "focus"
        }
      ];

      // 배틀 매칭 — 비슷한 레벨 ±2 우선, 없으면 전체 랜덤
      const pickBattleOpponent = (myUid, myLevel, pool) => {
        const candidates = (pool || []).filter(u => u.uid !== myUid);
        if (candidates.length === 0) return null;
        const near = candidates.filter(u => Math.abs((u.level || 1) - (myLevel || 1)) <= 2);
        const target = near.length > 0 ? near : candidates;
        return target[Math.floor(Math.random() * target.length)];
      };

      // AI 스킬 선택 — 기본 랜덤, 레벨 차이에 따라 약간의 카운터 경향
      const pickOpponentSkill = (mySkillId, myLevel, oppLevel) => {
        // 레벨 차이에 따라 카운터 확률 조정 (최대 50%)
        const levelDiff = (oppLevel || 1) - (myLevel || 1);
        const counterChance = Math.min(0.5, Math.max(0.1, 0.25 + levelDiff * 0.05));
        if (mySkillId && Math.random() < counterChance) {
          // 내 스킬을 이기는 스킬 선택
          const counter = BATTLE_SKILLS.find(s => s.beats === mySkillId);
          if (counter) return counter.id;
        }
        // 랜덤
        return BATTLE_SKILLS[Math.floor(Math.random() * BATTLE_SKILLS.length)].id;
      };

      // 승패 판정
      const resolveBattle = (mySkillId, oppSkillId) => {
        if (mySkillId === oppSkillId) return "draw";
        const my = BATTLE_SKILLS.find(s => s.id === mySkillId);
        if (!my) return "draw";
        return my.beats === oppSkillId ? "win" : "lose";
      };

      // 배틀 화면 진입 시 매칭 시작
      useEffect(() => {
        if (screen !== "battle") return;
        if (battleStep !== "matching") return;
        // rankingData 없으면 먼저 로드
        if (!rankingData) {
          fetchRanking();
          return;
        }
        const myUid = FirestoreService.getUserId();
        // 약간의 딜레이로 '매칭 중' 연출
        const t = setTimeout(() => {
          const opp = pickBattleOpponent(myUid, level, rankingData);
          if (!opp) {
            setBattleOpponent(null);
            setBattleStep("empty");
          } else {
            setBattleOpponent(opp);
            setBattleStep("ready");
          }
        }, 900);
        return () => clearTimeout(t);
      }, [screen, battleStep, rankingData, level]);

      const startBattle = () => {
        // 다시 매칭
        setBattleOpponent(null);
        setBattleMySkill(null);
        setBattleOppSkill(null);
        setBattleResult(null);
        setBattleStep("matching");
      };

      const selectBattleSkill = (skillId) => {
        if (battleStep !== "ready" || !battleOpponent) return;
        const oppSkillId = pickOpponentSkill(skillId, level, battleOpponent.level);
        const result = resolveBattle(skillId, oppSkillId);
        setBattleMySkill(skillId);
        setBattleOppSkill(oppSkillId);
        setBattleStep("reveal");
        // 0.9초 후 결과 화면으로 전환 + 기록 반영
        setTimeout(() => {
          if (result === "win") {
            setBattleWins(w => w + 1);
            setWeeklyBattleWins(w => w + 1);
            setCoins(c => c + 5); // 승리 시 5코인 보상
          } else if (result === "lose") {
            setBattleLosses(l => l + 1);
          } else {
            setBattleDraws(d => d + 1);
          }
          setBattleResult(result);
          setBattleLog(prev => [
            { ts: Date.now(), opponent: battleOpponent?.name, result, mySkill: skillId, oppSkill: oppSkillId },
            ...prev
          ].slice(0, 5));
          setBattleStep("result");
          // 랭킹 캐시 무효화 (내 승수가 반영되려면)
          try { localStorage.removeItem(RANKING_CACHE_KEY); } catch (e) {}
        }, 900);
      };

      const exitBattle = () => {
        setBattleStep("matching");
        setBattleOpponent(null);
        setBattleMySkill(null);
        setBattleOppSkill(null);
        setBattleResult(null);
        setScreen("ranking");
      };

      // ═══════════════════════════════════════
      // ⚔️ Phase 5b v2: AI 토론 배틀 (Gemini 2.5 Flash)
      // ═══════════════════════════════════════
      const getKstToday = () => {
        const now = new Date();
        const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
        return kst.toISOString().slice(0, 10);
      };

      const canBattleToday = () => {
        if (isAdmin) return true; // 관리자는 무제한
        const today = getKstToday();
        if (lastBattleDate !== today) return true;
        return (battleTodayCount || 0) < 1;
      };

      const BATTLE_PLAY_COIN_COST = 50;
      const BATTLE_PLAY_DAILY_LIMIT = 2;

      // ⚔️ 배틀 v2: HP 시스템 상수
      const BATTLE_V2 = {
        BASE_HP: 100,
        BOOK_HP_BONUS: 5,       // 완독 1권당
        MAX_BOOK_BONUS: 50,
        LEVEL_HP_BONUS: 3,      // 레벨당
        MAX_LEVEL_BONUS: 30,
        DMG_STRONG: [20, 30],   // 정답 강공격 범위
        DMG_WEAK: [5, 10],      // 오답 약공격 범위
        DMG_ULTIMATE_HIT: [40, 50],
        DMG_ULTIMATE_MISS: 10,
        DOMAIN_STRONG_MULT: 1.5,
        DOMAIN_WEAK_MULT: 0.7,
        TIMER_SECONDS: 10,
        TIMER_ULTIMATE: 30,
        ROUNDS: 5,
      };


      // ═══════════════════════════════════════
      // 📖 책 기반 배틀 맵 (아레나) 시스템
      // ═══════════════════════════════════════
      const getWeeklyArenaBook = () => {
        // 주간 추천 책 — 완독률 기준 자동 선정 (매주 월요일 변경)
        const weekNum = Math.floor((Date.now() - new Date("2026-01-05").getTime()) / (7 * 24 * 60 * 60 * 1000));
        const completedBooks = BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100);
        if (completedBooks.length === 0) return null;
        return completedBooks[weekNum % completedBooks.length];
      };

      const canEnterArena = () => {
        const arenaBook = getWeeklyArenaBook();
        if (!arenaBook) return false;
        return (bookProgress[arenaBook.id] || 0) >= 100;
      };

      const ARENA_BADGE = { name: "아레나 챔피언", icon: "🏟️", desc: "책 아레나 승리" };

      const calcMaxHP = (booksCompleted, playerLevel) => {
        const bookBonus = Math.min((booksCompleted || 0) * BATTLE_V2.BOOK_HP_BONUS, BATTLE_V2.MAX_BOOK_BONUS);
        const lvlBonus = Math.min((playerLevel || 1) * BATTLE_V2.LEVEL_HP_BONUS, BATTLE_V2.MAX_LEVEL_BONUS);
        return BATTLE_V2.BASE_HP + bookBonus + lvlBonus;
      };

      const rollDamage = (range) => {
        if (typeof range === "number") return range;
        return Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
      };
      const RARITY_LABEL = { free: "BASIC", common: "COMMON", rare: "RARE", epic: "EPIC", legendary: "LEGEND", heroic: "HEROIC", mythic: "MYTHIC", hidden: "HIDDEN" };
      const RARITY_BADGE_STYLE = {
        free: { background: "rgba(156,163,175,0.3)", color: "#d1d5db" },
        common: { background: "rgba(34,197,94,0.3)", color: "#4ade80" },
        rare: { background: "rgba(59,130,246,0.3)", color: "#60a5fa" },
        epic: { background: "rgba(168,85,247,0.3)", color: "#c084fc" },
        legendary: { background: "rgba(234,179,8,0.3)", color: "#fde047" },
        heroic: { background: "rgba(59,130,246,0.3)", color: "#60a5fa" },
        mythic: { background: "rgba(236,72,153,0.3)", color: "#f472b6" },
        hidden: { background: "rgba(139,92,246,0.3)", color: "#a78bfa" },
      };
      const remainingPlayCount = () => {
        if (isAdmin) return 999;
        const today = getKstToday();
        if (lastBattlePlayDate !== today) return BATTLE_PLAY_DAILY_LIMIT;
        return Math.max(0, BATTLE_PLAY_DAILY_LIMIT - (battleTodayPlayCount || 0));
      };
      const canPlayToday = () => remainingPlayCount() > 0;
      const canAffordPlay = () => isAdmin || (coins || 0) >= BATTLE_PLAY_COIN_COST;

      // 관리자 켜지면 배틀 에러 자동 삭제
      useEffect(() => {
        if (isAdmin && battleError) setBattleError("");
      }, [isAdmin]);

      const resetBattleSession = () => {
        setBattlePhase("gate");
        setBattleMode(null);
        setBattleMessages([]);
        setBattleRounds(null);
        setBattleWinner(null);
        setBattleNarration("");
        setBattleLoading(false);
        setBattleError("");
        // v2 HP reset
        setMyHP(100); setOppHP(100); setMyMaxHP(100); setOppMaxHP(100);
        setLastDamage(null); setBattleAnim(null);
        setBattleTimer(0); setBattleTimerActive(false);
        if (battleTimerRef.current) clearInterval(battleTimerRef.current);
        // 🔊 BGM 정지
        try { getBattleSound().stopBgm(); } catch(e) {}
      };

      const exitBattleV2 = () => {
        resetBattleSession();
        setBattleOpponent(null);
        setScreen("ranking");
      };

      const launchBattle = async (mode) => {
        if (!canBattleToday()) {
          setBattleError("오늘 배틀 기회를 이미 사용했어요. 내일 다시 도전해줘!");
          return;
        }
        setBattleMode(mode);
        setBattleError("");
        setBattleLoading(true);
        setBattlePhase("playing");
        // 🔊 배틀 BGM + 시작 효과음
        try { const bs = getBattleSound(); bs.sfx.battleStart(); setTimeout(() => bs.startBgm(), 500); } catch(e) {}
        setBattleMessages([{ kind: "banner", text: mode === "watch" ? "관전 모드 — 내 아바타와 상대가 토론합니다" : "자동진행 모드 — 아바타가 자동으로 싸웁니다" }]);

        try {
          const myUid = FirestoreService.getUserId();
          const opp = battleOpponent || pickBattleOpponent(myUid, level, rankingData);
          if (!opp) throw new Error("상대를 찾지 못했어요. 잠시 후 다시 시도해줘!");
          setBattleOpponent(opp);

          const myAvatarId = sanitizeAvatarId(profile?.avatar);
          const oppAvatarId = sanitizeAvatarId(opp.avatar);
          const myPack = getAvatarKnowledgePack(myAvatarId, bookProgress, { battleWins, battleLosses, level });
          const oppPack = getAvatarKnowledgePack(oppAvatarId, {}, { battleWins: opp.battleWins || 0, battleLosses: opp.battleLosses || 0, level: opp.level || 1 });
          const myName = profile?.name || "나";
          const oppName = opp.name || "상대";

          setBattleMessages(prev => [...prev, { kind: "narration", text: "🎙️ 양쪽 아바타가 입장했어요!" }]);

          const result = await CloudAPI.runAvatarBattle({
            myUid, oppUid: opp.uid, myPack, oppPack, myName, oppName, mode
          });

          setBattleRounds(result.rounds);
          setBattleWinner(result.winner);
          setBattleNarration(result.narration || "");
          await streamBattleMessages(result);
          // 🔊 관전 모드 배틀 종료: BGM 정지 + 결과 효과음
          try {
            const bs = getBattleSound();
            bs.stopBgm();
            setTimeout(() => { if (result.winner === "my") bs.sfx.victory(); else if (result.winner === "opp") bs.sfx.defeat(); }, 300);
          } catch(e) {}

          // Firestore 저장 + 로컬 통계 업데이트 (관리자는 일일 카운트 증가 안 함)
          if (!isAdmin) {
            const today = getKstToday();
            const nextCount = lastBattleDate === today ? (battleTodayCount || 0) + 1 : 1;
            setLastBattleDate(today);
            setBattleTodayCount(nextCount);
          }
          if (result.winner === "my") {
            setBattleWins(w => w + 1);
            setWeeklyBattleWins(w => w + 1);
          } else if (result.winner === "opp") {
            setBattleLosses(l => l + 1);
          } else {
            setBattleDraws(d => d + 1);
          }
          setBattlePhase("result");
        } catch (e) {
          console.error("launchBattle 실패:", e);
          setBattleError(e.message || "배틀 생성에 실패했어요.");
          setBattlePhase("ready");
        } finally {
          setBattleLoading(false);
        }
      };

      const streamBattleMessages = async (replay) => {
        const wait = (ms) => new Promise(r => setTimeout(r, ms));
        const myName = profile?.name || "나";
        const oppName = battleOpponent?.name || "상대";
        for (let i = 0; i < replay.rounds.length; i++) {
          const r = replay.rounds[i];
          const header = r.type === "qa"
            ? `— 라운드 ${i + 1} · 책 Q&A (${r.book || "책"}) —`
            : r.type === "complete"
            ? `— 라운드 ${i + 1} · 문장 완성 (${r.book || "책"}) —`
            : `— 라운드 ${i + 1} · 미니 토론 —`;
          setBattleMessages(prev => [...prev, { kind: "banner", text: header }]);
          await wait(700);
          if (r.type === "qa") {
            setBattleMessages(prev => [...prev, { kind: "system", text: `❓ ${r.question}` }]);
            await wait(900);
            setBattleMessages(prev => [...prev, { kind: "me", name: myName, text: r.myAnswer }]);
            await wait(800);
            setBattleMessages(prev => [...prev, { kind: "opp", name: oppName, text: r.oppAnswer }]);
          } else if (r.type === "complete") {
            setBattleMessages(prev => [...prev, { kind: "system", text: `✏️ ${r.sentence}` }]);
            await wait(900);
            const myAns = r.completions?.[r.myChoiceIdx] || "?";
            const oppAns = r.completions?.[r.oppChoiceIdx] || "?";
            setBattleMessages(prev => [...prev, { kind: "me", name: myName, text: myAns }]);
            await wait(800);
            setBattleMessages(prev => [...prev, { kind: "opp", name: oppName, text: oppAns }]);
          } else {
            setBattleMessages(prev => [...prev, { kind: "system", text: `💭 주제: ${r.topic}` }]);
            await wait(900);
            setBattleMessages(prev => [...prev, { kind: "me", name: myName, text: `[${r.myStance}] ${r.myArgument}` }]);
            await wait(800);
            setBattleMessages(prev => [...prev, { kind: "opp", name: oppName, text: `[${r.oppStance}] ${r.oppArgument}` }]);
          }
          await wait(700);
          const judgeText = r.judge === "my" ? `✅ 판정: ${myName} 승 — ${r.reason}`
            : r.judge === "opp" ? `❌ 판정: ${oppName} 승 — ${r.reason}`
            : `🤝 판정: 무승부 — ${r.reason}`;
          setBattleMessages(prev => [...prev, { kind: "judge", text: judgeText }]);
          await wait(900);
        }
        if (replay.narration) {
          setBattleMessages(prev => [...prev, { kind: "narration", text: `🎬 ${replay.narration}` }]);
        }
      };

      // ⚔️ 직접 참여 배틀 모드
      const launchInteractiveBattle = async (debateOwner) => {
        if (!canPlayToday()) {
          setBattleError(`오늘 직접 참여 기회를 모두 썼어요. (${BATTLE_PLAY_DAILY_LIMIT}회/일)`);
          return;
        }
        if (!canAffordPlay()) {
          setBattleError(`코인이 부족해요. ${BATTLE_PLAY_COIN_COST}코인 필요`);
          return;
        }
        setBattleMode("play");
        setMiniDebateOwner(debateOwner);
        setBattleError("");
        setBattleLoading(true);
        setRoundAnswers([]);
        setInteractiveRoundIdx(0);
        setShowRoundResult(false);
        setLastDamage(null);
        setBattleAnim(null);
        // 🔊 배틀 BGM + 시작 효과음
        try { const bs = getBattleSound(); bs.sfx.battleStart(); setTimeout(() => bs.startBgm(), 500); } catch(e) {}

        try {
          const myUid = FirestoreService.getUserId();
          const opp = battleOpponent || pickBattleOpponent(myUid, level, rankingData);
          if (!opp) throw new Error("상대를 찾지 못했어요. 잠시 후 다시 시도해줘!");
          setBattleOpponent(opp);

          // v2: HP 초기화 (아바타 스킬 보너스 포함)
          const completedBooks = BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100);
          let mHP = calcMaxHP(completedBooks.length, level);
          let oHP = calcMaxHP(0, opp.level || 1);
          // 🎮 스킬 HP 보너스 적용
          const myBattleSkill = getAvatarSkill(profile?.avatar);
          const oppBattleSkill = getAvatarSkill(opp.avatar);
          if (myBattleSkill?.effect?.type === "hp_boost") mHP += myBattleSkill.effect.value;
          if (myBattleSkill?.effect?.type === "dual_boost" && myBattleSkill.effect.value.hp) mHP += myBattleSkill.effect.value.hp;
          if (oppBattleSkill?.effect?.type === "hp_boost") oHP += oppBattleSkill.effect.value;
          if (oppBattleSkill?.effect?.type === "dual_boost" && oppBattleSkill.effect.value.hp) oHP += oppBattleSkill.effect.value.hp;
          setMyHP(mHP); setMyMaxHP(mHP);
          setOppHP(oHP); setOppMaxHP(oHP);
          // 스킬 상태 리셋
          setActiveSkillUsed(false); setSkillActivated(false); setOppSkillSealed(false); setReviveUsed(false);

          const myAvatarId = sanitizeAvatarId(profile?.avatar);
          const oppAvatarId = sanitizeAvatarId(opp.avatar);
          const myPack = getAvatarKnowledgePack(myAvatarId, bookProgress, { battleWins, battleLosses, level });
          const oppPack = getAvatarKnowledgePack(oppAvatarId, {}, { battleWins: opp.battleWins || 0, battleLosses: opp.battleLosses || 0, level: opp.level || 1 });
          const myName = profile?.name || "나";
          const oppName = opp.name || "상대";

          const result = await CloudAPI.runInteractiveBattle({
            myUid, oppUid: opp.uid, myPack, oppPack, myName, oppName, miniDebateOwner: debateOwner
          });

          setInteractiveBattleId(result.battleId);
          setInteractiveRounds(result.rounds);

          // 코인 차감 (관리자 제외)
          if (!isAdmin) {
            setCoins(c => Math.max(0, (c || 0) - BATTLE_PLAY_COIN_COST));
            const today = getKstToday();
            const nextCount = lastBattlePlayDate === today ? (battleTodayPlayCount || 0) + 1 : 1;
            setLastBattlePlayDate(today);
            setBattleTodayPlayCount(nextCount);
          }

          setBattlePhase("play-round");

          // 첫 라운드 타이머 시작 (스킬 시간 보너스 포함)
          const timeSkill = getAvatarSkill(profile?.avatar);
          const timeBonus = (timeSkill?.effect?.type === "time_bonus") ? timeSkill.effect.value
            : (timeSkill?.effect?.type === "multi_hint" && timeSkill.effect.value.time) ? timeSkill.effect.value.time
            : (timeSkill?.effect?.type === "mega_buff" && timeSkill.effect.value.time) ? timeSkill.effect.value.time : 0;
          const firstRound = result.rounds[0];
          if (firstRound?.type === "qa" || firstRound?.type === "complete") {
            setTimeout(() => startBattleTimer(BATTLE_V2.TIMER_SECONDS + timeBonus), 300);
          } else if (firstRound?.type === "debate" && debateOwner === "me") {
            setTimeout(() => startBattleTimer(BATTLE_V2.TIMER_ULTIMATE + timeBonus), 300);
          }
        } catch (e) {
          console.error("launchInteractiveBattle 실패:", e);
          setBattleError(e.message || "배틀 생성에 실패했어요.");
          setBattlePhase("ready");
        } finally {
          setBattleLoading(false);
        }
      };

      const submitRoundAnswer = async (choiceIdx) => {
        if (!interactiveRounds) return;
        const round = interactiveRounds[interactiveRoundIdx];
        let roundResult;

        if (round.type === "qa") {
          // 4지선다 — 정답 맞추면 승
          const myCorrect = choiceIdx === round.answerIdx;
          const oppCorrect = round.oppChoiceIdx === round.answerIdx;
          let judge;
          if (myCorrect && !oppCorrect) judge = "my";
          else if (!myCorrect && oppCorrect) judge = "opp";
          else if (myCorrect && oppCorrect) judge = "draw"; // 둘 다 정답 → 무승부
          else judge = "draw"; // 둘 다 오답 → 무승부
          roundResult = {
            type: "qa",
            myChoiceIdx: choiceIdx,
            oppChoiceIdx: round.oppChoiceIdx,
            answerIdx: round.answerIdx,
            myCorrect,
            oppCorrect,
            judge,
            question: round.question,
            choices: round.choices,
            explanation: round.explanation,
            book: round.book,
          };
        } else if (round.type === "complete") {
          // 문장 완성형 — 정답 맞추면 승
          const myCorrect = choiceIdx === round.answerIdx;
          const oppCorrect = round.oppChoiceIdx === round.answerIdx;
          let judge;
          if (myCorrect && !oppCorrect) judge = "my";
          else if (!myCorrect && oppCorrect) judge = "opp";
          else if (myCorrect && oppCorrect) judge = "draw";
          else judge = "draw";
          roundResult = {
            type: "complete",
            myChoiceIdx: choiceIdx,
            oppChoiceIdx: round.oppChoiceIdx,
            answerIdx: round.answerIdx,
            myCorrect,
            oppCorrect,
            judge,
            sentence: round.sentence,
            completions: round.completions,
            explanation: round.explanation,
            book: round.book,
          };
        } else {
          // 미니토론 (내가 담당) — 옵션 점수 vs 상대 점수
          if (miniDebateOwner === "me") {
            const myOpt = round.myOptions[choiceIdx];
            const myScore = myOpt?.score ?? 0;
            const oppScore = round.oppScore ?? 0;
            let judge;
            if (myScore > oppScore) judge = "my";
            else if (myScore < oppScore) judge = "opp";
            else judge = "draw";
            roundResult = {
              type: "debate",
              topic: round.topic,
              myChoiceIdx: choiceIdx,
              myStance: myOpt?.text || "",
              myScore,
              oppStance: round.oppStance,
              oppScore,
              judge,
              reason: round.reason || "양쪽 주장을 비교한 결과예요.",
            };
          } else {
            // AI 담당 토론은 서버 결과 그대로 사용
            roundResult = {
              type: "debate",
              topic: round.topic,
              myStance: round.myStance,
              myArgument: round.myArgument,
              oppStance: round.oppStance,
              oppArgument: round.oppArgument,
              judge: round.judge,
              reason: round.reason,
            };
          }
        }

        // ── HP 데미지 계산 (스킬 적용) ──
        let myDmg = 0;   // 내가 받는 데미지
        let oppDmg = 0;  // 상대가 받는 데미지
        const mySkill = getAvatarSkill(profile?.avatar);
        const oppSkillData = oppSkillSealed ? null : getAvatarSkill(battleOpponent?.avatar);
        const isDebateRound = roundResult.type === "debate";

        if (roundResult.type === "qa" || roundResult.type === "complete") {
          oppDmg = roundResult.myCorrect
            ? rollDamage(BATTLE_V2.DMG_STRONG)
            : rollDamage(BATTLE_V2.DMG_WEAK);
          myDmg = roundResult.oppCorrect
            ? rollDamage(BATTLE_V2.DMG_STRONG)
            : rollDamage(BATTLE_V2.DMG_WEAK);
        } else {
          if (roundResult.judge === "my") {
            oppDmg = rollDamage(BATTLE_V2.DMG_STRONG);
            myDmg = rollDamage(BATTLE_V2.DMG_WEAK);
          } else if (roundResult.judge === "opp") {
            oppDmg = rollDamage(BATTLE_V2.DMG_WEAK);
            myDmg = rollDamage(BATTLE_V2.DMG_STRONG);
          } else {
            oppDmg = rollDamage(BATTLE_V2.DMG_WEAK);
            myDmg = rollDamage(BATTLE_V2.DMG_WEAK);
          }
        }

        // 🎮 내 패시브 스킬 적용
        if (mySkill?.skillType === "passive") {
          const e = mySkill.effect;
          if (e.type === "dmg_boost") oppDmg = Math.round(oppDmg * (1 + e.value));
          if (e.type === "correct_dmg_boost" && roundResult.myCorrect) oppDmg = Math.round(oppDmg * (1 + e.value));
          if (e.type === "correct_flat_bonus" && roundResult.myCorrect) oppDmg += e.value;
          if (e.type === "shield") myDmg = Math.round(myDmg * (1 - e.value));
          if (e.type === "wrong_shield" && !roundResult.myCorrect) myDmg = Math.round(myDmg * (1 - e.value));
          if (e.type === "opp_dmg_boost") oppDmg = Math.round(oppDmg * (1 + e.value));
          if (e.type === "debate_dmg_boost" && isDebateRound) oppDmg = Math.round(oppDmg * (1 + e.value));
          if (e.type === "draw_bonus_atk" && roundResult.judge === "draw") oppDmg += e.value;
          if (e.type === "draw_to_win" && roundResult.judge === "draw") { roundResult.judge = "my"; oppDmg += 10; }
          if (e.type === "streak_double" && roundAnswers.length > 0 && roundAnswers[roundAnswers.length-1].judge === "my" && roundResult.judge === "my") oppDmg *= 2;
          if (e.type === "last_stand") {
            const curHP = myHP - myDmg; // 예상 남은 HP
            const threshold = myMaxHP * 0.3;
            if (curHP <= threshold && curHP > 0) oppDmg = Math.round(oppDmg * e.value);
          }
          if (e.type === "regen") setMyHP(prev => Math.min(myMaxHP, prev + e.value));
          if (e.type === "lifesteal") { const steal = Math.round(oppDmg * e.value); setMyHP(prev => Math.min(myMaxHP, prev + steal)); }
          if (e.type === "debate_lifesteal" && isDebateRound && roundResult.judge === "my") setMyHP(prev => Math.min(myMaxHP, prev + e.value));
          if (e.type === "double_strike" && roundResult.myCorrect) oppDmg = Math.round(oppDmg * 2);
