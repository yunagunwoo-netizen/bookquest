      // ═══════════════════════════════════════
      const ChangelogModal = () => {
        if (!showChangelog) return null;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1100, padding: 20 }}
            onClick={() => setShowChangelog(false)}>
            <div style={{ background: "white", borderRadius: 20, padding: 24, maxWidth: 400, width: "100%", maxHeight: "80vh", overflowY: "auto", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                <h3 style={{ fontSize: 18, fontWeight: 800, color: "#1a1a2e" }}><img src="icons/ui/ui_clipboard.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 업데이트 노트</h3>
                <button onClick={() => setShowChangelog(false)}
                  style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#999" }}>✕</button>
              </div>
              {CHANGELOG.map((entry, i) => (
                <div key={entry.version} style={{
                  padding: 14, marginBottom: 12, borderRadius: 14,
                  background: i === 0 ? "linear-gradient(135deg, #667eea15, #764ba215)" : "#f8f8f8",
                  border: i === 0 ? "1.5px solid #667eea40" : "1px solid #eee"
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <span style={{
                      fontSize: 11, fontWeight: 800, padding: "2px 8px", borderRadius: 6,
                      background: i === 0 ? "#667eea" : "#ccc", color: "white"
                    }}>v{entry.version}</span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#1a1a2e", flex: 1 }}>{entry.title}</span>
                    <span style={{ fontSize: 10, color: "#999" }}>{entry.date}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#555", lineHeight: 1.7 }}>
                    {entry.changes.map((c, j) => (
                      <div key={j} style={{ paddingLeft: 8 }}>• {c}</div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // ⏪ 롤백 모달
      // ═══════════════════════════════════════
      const RollbackModal = () => {
        if (!showRollback) return null;
        const versions = Object.entries(VERSION_HISTORY);
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1100, padding: 20 }}
            onClick={() => setShowRollback(false)}>
            <div style={{ background: "white", borderRadius: 20, padding: 24, maxWidth: 400, width: "100%", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                <h3 style={{ fontSize: 18, fontWeight: 800, color: "#1a1a2e" }}>⏪ 버전 복원</h3>
                <button onClick={() => setShowRollback(false)}
                  style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#999" }}>✕</button>
              </div>
              <div style={{ fontSize: 12, color: "#888", marginBottom: 16, lineHeight: 1.6, padding: "10px 12px", background: "#fff8e1", borderRadius: 10, border: "1px solid #ffe082" }}>
                버전을 복원하면 현재 앱 화면이 해당 버전으로 전환됩니다. 사용자 데이터(프로필, 코인 등)는 Firestore에 저장되어 있어 유지됩니다.
              </div>
              {versions.map(([ver, info]) => {
                const isCurrent = ver === APP_VERSION;
                const log = CHANGELOG.find(c => c.version === ver);
                return (
                  <div key={ver} style={{
                    padding: 14, marginBottom: 10, borderRadius: 14,
                    background: isCurrent ? "linear-gradient(135deg, #667eea10, #764ba210)" : "#f8f8f8",
                    border: isCurrent ? "2px solid #667eea" : "1.5px solid #eee",
                    display: "flex", alignItems: "center", gap: 12
                  }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                        <span style={{
                          fontSize: 11, fontWeight: 800, padding: "2px 8px", borderRadius: 6,
                          background: isCurrent ? "#667eea" : "#aaa", color: "white"
                        }}>v{ver}</span>
                        {isCurrent && <span style={{ fontSize: 10, color: "#667eea", fontWeight: 700 }}>현재</span>}
                      </div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#1a1a2e" }}>{info.label}</div>
                      {log && <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{log.date}</div>}
                    </div>

                          window.location.href = info.file;

                      }}
                        style={{
                          padding: "8px 16px", borderRadius: 10, border: "none",
                          background: "linear-gradient(135deg, #f59e0b, #d97706)", color: "white",
                          fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap",

                        }}>
                        복원
                      </button>
                    )}
                  </div>
                );
              })}
              <div style={{ fontSize: 11, color: "#aaa", textAlign: "center", marginTop: 12 }}>
                backup/ 폴더에 이전 버전 파일이 필요합니다
              </div>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🛍️ Shop Modal (대규모 개선 - 카테고리 탭 + 아바타 구매)
      // ═══════════════════════════════════════
      const ShopModal = () => {
        if (!showShop) return null;
        // 아바타는 희귀도/가격순으로 정렬
        // (무료 → 영웅 1200 → 한국영웅 1500 → 전설 2500 → 신화 3500)
        // storeHidden=true인 아바타는 상점에서 제외 (히든 탭에서는 별도 처리)
        const RARITY_ORDER = { free: 0, common: 1, rare: 2, epic: 3, legendary: 4 };
        const isHiddenTab = shopCategory === "avatar" && avatarRarityFilter === "hidden";
        // 히든 탭: HIDDEN_UNLOCK_RULES 기준 12종만 (조건+진행도 표시)
        const hiddenAvatars = HIDDEN_UNLOCK_RULES.map(rule => {
          const av = AVATAR_DATA.find(a => a.id === rule.id);
          if (!av) return null;
          const completedBookList = ALL_BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100);
          const totalBattles = (battleWins || 0) + (battleLosses || 0) + (battleDraws || 0);
          const ctx = {
            completedBookList,
            streak: streak || 0,
            battleWins: battleWins || 0,
            weeklyBattleWins: weeklyBattleWins || 0,
            totalBattles,
          };
          return {
            ...av, _rule: rule,
            _progress: rule.progress(ctx),
            _target: rule.target,
            _unlocked: rule.check(ctx) || ownedAvatars.includes(rule.id),
          };
        }).filter(Boolean);
        // 일반 탭: storeHidden=false
        const sortedAvatars = [...AVATAR_DATA]
          .filter(a => !a.storeHidden)
          .sort((a, b) => {
            const ro = (RARITY_ORDER[a.rarity] ?? 9) - (RARITY_ORDER[b.rarity] ?? 9);
            if (ro !== 0) return ro;
            return (a.price ?? 0) - (b.price ?? 0);
          });
        const isAvatarTab = shopCategory === "avatar";
        // Tier 기반 필터
        const matchTier = (a, tier) => {
          if (tier === "all") return true;
          if (tier === "free") return a.rarity === "free";
          if (tier === "hero") return (a.rarity === "epic" && a.price <= 1200) || a.rarity === "heroic";
          if (tier === "legendary") return a.rarity === "legendary" && a.price <= 2500;
          if (tier === "mythic") return a.rarity === "legendary" && a.price >= 3500;
          return a.rarity === tier;
        };
        const rarityFilteredAvatars = isHiddenTab
          ? hiddenAvatars
          : (avatarRarityFilter === "all" ? sortedAvatars : sortedAvatars.filter(a => matchTier(a, avatarRarityFilter)));
        // 페이지네이션 (아바타 탭만): 페이지당 12개
        const AVATAR_PAGE_SIZE = 12;
        const totalPages = Math.max(1, Math.ceil(rarityFilteredAvatars.length / AVATAR_PAGE_SIZE));
        const safePage = Math.min(avatarPage, totalPages - 1);
        const pagedAvatars = isAvatarTab
          ? rarityFilteredAvatars.slice(safePage * AVATAR_PAGE_SIZE, (safePage + 1) * AVATAR_PAGE_SIZE)
          : [];
        const filteredItems = isAvatarTab
          ? pagedAvatars
          : SHOP_ITEMS.filter(item => item.category === shopCategory);
        // 카운터는 상점 진열 대상(storeHidden=false)만 기준으로 표시
        const visibleAvatarIds = new Set(AVATAR_DATA.filter(a => !a.storeHidden).map(a => a.id));
        const ownedAvatarCount = ownedAvatars.filter(id => visibleAvatarIds.has(id)).length;
        const totalAvatarCount = visibleAvatarIds.size;
        const RARITY_TABS = [
          { id: "all",       label: "전체",   color: "#667eea" },
          { id: "free",      label: "무료",   color: "#10b981" },
          { id: "hero",      label: "영웅",   color: "#a855f7" },
          { id: "legendary", label: "전설",   color: "#f59e0b" },
          { id: "mythic",    label: "신화",   color: "#dc2626" },
          { id: "hidden",    label: "히든", color: "#ec4899" },
        ];
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 }}
            onClick={() => setShowShop(false)}>
            <div style={{ background: "white", borderRadius: "24px 24px 0 0", padding: "16px 16px 20px", maxHeight: "92vh", width: "100%", display: "flex", flexDirection: "column", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              {/* 상점 헤더: 큰 아바타 프리뷰 + 타이틀 */}
              <div style={{ textAlign: "center", padding: "8px 0 4px", position: "relative" }}>
                <div style={{ display: "flex", justifyContent: "flex-end", position: "absolute", top: 0, right: 0, gap: 12, alignItems: "center" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 14, fontWeight: 700, color: "#667eea" }}>
                    <img src={PNG_ICONS.coin} style={{ width: 18, height: 18 }} /> {coins}
                  </span>
                  <button onClick={() => setShowShop(false)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", padding: 0 }}>✕</button>
                </div>
                <AvatarWithItems
                  size={80}
                  avatarId={profile?.avatar}
                  equippedItems={equippedItems}
                  shape="circle"
                  borderStyle={{ border: "3px solid #667eea", boxShadow: "0 4px 16px rgba(102,126,234,0.3)" }}
                />
                <h3 style={{ fontSize: 16, fontWeight: 800, color: "#1a1a2e", marginTop: 6, marginBottom: 0 }}>
                  상점
                  {isAvatarTab && (
                    <span style={{ fontSize: 11, fontWeight: 600, color: "#667eea", marginLeft: 8, background: "#eef2ff", padding: "2px 8px", borderRadius: 10 }}>
                      수집 {ownedAvatarCount} / {totalAvatarCount}
                    </span>
                  )}
                </h3>
              </div>
              <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 10, marginBottom: 10, borderBottom: "1px solid #eee", flexShrink: 0 }}>
                {SHOP_CATEGORIES.map(cat => (
                  <button key={cat.id} onClick={() => setShopCategory(cat.id)}
                    style={{ padding: "6px 12px", borderRadius: 20, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", display: "inline-flex", alignItems: "center", gap: 4,
                      background: shopCategory === cat.id ? "#667eea" : "#f0f0f5",
                      color: shopCategory === cat.id ? "white" : "#666" }}>
                    <Icon name={`shop_${cat.id}`} size={16} /> {cat.name}
                  </button>
                ))}
              </div>
              {isAvatarTab && (
                <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 8, marginBottom: 8, flexShrink: 0 }}>
                  {RARITY_TABS.map(rt => {
                    const count = rt.id === "all"
                      ? sortedAvatars.length
                      : rt.id === "hidden"
                        ? hiddenAvatars.filter(h => h._unlocked).length + "/" + hiddenAvatars.length
                        : sortedAvatars.filter(a => matchTier(a, rt.id)).length;
                    const active = avatarRarityFilter === rt.id;
                    return (
                      <button key={rt.id} onClick={() => { setAvatarRarityFilter(rt.id); setAvatarPage(0); }}
                        style={{ padding: "4px 10px", borderRadius: 16, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap",
                          background: active ? rt.color : "#f0f0f5",
                          color: active ? "white" : "#666" }}>
                        {rt.label} {count}
                      </button>
                    );
                  })}
                </div>
              )}
              <div style={{ overflowY: "auto", flex: 1 }}>
                <div style={{ display: "grid", gridTemplateColumns: isAvatarTab ? "repeat(3, 1fr)" : "repeat(2, 1fr)", gap: 8 }}>
                  {isAvatarTab ? filteredItems.map(avatar => {
                    const owned = ownedAvatars.includes(avatar.id);
                    const equipped = profile?.avatar === avatar.id;
                    const rarity = RARITY_INFO[avatar.rarity] || RARITY_INFO.free;

                    // 🔒 히든 탭: 해금 조건 + 진행도만 표시 (코인 구매 불가)
                    // 자동 해금(checkHiddenUnlocks useEffect)이 조건 만족 시 ownedAvatars에 자동 추가함
                    if (isHiddenTab) {
                      const progress = avatar._progress || 0;
                      const target = avatar._target || 1;
                      const progressPct = Math.min(100, Math.round((progress / target) * 100));
                      const hint = avatar._rule?.hint || "";
                      return (
                        <div key={avatar.id} style={{ background: owned ? "#fdf2f8" : "#f9fafb", borderRadius: 14, padding: 10, textAlign: "center", border: equipped ? "2px solid #667eea" : owned ? "1px solid #f9a8d4" : "1px solid #e5e7eb", position: "relative" }}>
                          <div style={{ position: "absolute", top: 6, left: 6, background: owned ? "#fce7f3" : "#f3f4f6", color: owned ? "#9d174d" : "#6b7280", fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 6 }}>
                            {owned ? "해금" : "히든"}
                          </div>
                          <img src={avatar.img} style={{ width: 56, height: 56, borderRadius: "50%", objectFit: "cover", marginBottom: 4, marginTop: 8, filter: owned ? "none" : "grayscale(1) brightness(0.7)" }} />
                          <div style={{ fontSize: 11, fontWeight: 700, color: owned ? "#1a1a2e" : "#6b7280", marginBottom: 2 }}>{avatar.name}</div>
                          <div style={{ fontSize: 9, color: "#6b7280", marginBottom: 4, lineHeight: 1.3, minHeight: 24, padding: "0 2px" }}>
                            {hint}
                          </div>
                          <div style={{ height: 6, background: "#e5e7eb", borderRadius: 3, overflow: "hidden", marginBottom: 4 }}>
                            <div style={{ width: `${progressPct}%`, height: "100%", background: owned ? "#10b981" : "#ec4899", transition: "width 0.3s" }} />
                          </div>
                          <div style={{ fontSize: 9, color: owned ? "#059669" : "#9d174d", marginBottom: 6, fontWeight: 600 }}>{progress} / {target}</div>
                          {equipped ? (
                            <button style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: "#667eea", color: "white", fontSize: 11, fontWeight: 600 }}>
                              사용 중
                            </button>
                          ) : owned ? (
                            <button onClick={() => { setProfile(prev => ({...prev, avatar: avatar.id})); setProfileForm(prev => ({...prev, avatar: avatar.id})); }}
                              style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "2px solid #667eea", background: "white", color: "#667eea", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                              선택
                            </button>
                          ) : (
                            <button disabled
                              style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: "#e5e7eb", color: "#9ca3af", fontSize: 11, fontWeight: 600, cursor: "not-allowed" }}>
                              잠김
                            </button>
                          )}
                        </div>
                      );
                    }

                    const canAfford = coins >= (avatar.price || 0);
                    return (
                      <div key={avatar.id} style={{ background: "white", borderRadius: 14, padding: 10, textAlign: "center", border: equipped ? "2px solid #667eea" : "1px solid #eee", position: "relative" }}>
                        <div style={{ position: "absolute", top: 6, left: 6, background: rarity.bg, color: rarity.color, fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 6 }}>
                          {rarity.label}
                        </div>
                        <img src={avatar.img} style={{ width: 56, height: 56, borderRadius: "50%", objectFit: "cover", marginBottom: 4, marginTop: 8, filter: owned ? "none" : "grayscale(0.6) brightness(0.85)" }} />
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#1a1a2e", marginBottom: 2 }}>{avatar.name}</div>
                        <div style={{ fontSize: 10, color: "#888", marginBottom: 6 }}>
                          {avatar.free ? "무료" : `${avatar.price} 코인`}
                        </div>
                        {equipped ? (
                          <button style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: "#667eea", color: "white", fontSize: 11, fontWeight: 600 }}>
                            사용 중
                          </button>
                        ) : owned ? (
                          <button onClick={() => { setProfile(prev => ({...prev, avatar: avatar.id})); setProfileForm(prev => ({...prev, avatar: avatar.id})); }}
                            style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "2px solid #667eea", background: "white", color: "#667eea", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            선택
                          </button>
                        ) : (
                          <button onClick={() => {
                            if (canAfford) {
                              setCoins(prev => prev - avatar.price);
                              setOwnedAvatars(prev => [...prev, avatar.id]);
                              showCoinGain(-avatar.price, `${avatar.name} 구매!`);
                              try { getAppSound().sfx.purchase(); } catch(e) {}
                            }
                          }}
                            disabled={!canAfford}
                            style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: canAfford ? "#667eea" : "#ddd", color: "white", fontSize: 11, fontWeight: 600, cursor: canAfford ? "pointer" : "default" }}>
                            {canAfford ? "구매" : "코인 부족"}
                          </button>
                        )}
                      </div>
                    );
                  }) : filteredItems.map(item => {
                    const owned = ownedItems.includes(item.id);
                    const cat = item.category;
                    const equipped = equippedItems[cat] === item.id;
                    return (

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  {tp.wallpapers.map((w, i) => (
                    <div key={i} style={{ background: "rgba(0,0,0,0.35)", borderRadius: 14, padding: 8, border: `1px solid ${tp.accentColor}40` }}>
                      <img src={w.src} alt={w.label}
                        style={{ width: "100%", aspectRatio: "9/19.5", objectFit: "cover", borderRadius: 10, display: "block" }} />
                      <div style={{ fontSize: 11, fontWeight: 700, textAlign: "center", marginTop: 8, color: tp.accentColor }}>{w.label}</div>
                      <a href={w.src} download={w.name}
                        style={{ display: "block", marginTop: 6, padding: "7px 8px", borderRadius: 10, background: `${tp.accentColor}38`, color: tp.accentColor, fontSize: 11, fontWeight: 800, textAlign: "center", textDecoration: "none", border: `1px solid ${tp.accentColor}66` }}>
                        ⬇ 다운로드
                      </a>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            );
          })()}

          {/* <img src="icons/ui/ui_diamond_rare.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 테마팩 이모티콘 모달 — 데이터 드리븐 */}
          {themeEmojiModal && (() => {
            const tp = THEME_PACKS.find(p => p.avatarId === themeEmojiModal);
            if (!tp) return null;
            return (
            <div onClick={() => setThemeEmojiModal(null)}
              style={{ position: "fixed", inset: 0, zIndex: 1000, background: "rgba(15,10,35,0.85)", backdropFilter: "blur(8px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
              <div onClick={(e) => e.stopPropagation()}
                style={{ background: tp.gradient, borderRadius: 20, padding: 20, maxWidth: 430, width: "100%", maxHeight: "90vh", overflow: "auto", color: "white", boxShadow: "0 20px 60px rgba(0,0,0,0.6)" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 800, color: tp.secondaryColor, letterSpacing: 2 }}>EMOJI PACK</div>
                    <div style={{ fontSize: 18, fontWeight: 900 }}>{tp.name + " \uC774\uBAA8\uD2F0\uCF58 " + tp.emojis.length + "\uC885"}</div>
                  </div>
                  <button onClick={() => setThemeEmojiModal(null)}
                    style={{ background: "rgba(255,255,255,0.1)", border: "none", color: "white", width: 32, height: 32, borderRadius: 10, fontSize: 16, cursor: "pointer" }}>\u2715</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                  {tp.emojis.map((em, i) => (
                    <a key={i} href={em.src} download={em.name + ".png"} style={{ textDecoration: "none", textAlign: "center" }}>
                      <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: 6 }}>
                        <img src={em.src} alt={em.label}
                          style={{ width: "100%", aspectRatio: "1/1", objectFit: "contain", display: "block" }} />
                      </div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: tp.secondaryColor, marginTop: 4 }}>{em.label}</div>
                    </a>
                  ))}
                </div>
              </div>
            </div>
            );
          })()}


          {showInstallBanner && (() => {
            const dismissBanner = () => {
              setShowInstallBanner(false);
              localStorage.setItem("bq_install_dismissed_at", String(Date.now()));
            };
            const bannerBase = {
              position: "fixed", bottom: 70, left: 12, right: 12, zIndex: 200,
              background: "linear-gradient(135deg, #667eea, #764ba2)", borderRadius: 20,
              padding: "16px 18px", boxShadow: "0 8px 32px rgba(102,126,234,0.4)", animation: "pop 0.4s ease"
            };
            const iconStyle = { width: 52, height: 52, borderRadius: 14, flexShrink: 0, boxShadow: "0 2px 8px rgba(0,0,0,0.2)" };
            const closeBtnStyle = { background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 12, padding: "8px 12px", color: "white", fontSize: 12, fontWeight: 600, cursor: "pointer", flexShrink: 0 };
            if (installBannerType === "ios") return (
              <div style={bannerBase}>
                <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                  <img src="icons/app-icon-192.png" style={iconStyle} />
                  <div style={{ flex: 1 }}>
                    <div style={{ color: "white", fontSize: 14, fontWeight: 800 }}>BookQuest 설치하기</div>
                    <div style={{ color: "rgba(255,255,255,0.9)", fontSize: 12, marginTop: 6, lineHeight: 1.5 }}>
                      하단의 공유 버튼을 누른 뒤 <strong>"홈 화면에 추가"</strong>를 선택하세요!
                    </div>
                  </div>
                  <button onClick={dismissBanner} style={closeBtnStyle}>닫기</button>
                </div>
              </div>
            );
            return (
              <div style={{...bannerBase, display: "flex", alignItems: "center", gap: 14}}>
                <img src="icons/app-icon-192.png" style={iconStyle} />
                <div style={{ flex: 1 }}>
                  <div style={{ color: "white", fontSize: 14, fontWeight: 800 }}>BookQuest 설치하기</div>
                  <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 11, marginTop: 2 }}>홈 화면에 추가하면 더 빠르게!</div>
                </div>
                <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                  <button onClick={dismissBanner} style={closeBtnStyle}>닫기</button>
                  <button onClick={async () => {
                    if (installPrompt) {
                      installPrompt.prompt();
                      const result = await installPrompt.userChoice;
                      if (result.outcome === "accepted") setShowInstallBanner(false);
                      setInstallPrompt(null);
                    }
                  }}
                    style={{ background: "white", border: "none", borderRadius: 12, padding: "8px 16px", color: "#667eea", fontSize: 12, fontWeight: 800, cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
                    설치
                  </button>
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BookQuest />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      });
      navigator.serviceWorker.register('./sw.js').then(reg => {
        setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const installing = reg.installing;
          if (!installing) return;
          installing.addEventListener('statechange', () => {
            if (installing.state === 'installed' && navigator.serviceWorker.controller) {
              installing.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(() => {});
    }
  </script>
</body>
</html>
