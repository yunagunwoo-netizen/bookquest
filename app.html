      // ═══════════════════════════════════════
      // ═══════════════════════════════════════
      // {<img src="icons/ui/ui_hint.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} />} 책에게 물어보기 화면
      // ═══════════════════════════════════════
      const AskBookScreen = () => {
        // 읽은 책 데이터를 문자열로 변환
        const getBookDataString = () => {
          const allAvailable = [...seasonBooks, ...CURRICULUM_BOOKS, ...SEASON2_BOOKS];
          const completedBooks = allAvailable.filter(b => {
            const progress = bookProgress[b.id] || 0;
            return progress > 0;
          });
          if (completedBooks.length === 0) return "아직 읽은 책이 없습니다.";
          return completedBooks.map(b =>
            `"${b.title}" (${b.author})\n요약: ${b.summary}\n핵심포인트: ${(b.keyPoints||[]).join(", ")}\n챕터: ${(b.chapters||[]).map(c => c.title).join(", ")}`
          ).join("\n\n");
        };

        const sendAskMessage = async (messageText = null) => {
          const text = messageText || askInput.trim();
          if (!text || askLoading) return;
          setAskInput("");
          try { getAppSound().sfx.chat_send(); } catch(e) {}
          setAskMessages(prev => [...prev, { role: "user", text }]);
          setAskLoading(true);

          const answer = await CloudAPI.askBook(text, getBookDataString(), askMessages.slice(-6), profile?.name);
          setAskMessages(prev => [...prev, { role: "ai", text: answer, expression: "speaking" }]);
          try { getAppSound().sfx.chat_receive(); } catch(e) {}
          setAskLoading(false);
          completeMissionByTrigger("question");

          setIsSpeaking(true);
          VoiceService.speak(answer, () => { setIsSpeaking(false); });
        };

        const startAskListening = () => {
          if (!voiceSupported || askListening) return;
          askRecRef.current = VoiceService.createRecognizer();
          const rec = askRecRef.current;
          if (!rec) return;
          setAskListening(true);
          askListeningRef.current = true;
          setAskInput("");

          rec.onresult = (event) => {
            let finalText = "", interimText = "";
            for (let i = 0; i < event.results.length; i++) {
              if (event.results[i].isFinal) finalText += event.results[i][0].transcript;
              else interimText += event.results[i][0].transcript;
            }
            const full = (finalText + interimText).trim();
            if (full) setAskInput(full);
          };
          rec.onerror = (e) => { if (e.error !== 'no-speech') { setAskListening(false); askListeningRef.current = false; } };
          rec.onend = () => { if (askListeningRef.current) { try { rec.start(); } catch(e) { setAskListening(false); askListeningRef.current = false; } } };
          try { rec.start(); } catch(e) { setAskListening(false); askListeningRef.current = false; }
        };

        const finishAskListening = () => {
          setAskListening(false);
          askListeningRef.current = false;
          if (askRecRef.current) { try { askRecRef.current.stop(); } catch(e) {} askRecRef.current = null; }
          const text = askInput.trim();
          if (text) setTimeout(() => sendAskMessage(text), 300);
        };

        return (
          <div style={{ display: "flex", flexDirection: "column", height: "100vh", paddingBottom: 70 }}>
            <div style={{ padding: "16px 20px", background: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)", color: "white", flexShrink: 0 }}>

            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: 16, background: "#f7f7fa", display: "flex", flexDirection: "column" }}>
              {askMessages.map((msg, i) => (
                <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 10, alignItems: "flex-end", gap: 6 }}>

                    <img src={BOOK_HELPER.expressions[msg.expression] || BOOK_HELPER.expressions.default}

                    color: msg.role === "user" ? "white" : "#333",

          .filter(Boolean).map(d => `${d.emoji}${d.name}`).join(" ");

        const sendAvatarMessage = async (messageText = null) => {
          const text = messageText || avatarChatInput.trim();
          if (!text || avatarChatLoading) return;
          setAvatarChatInput("");
          try { getAppSound().sfx.chat_send(); } catch(e) {}
          setAvatarChatMessages(prev => [...prev, { role: "user", text }]);
          setAvatarChatLoading(true);

          const knowledgePack = getAvatarKnowledgePack(profile?.avatar, bookProgress, stats);
          const answer = await CloudAPI.askBook(text, knowledgePack, avatarChatMessages.slice(-6), profile?.name);
          setAvatarChatMessages(prev => [...prev, { role: "ai", text: answer }]);
          try { getAppSound().sfx.chat_receive(); } catch(e) {}
          setAvatarChatLoading(false);
          completeMissionByTrigger("question");

          setIsSpeaking(true);
          VoiceService.speak(answer, () => { setIsSpeaking(false); }, profile?.avatar);
        };

        return (
          <div style={{ display: "flex", flexDirection: "column", height: "100vh", paddingBottom: 70 }}>
            {/* 헤더 - 보라색(#6366f1 → #a855f7) 아바타 테마 */}
            <div style={{ padding: "16px 20px", background: "linear-gradient(135deg, #6366f1 0%, #a855f7 100%)", color: "white", flexShrink: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <AvatarIcon avatarId={profile?.avatar} size={52} style={{ border: `3px solid ${rarityInfo.color}`, boxShadow: `0 0 0 2px white` }} />
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ fontSize: 18, fontWeight: 800 }}><img src="icons/ui/ui_chat.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> {avatarProfile.name}와 대화</div>
                    <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 6px", borderRadius: 8, background: rarityInfo.bg, color: rarityInfo.color }}>{rarityInfo.label}</span>
                  </div>
                  <div style={{ fontSize: 11, opacity: 0.9, marginTop: 2 }}>IQ {stats.iq} · 강점 {strongNames || "-"}</div>
                </div>
              </div>
              <div style={{ fontSize: 11, opacity: 0.85, marginTop: 8, padding: "6px 10px", background: "rgba(255,255,255,0.15)", borderRadius: 8 }}>
                {<img src="icons/ui/ui_hint.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} />} 내 아바타는 내가 읽은 책({stats.booksCompleted.length}권 완독)을 알고 있어. 강점 분야 질문은 자신 있게, 약점({weakNames}) 분야엔 솔직하게 대답해.
              </div>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: 16, background: "#f7f7fa", display: "flex", flexDirection: "column" }}>
              {avatarChatMessages.map((msg, i) => (
                <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 10, alignItems: "flex-end", gap: 6 }}>
                  {msg.role === "ai" && (
                    <AvatarIcon avatarId={profile?.avatar} size={36} style={{ border: `2px solid ${rarityInfo.color}`, flexShrink: 0 }} />
                  )}
                  <div style={{
                    maxWidth: "75%", padding: "10px 14px",
                    borderRadius: msg.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                    background: msg.role === "user" ? "#6366f1" : "white",
                    color: msg.role === "user" ? "white" : "#333",
                    fontSize: 13, lineHeight: 1.6, boxShadow: "0 1px 4px rgba(0,0,0,0.06)"
                  }}>
                    {msg.role === "ai" && <span style={{ fontSize: 11, color: rarityInfo.color, fontWeight: 700, display: "block", marginBottom: 2 }}>{avatarProfile.name}</span>}
                    {msg.text}
                  </div>
                </div>
              ))}
              {avatarChatLoading && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <AvatarIcon avatarId={profile?.avatar} size={36} style={{ border: `2px solid ${rarityInfo.color}`, flexShrink: 0 }} />
                  <span style={{ fontSize: 12, color: "#666", fontStyle: "italic" }}>{avatarProfile.name} 생각하는 중...</span>
                </div>
              )}
              {isSpeaking && <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 20 }}><img src="icons/ui/ui_speaker.png" alt="" style={{ width: 16, height: 16 }} /></span>
                <span style={{ fontSize: 12, color: "#666", fontStyle: "italic" }}>AI가 말하는 중...</span>
                <button onClick={() => { VoiceService.stopSpeaking(); setIsSpeaking(false); }}
                  style={{ marginLeft: "auto", padding: "4px 12px", borderRadius: 8, border: "1.5px solid #667eea", background: "white", color: "#667eea", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                  ⏭️ 건너뛰기
                </button>
              </div>}
              <div ref={avatarChatEndRef} />
            </div>

            {/* 빠른 질문 제안 — 매번 랜덤 3개 */}
            {avatarChatMessages.length <= 1 && !avatarChatLoading && (() => {
              const strongDomain = avatarProfile.strongDomains?.[0];
              const strongMeta = strongDomain && DOMAIN_META.find(d => d.id === strongDomain);
              const weakDomain = avatarProfile.weakDomains?.[0];
              const weakMeta = weakDomain && DOMAIN_META.find(d => d.id === weakDomain);
              const completedBooks = BOOKS.filter(b => bookProgress[b.id] === 100);
              const randomBook = completedBooks.length > 0 ? completedBooks[Math.floor(Math.random() * completedBooks.length)] : null;
              const pool = [
                "가장 기억에 남는 책이 뭐야?",
                "다음에 어떤 책을 읽으면 좋을까?",
                "요즘 학교에서 유행하는 게 뭐야?",
                "네가 가장 좋아하는 명언이 있어?",
                "오늘 기분이 어때?",
                "내가 모르는 재미있는 사실 하나 알려줘!",
                "공부 잘하는 비법 알려줘!",
                "넌 어떤 초능력을 갖고 싶어?",
                strongMeta ? `${strongMeta.emoji}${strongMeta.name}에 대해 알려줘` : "가장 잘하는 게 뭐야?",
                strongMeta ? `${strongMeta.name} 관련 퀴즈 내줘!` : "퀴즈 하나 내줘!",
                weakMeta ? `${weakMeta.emoji}${weakMeta.name}은 왜 어려워?` : "어려운 과목은 어떻게 공부해?",
                randomBook ? `"${randomBook.title}" 어떤 내용이야?` : "책 추천해줘!",
                randomBook ? `"${randomBook.title}"에서 제일 중요한 건 뭐야?` : "읽은 책 중에 제일 재미있는 건?",
                "세상에서 가장 신기한 동물이 뭐야?",
                "미래에는 어떤 직업이 생길까?",
                "AI가 세상을 지배할 수 있을까?",

              const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, 3);

                <div style={{ padding: "8px 16px", background: "white", borderTop: "1px solid #eee", display: "flex", flexWrap: "wrap", gap: 6 }}>

                      {q}
                    </button>
                  ))}
                </div>
              );
            })()}

            <div style={{ padding: 16, background: "white", borderTop: "1px solid #eee", flexShrink: 0 }}>
              <div style={{ display: "flex", gap: 8 }}>
                <input value={avatarChatInput} onChange={e => setAvatarChatInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && sendAvatarMessage()}
                  placeholder={`${avatarProfile.name}에게 물어봐...`}
                  disabled={avatarChatLoading}
                  style={{ flex: 1, padding: "12px 14px", borderRadius: 20, border: "2px solid #eee", fontSize: 13 }} />
                <button onClick={() => sendAvatarMessage()} disabled={avatarChatLoading || !avatarChatInput.trim()}
                  style={{ padding: "10px 18px", borderRadius: 20, border: "none", background: "linear-gradient(135deg, #6366f1, #a855f7)", color: "white", fontSize: 13, fontWeight: 700, cursor: "pointer", opacity: avatarChatLoading || !avatarChatInput.trim() ? 0.5 : 1 }}>
                  전송
                </button>
              </div>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 📖 도서 추천 화면
      // ═══════════════════════════════════════
      // ═══════════════════════════════════════
      // 📚 교과 연계 추천 화면
      // ═══════════════════════════════════════
      const CurriculumScreen = () => {
        const grade = profile?.grade || "4";
        const [selSemester, setSelSemester] = useState("1");
        const gradeData = CURRICULUM_MAP[grade];
        const semesterData = gradeData?.[selSemester];
        const korUnits = semesterData?.["국어"] || [];

        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%)", paddingBottom: 100 }}>
            {/* 헤더 */}
            <div style={{ padding: "18px 20px 14px", display: "flex", alignItems: "center", gap: 10 }}>
              <button onClick={() => setScreen("aiHub")} style={{ background: "none", border: "none", fontSize: 22, cursor: "pointer", padding: 4 }}>←</button>
              <div>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#1e1b4b" }}>교과 연계 추천</div>
                <div style={{ fontSize: 12, color: "#6366f1", fontWeight: 600 }}>{grade}학년 국어</div>
              </div>
            </div>

            {/* 학기 선택 */}
            <div style={{ display: "flex", gap: 8, padding: "0 20px", marginBottom: 16 }}>
              {["1", "2"].map(s => (
                <button key={s} onClick={() => setSelSemester(s)}
                  style={{
                    flex: 1, padding: "10px 0", borderRadius: 12,
                    border: selSemester === s ? "2px solid #6366f1" : "2px solid #e2e8f0",
                    background: selSemester === s ? "#6366f1" : "white",
                    color: selSemester === s ? "white" : "#64748b",
                    fontSize: 14, fontWeight: 700, cursor: "pointer"
                  }}>
                  {s}학기
                </button>
              ))}
            </div>

            {/* 단원 목록 */}
            <div style={{ padding: "0 20px" }}>
              {korUnits.map((unit) => {
                const books = (unit.recommendedBooks || []).map(id => findBookById(id)).filter(Boolean);
                const hasBooks = books.length > 0;
                return (
                  <div key={unit.unit} style={{
                    background: "white", borderRadius: 16, padding: 16,
                    marginBottom: 12, boxShadow: "0 2px 8px rgba(0,0,0,0.04)",
                    border: hasBooks ? "1.5px solid #e0e7ff" : "1.5px solid #f1f5f9"
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: hasBooks ? 12 : 0 }}>
                      <div style={{
                        width: 32, height: 32, borderRadius: 10,
                        background: hasBooks ? "linear-gradient(135deg, #6366f1, #818cf8)" : "#e2e8f0",
                        color: hasBooks ? "white" : "#94a3b8",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: 13, fontWeight: 800, flexShrink: 0
                      }}>{unit.unit}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#1e293b" }}>{unit.title}</div>
                        <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>
                          {unit.theme.slice(0, 3).map(t => `#${t}`).join("  ")}
                        </div>
                      </div>
                      {hasBooks && <div style={{ fontSize: 11, color: "#6366f1", fontWeight: 600 }}>{books.length}권</div>}
                    </div>

                    {/* 추천도서 카드 */}
                    {hasBooks && (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {books.map(book => (
                          <button key={book.id}
                            onClick={() => {
                              if (!canAccessBook(book.id)) { showPremiumUpsell("book"); return; }
                              setSelectedBook(book); setBookTab("summary"); setScreen("book");
                            }}
                            style={{
                              display: "flex", alignItems: "center", gap: 12,
                              background: "#f8faff", borderRadius: 12, padding: "10px 12px",
                              border: "1px solid #e0e7ff", cursor: "pointer", textAlign: "left", width: "100%",
                              position: "relative"
                            }}>
                            <div style={{
                              width: 36, height: 36, borderRadius: 10,
                              background: book.color || "#6366f1", color: "white",
                              display: "flex", alignItems: "center", justifyContent: "center",
                              fontSize: 18, flexShrink: 0, filter: canAccessBook(book.id) ? "none" : "grayscale(0.5)"
                            }}>{book.emoji}</div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 13, fontWeight: 700, color: "#1e293b" }}>{book.title}</div>
                              <div style={{ fontSize: 11, color: "#64748b" }}>{book.author} · {book.pages}p</div>
                            </div>
                            {canAccessBook(book.id) ? (
                              <div style={{ fontSize: 10, color: "#6366f1", fontWeight: 600, flexShrink: 0 }}>
                                {(bookProgress[book.id] || 0) > 0 ? `${bookProgress[book.id]}%` : "시작하기"} →
                              </div>
                            ) : (
                              <div style={{ fontSize: 9, fontWeight: 700, padding: "3px 8px", borderRadius: 8, background: "linear-gradient(135deg, #667eea, #764ba2)", color: "white", flexShrink: 0 }}>Premium</div>
                            )}
                          </button>
                        ))}
                      </div>
                    )}
                    {!hasBooks && (
                      <div style={{ fontSize: 11, color: "#cbd5e1", marginTop: 6, fontStyle: "italic" }}>추천도서 준비 중</div>
                    )}
                  </div>
                );
              })}

              {korUnits.length === 0 && (
                <div style={{ textAlign: "center", padding: "40px 20px", color: "#94a3b8" }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>📚</div>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{grade}학년 {selSemester}학기 데이터 준비 중</div>
                  <div style={{ fontSize: 12, marginTop: 6 }}>곧 업데이트됩니다!</div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const RecommendScreen = () => {
        const getReadBooks = () => {
          return ALL_BOOKS.filter(b => (bookProgress[b.id] || 0) > 0).map(b => ({
            title: b.title,
            summary: b.summary,
            keywords: b.keyPoints.slice(0, 3)
          }));
        };

        const loadRecommendations = async () => {
          const readBooks = getReadBooks();
          if (readBooks.length === 0) return;
          setRecLoading(true);
          const recs = await CloudAPI.recommendBooks(readBooks);
          setRecommendations(recs);
          setRecLoading(false);
          setRecLoaded(true);
        };

        const readBooks = getReadBooks();

        return (
          <div style={{ padding: "0 20px 90px", maxWidth: 430 }}>
            <div style={{ padding: "16px 0 12px", marginBottom: 12 }}>
              <div style={{ fontSize: 22, fontWeight: 900, color: "#1a1a2e" }}><img src="icons/ui/ui_book_open.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 추천 도서</div>
              <div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>읽은 책을 바탕으로 다음에 읽으면 좋을 책을 추천해줘!</div>
            </div>

            {readBooks.length === 0 ? (
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start", background: "white", borderRadius: 16, padding: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                <img src={RECOMMENDER.img} alt={RECOMMENDER.shortName}
                  style={{ width: 44, height: 44, borderRadius: "50%", border: `2px solid ${RECOMMENDER.color}`, flexShrink: 0, objectFit: "cover" }} />
                <div>
                  <span style={{ fontSize: 11, color: RECOMMENDER.color, fontWeight: 600 }}>{RECOMMENDER.name}</span>
                  <div style={{ fontSize: 13, color: "#333", marginTop: 4, lineHeight: 1.6 }}>아직 읽은 책이 없구나! 책을 읽고 토론을 시작하면 딱 맞는 책을 추천해줄게!</div>
                </div>
              </div>
            ) : recLoading ? (
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start", background: "white", borderRadius: 16, padding: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                <img src={RECOMMENDER.img} alt={RECOMMENDER.shortName}
                  style={{ width: 44, height: 44, borderRadius: "50%", border: `2px solid ${RECOMMENDER.color}`, flexShrink: 0, objectFit: "cover", animation: "pop 0.8s ease infinite alternate" }} />
                <div>
                  <span style={{ fontSize: 11, color: RECOMMENDER.color, fontWeight: 600 }}>{RECOMMENDER.name}</span>
                  <div style={{ fontSize: 13, color: "#333", marginTop: 4 }}>도서관에서 책을 찾는 중... 잠시만 기다려!</div>
                </div>
              </div>
            ) : recommendations.length > 0 ? (
              <div>
                <div style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 16 }}>
                  <img src={RECOMMENDER.img} alt={RECOMMENDER.shortName}
                    style={{ width: 44, height: 44, borderRadius: "50%", border: `2px solid ${RECOMMENDER.color}`, flexShrink: 0, objectFit: "cover" }} />
                  <div style={{ background: "white", borderRadius: "16px 16px 16px 4px", padding: "10px 14px", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                    <span style={{ fontSize: 11, color: RECOMMENDER.color, fontWeight: 600, display: "block", marginBottom: 2 }}>{RECOMMENDER.name}</span>
                    <span style={{ fontSize: 13, color: "#333", lineHeight: 1.6 }}>{readBooks.length}권의 책을 분석해서 추천했어! 한번 살펴봐!</span>
                  </div>
                </div>
                {recommendations.map((book, i) => (
                  <div key={i} style={{
                    background: "white", borderRadius: 16, padding: 16, marginBottom: 12,
                    boxShadow: "0 2px 8px rgba(0,0,0,0.06)", display: "flex", gap: 12
                  }}>
                    {book.cover ? (
                      <img src={book.cover} alt={book.title}
                        style={{ width: 70, height: 100, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} />
                    ) : (
                      <div style={{ width: 70, height: 100, borderRadius: 8, background: "linear-gradient(135deg, #667eea, #764ba2)", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <img src="icons/ui/ui_book_open.png" alt="" style={{ width: 28, height: 28, verticalAlign: "middle" }} />
                      </div>
                    )}
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#1a1a2e", marginBottom: 4 }}>{book.title}</div>
                      <div style={{ fontSize: 11, color: "#888", marginBottom: 6 }}>{book.author}</div>
                      <div style={{ fontSize: 12, color: "#667eea", fontWeight: 600, background: "#f0f3ff", padding: "6px 10px", borderRadius: 8, lineHeight: 1.5 }}>
                        {<img src="icons/ui/ui_hint.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle", borderRadius: "50%" }} />} {book.reason}
                      </div>
                      {book.link && (
                        <a href={book.link} target="_blank" rel="noopener noreferrer"
                          style={{ fontSize: 11, color: "#f5576c", fontWeight: 600, marginTop: 6, display: "inline-block", textDecoration: "none" }}>
                          알라딘에서 보기 →
                        </a>
                      )}
                    </div>
                  </div>
                ))}
                <button onClick={loadRecommendations}
                  style={{ width: "100%", padding: 14, borderRadius: 16, border: "none", background: "linear-gradient(135deg, #667eea, #764ba2)", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 8 }}>
                  <img src="icons/ui/ui_refresh.png" alt="" style={{ width: 14, height: 14, verticalAlign: "middle" }} /> 다른 책 추천받기
                </button>
              </div>
            ) : recLoaded ? (
              <div style={{ textAlign: "center", padding: 40, background: "white", borderRadius: 16 }}>
                <div style={{ marginBottom: 12 }}><img src="icons/ui/ui_question.png" alt="" style={{ width: 48, height: 48 }} /></div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>추천을 가져오지 못했어요</div>
                <button onClick={loadRecommendations}
                  style={{ marginTop: 12, padding: "10px 24px", borderRadius: 16, border: "none", background: "#667eea", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                  다시 시도
                </button>
              </div>
            ) : null}
          </div>
        );
      };

      // ═══════════════════════════════════════
      // ❓ Quiz Result Modal
      // ═══════════════════════════════════════
      const QuizResultModal = () => {
        if (!showQuizResult || !quizResultInfo) return null;
        const { correct, explanation, answer } = quizResultInfo;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}
            onClick={() => setShowQuizResult(false)}>
            <div style={{ background: "white", borderRadius: 24, padding: "32px 24px", textAlign: "center", maxWidth: 320, width: "90%", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <img src={correct ? PNG_ICONS.quiz_correct : PNG_ICONS.quiz_wrong} style={{ width: 100, height: 100, marginBottom: 12 }} />
              <div style={{ fontSize: 20, fontWeight: 800, color: "#1a1a2e", marginBottom: 8 }}>{correct ? "정답!" : "틀렸어요"}</div>
              <div style={{ fontSize: 14, color: "#666", marginBottom: 16, lineHeight: 1.6 }}>{explanation}</div>
              {!correct && <div style={{ fontSize: 13, color: "#888", marginBottom: 12 }}>정답: {answer}</div>}
              {correct && <div style={{ fontSize: 13, color: "#4CAF50", fontWeight: 600, marginBottom: 12 }}>+10XP, +3코인!</div>}
              <button onClick={() => setShowQuizResult(false)}
                style={{ padding: "12px 32px", borderRadius: 20, border: "none", background: "#667eea", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                확인
              </button>

      // ═══════════════════════════════════════

      const TabBar = () => {
        if (screen === "discussion" || screen === "admin" || !profile) return null;
        // 🎨 v1.9 프리미엄 다크 판타지 탭 아이콘 — active/inactive PNG 페어
        const tabs = [
          { key: "home",     iconKey: "home",    label: "홈" },
          { key: "schedule", iconKey: "mission", label: "미션" },
          { key: "aiHub",    iconKey: "ai",      label: "AI" },
          { key: "ranking",  iconKey: "ranking", label: "랭킹" },
          { key: "avatar",   iconKey: "shop",    label: "상점" }
        ];
        const isActive = (key) => {
          if (screen === key) return true;
          if (screen === "book" && key === "home") return true;
          if ((screen === "askbook" || screen === "recommend" || screen === "avatarChat" || screen === "curriculum") && key === "aiHub") return true;
          if (screen === "battle" && key === "ranking") return true;

              return (
                <button key={t.key} onClick={() => { try { getAppSound().sfx.tab_tap(); } catch(e) {} setScreen(t.key); }}
                  style={{
                    background: "none", border: "none", padding: "6px 14px",

      // ═══════════════════════════════════════
      const ChangelogModal = () => {

          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1100, padding: 20 }}
            onClick={() => setShowChangelog(false)}>

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>

                  padding: 14, marginBottom: 12, borderRadius: 14,
                  background: i === 0 ? "linear-gradient(135deg, #667eea15, #764ba215)" : "#f8f8f8",

                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <span style={{
                      fontSize: 11, fontWeight: 800, padding: "2px 8px", borderRadius: 6,

                    }}>v{entry.version}</span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#1a1a2e", flex: 1 }}>{entry.title}</span>
                    <span style={{ fontSize: 10, color: "#999" }}>{entry.date}</span>

                  <div style={{ fontSize: 12, color: "#555", lineHeight: 1.7 }}>

                      <div key={j} style={{ paddingLeft: 8 }}>• {c}</div>

      // ═══════════════════════════════════════
      // ⏪ 롤백 모달
      // ═══════════════════════════════════════
      const RollbackModal = () => {
        if (!showRollback) return null;
        const versions = Object.entries(VERSION_HISTORY);
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1100, padding: 20 }}
            onClick={() => setShowRollback(false)}>
            <div style={{ background: "white", borderRadius: 20, padding: 24, maxWidth: 400, width: "100%", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                <h3 style={{ fontSize: 18, fontWeight: 800, color: "#1a1a2e" }}>⏪ 버전 복원</h3>
                <button onClick={() => setShowRollback(false)}
                  style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#999" }}>✕</button>

                버전을 복원하면 현재 앱 화면이 해당 버전으로 전환됩니다. 사용자 데이터(프로필, 코인 등)는 Firestore에 저장되어 있어 유지됩니다.
              </div>
              {versions.map(([ver, info]) => {
                const isCurrent = ver === APP_VERSION;
                const log = CHANGELOG.find(c => c.version === ver);
                return (
                  <div key={ver} style={{
                    padding: 14, marginBottom: 10, borderRadius: 14,
                    background: isCurrent ? "linear-gradient(135deg, #667eea10, #764ba210)" : "#f8f8f8",

                    display: "flex", alignItems: "center", gap: 12
                  }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>

      // ═══════════════════════════════════════
      // 🛍️ Shop Modal (대규모 개선 - 카테고리 탭 + 아바타 구매)
      // ═══════════════════════════════════════
      const ShopModal = () => {
        if (!showShop) return null;
        // 아바타는 희귀도/가격순으로 정렬
        // (무료 → 영웅 1200 → 한국영웅 1500 → 전설 2500 → 신화 3500)
        // storeHidden=true인 아바타는 상점에서 제외 (히든 탭에서는 별도 처리)
        const RARITY_ORDER = { free: 0, common: 1, rare: 2, epic: 3, legendary: 4 };
        const isHiddenTab = shopCategory === "avatar" && avatarRarityFilter === "hidden";
        // 히든 탭: HIDDEN_UNLOCK_RULES 기준 12종만 (조건+진행도 표시)
        const hiddenAvatars = HIDDEN_UNLOCK_RULES.map(rule => {
          const av = AVATAR_DATA.find(a => a.id === rule.id);
          if (!av) return null;
          const completedBookList = ALL_BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100);
          const totalBattles = (battleWins || 0) + (battleLosses || 0) + (battleDraws || 0);
          const ctx = {
            completedBookList,
            streak: streak || 0,
            battleWins: battleWins || 0,
            weeklyBattleWins: weeklyBattleWins || 0,
            totalBattles,
          };
          return {
            ...av, _rule: rule,
            _progress: rule.progress(ctx),
            _target: rule.target,
            _unlocked: rule.check(ctx) || ownedAvatars.includes(rule.id),
          };
        }).filter(Boolean);
        // 일반 탭: storeHidden=false
        const sortedAvatars = [...AVATAR_DATA]
          .filter(a => !a.storeHidden)
          .sort((a, b) => {
            const ro = (RARITY_ORDER[a.rarity] ?? 9) - (RARITY_ORDER[b.rarity] ?? 9);
            if (ro !== 0) return ro;
            return (a.price ?? 0) - (b.price ?? 0);
          });
        const isAvatarTab = shopCategory === "avatar";
        // Tier 기반 필터
        const matchTier = (a, tier) => {
          if (tier === "all") return true;
          if (tier === "free") return a.rarity === "free";
          if (tier === "hero") return (a.rarity === "epic" && a.price <= 1200) || a.rarity === "heroic";
          if (tier === "legendary") return a.rarity === "legendary" && a.price <= 2500;
          if (tier === "mythic") return a.rarity === "legendary" && a.price >= 3500;
          return a.rarity === tier;
        };
        const rarityFilteredAvatars = isHiddenTab
          ? hiddenAvatars
          : (avatarRarityFilter === "all" ? sortedAvatars : sortedAvatars.filter(a => matchTier(a, avatarRarityFilter)));
        // 페이지네이션 (아바타 탭만): 페이지당 12개
        const AVATAR_PAGE_SIZE = 12;
        const totalPages = Math.max(1, Math.ceil(rarityFilteredAvatars.length / AVATAR_PAGE_SIZE));
        const safePage = Math.min(avatarPage, totalPages - 1);
        const pagedAvatars = isAvatarTab
          ? rarityFilteredAvatars.slice(safePage * AVATAR_PAGE_SIZE, (safePage + 1) * AVATAR_PAGE_SIZE)
          : [];
        const filteredItems = isAvatarTab
          ? pagedAvatars
          : SHOP_ITEMS.filter(item => item.category === shopCategory);
        // 카운터는 상점 진열 대상(storeHidden=false)만 기준으로 표시
        const visibleAvatarIds = new Set(AVATAR_DATA.filter(a => !a.storeHidden).map(a => a.id));
        const ownedAvatarCount = ownedAvatars.filter(id => visibleAvatarIds.has(id)).length;
        const totalAvatarCount = visibleAvatarIds.size;
        const RARITY_TABS = [
          { id: "all",       label: "전체",   color: "#667eea" },
          { id: "free",      label: "무료",   color: "#10b981" },
          { id: "hero",      label: "영웅",   color: "#a855f7" },
          { id: "legendary", label: "전설",   color: "#f59e0b" },
          { id: "mythic",    label: "신화",   color: "#dc2626" },
          { id: "hidden",    label: "히든", color: "#ec4899" },
        ];
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 }}
            onClick={() => setShowShop(false)}>
            <div style={{ background: "white", borderRadius: "24px 24px 0 0", padding: "16px 16px 20px", maxHeight: "92vh", width: "100%", display: "flex", flexDirection: "column", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              {/* 상점 헤더: 큰 아바타 프리뷰 + 타이틀 */}
              <div style={{ textAlign: "center", padding: "8px 0 4px", position: "relative" }}>
                <div style={{ display: "flex", justifyContent: "flex-end", position: "absolute", top: 0, right: 0, gap: 12, alignItems: "center" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 14, fontWeight: 700, color: "#667eea" }}>
                    <img src={PNG_ICONS.coin} style={{ width: 18, height: 18 }} /> {coins}
                  </span>
                  <button onClick={() => setShowShop(false)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", padding: 0 }}>✕</button>
                </div>
                <AvatarWithItems
                  size={80}
                  avatarId={profile?.avatar}
                  equippedItems={equippedItems}
                  shape="circle"
                  borderStyle={{ border: "3px solid #667eea", boxShadow: "0 4px 16px rgba(102,126,234,0.3)" }}
                />
                <h3 style={{ fontSize: 16, fontWeight: 800, color: "#1a1a2e", marginTop: 6, marginBottom: 0 }}>
                  상점
                  {isAvatarTab && (
                    <span style={{ fontSize: 11, fontWeight: 600, color: "#667eea", marginLeft: 8, background: "#eef2ff", padding: "2px 8px", borderRadius: 10 }}>
                      수집 {ownedAvatarCount} / {totalAvatarCount}
                    </span>
                  )}
                </h3>
              </div>
              <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 10, marginBottom: 10, borderBottom: "1px solid #eee", flexShrink: 0 }}>
                {SHOP_CATEGORIES.map(cat => (
                  <button key={cat.id} onClick={() => setShopCategory(cat.id)}
                    style={{ padding: "6px 12px", borderRadius: 20, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", display: "inline-flex", alignItems: "center", gap: 4,
                      background: shopCategory === cat.id ? "#667eea" : "#f0f0f5",
                      color: shopCategory === cat.id ? "white" : "#666" }}>
                    <Icon name={`shop_${cat.id}`} size={16} /> {cat.name}
                  </button>
                ))}
              </div>
              {isAvatarTab && (
                <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 8, marginBottom: 8, flexShrink: 0 }}>
                  {RARITY_TABS.map(rt => {
                    const count = rt.id === "all"
                      ? sortedAvatars.length
                      : rt.id === "hidden"
                        ? hiddenAvatars.filter(h => h._unlocked).length + "/" + hiddenAvatars.length
                        : sortedAvatars.filter(a => matchTier(a, rt.id)).length;
                    const active = avatarRarityFilter === rt.id;
                    return (
                      <button key={rt.id} onClick={() => { setAvatarRarityFilter(rt.id); setAvatarPage(0); }}
                        style={{ padding: "4px 10px", borderRadius: 16, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap",
                          background: active ? rt.color : "#f0f0f5",
                          color: active ? "white" : "#666" }}>
                        {rt.label} {count}
                      </button>
                    );
                  })}
                </div>
              )}
              <div style={{ overflowY: "auto", flex: 1 }}>
                <div style={{ display: "grid", gridTemplateColumns: isAvatarTab ? "repeat(3, 1fr)" : "repeat(2, 1fr)", gap: 8 }}>
                  {isAvatarTab ? filteredItems.map(avatar => {
                    const owned = ownedAvatars.includes(avatar.id);
                    const equipped = profile?.avatar === avatar.id;
                    const rarity = RARITY_INFO[avatar.rarity] || RARITY_INFO.free;

                    // 🔒 히든 탭: 해금 조건 + 진행도만 표시 (코인 구매 불가)
                    // 자동 해금(checkHiddenUnlocks useEffect)이 조건 만족 시 ownedAvatars에 자동 추가함
                    if (isHiddenTab) {
                      const progress = avatar._progress || 0;
                      const target = avatar._target || 1;
                      const progressPct = Math.min(100, Math.round((progress / target) * 100));
                      const hint = avatar._rule?.hint || "";
                      return (
                        <div key={avatar.id} style={{ background: owned ? "#fdf2f8" : "#f9fafb", borderRadius: 14, padding: 10, textAlign: "center", border: equipped ? "2px solid #667eea" : owned ? "1px solid #f9a8d4" : "1px solid #e5e7eb", position: "relative" }}>
                          <div style={{ position: "absolute", top: 6, left: 6, background: owned ? "#fce7f3" : "#f3f4f6", color: owned ? "#9d174d" : "#6b7280", fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 6 }}>
                            {owned ? "해금" : "히든"}
                          </div>
                          <img src={avatar.img} style={{ width: 56, height: 56, borderRadius: "50%", objectFit: "cover", marginBottom: 4, marginTop: 8, filter: owned ? "none" : "grayscale(1) brightness(0.7)" }} />
                          <div style={{ fontSize: 11, fontWeight: 700, color: owned ? "#1a1a2e" : "#6b7280", marginBottom: 2 }}>{avatar.name}</div>
                          <div style={{ fontSize: 9, color: "#6b7280", marginBottom: 4, lineHeight: 1.3, minHeight: 24, padding: "0 2px" }}>
                            {hint}
                          </div>
                          <div style={{ height: 6, background: "#e5e7eb", borderRadius: 3, overflow: "hidden", marginBottom: 4 }}>
                            <div style={{ width: `${progressPct}%`, height: "100%", background: owned ? "#10b981" : "#ec4899", transition: "width 0.3s" }} />
                          </div>
                          <div style={{ fontSize: 9, color: owned ? "#059669" : "#9d174d", marginBottom: 6, fontWeight: 600 }}>{progress} / {target}</div>
                          {equipped ? (
                            <button style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: "#667eea", color: "white", fontSize: 11, fontWeight: 600 }}>
                              사용 중
                            </button>
                          ) : owned ? (
                            <button onClick={() => { setProfile(prev => ({...prev, avatar: avatar.id})); setProfileForm(prev => ({...prev, avatar: avatar.id})); }}
                              style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "2px solid #667eea", background: "white", color: "#667eea", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                              선택
                            </button>
                          ) : (
                            <button disabled
                              style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: "#e5e7eb", color: "#9ca3af", fontSize: 11, fontWeight: 600, cursor: "not-allowed" }}>
                              잠김
                            </button>
                          )}
                        </div>
                      );
                    }

                    const canAfford = coins >= (avatar.price || 0);
                    return (
                      <div key={avatar.id} style={{ background: "white", borderRadius: 14, padding: 10, textAlign: "center", border: equipped ? "2px solid #667eea" : "1px solid #eee", position: "relative" }}>
                        <div style={{ position: "absolute", top: 6, left: 6, background: rarity.bg, color: rarity.color, fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 6 }}>
                          {rarity.label}
                        </div>
                        <img src={avatar.img} style={{ width: 56, height: 56, borderRadius: "50%", objectFit: "cover", marginBottom: 4, marginTop: 8, filter: owned ? "none" : "grayscale(0.6) brightness(0.85)" }} />
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#1a1a2e", marginBottom: 2 }}>{avatar.name}</div>
                        <div style={{ fontSize: 10, color: "#888", marginBottom: 6 }}>
                          {avatar.free ? "무료" : `${avatar.price} 코인`}
                        </div>
                        {equipped ? (
                          <button style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: "#667eea", color: "white", fontSize: 11, fontWeight: 600 }}>

          {showInstallBanner && (() => {

            };
            const bannerBase = {
              position: "fixed", bottom: 70, left: 12, right: 12, zIndex: 200,
              background: "linear-gradient(135deg, #667eea, #764ba2)", borderRadius: 20,
              padding: "16px 18px", boxShadow: "0 8px 32px rgba(102,126,234,0.4)", animation: "pop 0.4s ease"

            const iconStyle = { width: 52, height: 52, borderRadius: 14, flexShrink: 0, boxShadow: "0 2px 8px rgba(0,0,0,0.2)" };

            if (installBannerType === "ios") return (
              <div style={bannerBase}>

              </div>
            );
            return (
              <div style={{...bannerBase, display: "flex", alignItems: "center", gap: 14}}>
                <img src="icons/app-icon-192.png" style={iconStyle} />
                <div style={{ flex: 1 }}>
                  <div style={{ color: "white", fontSize: 14, fontWeight: 800 }}>BookQuest \uC124\uCE58\uD558\uAE30</div>
                  <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 11, marginTop: 2 }}>\uD648 \uD654\uBA74\uC5D0 \uCD94\uAC00\uD558\uBA74 \uB354 \uBE60\uB974\uAC8C!</div>
                </div>
                <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                  <button onClick={dismissBanner} style={closeBtnStyle}>\uB2EB\uAE30</button>
                  <button onClick={async () => {
                    if (installPrompt) {
                      installPrompt.prompt();
                      const result = await installPrompt.userChoice;
                      if (result.outcome === "accepted") setShowInstallBanner(false);
                      setInstallPrompt(null);
                    }
                  }}
                    style={{ background: "white", border: "none", borderRadius: 12, padding: "8px 16px", color: "#667eea", fontSize: 12, fontWeight: 800, cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
                    \uC124\uCE58
                  </button>
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BookQuest />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      });
      navigator.serviceWorker.register('./sw.js').then(reg => {
        setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const installing = reg.installing;
          if (!installing) return;
          installing.addEventListener('statechange', () => {
            if (installing.state === 'installed' && navigator.serviceWorker.controller) {
              installing.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(() => {});
    }
  </script>
</body>
