    // ☁️ Cloud Functions API 서비스

        try {
          const res = await fetch(ASKBOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, bookData, chatHistory })

          return data.answer;

        try {
          const res = await fetch(`${FUNCTIONS_BASE}/discussionCoach`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userAnswer, topic, bookTitle, bookSummary, isDeep })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          return data.feedback;
        } catch (e) {

          return "좋은 생각이에요! 조금 더 깊이 생각해보면 좋겠어요. 🌟";
        }
      },

        try {
          const res = await fetch(`${FUNCTIONS_BASE}/recommendBooks`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ readBooks, interests })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          return data.recommendations || [];
        } catch (e) {
          console.error("recommendBooks 실패:", e);
          return [];
        }
      }
    };

    // ═══════════════════════════════════════
    // 🔥 Firestore 데이터 서비스
    // ═══════════════════════════════════════
    const FirestoreService = {
      _LOCAL_KEY: "bookquest_backup",
      _saveFailCount: 0,
      _onSaveError: null, // 콜백: 저장 실패 시 UI 알림용

      // 유저 ID 생성/가져오기 (기기별 고유)
      getUserId() {
        let uid = localStorage.getItem("bookquest_uid");
        if (!uid) {
          uid = "user_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
          localStorage.setItem("bookquest_uid", uid);
        }
        return uid;
      },

      // localStorage 백업 저장
      _saveToLocal(data) {
        try {
          localStorage.setItem(this._LOCAL_KEY, JSON.stringify({
            ...data,
            _backupTime: new Date().toISOString()
          }));
        } catch (e) {
          console.warn("⚠️ localStorage 백업 실패:", e);
        }
      },

      // localStorage 백업 로드
      _loadFromLocal() {
        try {
          const raw = localStorage.getItem(this._LOCAL_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (e) {
          console.warn("⚠️ localStorage 백업 로드 실패:", e);
          return null;
        }
      },

      // 유저 데이터 저장 (Firestore + localStorage 이중 백업)
      async saveUserData(data) {
        // 항상 localStorage에 백업
        this._saveToLocal(data);

        try {
          const uid = this.getUserId();
          await db.collection("users").doc(uid).set({
            ...data,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          this._saveFailCount = 0;
          console.log("✅ Firestore 저장 완료");
          return true;
        } catch (e) {
          this._saveFailCount++;
          console.error("❌ Firestore 저장 실패:", e);
          if (this._saveFailCount >= 2 && this._onSaveError) {
            this._onSaveError("저장 중 오류가 발생했어요. 인터넷 연결을 확인해주세요.");
          }
          return false;
        }
      },

      // 유저 데이터 불러오기 (Firestore 우선, 실패 시 localStorage 폴백)
      async loadUserData() {
        try {
          const uid = this.getUserId();
          const doc = await db.collection("users").doc(uid).get();
          if (doc.exists) {
            console.log("✅ Firestore 데이터 로드 완료");
            const data = doc.data();
            // 성공 시 localStorage도 갱신
            this._saveToLocal(data);
            return data;
          }
          // Firestore에 데이터 없으면 localStorage 폴백 시도
          const local = this._loadFromLocal();
          if (local) {
            console.log("📦 localStorage 백업에서 복원");
            return local;
          }
          return null;
        } catch (e) {
          console.error("❌ Firestore 로드 실패, localStorage 폴백 시도:", e);
          const local = this._loadFromLocal();
          if (local) {
            console.log("📦 오프라인 — localStorage 백업에서 복원");
            return local;
          }
          return null;
        }
      }
    };

    // 🎙️ Voice Service with Web Speech API (Enhanced Korean TTS)
    // ═══════════════════════════════════════
    const VoiceService = {
      SpeechRecognition: window.SpeechRecognition || window.webkitSpeechRecognition,
      SpeechSynthesis: window.speechSynthesis,
      _cachedVoice: null,
      _voicesLoaded: false,

      isSupported() {
        return !!this.SpeechRecognition && !!this.SpeechSynthesis;
      },

      // 앱 시작 시 최적 한국어 음성을 미리 선택
      preloadVoice() {
        if (!this.SpeechSynthesis) return;
        const tryLoad = () => {
          const voices = this.SpeechSynthesis.getVoices();
          if (voices.length === 0) return;
          this._voicesLoaded = true;
          // 한국어 음성 품질 우선순위 (높은 순)
          const koVoices = voices.filter(v => v.lang.startsWith('ko'));
          // 1순위: 프리미엄/고품질 음성 (삼성, Google 한국어 여성)
          const premium = koVoices.find(v =>
            /samsung|heami|yuna|sora|jian|sunhi|premium|enhanced|natural/i.test(v.name)
          );
          // 2순위: Google 한국어 음성 (Chrome 내장)
          const google = koVoices.find(v => /google/i.test(v.name));
          // 3순위: Microsoft Online 음성 (Edge)
          const msOnline = koVoices.find(v => /online|neural/i.test(v.name));
          // 4순위: 아무 한국어 음성
          const anyKo = koVoices[0];

          this._cachedVoice = premium || google || msOnline || anyKo || null;
          if (this._cachedVoice) {
            console.log('[TTS] 선택된 음성:', this._cachedVoice.name, this._cachedVoice.lang);
          }
        };
        tryLoad();
        if (!this._voicesLoaded) {
          this.SpeechSynthesis.onvoiceschanged = tryLoad;
        }
      },

      createRecognizer() {
        if (!this.SpeechRecognition) return null;
        const rec = new this.SpeechRecognition();
        rec.lang = 'ko-KR';
        rec.continuous = true;
        rec.interimResults = true;
        return rec;
      },

      // TTS용 텍스트 정리 (이모지, 마크다운, 특수문자 제거)
      cleanForTTS(text) {
        return text
          .replace(/[\u{1F300}-\u{1FAFF}]|[\u{2600}-\u{27BF}]|[\u{FE00}-\u{FE0F}]|[\u{200D}]|[\u{20E3}]|[\u{E0020}-\u{E007F}]|✅|❌|⭐|⚡|☀|☁|☂|❤|♥|♡|★|☆/gu, '')
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          .replace(/\*([^*]+)\*/g, '$1')
          .replace(/^#+\s*/gm, '')
          .replace(/https?:\/\/[^\s]+/g, '')
          .replace(/\([A-Z]{2,}\)/g, '')
          .replace(/\n+/g, '. ')
          .replace(/\s{2,}/g, ' ')
          .trim();
      },

      // 긴 문장을 호흡 단위(breath group)로 자연스럽게 분리
      splitIntoBreathGroups(text) {
        // 1단계: 문장 단위 분리 (마침표, 물음표, 느낌표)
        const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
        const groups = [];

        sentences.forEach(sentence => {
          const s = sentence.trim();
          if (!s) return;
          // 2단계: 40자 넘는 문장은 쉼표/접속사 기준으로 분리
          if (s.length > 40) {
            const parts = s.split(/(?<=,\s)|(?<=다\s)|(?<=고\s)|(?<=며\s)|(?<=지만\s)|(?<=는데\s)|(?<=해서\s)/);
            let buffer = '';
            parts.forEach(part => {
              if ((buffer + part).length > 50 && buffer.length > 0) {
                groups.push({ text: buffer.trim(), pause: 150 });
                buffer = part;
              } else {
                buffer += part;
              }
            });
            if (buffer.trim()) groups.push({ text: buffer.trim(), pause: 350 });
          } else {
            groups.push({ text: s, pause: s.endsWith('?') ? 500 : 350 });
          }
        });
        return groups;
      },

      speak(text, callback) {
        if (!this.SpeechSynthesis) {
          if (callback) callback(false);
          return;
        }

        this.SpeechSynthesis.cancel();
        const cleanText = this.cleanForTTS(text);
        if (!cleanText) { if (callback) callback(true); return; }

        const groups = this.splitIntoBreathGroups(cleanText);
        let idx = 0;
        let cancelled = false;
        this._currentCancel = () => { cancelled = true; };

        const speakNext = () => {
          if (cancelled || idx >= groups.length) {
            if (callback) callback(!cancelled);
            return;
          }
          const group = groups[idx];
          idx++;
          if (!group.text) { speakNext(); return; }

          const utterance = new SpeechSynthesisUtterance(group.text);
          utterance.lang = 'ko-KR';

          // 자연스러운 속도/피치 (질문은 피치 살짝 높게)
          const isQuestion = group.text.endsWith('?');
          utterance.rate = 0.92;
          utterance.pitch = isQuestion ? 1.12 : 1.0;
          utterance.volume = 1;

          // 캐싱된 최적 음성 사용
          if (this._cachedVoice) {
            utterance.voice = this._cachedVoice;
          } else {
            const voices = this.SpeechSynthesis.getVoices();
            const koVoice = voices.find(v => v.lang.startsWith('ko') && /google|samsung|heami|yuna/i.test(v.name))
              || voices.find(v => v.lang.startsWith('ko'));
            if (koVoice) utterance.voice = koVoice;
          }

          utterance.onend = () => {
            // 문장 간 자연스러운 쉼 (pause ms)
            if (group.pause > 0 && idx < groups.length) {
              setTimeout(speakNext, group.pause);
            } else {
              speakNext();
            }
          };
          utterance.onerror = () => speakNext();
          this.SpeechSynthesis.speak(utterance);
        };
        speakNext();
      },

      stopSpeaking() {
        if (this._currentCancel) this._currentCancel();
        if (this.SpeechSynthesis) {
          this.SpeechSynthesis.cancel();
        }
      },

      isSpeaking() {
        return this.SpeechSynthesis ? this.SpeechSynthesis.speaking : false;
      }
    };

    // 음성 프리로드 (앱 로드 시 최적 음성 미리 선택)
    VoiceService.preloadVoice();

    const generateAIResponse = (userText, topic, isDeep) => {
      const responses = [
        `정말 좋은 생각이에요! "${userText.slice(0, 20)}..." 라는 의견이 인상적이네요.`,
        `흥미로운 관점이에요. "${topic.hint}" 를 더 생각해 보셨나요?`,
        `훌륭한 답변입니다! 이렇게 깊이 생각할 수 있다니 멋있어요.`,
        `맞아요! 그 외에 다른 예시도 있을까요?`,
        `정확한 지적이에요. 이러한 맥락에서 더 생각해 보면...`,
        `너의 생각을 정리하면, 핵심은 "${userText.slice(0, 30)}..." 이군요.`,
        `이것은 매우 타당한 주장이에요. 논리적으로도 잘 설명했어요.`,
        `오, 이건 정말 창의적인 생각이에요!`
      ];

      const randomIdx = Math.floor(Math.random() * responses.length);
      return responses[randomIdx];
    };

    // ═══════════════════════════════════════
    // 📖 Main App Component
    // ═══════════════════════════════════════
    function BookQuest() {
      const [profile, setProfile] = useState(null);
      const [profileForm, setProfileForm] = useState({ name: "", school: "", grade: "6", avatar: "crow" });
      const [screen, _setScreenRaw] = useState("home");
      const screenRef = useRef("home");

      // 화면 전환 시 history에 push하여 뒤로가기 버튼이 앱 내에서 동작하도록
      const setScreen = (newScreen) => {
        if (newScreen === screenRef.current) return;
        screenRef.current = newScreen;
        _setScreenRaw(newScreen);
        window.history.pushState({ screen: newScreen }, "", "");
      };
      const [selectedBook, setSelectedBook] = useState(null);
      const [bookTab, setBookTab] = useState("summary");
      const [xp, setXp] = useState(0);
      const [level, setLevel] = useState(1);
      const [currentTitle, setCurrentTitle] = useState(TITLES_LIST[0]);
      const [earnedBadges, setEarnedBadges] = useState([]);
      const [streak, setStreak] = useState(1);
      const [bookProgress, setBookProgress] = useState({ 1: 0, 2: 0, 3: 0 });
      const [discussionState, setDiscussionState] = useState({});
      const [chatMessages, setChatMessages] = useState([]);
      const [chatInput, setChatInput] = useState("");
      const [activeDiscussionBook, setActiveDiscussionBook] = useState(null);
      const [activeDiscussionIdx, setActiveDiscussionIdx] = useState(0);
      const [isDeep, setIsDeep] = useState(false);
      const [showReward, setShowReward] = useState(false);
      const [rewardInfo, setRewardInfo] = useState(null);
      const [today] = useState(new Date());
      const [startDate] = useState(new Date(2026, 2, 23));
      const [isListening, setIsListening] = useState(false);
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [voiceSupported] = useState(VoiceService.isSupported());
      const [showKeyboard, setShowKeyboard] = useState(false);
      const [dataLoaded, setDataLoaded] = useState(false);

      // AskBookScreen 상태 (훅을 부모에서 관리)
      const [askMessages, setAskMessages] = useState([
        { role: "ai", text: "안녕, 건우! 📚 읽은 책에 대해 궁금한 게 있으면 뭐든 물어봐! 책 내용을 바탕으로 답변해줄게." }
      ]);
      const [askInput, setAskInput] = useState("");
      const [askLoading, setAskLoading] = useState(false);
      const [askListening, setAskListening] = useState(false);
      const askEndRef = useRef(null);
      const askRecRef = useRef(null);
      const askListeningRef = useRef(false);

      // RecommendScreen 상태 (훅을 부모에서 관리)
      const [recommendations, setRecommendations] = useState([]);
      const [recLoading, setRecLoading] = useState(false);
      const [recLoaded, setRecLoaded] = useState(false);

      // Feature 1: Daily Missions (일일 미션)
      const [dailyMissions, setDailyMissions] = useState([]);
      const [missionDate, setMissionDate] = useState("");

      // Feature 3: Discussion Star Rating
      const [discussionStarState, setDiscussionStarState] = useState({});

      // Feature 4: Quiz System
      const [quizState, setQuizState] = useState({});
      const [showQuizResult, setShowQuizResult] = useState(false);
      const [quizResultInfo, setQuizResultInfo] = useState(null);

      // Feature 5: Avatar Shop (대규모 개선)
      const [coins, setCoins] = useState(0);
      const [ownedItems, setOwnedItems] = useState([]);
      const [equippedItems, setEquippedItems] = useState({});
      const [showShop, setShowShop] = useState(false);
      const [shopCategory, setShopCategory] = useState("avatar");
      const [ownedAvatars, setOwnedAvatars] = useState(AVATAR_DATA.filter(a => a.free).map(a => a.id));
      const [lastLoginDate, setLastLoginDate] = useState(null);
      const [showCoinPopup, setShowCoinPopup] = useState(null);
      const [saveErrorMsg, setSaveErrorMsg] = useState(null);

      // Feature 6: 코디 슬롯 시스템 (3개 의상 프리셋)
      const DEFAULT_OUTFIT_SLOTS = [
        { name: "코디 1", equippedItems: {} },
        { name: "코디 2", equippedItems: {} },
        { name: "코디 3", equippedItems: {} }
      ];
      const [outfitSlots, setOutfitSlots] = useState(DEFAULT_OUTFIT_SLOTS);
      const [activeOutfitSlot, setActiveOutfitSlot] = useState(0);

      // PWA Install Prompt
      const [installPrompt, setInstallPrompt] = useState(null);
      const [showInstallBanner, setShowInstallBanner] = useState(false);

      const chatEndRef = useRef(null);
      const recognizerRef = useRef(null);
      const saveTimerRef = useRef(null);
      const isListeningRef = useRef(false);

      const currentWeek = getWeekNum(startDate);
      const thisWeekBook = BOOKS.find(b => b.week === currentWeek) || BOOKS[0];
      const weekRange = getWeekRange(startDate, currentWeek);

      // 📲 PWA 설치 프롬프트 감지
      useEffect(() => {
        const handler = (e) => {
          e.preventDefault();
          setInstallPrompt(e);
          const dismissed = localStorage.getItem("bq_install_dismissed");
          if (!dismissed) setShowInstallBanner(true);
        };
        window.addEventListener("beforeinstallprompt", handler);
        return () => window.removeEventListener("beforeinstallprompt", handler);
      }, []);

      // 🔙 뒤로가기 버튼 → 앱 내 네비게이션 처리
      const showShopRef = useRef(false);
      const showRewardRef = useRef(false);
      useEffect(() => { showShopRef.current = showShop; }, [showShop]);
      useEffect(() => { showRewardRef.current = showReward; }, [showReward]);

      useEffect(() => {
        // 초기 history 스택: 2개 push해서 뒤로가기 여유 확보
        window.history.replaceState({ screen: "home", guard: true }, "", "");
        window.history.pushState({ screen: "home" }, "", "");

        const handlePopState = (e) => {
          // 항상 즉시 다시 push → 브라우저가 진짜로 뒤로 가는 것을 원천 차단
          window.history.pushState({ screen: screenRef.current }, "", "");

          // 모달이 열려있으면 모달 먼저 닫기
          if (showShopRef.current) {
            setShowShop(false);
            return;
          }
          if (showRewardRef.current) {
            setShowReward(false);
            return;
          }
          // home이 아니면 home으로 돌아가기
          if (screenRef.current !== "home") {
            screenRef.current = "home";
            _setScreenRaw("home");
          }
          // home이면 아무 일도 안 함 (이미 push해서 앱 유지)
        };

        window.addEventListener("popstate", handlePopState);
        return () => window.removeEventListener("popstate", handlePopState);
      }, []);

      // 🔥 저장 실패 콜백 연결
      useEffect(() => {
        FirestoreService._onSaveError = (msg) => {
          setSaveErrorMsg(msg);
          setTimeout(() => setSaveErrorMsg(null), 4000);
        };
      }, []);

      // 🔥 Firestore에서 데이터 불러오기 (앱 시작 시 1회)
      useEffect(() => {
        (async () => {
          const data = await FirestoreService.loadUserData();
          if (data) {
            if (data.profile) {
              // 이전 아바타 ID가 현재 AVATAR_DATA에 없으면 기본값으로 폴백
              if (data.profile.avatar && !AVATAR_DATA.find(a => a.id === data.profile.avatar)) {
                data.profile.avatar = "crow";
              }
              setProfile(data.profile);
            }
            if (data.xp !== undefined) setXp(data.xp);
            if (data.level) setLevel(data.level);
            if (data.currentTitle) setCurrentTitle(data.currentTitle);
            if (data.earnedBadges) setEarnedBadges(data.earnedBadges);
            if (data.streak) setStreak(data.streak);
            if (data.bookProgress) setBookProgress(data.bookProgress);
            if (data.discussionState) setDiscussionState(data.discussionState);
            if (data.dailyMissions) setDailyMissions(data.dailyMissions);
            if (data.missionDate) setMissionDate(data.missionDate);
            if (data.discussionStarState) setDiscussionStarState(data.discussionStarState);
            if (data.quizState) setQuizState(data.quizState);
            if (data.coins !== undefined) setCoins(data.coins);
            if (data.ownedItems) setOwnedItems(data.ownedItems);
            // 마이그레이션: 레거시 equippedItem → equippedItems 변환
            if (data.equippedItems) {
              setEquippedItems(data.equippedItems);
            } else if (data.equippedItem) {
              const legacyItem = SHOP_ITEMS.find(i => i.id === data.equippedItem);
              if (legacyItem && legacyItem.category) {
                setEquippedItems({ [legacyItem.category]: data.equippedItem });
              }
            }
            if (data.ownedAvatars) setOwnedAvatars(data.ownedAvatars);
            if (data.lastLoginDate) setLastLoginDate(data.lastLoginDate);
            // 코디 슬롯 로드
            if (data.outfitSlots) setOutfitSlots(data.outfitSlots);
            if (data.activeOutfitSlot !== undefined) setActiveOutfitSlot(data.activeOutfitSlot);
          }
          setDataLoaded(true);
        })();
      }, []);

      // 🔥 Firestore에 데이터 저장 (변경 시 자동, 1초 디바운스)
      useEffect(() => {
        if (!dataLoaded) return; // 로드 전에는 저장하지 않음
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(() => {
          FirestoreService.saveUserData({
            profile,
            xp,
            level,
            currentTitle,
            earnedBadges,
            streak,
            bookProgress,
            discussionState,
            dailyMissions,
            missionDate,
            discussionStarState,
            quizState,
            coins,
            ownedItems,
            equippedItems,
            ownedAvatars,
            lastLoginDate,
            outfitSlots,
            activeOutfitSlot
          });
        }, 1000);
        return () => clearTimeout(saveTimerRef.current);
      }, [profile, xp, level, currentTitle, earnedBadges, streak, bookProgress, discussionState, dataLoaded, dailyMissions, missionDate, discussionStarState, quizState, coins, ownedItems, equippedItems, ownedAvatars, lastLoginDate, outfitSlots, activeOutfitSlot]);

      // Feature 1: Initialize Daily Missions
      useEffect(() => {
        if (dataLoaded) {
          const today = getTodayString();
          if (missionDate !== today) {
            setDailyMissions(generateDailyMissions());
            setMissionDate(today);
          }
        }
      }, [dataLoaded]);

      // 💰 출석 보너스 시스템
      const showCoinGain = (amount, label) => {
        setShowCoinPopup({ amount, label });
        setTimeout(() => setShowCoinPopup(null), 2000);
      };

      useEffect(() => {
        if (!dataLoaded || !profile) return;
        const today = getTodayString();
        if (lastLoginDate !== today) {
          const streakBonus = Math.min(streak, 7) * 2;
          const dailyBase = 5;
          const setBonus = getActiveSetBonus();
          const setBonusCoins = setBonus ? setBonus.bonus : 0;
          // pet 효과: 출석 코인 +3
          const petBonus = getItemBonus(equippedItems, "loginCoin");
          const totalBonus = dailyBase + streakBonus + setBonusCoins + petBonus;
          setCoins(prev => prev + totalBonus);
          setLastLoginDate(today);
          setTimeout(() => {
            const parts = [`기본 ${dailyBase}`, `연속 ${streakBonus}`];
            if (petBonus > 0) parts.push(`펫 +${petBonus}`);
            if (setBonusCoins > 0) parts.push(`${setBonus.name} +${setBonusCoins}`);
            showCoinGain(totalBonus, `출석 보너스! (${parts.join(" + ")})`);
          }, 500);

          // 7일 연속 접속 보상: 랜덤 아이템 지급
          if (streak > 0 && streak % 7 === 0) {
            const categories = ["frame", "hat", "face", "pet", "wing", "weapon", "aura", "emote"];
            const randomCat = categories[Math.floor(Math.random() * categories.length)];
            setTimeout(() => {
              const item = grantRandomItem(randomCat);
              if (item) {
                showCoinGain(0, `7일 연속 보상: ${item.name} 획득!`);
              }
            }, 2500);
          }
        }
      }, [dataLoaded, profile]);

      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [chatMessages]);

      // AskBookScreen 스크롤
      useEffect(() => {
        askEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [askMessages]);

      // RecommendScreen 자동 로드
      useEffect(() => {
        if (screen === "recommend" && !recLoaded) {
          const readBooks = BOOKS.filter(b => (bookProgress[b.id] || 0) > 0);
          if (readBooks.length > 0) {
            (async () => {
              setRecLoading(true);
              const recs = await CloudAPI.recommendBooks(readBooks.map(b => ({
                title: b.title, summary: b.summary, keywords: b.keyPoints.slice(0, 3)
              })));
              setRecommendations(recs);
              setRecLoading(false);
              setRecLoaded(true);
            })();
          }
        }
      }, [screen]);

      const getLevel = (xpVal) => Math.min(Math.floor(xpVal / 100) + 1, 10);
      const getTitle = (lvl) => TITLES_LIST[Math.min(lvl - 1, TITLES_LIST.length - 1)];
      const xpToNext = (xpVal) => 100 - (xpVal % 100);

      // 레벨업 아이템 보상 테이블 (특정 레벨에 랜덤 아이템 지급)
      const LEVEL_ITEM_REWARDS = { 3: "frame", 5: "hat", 7: "pet", 10: "wing", 13: "weapon", 15: "face", 18: "aura", 20: "emote" };

      const grantRandomItem = (category) => {
        const available = SHOP_ITEMS.filter(i => i.category === category && !ownedItems.includes(i.id));
        if (available.length === 0) return null;
        const item = available[Math.floor(Math.random() * available.length)];
        setOwnedItems(prev => [...prev, item.id]);
        return item;
      };

      // 코디 슬롯 전환
      const switchOutfitSlot = (slotIdx) => {
        if (slotIdx === activeOutfitSlot) return;
        // 현재 슬롯에 현재 장착 아이템 저장
        setOutfitSlots(prev => {
          const updated = [...prev];
          updated[activeOutfitSlot] = { ...updated[activeOutfitSlot], equippedItems: { ...equippedItems } };
          return updated;
        });
        // 새 슬롯의 아이템으로 교체
        setEquippedItems(outfitSlots[slotIdx].equippedItems || {});
        setActiveOutfitSlot(slotIdx);
      };

      // 현재 코디를 슬롯에 저장
      const saveCurrentOutfit = () => {
        setOutfitSlots(prev => {
          const updated = [...prev];
          updated[activeOutfitSlot] = { ...updated[activeOutfitSlot], equippedItems: { ...equippedItems } };
          return updated;
        });
      };

      // 세트 보너스 체크: 같은 테마 접두어 아이템이 3개 이상이면 보너스
      const SET_THEMES = [
        { prefix: "deco_frame_fire|deco_aura_fire|deco_hat_fire|deco_face_fire|deco_pet_fire|deco_weapon_fire|deco_wing_fire|deco_emote_fire", name: "불꽃 세트", bonus: 2 },
        { prefix: "deco_frame_ice|deco_aura_ice|deco_hat_ice|deco_face_ice|deco_pet_ice|deco_weapon_ice|deco_wing_ice|deco_emote_ice", name: "얼음 세트", bonus: 2 },
        { prefix: "deco_frame_dragon|deco_aura_dark|deco_hat_devil|deco_weapon_sword|deco_wing_bat", name: "다크 세트", bonus: 3 },
        { prefix: "deco_frame_flower|deco_aura_light|deco_hat_halo|deco_pet_rabbit|deco_wing_angel", name: "천사 세트", bonus: 3 },
        { prefix: "deco_frame_neon|deco_aura_electric|deco_hat_headphones|deco_face_vr|deco_wing_jetpack", name: "사이버 세트", bonus: 3 },
        { prefix: "deco_frame_space|deco_aura_galaxy|deco_hat_astronaut|deco_pet_alien|deco_wing_rocket", name: "우주 세트", bonus: 3 }
      ];

      const getActiveSetBonus = () => {
        const equippedIds = Object.values(equippedItems);
        if (equippedIds.length < 3) return null;
        for (const set of SET_THEMES) {
          const setItems = set.prefix.split("|");
          const matched = equippedIds.filter(id => setItems.includes(id));
          if (matched.length >= 3) return { name: set.name, bonus: set.bonus, count: matched.length };
        }
        return null;
      };

      const addXp = (amount) => {
        const newXp = xp + amount;
        const newLevel = getLevel(newXp);
        if (newLevel > level) {
          const levelUpCoins = 20 + (newLevel * 5);
          setCoins(prev => prev + levelUpCoins);

          // 레벨업 아이템 보상 체크
          let bonusItem = null;
          const rewardCat = LEVEL_ITEM_REWARDS[newLevel];
          if (rewardCat) {
            bonusItem = grantRandomItem(rewardCat);
          }

          setRewardInfo({
            type: "levelup", level: newLevel, title: getTitle(newLevel), coins: levelUpCoins,
            bonusItem: bonusItem ? bonusItem.name : null
          });
          setShowReward(true);
          setLevel(newLevel);
          setCurrentTitle(getTitle(newLevel));
        }
        setXp(newXp);
      };

      // 배지 → 아바타 해금 매핑
      const BADGE_AVATAR_REWARDS = {
        "첫 발걸음": "brock",    // 첫 토론 완료 → 브록 해금
        "호기심 대장": "piper",  // 3개 토론 → 파이퍼 해금
        "깊은 생각": "mortis",   // 심화 토론 → 모티스 해금
        "책벌레": "spike",       // 1권 완독 → 스파이크 해금
        "연속 달성": "sandy",    // 3일 연속 → 샌디 해금
        "완전 정복": "amber"     // 3권 완독 → 앰버 해금
      };

      // 배지 체크 & 자동 부여
      const checkBadges = () => {
        if (!dataLoaded || !profile) return;
        const newBadges = [];
        const totalDiscussions = Object.values(discussionState).filter(v => v && v.completed).length;
        const deepDiscussions = Object.values(discussionState).filter(v => v && v.completed && v.deep).length;
        const completedBooks = BOOKS.filter(b => (bookProgress[b.id] || 0) >= 100).length;

        const checks = [
          { name: "첫 발걸음", condition: totalDiscussions >= 1 },
          { name: "호기심 대장", condition: totalDiscussions >= 3 },
          { name: "깊은 생각", condition: deepDiscussions >= 1 },
          { name: "책벌레", condition: completedBooks >= 1 },
          { name: "연속 달성", condition: streak >= 3 },
          { name: "완전 정복", condition: completedBooks >= 3 }
        ];

        checks.forEach(({ name, condition }) => {
          if (condition && !earnedBadges.some(b => b.name === name)) {
            const badge = BADGES.find(b => b.name === name);
            if (badge) {
              newBadges.push({ name, date: new Date().toISOString() });
              // 배지 → 아바타 해금
              const avatarReward = BADGE_AVATAR_REWARDS[name];
              if (avatarReward && !ownedAvatars.includes(avatarReward)) {
                setOwnedAvatars(prev => [...prev, avatarReward]);
                const avatarInfo = AVATAR_DATA.find(a => a.id === avatarReward);
                setTimeout(() => {
                  showCoinGain(0, `배지 보상: ${avatarInfo?.name || avatarReward} 아바타 해금!`);
                }, 1500);
              }
            }
          }
        });

        if (newBadges.length > 0) {
          setEarnedBadges(prev => [...prev, ...newBadges]);
        }
      };

      // 코디 슬롯 자동 동기화 (아이템 장착 변경 시 현재 슬롯 업데이트)
      useEffect(() => {
        if (!dataLoaded) return;
        setOutfitSlots(prev => {
          const updated = [...prev];
          updated[activeOutfitSlot] = { ...updated[activeOutfitSlot], equippedItems: { ...equippedItems } };
          return updated;
        });
      }, [equippedItems]);

      // 배지 자동 체크 (상태 변경 시)
      useEffect(() => {
        checkBadges();
      }, [discussionState, bookProgress, streak, dataLoaded]);

      const startDiscussion = (book, idx, deep = false) => {
        setActiveDiscussionBook(book);
        setActiveDiscussionIdx(idx);
        setIsDeep(deep);
        const topics = deep ? book.deepTopics : book.discussionTopics;
        const topic = topics[idx];

        // Feature 2: Use avatar personality
        const avatarPersonality = AVATAR_PERSONALITIES[profile?.avatar] || AVATAR_PERSONALITIES.wizard;

        const initialMessages = [
          { role: "ai", text: avatarPersonality.greeting },
          { role: "ai", text: `📚 "${book.title}" ${deep ? "심화" : ""} 토론 ${idx + 1}번째 주제입니다!` },
          { role: "ai", text: topic.q },
          { role: "ai", text: `💡 힌트: ${topic.hint}` },
          { role: "ai", text: `${profile?.name || "친구"}의 생각을 말씀해 주세요! 🎤` }
        ];

        setChatMessages(initialMessages);
        setChatInput("");
        setShowKeyboard(false);
        setScreen("discussion");

        setTimeout(() => {
          setIsSpeaking(true);
          VoiceService.speak(topic.q, () => {
            setIsSpeaking(false);
          });
        }, 500);
      };

      const startListening = () => {
        if (!voiceSupported || isListening) return;

        // 매번 새 인식기 생성 (continuous 모드 재시작 문제 방지)
        recognizerRef.current = VoiceService.createRecognizer();
        const recognizer = recognizerRef.current;
        if (!recognizer) return;

        setIsListening(true);
        isListeningRef.current = true;
        setChatInput("");

        recognizer.onstart = () => {
          setIsListening(true);
          isListeningRef.current = true;
        };

        recognizer.onresult = (event) => {
          let finalText = "";
          let interimText = "";
          for (let i = 0; i < event.results.length; i++) {
            const result = event.results[i];
            if (result.isFinal) {
              finalText += result[0].transcript;
            } else {
              interimText += result[0].transcript;
            }
          }
          const fullText = (finalText + interimText).trim();
          if (fullText) {
            setChatInput(fullText);
          }
        };

        recognizer.onerror = (e) => {
          if (e.error !== 'no-speech') {
            setIsListening(false);
            isListeningRef.current = false;
          }
        };

        recognizer.onend = () => {
          // continuous 모드에서도 브라우저가 자동 종료할 수 있으므로 재시작
          if (isListeningRef.current) {
            try { recognizer.start(); } catch(e) {
              setIsListening(false);
              isListeningRef.current = false;
            }
          }
        };

        try {
          recognizer.start();
        } catch (e) {
          setIsListening(false);
        }
      };

      const stopListening = () => {
        setIsListening(false);
        isListeningRef.current = false;
        if (recognizerRef.current) {
          try { recognizerRef.current.stop(); } catch(e) {}
          recognizerRef.current = null;
        }
      };

      const finishVoiceInput = () => {
        stopListening();
        const text = chatInput.trim();
        if (text) {
          setTimeout(() => sendChat(text), 300);
        }
      };

      const sendChat = async (messageText = null) => {
        const text = messageText || chatInput.trim();
        if (!text) return;

        setChatInput("");
        const userMsg = text;
        const newMsgs = [...chatMessages, { role: "user", text: userMsg }];
        setChatMessages(newMsgs);

        const topics = isDeep ? activeDiscussionBook.deepTopics : activeDiscussionBook.discussionTopics;
        const topic = topics[activeDiscussionIdx];

        // 실제 Claude AI로 피드백 받기
        setIsSpeaking(true);
        const aiResponse = await CloudAPI.discussionCoach(
          userMsg, topic, activeDiscussionBook.title, activeDiscussionBook.summary, isDeep
        );
        const complimentMsg = `🌟 이 토론에서 ${isDeep ? 30 : 20}XP를 획득했어요!`;

        setChatMessages(prev => [...prev, { role: "ai", text: aiResponse }]);

        VoiceService.speak(aiResponse, () => {
          VoiceService.speak(complimentMsg, () => {
            setIsSpeaking(false);
          });
        });

        setTimeout(() => {
          setChatMessages(prev => [...prev, { role: "ai", text: complimentMsg }]);
        }, 2000);

        // Feature 3: Calculate star rating based on answer length
        const answerLength = userMsg.trim().length;
        let stars = 1;
        if (answerLength >= 20 && answerLength < 80) stars = 2;
        else if (answerLength >= 80) stars = 3;

        const key = `${activeDiscussionBook.id}-${isDeep ? "deep" : "disc"}-${activeDiscussionIdx}`;
        const isFirstCompletion = !discussionState[key];

        // hat 효과: 토론 XP +15%
        const discXpBase = isDeep ? 30 : 20;
        const hatBonus = getItemBonus(equippedItems, "discussionXp");
        addXp(Math.round(discXpBase * (1 + hatBonus)));

        // 코인 보상: 기본 + 별점 보너스 + 심화 보너스
        const baseCoin = isFirstCompletion ? 5 : 2;
        const starBonus = stars === 3 ? 5 : stars === 2 ? 2 : 0;
        const deepBonus = isDeep ? 3 : 0;
        // weapon 효과: 별점 코인 +2
        const weaponBonus = (stars >= 2) ? getItemBonus(equippedItems, "starCoin") : 0;
        const totalCoin = baseCoin + starBonus + deepBonus + weaponBonus;
        setCoins(prev => prev + totalCoin);

        // Store discussion with stars
        setDiscussionStarState(prev => {
          const existing = prev[key] || { completed: false, stars: 0, bestStars: 0 };
          const newBestStars = Math.max(existing.bestStars || 0, stars);
          return {
            ...prev,
            [key]: { completed: true, stars, bestStars: newBestStars }
          };
        });

        setDiscussionState(prev => ({ ...prev, [key]: true }));
        const bookId = activeDiscussionBook.id;
        const oldProgress = bookProgress[bookId] || 0;
        const newProgress = Math.min(100, oldProgress + (isDeep ? 15 : 10));
        setBookProgress(prev => ({ ...prev, [bookId]: newProgress }));

        // 독서 진도 마일스톤 보상
        if (oldProgress < 50 && newProgress >= 50) {
          setCoins(prev => prev + 10);
          showCoinGain(10, `📚 ${activeDiscussionBook.title} 50% 달성!`);
        } else if (oldProgress < 100 && newProgress >= 100) {
          setCoins(prev => prev + 25);
          showCoinGain(25, `📚 ${activeDiscussionBook.title} 완독!`);
        }
      };

                  <div key={catId} onClick={() => { setShowShop(true); setShopCategory(catId); }}

      // ═══════════════════════════════════════
      // ═══════════════════════════════════════
      // 💡 책에게 물어보기 화면
      // ═══════════════════════════════════════
      const AskBookScreen = () => {
        // 읽은 책 데이터를 문자열로 변환
        const getBookDataString = () => {
          const completedBooks = BOOKS.filter(b => {
            const progress = bookProgress[b.id] || 0;
            return progress > 0;
          });
          if (completedBooks.length === 0) return "아직 읽은 책이 없습니다.";
          return completedBooks.map(b =>
            `📖 "${b.title}" (${b.author})\n요약: ${b.summary}\n핵심포인트: ${b.keyPoints.join(", ")}\n챕터: ${b.chapters.map(c => c.title).join(", ")}`
          ).join("\n\n");
        };

        const sendAskMessage = async (messageText = null) => {
          const text = messageText || askInput.trim();
          if (!text || askLoading) return;
          setAskInput("");
          setAskMessages(prev => [...prev, { role: "user", text }]);
          setAskLoading(true);

          const answer = await CloudAPI.askBook(text, getBookDataString(), askMessages.slice(-6));
          setAskMessages(prev => [...prev, { role: "ai", text: answer }]);
          setAskLoading(false);

          VoiceService.speak(answer, () => {});
        };

        const startAskListening = () => {
          if (!voiceSupported || askListening) return;
          askRecRef.current = VoiceService.createRecognizer();
          const rec = askRecRef.current;
          if (!rec) return;
          setAskListening(true);
          askListeningRef.current = true;
          setAskInput("");

          rec.onresult = (event) => {
            let finalText = "", interimText = "";
            for (let i = 0; i < event.results.length; i++) {
              if (event.results[i].isFinal) finalText += event.results[i][0].transcript;
              else interimText += event.results[i][0].transcript;
            }
            const full = (finalText + interimText).trim();
            if (full) setAskInput(full);
          };
          rec.onerror = (e) => { if (e.error !== 'no-speech') { setAskListening(false); askListeningRef.current = false; } };
          rec.onend = () => { if (askListeningRef.current) { try { rec.start(); } catch(e) { setAskListening(false); askListeningRef.current = false; } } };
          try { rec.start(); } catch(e) { setAskListening(false); askListeningRef.current = false; }
        };

        const finishAskListening = () => {
          setAskListening(false);
          askListeningRef.current = false;
          if (askRecRef.current) { try { askRecRef.current.stop(); } catch(e) {} askRecRef.current = null; }
          const text = askInput.trim();
          if (text) setTimeout(() => sendAskMessage(text), 300);
        };

        return (
          <div style={{ display: "flex", flexDirection: "column", height: "100vh", paddingBottom: 70 }}>
            <div style={{ padding: "16px 20px", background: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)", color: "white", flexShrink: 0 }}>
              <div style={{ fontSize: 20, fontWeight: 800 }}>💡 책에게 물어보기</div>
              <div style={{ fontSize: 12, opacity: 0.9, marginTop: 4 }}>읽은 책 내용을 바탕으로 궁금한 걸 물어봐!</div>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: 16, background: "#f7f7fa", display: "flex", flexDirection: "column" }}>
              {askMessages.map((msg, i) => (
                <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
                  <div style={{
                    maxWidth: "80%", padding: "10px 14px",
                    borderRadius: msg.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                    background: msg.role === "user" ? "#f5576c" : "white",
                    color: msg.role === "user" ? "white" : "#333",
                    fontSize: 13, lineHeight: 1.6, boxShadow: "0 1px 4px rgba(0,0,0,0.06)"
                  }}>
                    {msg.role === "ai" && <span style={{ fontSize: 11, color: "#f5576c", fontWeight: 600, display: "block", marginBottom: 2 }}>📚 책 도우미</span>}
                    {msg.text}
                  </div>
                </div>
              ))}
              {askLoading && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <span style={{ fontSize: 20 }}>🤔</span>
                  <span style={{ fontSize: 12, color: "#666", fontStyle: "italic" }}>책을 찾아보는 중...</span>
                </div>
              )}
              <div ref={askEndRef} />
            </div>

            <div style={{ padding: 16, background: "white", borderTop: "1px solid #eee", flexShrink: 0 }}>
              {askListening && askInput && (
                <div style={{ padding: "8px 12px", marginBottom: 8, borderRadius: 12, background: "#fff0f3", border: "2px solid #f5576c", fontSize: 13, maxHeight: 80, overflowY: "auto" }}>
                  <span style={{ fontSize: 11, color: "#f5576c", fontWeight: 600 }}>내 질문:</span>
                  <div style={{ marginTop: 2 }}>{askInput}</div>
                </div>
              )}
              <div style={{ display: "flex", gap: 8 }}>
                {!askListening ? (
                  <button onClick={startAskListening} disabled={askLoading}
                    style={{ flex: 1, padding: 14, borderRadius: 20, border: "none", background: "#f5576c", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, opacity: askLoading ? 0.5 : 1 }}>
                    <span>🎤</span> 질문하기
                  </button>
                ) : (
                  <button onClick={finishAskListening}
                    style={{ flex: 1, padding: 14, borderRadius: 20, border: "none", background: "#ff6b6b", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, animation: "pulse 1.5s infinite" }}>
                    <span>✅</span> 질문 완료
                  </button>
                )}
                <input value={askInput} onChange={e => setAskInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && sendAskMessage()}
                  placeholder="타이핑으로 질문..."
                  disabled={askLoading}
                  style={{ flex: 1, padding: "10px 14px", borderRadius: 20, border: "2px solid #eee", fontSize: 13 }} />
                <button onClick={() => sendAskMessage()} disabled={askLoading || !askInput.trim()}
                  style={{ padding: "10px 16px", borderRadius: 20, border: "none", background: "#f5576c", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer", opacity: askLoading || !askInput.trim() ? 0.5 : 1 }}>
                  전송
                </button>
              </div>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 📖 도서 추천 화면
      // ═══════════════════════════════════════
      const RecommendScreen = () => {
        const getReadBooks = () => {
          return BOOKS.filter(b => (bookProgress[b.id] || 0) > 0).map(b => ({
            title: b.title,
            summary: b.summary,
            keywords: b.keyPoints.slice(0, 3)
          }));
        };

        const loadRecommendations = async () => {
          const readBooks = getReadBooks();
          if (readBooks.length === 0) return;
          setRecLoading(true);
          const recs = await CloudAPI.recommendBooks(readBooks);
          setRecommendations(recs);
          setRecLoading(false);
          setRecLoaded(true);
        };

        const readBooks = getReadBooks();

        return (
          <div style={{ padding: "0 20px 90px", maxWidth: 430 }}>
            <div style={{ padding: "16px 0 12px", marginBottom: 12 }}>
              <div style={{ fontSize: 22, fontWeight: 900, color: "#1a1a2e" }}>📖 추천 도서</div>
              <div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>읽은 책을 바탕으로 다음에 읽으면 좋을 책을 추천해줘요!</div>
            </div>

            {readBooks.length === 0 ? (
              <div style={{ textAlign: "center", padding: 40, background: "white", borderRadius: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📚</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#333", marginBottom: 8 }}>아직 읽은 책이 없어요</div>
                <div style={{ fontSize: 13, color: "#888" }}>책을 읽고 토론을 시작하면 맞춤 추천을 받을 수 있어요!</div>
              </div>
            ) : recLoading ? (
              <div style={{ textAlign: "center", padding: 40, background: "white", borderRadius: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                <div style={{ fontSize: 48, marginBottom: 12, animation: "pop 0.8s ease infinite alternate" }}>🔍</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#333" }}>도서관에서 책을 찾는 중...</div>
                <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>잠시만 기다려주세요!</div>
              </div>
            ) : recommendations.length > 0 ? (
              <div>
                <div style={{ fontSize: 13, color: "#667eea", fontWeight: 600, marginBottom: 12 }}>
                  📚 {readBooks.length}권의 책을 분석해서 추천해요!
                </div>
                {recommendations.map((book, i) => (
                  <div key={i} style={{
                    background: "white", borderRadius: 16, padding: 16, marginBottom: 12,
                    boxShadow: "0 2px 8px rgba(0,0,0,0.06)", display: "flex", gap: 12
                  }}>
                    {book.cover ? (
                      <img src={book.cover} alt={book.title}
                        style={{ width: 70, height: 100, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} />
                    ) : (
                      <div style={{ width: 70, height: 100, borderRadius: 8, background: "linear-gradient(135deg, #667eea, #764ba2)", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <span style={{ fontSize: 28 }}>📕</span>
                      </div>
                    )}
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#1a1a2e", marginBottom: 4 }}>{book.title}</div>
                      <div style={{ fontSize: 11, color: "#888", marginBottom: 6 }}>{book.author}</div>
                      <div style={{ fontSize: 12, color: "#667eea", fontWeight: 600, background: "#f0f3ff", padding: "6px 10px", borderRadius: 8, lineHeight: 1.5 }}>
                        💡 {book.reason}
                      </div>
                      {book.link && (
                        <a href={book.link} target="_blank" rel="noopener noreferrer"
                          style={{ fontSize: 11, color: "#f5576c", fontWeight: 600, marginTop: 6, display: "inline-block", textDecoration: "none" }}>
                          알라딘에서 보기 →
                        </a>
                      )}
                    </div>
                  </div>
                ))}
                <button onClick={loadRecommendations}
                  style={{ width: "100%", padding: 14, borderRadius: 16, border: "none", background: "linear-gradient(135deg, #667eea, #764ba2)", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 8 }}>
                  🔄 다른 책 추천받기
                </button>
              </div>
            ) : recLoaded ? (
              <div style={{ textAlign: "center", padding: 40, background: "white", borderRadius: 16 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>😅</div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>추천을 가져오지 못했어요</div>
                <button onClick={loadRecommendations}
                  style={{ marginTop: 12, padding: "10px 24px", borderRadius: 16, border: "none", background: "#667eea", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                  다시 시도
                </button>
              </div>
            ) : null}
          </div>
        );
      };

      // ═══════════════════════════════════════
      // ❓ Quiz Result Modal
      // ═══════════════════════════════════════
      const QuizResultModal = () => {
        if (!showQuizResult || !quizResultInfo) return null;
        const { correct, explanation, answer } = quizResultInfo;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}
            onClick={() => setShowQuizResult(false)}>
            <div style={{ background: "white", borderRadius: 24, padding: "32px 24px", textAlign: "center", maxWidth: 320, width: "90%", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <img src={correct ? PNG_ICONS.quiz_correct : PNG_ICONS.quiz_wrong} style={{ width: 100, height: 100, marginBottom: 12 }} />
              <div style={{ fontSize: 20, fontWeight: 800, color: "#1a1a2e", marginBottom: 8 }}>{correct ? "정답!" : "틀렸어요"}</div>
              <div style={{ fontSize: 14, color: "#666", marginBottom: 16, lineHeight: 1.6 }}>{explanation}</div>
              {!correct && <div style={{ fontSize: 13, color: "#888", marginBottom: 12 }}>정답: {answer}</div>}
              {correct && <div style={{ fontSize: 13, color: "#4CAF50", fontWeight: 600, marginBottom: 12 }}>+10XP, +3코인!</div>}
              <button onClick={() => setShowQuizResult(false)}
                style={{ padding: "12px 32px", borderRadius: 20, border: "none", background: "#667eea", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                확인
              </button>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🎉 레벨업 보상 모달
      // ═══════════════════════════════════════
      const RewardModal = () => {
        if (!showReward || !rewardInfo) return null;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}
            onClick={() => setShowReward(false)}>
            <div style={{ background: "white", borderRadius: 24, padding: "32px 24px", textAlign: "center", maxWidth: 300, width: "90%", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <div style={{ fontSize: 60, marginBottom: 12 }}>🎉</div>
              <div style={{ fontSize: 20, fontWeight: 800, color: "#1a1a2e", marginBottom: 8 }}>레벨 업!</div>
              <div style={{ fontSize: 40, fontWeight: 800, color: "#667eea", marginBottom: 8 }}>Lv.{rewardInfo.level}</div>
              <div style={{ fontSize: 16, color: "#444", marginBottom: 8 }}>새로운 칭호: <b style={{ color: "#FFB300" }}>{rewardInfo.title}</b></div>
              <div style={{ fontSize: 14, color: "#667eea", fontWeight: 600, marginBottom: 4 }}>+{rewardInfo.coins} 코인</div>
              {rewardInfo.bonusItem && (
                <div style={{ fontSize: 13, color: "#4CAF50", fontWeight: 600, marginBottom: 8, padding: "6px 12px", background: "#E8F5E9", borderRadius: 10 }}>
                  보너스 아이템: {rewardInfo.bonusItem}
                </div>
              )}
              <button onClick={() => setShowReward(false)}
                style={{ padding: "12px 32px", borderRadius: 20, border: "none", background: "#667eea", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 8 }}>
                좋아요! 🎮
              </button>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🔽 Bottom Tab Bar
      // ═══════════════════════════════════════
      const TabBar = () => {
        if (screen === "discussion" || !profile) return null;
        const tabs = [
          { key: "home", svg: PNG_ICONS.tab_home, label: "홈" },
          { key: "askbook", svg: PNG_ICONS.tab_ask, label: "질문" },
          { key: "recommend", svg: PNG_ICONS.tab_recommend, label: "추천" },
          { key: "avatar", svg: PNG_ICONS.tab_profile, label: "프로필" },
          { key: "schedule", svg: PNG_ICONS.tab_schedule, label: "스케줄" }
        ];
        const isActive = (key) => screen === key || (screen === "book" && key === "home");
        return (
          <div style={{
            position: "fixed", bottom: 0, left: 0, right: 0,
            background: "rgba(255,255,255,0.95)", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)",
            borderTop: "1px solid rgba(0,0,0,0.06)",
            display: "flex", justifyContent: "space-around", padding: "6px 0 env(safe-area-inset-bottom, 6px)", zIndex: 100
          }}>
            {tabs.map(t => (
              <button key={t.key} onClick={() => setScreen(t.key)}
                style={{
                  background: "none", border: "none", padding: "6px 16px",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                  cursor: "pointer", transition: "all 0.2s", opacity: isActive(t.key) ? 1 : 0.5
                }}>
                <SvgIcon svg={t.svg} size={24} style={{ opacity: isActive(t.key) ? 1 : 0.6 }} />
                <span style={{
                  fontSize: 10, fontWeight: isActive(t.key) ? 700 : 500,
                  color: isActive(t.key) ? "#667eea" : "#999",
                  transition: "all 0.2s"
                }}>{t.label}</span>
              </button>
            ))}
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🛍️ Shop Modal (대규모 개선 - 카테고리 탭 + 아바타 구매)
      // ═══════════════════════════════════════
      const ShopModal = () => {
        if (!showShop) return null;
        const filteredItems = shopCategory === "avatar"
          ? AVATAR_DATA
          : SHOP_ITEMS.filter(item => item.category === shopCategory);
        const isAvatarTab = shopCategory === "avatar";
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 }}
            onClick={() => setShowShop(false)}>
            <div style={{ background: "white", borderRadius: "24px 24px 0 0", padding: "16px 16px 20px", maxHeight: "92vh", width: "100%", display: "flex", flexDirection: "column", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              {/* 상점 헤더: 큰 아바타 프리뷰 + 타이틀 */}
              <div style={{ textAlign: "center", padding: "8px 0 4px", position: "relative" }}>
                <div style={{ display: "flex", justifyContent: "flex-end", position: "absolute", top: 0, right: 0, gap: 12, alignItems: "center" }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 14, fontWeight: 700, color: "#667eea" }}>
                    <img src={PNG_ICONS.coin} style={{ width: 18, height: 18 }} /> {coins}
                  </span>
                  <button onClick={() => setShowShop(false)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", padding: 0 }}>✕</button>
                </div>
                <AvatarWithItems
                  size={80}
                  avatarId={profile?.avatar}
                  equippedItems={equippedItems}
                  shape="circle"
                  borderStyle={{ border: "3px solid #667eea", boxShadow: "0 4px 16px rgba(102,126,234,0.3)" }}
                />
                <h3 style={{ fontSize: 16, fontWeight: 800, color: "#1a1a2e", marginTop: 6, marginBottom: 0 }}>상점</h3>
              </div>
              <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 10, marginBottom: 10, borderBottom: "1px solid #eee", flexShrink: 0 }}>
                {SHOP_CATEGORIES.map(cat => (
                  <button key={cat.id} onClick={() => setShopCategory(cat.id)}
                    style={{ padding: "6px 12px", borderRadius: 20, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap",
                      background: shopCategory === cat.id ? "#667eea" : "#f0f0f5",
                      color: shopCategory === cat.id ? "white" : "#666" }}>
                    {cat.emoji} {cat.name}
                  </button>
                ))}
              </div>
              <div style={{ overflowY: "auto", flex: 1 }}>
                <div style={{ display: "grid", gridTemplateColumns: isAvatarTab ? "repeat(3, 1fr)" : "repeat(2, 1fr)", gap: 8 }}>
                  {isAvatarTab ? filteredItems.map(avatar => {
                    const owned = ownedAvatars.includes(avatar.id);
                    const equipped = profile?.avatar === avatar.id;
                    return (
                      <div key={avatar.id} style={{ background: "#f7f7fa", borderRadius: 14, padding: 10, textAlign: "center", border: equipped ? "2px solid #667eea" : "1px solid #eee" }}>
                        <img src={avatar.img} style={{ width: 56, height: 56, borderRadius: "50%", objectFit: "cover", marginBottom: 4 }} />
                        <div style={{ fontSize: 11, fontWeight: 700, color: "#1a1a2e", marginBottom: 2 }}>{avatar.name}</div>
                        <div style={{ fontSize: 10, color: "#888", marginBottom: 6 }}>무료</div>
                        {equipped ? (
                          <button style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "none", background: "#667eea", color: "white", fontSize: 11, fontWeight: 600 }}>
                            사용 중
                          </button>
                        ) : (
                          <button onClick={() => { setProfile(prev => ({...prev, avatar: avatar.id})); setProfileForm(prev => ({...prev, avatar: avatar.id})); }}
                            style={{ width: "100%", padding: "5px 8px", borderRadius: 8, border: "2px solid #667eea", background: "white", color: "#667eea", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            선택
                          </button>
                        )}
                      </div>
                    );
                  }) : filteredItems.map(item => {
                    const owned = ownedItems.includes(item.id);
                    const cat = item.category;
                    const equipped = equippedItems[cat] === item.id;
                    return (
                      <div key={item.id} style={{ background: "#f7f7fa", borderRadius: 14, padding: 12, textAlign: "center", border: equipped ? "2px solid #667eea" : "1px solid #eee" }}>
                        <div style={{ marginBottom: 8, padding: 4 }}><img src={getComboImagePath(profile?.avatar || "shelly", item.id)} style={{ width: 64, height: 64, borderRadius: "50%", objectFit: "cover" }} onError={(e) => { const av = AVATAR_DATA.find(a => a.id === (profile?.avatar || "shelly")); if (av && e.target.src !== av.img) e.target.src = av.img; }} /></div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "#1a1a2e", marginBottom: 2 }}>{item.name}</div>
                        {ITEM_EFFECTS[cat]?.type === "bonus" && (
                          <div style={{ fontSize: 10, fontWeight: 600, color: ITEM_EFFECTS[cat].color, background: ITEM_EFFECTS[cat].color + "18", borderRadius: 6, padding: "2px 6px", marginBottom: 4, display: "inline-block" }}>
                            {ITEM_EFFECTS[cat].icon} {ITEM_EFFECTS[cat].label}
                          </div>
                        )}
                        {ITEM_EFFECTS[cat]?.type === "visual" && (
                          <div style={{ fontSize: 10, fontWeight: 600, color: ITEM_EFFECTS[cat].color, background: ITEM_EFFECTS[cat].color + "18", borderRadius: 6, padding: "2px 6px", marginBottom: 4, display: "inline-block" }}>
                            ✨ {ITEM_EFFECTS[cat].desc}
                          </div>
                        )}
                        <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>{item.price} 코인</div>
                        {!owned ? (
                          <button onClick={() => {
                            if (coins >= item.price) {
                              setCoins(prev => prev - item.price);
                              setOwnedItems(prev => [...prev, item.id]);
                              setEquippedItems(prev => ({...prev, [cat]: item.id}));
                              showCoinGain(-item.price, `${item.name} 구매!`);
                            }
                          }}
                            disabled={coins < item.price}
                            style={{ width: "100%", padding: "7px 10px", borderRadius: 10, border: "none", background: coins >= item.price ? "#667eea" : "#ddd", color: "white", fontSize: 12, fontWeight: 600, cursor: coins >= item.price ? "pointer" : "default" }}>
                            구매
                          </button>
                        ) : equipped ? (
                          <button onClick={() => setEquippedItems(prev => { const n = {...prev}; delete n[cat]; return n; })}
                            style={{ width: "100%", padding: "7px 10px", borderRadius: 10, border: "none", background: "#667eea", color: "white", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                            해제
                          </button>
                        ) : (
                          <button onClick={() => setEquippedItems(prev => ({...prev, [cat]: item.id}))}
                            style={{ width: "100%", padding: "7px 10px", borderRadius: 10, border: "2px solid #667eea", background: "white", color: "#667eea", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                            장착
                          </button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 메인 렌더링
      // ═══════════════════════════════════════
      if (!dataLoaded) {
        return (
          <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #667eea, #764ba2)" }}>
            <div style={{ fontSize: 48, marginBottom: 16, animation: "pop 0.5s ease" }}>📚</div>
            <div style={{ color: "white", fontSize: 18, fontWeight: 800 }}>BookQuest</div>
            <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 14 }}>데이터 불러오는 중...</div>
          </div>
        );
      }

      return (
        <div style={{ maxWidth: 430, margin: "0 auto", background: "#f7f7fa", minHeight: "100vh", fontFamily: "'Noto Sans KR', -apple-system, sans-serif", paddingTop: profile ? 16 : 0, position: "relative" }}>
          {!profile && ProfileSetupScreen()}
          {profile && screen === "home" && HomeScreen()}
          {profile && screen === "book" && BookScreen()}
          {profile && screen === "discussion" && DiscussionScreen()}
          {profile && screen === "askbook" && AskBookScreen()}
          {profile && screen === "recommend" && RecommendScreen()}
          {profile && screen === "avatar" && AvatarScreen()}
          {profile && screen === "schedule" && ScheduleScreen()}

          <TabBar />
          <RewardModal />
          <QuizResultModal />
          <ShopModal />

          {showCoinPopup && (
            <div style={{
              position: "fixed", top: 80, left: "50%", transform: "translateX(-50%)", zIndex: 2000,
              background: showCoinPopup.amount > 0
                ? "linear-gradient(135deg, #FFD700, #FFA500)"
                : "linear-gradient(135deg, #667eea, #764ba2)",
              borderRadius: 20,
              padding: "12px 24px", display: "flex", alignItems: "center", gap: 8,
              boxShadow: showCoinPopup.amount > 0
                ? "0 8px 24px rgba(255,165,0,0.4)"
                : "0 8px 24px rgba(102,126,234,0.4)",
              animation: "pop 0.3s ease",
              color: "white", fontWeight: 700, fontSize: 14
            }}>
              <img src={PNG_ICONS.coin} style={{ width: 24, height: 24 }} />
              {showCoinPopup.amount > 0 ? "+" : ""}{showCoinPopup.amount} 코인 {showCoinPopup.label}
            </div>
          )}

          {saveErrorMsg && (
            <div style={{
              position: "fixed", top: 80, left: "50%", transform: "translateX(-50%)", zIndex: 2000,
              background: "linear-gradient(135deg, #FF5252, #D32F2F)", borderRadius: 20,
              padding: "12px 24px", display: "flex", alignItems: "center", gap: 8,
              boxShadow: "0 8px 24px rgba(211,47,47,0.4)", animation: "pop 0.3s ease",
              color: "white", fontWeight: 700, fontSize: 13
            }}>
              {saveErrorMsg}
            </div>
          )}

          {showInstallBanner && (
            <div style={{
              position: "fixed", bottom: 70, left: 12, right: 12, zIndex: 200,
              background: "linear-gradient(135deg, #667eea, #764ba2)", borderRadius: 20,
              padding: "16px 18px", display: "flex", alignItems: "center", gap: 14,
              boxShadow: "0 8px 32px rgba(102,126,234,0.4)", animation: "pop 0.4s ease"
            }}>
              <img src="icons/app-icon-192.png" style={{ width: 52, height: 52, borderRadius: 14, flexShrink: 0, boxShadow: "0 2px 8px rgba(0,0,0,0.2)" }} />
              <div style={{ flex: 1 }}>
                <div style={{ color: "white", fontSize: 14, fontWeight: 800 }}>BookQuest 설치하기</div>
                <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 11, marginTop: 2 }}>홈 화면에 추가하면 더 빠르게!</div>
              </div>
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                <button onClick={() => { setShowInstallBanner(false); localStorage.setItem("bq_install_dismissed", "1"); }}
                  style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 12, padding: "8px 12px", color: "white", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                  닫기
                </button>
                <button onClick={async () => {
                  if (installPrompt) {
                    installPrompt.prompt();
                    const result = await installPrompt.userChoice;
                    if (result.outcome === "accepted") setShowInstallBanner(false);
                    setInstallPrompt(null);
                  }
                }}
                  style={{ background: "white", border: "none", borderRadius: 12, padding: "8px 16px", color: "#667eea", fontSize: 12, fontWeight: 800, cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
                  설치
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BookQuest />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
