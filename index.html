        try {
          const res = await fetch(ASKBOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, bookData, chatHistory })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          return data.answer;
        } catch (e) {
          console.error("askBook 실패:", e);
          return "죄송해요, 지금 답변을 할 수 없어요. 잠시 후 다시 시도해주세요! 🙏";

      },

        try {
          const res = await fetch(`${FUNCTIONS_BASE}/discussionCoach`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userAnswer, topic, bookTitle, bookSummary, isDeep })

          const data = await res.json();
          if (data.error) throw new Error(data.error);
          return data.feedback;

          return "좋은 생각이에요! 조금 더 깊이 생각해보면 좋겠어요. 🌟";

      },

        if (!uid) {
          uid = "user_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
          localStorage.setItem("bookquest_uid", uid);
        }
        return uid;
      },

      async saveUserData(data) {
        try {
          const uid = this.getUserId();
          await db.collection("users").doc(uid).set({
            ...data,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          console.log("✅ Firestore 저장 완료");
        } catch (e) {
          console.error("❌ Firestore 저장 실패:", e);
        }

      async loadUserData() {
        try {
          const uid = this.getUserId();
          const doc = await db.collection("users").doc(uid).get();
          if (doc.exists) {

            return doc.data();
          }
          return null;
        } catch (e) {
          console.error("❌ Firestore 로드 실패:", e);

    // 🎙️ Voice Service with Web Speech API
    // ═══════════════════════════════════════
    const VoiceService = {
      SpeechRecognition: window.SpeechRecognition || window.webkitSpeechRecognition,
      SpeechSynthesis: window.speechSynthesis,

      isSupported() {
        return !!this.SpeechRecognition && !!this.SpeechSynthesis;
      },

      createRecognizer() {
        if (!this.SpeechRecognition) return null;
        const rec = new this.SpeechRecognition();
        rec.lang = 'ko-KR';
        rec.continuous = true;
        rec.interimResults = true;
        return rec;
      },

      // TTS용 텍스트 정리 (이모지, 마크다운, 특수문자 제거)
      cleanForTTS(text) {
        return text
          // 이모지 제거
          .replace(/[\u{1F300}-\u{1FAFF}]|[\u{2600}-\u{27BF}]|[\u{FE00}-\u{FE0F}]|[\u{200D}]|[\u{20E3}]|[\u{E0020}-\u{E007F}]|✅|❌|⭐|⚡|☀|☁|☂|❤|♥|♡|★|☆/gu, '')
          // 마크다운 굵은글씨 **text** → text
          .replace(/\*\*([^*]+)\*\*/g, '$1')
          // 마크다운 기울임 *text* → text
          .replace(/\*([^*]+)\*/g, '$1')
          // 마크다운 헤더 ## text → text
          .replace(/^#+\s*/gm, '')
          // URL 제거
          .replace(/https?:\/\/[^\s]+/g, '')
          // 괄호 안 영어 약어 제거 (예: "(GDP)" → "")
          .replace(/\([A-Z]{2,}\)/g, '')
          // 연속 공백/줄바꿈 정리
          .replace(/\n+/g, '. ')
          .replace(/\s{2,}/g, ' ')
          .trim();
      },

      speak(text, callback) {
        if (!this.SpeechSynthesis) {
          if (callback) callback(false);
          return;
        }

        this.SpeechSynthesis.cancel();
        const cleanText = this.cleanForTTS(text);
        if (!cleanText) { if (callback) callback(true); return; }

        // 문장 단위로 분리 (마침표, 물음표, 느낌표 기준)
        const sentences = cleanText.match(/[^.!?]+[.!?]?/g) || [cleanText];

        // 문장별로 순차적으로 읽기
        let idx = 0;
        const speakNext = () => {
          if (idx >= sentences.length) {
            if (callback) callback(true);
            return;
          }
          const sentence = sentences[idx].trim();
          idx++;
          if (!sentence) { speakNext(); return; }

          const utterance = new SpeechSynthesisUtterance(sentence);
          utterance.lang = 'ko-KR';
          utterance.rate = 0.95;
          utterance.pitch = 1.05;
          utterance.volume = 1;

          const voices = this.SpeechSynthesis.getVoices();
          // Google 한국어 음성 우선 선택 (더 자연스러움)
          const googleKo = voices.find(v => v.lang.startsWith('ko') && v.name.includes('Google'));
          const anyKo = voices.find(v => v.lang.startsWith('ko'));
          if (googleKo) utterance.voice = googleKo;
          else if (anyKo) utterance.voice = anyKo;

          utterance.onend = () => speakNext();
          utterance.onerror = () => speakNext();
          this.SpeechSynthesis.speak(utterance);
        };
        speakNext();
      },

      stopSpeaking() {
        if (this.SpeechSynthesis) {
          this.SpeechSynthesis.cancel();
        }
      },

      isSpeaking() {
        return this.SpeechSynthesis ? this.SpeechSynthesis.speaking : false;
      }
    };

        const topic = topics[idx];

        // Feature 2: Use avatar personality
        const avatarPersonality = AVATAR_PERSONALITIES[profile?.avatar] || AVATAR_PERSONALITIES.wizard;

        const initialMessages = [
          { role: "ai", text: avatarPersonality.greeting },
          { role: "ai", text: `📚 "${book.title}" ${deep ? "심화" : ""} 토론 ${idx + 1}번째 주제입니다!` },
          { role: "ai", text: topic.q },
          { role: "ai", text: `💡 힌트: ${topic.hint}` },
          { role: "ai", text: `${profile?.name || "친구"}의 생각을 말씀해 주세요! 🎤` }
        ];

        setChatMessages(initialMessages);
        setChatInput("");
        setShowKeyboard(false);
        setScreen("discussion");

        setTimeout(() => {
          setIsSpeaking(true);
          VoiceService.speak(topic.q, () => {
            setIsSpeaking(false);
          });
        }, 500);
      };

      const startListening = () => {
        if (!voiceSupported || isListening) return;

        // 매번 새 인식기 생성 (continuous 모드 재시작 문제 방지)
        recognizerRef.current = VoiceService.createRecognizer();
        const recognizer = recognizerRef.current;
        if (!recognizer) return;

        setIsListening(true);
        isListeningRef.current = true;
        setChatInput("");

        recognizer.onstart = () => {
          setIsListening(true);
          isListeningRef.current = true;
        };

        recognizer.onresult = (event) => {
          let finalText = "";
          let interimText = "";
          for (let i = 0; i < event.results.length; i++) {
            const result = event.results[i];
            if (result.isFinal) {
              finalText += result[0].transcript;
            } else {
              interimText += result[0].transcript;
            }
          }
          const fullText = (finalText + interimText).trim();
          if (fullText) {
            setChatInput(fullText);
          }
        };

        recognizer.onerror = (e) => {
          if (e.error !== 'no-speech') {
            setIsListening(false);
            isListeningRef.current = false;
          }
        };

        recognizer.onend = () => {
          // continuous 모드에서도 브라우저가 자동 종료할 수 있으므로 재시작
          if (isListeningRef.current) {
            try { recognizer.start(); } catch(e) {
              setIsListening(false);
              isListeningRef.current = false;
            }
          }
        };

        try {
          recognizer.start();
        } catch (e) {
          setIsListening(false);
        }
      };

      const stopListening = () => {
        setIsListening(false);
        isListeningRef.current = false;
        if (recognizerRef.current) {
          try { recognizerRef.current.stop(); } catch(e) {}
          recognizerRef.current = null;
        }
      };

      const finishVoiceInput = () => {
        stopListening();
        const text = chatInput.trim();
        if (text) {
          setTimeout(() => sendChat(text), 300);
        }
      };

      const sendChat = async (messageText = null) => {
        const text = messageText || chatInput.trim();
        if (!text) return;

        setChatInput("");
        const userMsg = text;
        const newMsgs = [...chatMessages, { role: "user", text: userMsg }];
        setChatMessages(newMsgs);

        const topics = isDeep ? activeDiscussionBook.deepTopics : activeDiscussionBook.discussionTopics;
        const topic = topics[activeDiscussionIdx];

        // 실제 Claude AI로 피드백 받기
        setIsSpeaking(true);
        const aiResponse = await CloudAPI.discussionCoach(
          userMsg, topic, activeDiscussionBook.title, activeDiscussionBook.summary, isDeep
        );
        const complimentMsg = `🌟 이 토론에서 ${isDeep ? 30 : 20}XP를 획득했어요!`;

        setChatMessages(prev => [...prev, { role: "ai", text: aiResponse }]);

        VoiceService.speak(aiResponse, () => {
          VoiceService.speak(complimentMsg, () => {
            setIsSpeaking(false);
          });
        });

        setTimeout(() => {
          setChatMessages(prev => [...prev, { role: "ai", text: complimentMsg }]);
        }, 2000);

        // Feature 3: Calculate star rating based on answer length
        const answerLength = userMsg.trim().length;
        let stars = 1;
        if (answerLength >= 20 && answerLength < 80) stars = 2;
        else if (answerLength >= 80) stars = 3;

        const key = `${activeDiscussionBook.id}-${isDeep ? "deep" : "disc"}-${activeDiscussionIdx}`;

        addXp(isDeep ? 30 : 20);

        // Add coins on first completion only

        }

        // Store discussion with stars
        setDiscussionStarState(prev => {
          const existing = prev[key] || { completed: false, stars: 0, bestStars: 0 };
          const newBestStars = Math.max(existing.bestStars || 0, stars);
          return {
            ...prev,
            [key]: { completed: true, stars, bestStars: newBestStars }
          };
        });

        setDiscussionState(prev => ({ ...prev, [key]: true }));
        const bookId = activeDiscussionBook.id;
        setBookProgress(prev => ({ ...prev, [bookId]: Math.min(100, prev[bookId] + (isDeep ? 15 : 10)) }));

              </div>
              <div style={{ fontSize: 12, color: "#888" }}>📅 {formatDate(today)}</div>
            </div>

            <div style={{ background: `linear-gradient(135deg, ${book.color}cc, ${book.color}88)`, borderRadius: 20, padding: "24px 20px", marginBottom: 16, color: "#1a1a2e" }}>

                <SvgIcon svg={BOOK_COVERS[book.id]} size={48} style={{ height: 62, width: 48, borderRadius: 6 }} />

              </div>
              <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>{book.title}</div>
              <div style={{ fontSize: 13, opacity: 0.8, marginBottom: 6 }}>{book.subtitle}</div>
              <div style={{ fontSize: 12, opacity: 0.7 }}>✍️ {book.author} | 📄 {book.pages}쪽</div>
              <div style={{ marginTop: 12, background: "rgba(255,255,255,0.4)", borderRadius: 8, height: 8, overflow: "hidden" }}>
                <div style={{ background: "white", height: "100%", width: `${bookProgress[book.id]}%`, borderRadius: 8 }} />

            <div style={{ display: "flex", gap: 4, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>

                <button key={t.key} onClick={() => setBookTab(t.key)}
                  style={{ padding: "8px 12px", borderRadius: 20, border: "none", background: bookTab === t.key ? "#667eea" : "#f0f0f0", color: bookTab === t.key ? "white" : "#666", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
                  {t.label}
                </button>
              ))}
            </div>

            {bookTab === "summary" && (
              <div>
                <div style={{ background: "white", borderRadius: 16, padding: 20, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", marginBottom: 16 }}>
                  <h4 style={{ fontSize: 15, fontWeight: 700, marginBottom: 10, color: "#1a1a2e" }}>📝 줄거리</h4>
                  <p style={{ fontSize: 14, lineHeight: 1.7, color: "#444" }}>{book.summary}</p>
                </div>
                <div style={{ background: "white", borderRadius: 16, padding: 20, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                  <h4 style={{ fontSize: 15, fontWeight: 700, marginBottom: 10, color: "#1a1a2e" }}>⭐ 핵심 포인트</h4>
                  {book.keyPoints.map((p, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8 }}>

            {bookTab === "chapters" && (
              <div>
                {book.chapters.map((ch, i) => (
                  <div key={i} style={{ background: "white", borderRadius: 14, padding: 16, marginBottom: 10, boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#1a1a2e", marginBottom: 8 }}>{ch.title}</div>
                    {ch.topics.map((t, j) => (
                      <div key={j} style={{ fontSize: 12, color: "#666", padding: "3px 0 3px 12px", borderLeft: `2px solid ${book.color}40` }}>{t}</div>

                  </div>
                ))}
              </div>
            )}
            {bookTab === "characters" && (
              <div>
                {book.characters.map((c, i) => (
                  <div key={i} style={{ background: "white", borderRadius: 14, padding: 16, marginBottom: 10, display: "flex", gap: 12, alignItems: "center", boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                    <div style={{ width: 44, height: 44, borderRadius: "50%", background: `${book.color}30`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>
                      {["👤", "🧑‍🔬", "👩", "📜"][i % 4]}

                    <div>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#1a1a2e" }}>{c.name}</div>
                      <div style={{ fontSize: 12, color: "#666", marginTop: 2 }}>{c.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {bookTab === "discuss" && (
              <div>
                <div style={{ fontSize: 13, color: "#888", marginBottom: 12 }}>🎤 주제를 선택해 음성으로 AI와 토론하세요!</div>
                {book.discussionTopics.map((t, i) => {
                  const key = `${book.id}-disc-${i}`;
                  const done = discussionState[key];
                  const starInfo = discussionStarState[key];
                  const stars = starInfo?.bestStars || 0;
                  const renderStars = (num) => {
                    const full = Math.floor(num);
                    return '⭐'.repeat(full) + '☆'.repeat(Math.max(0, 3 - full));
                  };
                  return (
                    <div key={i} onClick={() => startDiscussion(book, i, false)}
                      style={{ background: done ? "#f0fff0" : "white", borderRadius: 14, padding: 16, marginBottom: 10, cursor: "pointer", boxShadow: "0 2px 6px rgba(0,0,0,0.04)", border: done ? "2px solid #4CAF50" : "2px solid transparent" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 12, color: "#667eea", fontWeight: 600, marginBottom: 4 }}>토론 {i + 1} {done ? (stars > 0 ? renderStars(stars) : "✅") : "(+20XP)"}</div>

                        </div>

            {bookTab === "quiz" && (
              <div>
                <div style={{ fontSize: 13, color: "#888", marginBottom: 12 }}>❓ 책 내용을 바탕으로 퀴즈를 풀어보세요! (+10XP)</div>
                {book.quizzes && book.quizzes.map((quiz, i) => {
                  const key = `${book.id}-quiz-${i}`;
                  const answered = quizState[key];
                  return (
                    <div key={i} style={{ background: "white", borderRadius: 14, padding: 16, marginBottom: 10, boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#1a1a2e", flex: 1 }}>Q{i + 1}. {quiz.q}</div>
                        {answered && (answered.correct ? <span style={{ fontSize: 14 }}>✅</span> : <span style={{ fontSize: 14 }}>❌</span>)}
                      </div>
                      {quiz.type === "choice" ? (
                        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {quiz.options.map((opt, j) => (
                            <button key={j} onClick={() => {
                              const isCorrect = j === quiz.answer;
                              setQuizState(prev => ({ ...prev, [key]: { answered: true, correct: isCorrect } }));
                              if (isCorrect && !answered) {
                                setCoins(prev => prev + 3);
                                addXp(10);
                              }
                              setQuizResultInfo({ correct: isCorrect, explanation: quiz.explanation, answer: quiz.options[quiz.answer] });
                              setShowQuizResult(true);
                            }}
                              disabled={answered}
                              style={{ padding: "10px 12px", borderRadius: 10, border: "2px solid #eee", background: "white", color: "#1a1a2e", fontSize: 13, fontWeight: 500, cursor: answered ? "default" : "pointer", opacity: answered ? 0.6 : 1, transition: "all 0.2s" }}>
                              {String.fromCharCode(65 + j)}. {opt}
                            </button>
                          ))}
                        </div>
                      ) : (
                        <div style={{ display: "flex", gap: 8 }}>
                          {[true, false].map(ans => (
                            <button key={ans} onClick={() => {
                              const isCorrect = ans === quiz.answer;
                              setQuizState(prev => ({ ...prev, [key]: { answered: true, correct: isCorrect } }));
                              if (isCorrect && !answered) {
                                setCoins(prev => prev + 3);
                                addXp(10);
                              }
                              setQuizResultInfo({ correct: isCorrect, explanation: quiz.explanation, answer: quiz.answer ? "맞음" : "틀림" });
                              setShowQuizResult(true);
                            }}
                              disabled={answered}
                              style={{ flex: 1, padding: "10px 12px", borderRadius: 10, border: "2px solid #eee", background: "white", color: "#1a1a2e", fontSize: 13, fontWeight: 500, cursor: answered ? "default" : "pointer", opacity: answered ? 0.6 : 1, transition: "all 0.2s" }}>

                  const key = `${book.id}-deep-${i}`;
                  const done = discussionState[key];
                  const starInfo = discussionStarState[key];
                  const stars = starInfo?.bestStars || 0;
                  const renderStars = (num) => {
                    const full = Math.floor(num);
                    return '⭐'.repeat(full) + '☆'.repeat(Math.max(0, 3 - full));

                  return (
                    <div key={i} onClick={() => startDiscussion(book, i, true)}
                      style={{ background: done ? "#fff8e1" : "white", borderRadius: 14, padding: 16, marginBottom: 10, cursor: "pointer", boxShadow: "0 2px 6px rgba(0,0,0,0.04)", border: done ? "2px solid #FFB300" : "2px solid transparent" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 12, color: "#FF6F00", fontWeight: 600, marginBottom: 4 }}>심화 {i + 1} {done ? (stars > 0 ? renderStars(stars) : "✅") : "(+30XP)"}</div>

                        </div>

                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 💬 Discussion Screen with Voice
      // ═══════════════════════════════════════
      const DiscussionScreen = () => (
        <div style={{ display: "flex", flexDirection: "column", height: "100vh", maxHeight: "100vh" }}>
          <div style={{ background: isDeep ? "linear-gradient(135deg, #FF6F00, #FFB300)" : "linear-gradient(135deg, #667eea, #764ba2)", padding: "16px 20px", color: "white", flexShrink: 0 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div onClick={() => setScreen("book")} style={{ cursor: "pointer", fontSize: 13, opacity: 0.8 }}>← 돌아가기</div>
              <div style={{ fontSize: 11, opacity: 0.7 }}>📅 {formatDate(today)}</div>
            </div>
            <div style={{ fontSize: 16, fontWeight: 700, marginTop: 4 }}>{activeDiscussionBook?.title}</div>
            <div style={{ fontSize: 12, opacity: 0.8 }}>{isDeep ? "🔥 심화" : "💬"} 토론 {activeDiscussionIdx + 1}</div>
          </div>

          <div style={{ flex: 1, overflowY: "auto", padding: 16, background: "#f7f7fa", display: "flex", flexDirection: "column" }}>

              <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
                <div style={{
                  maxWidth: "80%", padding: "10px 14px",
                  borderRadius: msg.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",

                  {msg.text}
                </div>
              </div>
            ))}
            {isSpeaking && <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <span style={{ fontSize: 20 }}>🔊</span>
              <span style={{ fontSize: 12, color: "#666", fontStyle: "italic" }}>AI가 말하는 중...</span>
            </div>}
            <div ref={chatEndRef} />
          </div>

          <div style={{ padding: "16px", background: "white", borderTop: "1px solid #eee", flexShrink: 0, display: "flex", flexDirection: "column", gap: 10 }}>
            {!showKeyboard ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {isListening && chatInput && (
                  <div style={{
                    padding: "10px 14px", borderRadius: 12, background: "#f0f3ff",
                    border: "2px solid #667eea", fontSize: 13, color: "#333",
                    lineHeight: 1.6, minHeight: 40, maxHeight: 120, overflowY: "auto"
                  }}>
                    <span style={{ fontSize: 11, color: "#667eea", fontWeight: 600 }}>내가 말한 내용:</span>
                    <div style={{ marginTop: 4 }}>{chatInput}</div>
                  </div>
                )}
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  {!isListening ? (
                    <button onClick={startListening} disabled={!voiceSupported}
                      style={{
                        flex: 1, padding: "16px", borderRadius: 20, border: "none",
                        background: "#667eea",
                        color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer",
                        display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                        opacity: voiceSupported ? 1 : 0.5
                      }}>
                      <span style={{ fontSize: 20 }}>🎤</span>
                      말하기
                    </button>
                  ) : (
                    <button onClick={finishVoiceInput}
                      style={{
                        flex: 1, padding: "16px", borderRadius: 20, border: "none",
                        background: "#ff6b6b",
                        color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer",
                        display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
                        animation: "pulse 1.5s infinite"
                      }}>
                      <span style={{ fontSize: 20 }}>✅</span>
                      말하기 완료
                    </button>

                  <button onClick={() => { stopListening(); setShowKeyboard(true); }}
                    style={{
                      padding: "14px 16px", borderRadius: 20, border: "2px solid #eee",
                      background: "white", color: "#666", fontSize: 12, fontWeight: 600,

                    ⌨️
                  </button>
                </div>

              <div style={{ display: "flex", gap: 8 }}>
                <input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendChat()}

                  style={{ flex: 1, padding: "10px 14px", borderRadius: 20, border: "2px solid #eee", fontSize: 13, outline: "none" }} />

                  style={{
                    padding: "10px 16px", borderRadius: 20, border: "none", background: "#f0f0f0",
                    color: "#666", fontSize: 12, fontWeight: 600, cursor: "pointer"

                  🎤
                </button>
                <button onClick={sendChat}
                  style={{ padding: "10px 18px", borderRadius: 20, border: "none", background: "#667eea", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                  전송
                </button>
              </div>
            )}
            {!voiceSupported && <div style={{ fontSize: 11, color: "#ff6b6b", textAlign: "center" }}>
              🔊 이 브라우저에서는 음성 기능이 지원되지 않습니다. 텍스트로 이용해주세요.
            </div>}
          </div>
        </div>
      );

      // ═══════════════════════════════════════
      // 👤 Profile / Avatar Screen

              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><img src={PNG_ICONS.shop_chest} style={{ width: 18, height: 18 }} /> 상점 ({coins}코인)</span>
            </button>

            <div style={{ fontSize: 13, color: "#444", lineHeight: 2.2 }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#888" }}>이름</span><span style={{ fontWeight: 600 }}>{profile?.name}</span></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#888" }}>학교</span><span style={{ fontWeight: 600 }}>{profile?.school || "미입력"}</span></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#888" }}>학년</span><span style={{ fontWeight: 600 }}>{profile?.grade}학년</span></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#888" }}>가입일</span><span style={{ fontWeight: 600 }}>{profile?.createdAt ? new Date(profile.createdAt).toLocaleDateString("ko-KR") : "-"}</span></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "#888" }}>현재 주차</span><span style={{ fontWeight: 600 }}>{currentWeek}주차 / 3주차</span></div>
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
            {[
              { label: "총 XP", value: xp, icon: PNG_ICONS.stat_xp },
              { label: "레벨", value: level, icon: PNG_ICONS.stat_level },
              { label: "연속", value: `${streak}일`, icon: PNG_ICONS.stat_streak }
            ].map((s, i) => (
              <div key={i} style={{ background: "white", borderRadius: 14, padding: "14px 10px", textAlign: "center", boxShadow: "0 2px 6px rgba(0,0,0,0.06)" }}>
                <div><img src={s.icon} style={{ width: 32, height: 32, objectFit: "contain" }} /></div>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#1a1a2e", marginTop: 2 }}>{s.value}</div>
                <div style={{ fontSize: 10, color: "#888" }}>{s.label}</div>
              </div>
            ))}
          </div>

          <div style={{ background: "white", borderRadius: 16, padding: 20, boxShadow: "0 2px 8px rgba(0,0,0,0.06)", marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 8 }}>
              <span style={{ fontWeight: 600 }}>경험치</span>
              <span style={{ color: "#888" }}>{xp % 100}/100 XP</span>
            </div>
            <div style={{ background: "#eee", borderRadius: 10, height: 14, overflow: "hidden" }}>
              <div style={{ background: "linear-gradient(90deg, #667eea, #764ba2)", height: "100%", width: `${xp % 100}%`, borderRadius: 10, transition: "width 0.5s" }} />
            </div>
          </div>

          <div style={{ background: "white", borderRadius: 16, padding: 20, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
            <h4 style={{ fontSize: 15, fontWeight: 700, marginBottom: 12, display: "flex", alignItems: "center", gap: 6 }}><img src={PNG_ICONS.stat_trophy} style={{ width: 20, height: 20 }} /> 업적</h4>
            <div style={{ fontSize: 13, color: "#444", lineHeight: 2 }}>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><img src={PNG_ICONS.activity_reading} style={{ width: 16, height: 16 }} /> 완독한 책: {Object.values(bookProgress).filter(v => v === 100).length}권 / 3권</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><img src={PNG_ICONS.ui_speech} style={{ width: 16, height: 16 }} /> 완료한 토론: {Object.keys(discussionState).filter(k => !k.includes("deep")).length}개 / 15개</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><img src={PNG_ICONS.stat_streak} style={{ width: 16, height: 16 }} /> 완료한 심화: {Object.keys(discussionState).filter(k => k.includes("deep")).length}개 / 9개</span>
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}><img src={PNG_ICONS.stat_trophy} style={{ width: 16, height: 16 }} /> 획득한 배지: {earnedBadges.length}개 / {BADGES.length}개</span>
            </div>
          </div>

          <button onClick={() => setProfile(null)}
            style={{ width: "100%", marginTop: 16, padding: "12px", borderRadius: 12, border: "2px solid #eee", background: "white", color: "#888", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
            ✏️ 프로필 수정
          </button>
        </div>
      );

      // ═══════════════════════════════════════
      // 📅 Schedule Screen
      // ═══════════════════════════════════════
      const ScheduleScreen = () => {
        const days = ["월", "화", "수", "목", "금", "토", "일"];
        const cwBook = thisWeekBook;
        const schedule = [
          { day: "월", task: "📖 주요 내용 읽기", book: cwBook },
          { day: "화", task: "💬 토론 1~2", book: cwBook },
          { day: "수", task: "💬 토론 3~5", book: cwBook },
          { day: "목", task: "🔥 심화 토론", book: cwBook },
          { day: "금", task: "📝 정리 & 클리어", book: cwBook },
          { day: "토", task: "🎮 자유 독서", book: null },
          { day: "일", task: "📅 다음 주 준비", book: null }
        ];
        const todayIdx = today.getDay() === 0 ? 6 : today.getDay() - 1;

        return (
          <div style={{ padding: "0 16px 100px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ fontSize: 18, fontWeight: 800, color: "#1a1a2e" }}>📅 {currentWeek}주차 스케줄</h3>
              <div style={{ fontSize: 12, color: "#888" }}>{formatDate(today)}</div>
            </div>

            <div style={{ background: "linear-gradient(135deg, #667eea15, #764ba215)", borderRadius: 14, padding: 14, marginBottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
              <SvgIcon svg={BOOK_COVERS[cwBook.id]} size={36} style={{ height: 46, width: 36, borderRadius: 4 }} />
              <div>
                <div style={{ fontSize: 12, color: "#667eea", fontWeight: 600 }}>{currentWeek}주차 퀘스트</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#1a1a2e" }}>{cwBook.title}</div>
                <div style={{ fontSize: 11, color: "#888" }}>
                  {weekRange.start.getMonth() + 1}/{weekRange.start.getDate()} ~ {weekRange.end.getMonth() + 1}/{weekRange.end.getDate()}
                </div>
              </div>
            </div>

            <div style={{ background: "white", borderRadius: 16, overflow: "hidden", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", marginBottom: 24 }}>
              {schedule.map((s, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 14, padding: "14px 16px",
                  borderBottom: i < 6 ? "1px solid #f0f0f0" : "none",
                  background: i === todayIdx ? "#667eea08" : "transparent"
                }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: "50%",
                    background: i === todayIdx ? "#667eea" : i < todayIdx ? "#4CAF5020" : "#f0f0f0",
                    color: i === todayIdx ? "white" : i < todayIdx ? "#4CAF50" : "#666",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 13, fontWeight: 700, flexShrink: 0
                  }}>
                    {i < todayIdx ? "✓" : s.day}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: i === todayIdx ? 700 : 500, color: "#1a1a2e" }}>{s.task}</div>
                    {s.book && <div style={{ fontSize: 11, color: "#888" }}>{s.book.title}</div>}
                  </div>
                  {i === todayIdx && <span style={{ fontSize: 11, color: "#667eea", fontWeight: 700, background: "#667eea15", padding: "3px 8px", borderRadius: 8 }}>오늘</span>}
                </div>
              ))}
            </div>

            <h3 style={{ fontSize: 16, fontWeight: 700, color: "#1a1a2e", marginBottom: 12 }}>🗓️ 3주 전체 일정</h3>
            {BOOKS.map(book => {
              const wr = getWeekRange(startDate, book.week);
              const isCurrent = book.week === currentWeek;
              const isPast = book.week < currentWeek;
              return (
                <div key={book.id} style={{
                  background: isCurrent ? `${book.color}15` : "white",
                  borderRadius: 14, padding: 14, marginBottom: 10,
                  border: isCurrent ? `2px solid ${book.color}60` : "2px solid transparent",
                  boxShadow: "0 2px 6px rgba(0,0,0,0.04)"
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <SvgIcon svg={BOOK_COVERS[book.id]} size={30} style={{ height: 38, width: 30, borderRadius: 4 }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: isCurrent ? book.color : "#888" }}>{book.week}주차</span>
                        {isCurrent && <span style={{ fontSize: 10, background: book.color, color: "white", padding: "1px 6px", borderRadius: 6 }}>진행 중</span>}
                        {isPast && <span style={{ fontSize: 10, color: "#4CAF50" }}>✅</span>}
                      </div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#1a1a2e" }}>{book.title}</div>
                      <div style={{ fontSize: 11, color: "#888" }}>
                        {wr.start.getMonth() + 1}/{wr.start.getDate()} ({getDayName(wr.start)}) ~ {wr.end.getMonth() + 1}/{wr.end.getDate()} ({getDayName(wr.end)})
                      </div>
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: book.color }}>{bookProgress[book.id]}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      // ═══════════════════════════════════════
      // ═══════════════════════════════════════
      // 💡 책에게 물어보기 화면
      // ═══════════════════════════════════════
      const AskBookScreen = () => {
        // 읽은 책 데이터를 문자열로 변환
        const getBookDataString = () => {
          const completedBooks = BOOKS.filter(b => {
            const progress = bookProgress[b.id] || 0;
            return progress > 0;
          });
          if (completedBooks.length === 0) return "아직 읽은 책이 없습니다.";
          return completedBooks.map(b =>
            `📖 "${b.title}" (${b.author})\n요약: ${b.summary}\n핵심포인트: ${b.keyPoints.join(", ")}\n챕터: ${b.chapters.map(c => c.title).join(", ")}`
          ).join("\n\n");
        };

        const sendAskMessage = async (messageText = null) => {
          const text = messageText || askInput.trim();
          if (!text || askLoading) return;
          setAskInput("");
          setAskMessages(prev => [...prev, { role: "user", text }]);
          setAskLoading(true);

          const answer = await CloudAPI.askBook(text, getBookDataString(), askMessages.slice(-6));
          setAskMessages(prev => [...prev, { role: "ai", text: answer }]);
          setAskLoading(false);

          VoiceService.speak(answer, () => {});
        };

        const startAskListening = () => {
          if (!voiceSupported || askListening) return;
          askRecRef.current = VoiceService.createRecognizer();
          const rec = askRecRef.current;
          if (!rec) return;
          setAskListening(true);
          askListeningRef.current = true;
          setAskInput("");

          rec.onresult = (event) => {
            let finalText = "", interimText = "";
            for (let i = 0; i < event.results.length; i++) {
              if (event.results[i].isFinal) finalText += event.results[i][0].transcript;
              else interimText += event.results[i][0].transcript;
            }
            const full = (finalText + interimText).trim();
            if (full) setAskInput(full);
          };
          rec.onerror = (e) => { if (e.error !== 'no-speech') { setAskListening(false); askListeningRef.current = false; } };
          rec.onend = () => { if (askListeningRef.current) { try { rec.start(); } catch(e) { setAskListening(false); askListeningRef.current = false; } } };
          try { rec.start(); } catch(e) { setAskListening(false); askListeningRef.current = false; }
        };

        const finishAskListening = () => {
          setAskListening(false);
          askListeningRef.current = false;
          if (askRecRef.current) { try { askRecRef.current.stop(); } catch(e) {} askRecRef.current = null; }
          const text = askInput.trim();
          if (text) setTimeout(() => sendAskMessage(text), 300);
        };

        return (
          <div style={{ display: "flex", flexDirection: "column", height: "100vh", paddingBottom: 70 }}>
            <div style={{ padding: "16px 20px", background: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)", color: "white", flexShrink: 0 }}>
              <div style={{ fontSize: 20, fontWeight: 800 }}>💡 책에게 물어보기</div>
              <div style={{ fontSize: 12, opacity: 0.9, marginTop: 4 }}>읽은 책 내용을 바탕으로 궁금한 걸 물어봐!</div>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: 16, background: "#f7f7fa", display: "flex", flexDirection: "column" }}>
              {askMessages.map((msg, i) => (
                <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 10 }}>
                  <div style={{
                    maxWidth: "80%", padding: "10px 14px",
                    borderRadius: msg.role === "user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                    background: msg.role === "user" ? "#f5576c" : "white",
                    color: msg.role === "user" ? "white" : "#333",
                    fontSize: 13, lineHeight: 1.6, boxShadow: "0 1px 4px rgba(0,0,0,0.06)"
                  }}>
                    {msg.role === "ai" && <span style={{ fontSize: 11, color: "#f5576c", fontWeight: 600, display: "block", marginBottom: 2 }}>📚 책 도우미</span>}
                    {msg.text}
                  </div>
                </div>
              ))}
              {askLoading && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <span style={{ fontSize: 20 }}>🤔</span>
                  <span style={{ fontSize: 12, color: "#666", fontStyle: "italic" }}>책을 찾아보는 중...</span>
                </div>
              )}
              <div ref={askEndRef} />
            </div>

            <div style={{ padding: 16, background: "white", borderTop: "1px solid #eee", flexShrink: 0 }}>
              {askListening && askInput && (
                <div style={{ padding: "8px 12px", marginBottom: 8, borderRadius: 12, background: "#fff0f3", border: "2px solid #f5576c", fontSize: 13, maxHeight: 80, overflowY: "auto" }}>
                  <span style={{ fontSize: 11, color: "#f5576c", fontWeight: 600 }}>내 질문:</span>
                  <div style={{ marginTop: 2 }}>{askInput}</div>
                </div>
              )}
              <div style={{ display: "flex", gap: 8 }}>
                {!askListening ? (
                  <button onClick={startAskListening} disabled={askLoading}
                    style={{ flex: 1, padding: 14, borderRadius: 20, border: "none", background: "#f5576c", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, opacity: askLoading ? 0.5 : 1 }}>
                    <span>🎤</span> 질문하기
                  </button>
                ) : (
                  <button onClick={finishAskListening}
                    style={{ flex: 1, padding: 14, borderRadius: 20, border: "none", background: "#ff6b6b", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, animation: "pulse 1.5s infinite" }}>
                    <span>✅</span> 질문 완료
                  </button>
                )}
                <input value={askInput} onChange={e => setAskInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && sendAskMessage()}
                  placeholder="타이핑으로 질문..."
                  disabled={askLoading}
                  style={{ flex: 1, padding: "10px 14px", borderRadius: 20, border: "2px solid #eee", fontSize: 13 }} />
                <button onClick={() => sendAskMessage()} disabled={askLoading || !askInput.trim()}
                  style={{ padding: "10px 16px", borderRadius: 20, border: "none", background: "#f5576c", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer", opacity: askLoading || !askInput.trim() ? 0.5 : 1 }}>
                  전송
                </button>
              </div>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 📖 도서 추천 화면
      // ═══════════════════════════════════════
      const RecommendScreen = () => {
        const getReadBooks = () => {
          return BOOKS.filter(b => (bookProgress[b.id] || 0) > 0).map(b => ({
            title: b.title,
            summary: b.summary,
            keywords: b.keyPoints.slice(0, 3)
          }));
        };

        const loadRecommendations = async () => {
          const readBooks = getReadBooks();
          if (readBooks.length === 0) return;
          setRecLoading(true);
          const recs = await CloudAPI.recommendBooks(readBooks);
          setRecommendations(recs);
          setRecLoading(false);
          setRecLoaded(true);
        };

        const readBooks = getReadBooks();

        return (
          <div style={{ padding: "0 20px 90px", maxWidth: 430 }}>
            <div style={{ padding: "16px 0 12px", marginBottom: 12 }}>
              <div style={{ fontSize: 22, fontWeight: 900, color: "#1a1a2e" }}>📖 추천 도서</div>
              <div style={{ fontSize: 13, color: "#888", marginTop: 4 }}>읽은 책을 바탕으로 다음에 읽으면 좋을 책을 추천해줘요!</div>
            </div>

            {readBooks.length === 0 ? (
              <div style={{ textAlign: "center", padding: 40, background: "white", borderRadius: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📚</div>
                <div style={{ fontSize: 16, fontWeight: 700, color: "#333", marginBottom: 8 }}>아직 읽은 책이 없어요</div>
                <div style={{ fontSize: 13, color: "#888" }}>책을 읽고 토론을 시작하면 맞춤 추천을 받을 수 있어요!</div>
              </div>
            ) : recLoading ? (
              <div style={{ textAlign: "center", padding: 40, background: "white", borderRadius: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                <div style={{ fontSize: 48, marginBottom: 12, animation: "pop 0.8s ease infinite alternate" }}>🔍</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#333" }}>도서관에서 책을 찾는 중...</div>
                <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>잠시만 기다려주세요!</div>
              </div>
            ) : recommendations.length > 0 ? (
              <div>
                <div style={{ fontSize: 13, color: "#667eea", fontWeight: 600, marginBottom: 12 }}>
                  📚 {readBooks.length}권의 책을 분석해서 추천해요!
                </div>
                {recommendations.map((book, i) => (
                  <div key={i} style={{
                    background: "white", borderRadius: 16, padding: 16, marginBottom: 12,
                    boxShadow: "0 2px 8px rgba(0,0,0,0.06)", display: "flex", gap: 12
                  }}>
                    {book.cover ? (
                      <img src={book.cover} alt={book.title}
                        style={{ width: 70, height: 100, borderRadius: 8, objectFit: "cover", flexShrink: 0 }} />
                    ) : (
                      <div style={{ width: 70, height: 100, borderRadius: 8, background: "linear-gradient(135deg, #667eea, #764ba2)", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <span style={{ fontSize: 28 }}>📕</span>
                      </div>
                    )}
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#1a1a2e", marginBottom: 4 }}>{book.title}</div>
                      <div style={{ fontSize: 11, color: "#888", marginBottom: 6 }}>{book.author}</div>
                      <div style={{ fontSize: 12, color: "#667eea", fontWeight: 600, background: "#f0f3ff", padding: "6px 10px", borderRadius: 8, lineHeight: 1.5 }}>
                        💡 {book.reason}
                      </div>
                      {book.link && (
                        <a href={book.link} target="_blank" rel="noopener noreferrer"
                          style={{ fontSize: 11, color: "#f5576c", fontWeight: 600, marginTop: 6, display: "inline-block", textDecoration: "none" }}>
                          알라딘에서 보기 →
                        </a>
                      )}
                    </div>
                  </div>
                ))}
                <button onClick={loadRecommendations}
                  style={{ width: "100%", padding: 14, borderRadius: 16, border: "none", background: "linear-gradient(135deg, #667eea, #764ba2)", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 8 }}>
                  🔄 다른 책 추천받기
                </button>
              </div>
            ) : recLoaded ? (
              <div style={{ textAlign: "center", padding: 40, background: "white", borderRadius: 16 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>😅</div>
                <div style={{ fontSize: 14, fontWeight: 600 }}>추천을 가져오지 못했어요</div>
                <button onClick={loadRecommendations}
                  style={{ marginTop: 12, padding: "10px 24px", borderRadius: 16, border: "none", background: "#667eea", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                  다시 시도
                </button>
              </div>
            ) : null}
          </div>
        );
      };

      // ═══════════════════════════════════════
      // ❓ Quiz Result Modal
      // ═══════════════════════════════════════
      const QuizResultModal = () => {
        if (!showQuizResult || !quizResultInfo) return null;
        const { correct, explanation, answer } = quizResultInfo;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}
            onClick={() => setShowQuizResult(false)}>
            <div style={{ background: "white", borderRadius: 24, padding: "32px 24px", textAlign: "center", maxWidth: 320, width: "90%", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <img src={correct ? PNG_ICONS.quiz_correct : PNG_ICONS.quiz_wrong} style={{ width: 100, height: 100, marginBottom: 12 }} />
              <div style={{ fontSize: 20, fontWeight: 800, color: "#1a1a2e", marginBottom: 8 }}>{correct ? "정답!" : "틀렸어요"}</div>
              <div style={{ fontSize: 14, color: "#666", marginBottom: 16, lineHeight: 1.6 }}>{explanation}</div>
              {!correct && <div style={{ fontSize: 13, color: "#888", marginBottom: 12 }}>정답: {answer}</div>}
              {correct && <div style={{ fontSize: 13, color: "#4CAF50", fontWeight: 600, marginBottom: 12 }}>+10XP, +3코인!</div>}
              <button onClick={() => setShowQuizResult(false)}
                style={{ padding: "12px 32px", borderRadius: 20, border: "none", background: "#667eea", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                확인
              </button>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🛍️ Shop Modal
      // ═══════════════════════════════════════
      const ShopModal = () => {
        if (!showShop) return null;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", zIndex: 1000 }}
            onClick={() => setShowShop(false)}>
            <div style={{ background: "white", borderRadius: "24px 24px 0 0", padding: "20px", maxHeight: "90vh", width: "100%", overflowY: "auto", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h3 style={{ fontSize: 18, fontWeight: 800, color: "#1a1a2e" }}>🛍️ 아바타 상점</h3>
                <button onClick={() => setShowShop(false)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer" }}>✕</button>
              </div>
              <div style={{ display: "flex", gap: 4, marginBottom: 16, fontSize: 13, fontWeight: 600, color: "#888", paddingBottom: 8, borderBottom: "1px solid #eee" }}>
                <span style={{ display: "flex", alignItems: "center", gap: 4 }}><img src={PNG_ICONS.coin} style={{ width: 18, height: 18 }} /> {coins} 코인</span>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10 }}>
                {SHOP_ITEMS.map(item => {
                  const owned = ownedItems.includes(item.id);
                  const equipped = equippedItem === item.id;
                  return (
                    <div key={item.id} style={{ background: "#f7f7fa", borderRadius: 14, padding: 14, textAlign: "center", border: equipped ? "2px solid #667eea" : "1px solid #eee" }}>
                      <div style={{ marginBottom: 8 }}>{item.icon ? <img src={item.icon} style={{ width: 56, height: 56, objectFit: "contain" }} /> : <span style={{ fontSize: 40 }}>{item.emoji}</span>}</div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#1a1a2e", marginBottom: 2 }}>{item.name}</div>
                      <div style={{ fontSize: 12, color: "#888", marginBottom: 10 }}>{item.price} 코인</div>
                      {!owned ? (
                        <button onClick={() => {
                          if (coins >= item.price) {
                            setCoins(prev => prev - item.price);
                            setOwnedItems(prev => [...prev, item.id]);
                            setEquippedItem(item.id);
                          }
                        }}
                          disabled={coins < item.price}
                          style={{ width: "100%", padding: "8px 12px", borderRadius: 10, border: "none", background: coins >= item.price ? "#667eea" : "#ddd", color: "white", fontSize: 12, fontWeight: 600, cursor: coins >= item.price ? "pointer" : "default" }}>
                          구매
                        </button>
                      ) : equipped ? (
                        <button style={{ width: "100%", padding: "8px 12px", borderRadius: 10, border: "none", background: "#667eea", color: "white", fontSize: 12, fontWeight: 600, cursor: "default" }}>
                          장착 중
                        </button>
                      ) : (
                        <button onClick={() => setEquippedItem(item.id)}
                          style={{ width: "100%", padding: "8px 12px", borderRadius: 10, border: "2px solid #667eea", background: "white", color: "#667eea", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                          장착
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🎁 Reward Modal
      // ═══════════════════════════════════════
      const RewardModal = () => {
        if (!showReward || !rewardInfo) return null;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}
            onClick={() => setShowReward(false)}>
            <div style={{ background: "white", borderRadius: 24, padding: "32px 24px", textAlign: "center", maxWidth: 300, width: "90%", animation: "pop 0.3s ease" }}
              onClick={e => e.stopPropagation()}>
              <img src={PNG_ICONS.level_up} style={{ width: "100%", borderRadius: 16, marginBottom: 12 }} />
              <div style={{ fontSize: 20, fontWeight: 800, color: "#1a1a2e", marginBottom: 8 }}>레벨 업!</div>
              <div style={{ fontSize: 40, fontWeight: 800, color: "#667eea", marginBottom: 8 }}>Lv.{rewardInfo.level}</div>
              <div style={{ fontSize: 16, color: "#444", marginBottom: 16 }}>새로운 칭호: <b style={{ color: "#FFB300" }}>{rewardInfo.title}</b></div>
              <button onClick={() => setShowReward(false)}
                style={{ padding: "12px 32px", borderRadius: 20, border: "none", background: "#667eea", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                좋아요! 🎮
              </button>
            </div>
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🔽 Bottom Tab Bar
      // ═══════════════════════════════════════
      const TabBar = () => {
        if (screen === "discussion" || !profile) return null;
        const tabs = [
          { key: "home", svg: PNG_ICONS.tab_home, label: "홈" },
          { key: "askbook", svg: PNG_ICONS.tab_ask, label: "질문" },
          { key: "recommend", svg: PNG_ICONS.tab_recommend, label: "추천" },
          { key: "avatar", svg: PNG_ICONS.tab_profile, label: "프로필" },
          { key: "schedule", svg: PNG_ICONS.tab_schedule, label: "스케줄" }
        ];
        const isActive = (key) => screen === key || (screen === "book" && key === "home");
        return (
          <div style={{
            position: "fixed", bottom: 0, left: 0, right: 0,
            background: "rgba(255,255,255,0.95)", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)",
            borderTop: "1px solid rgba(0,0,0,0.06)",
            display: "flex", justifyContent: "space-around", padding: "6px 0 env(safe-area-inset-bottom, 6px)", zIndex: 100
          }}>
            {tabs.map(t => (
              <button key={t.key} onClick={() => setScreen(t.key)}
                style={{
                  background: "none", border: "none", padding: "6px 16px",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                  cursor: "pointer", transition: "all 0.2s"
                }}>
                <div style={{
                  width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center",
                  background: isActive(t.key) ? "#667eea15" : "transparent",
                  borderRadius: 10, padding: 2, transition: "all 0.2s",
                  opacity: isActive(t.key) ? 1 : 0.5
                }}>
                  <img src={t.svg} style={{ width: 24, height: 24, objectFit: "contain" }} />
                </div>
                <span style={{
                  fontSize: 10, fontWeight: isActive(t.key) ? 700 : 500,
                  color: isActive(t.key) ? "#667eea" : "#999",
                  transition: "all 0.2s"
                }}>{t.label}</span>
              </button>
            ))}
          </div>
        );
      };

      // ═══════════════════════════════════════
      // 🎨 Main Render
      // ═══════════════════════════════════════
      // 🔄 Firestore 로딩 중 화면
      if (!dataLoaded) {
        return (
          <div style={{ maxWidth: 430, margin: "0 auto", background: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "'Noto Sans KR', -apple-system, sans-serif" }}>
            <img src="icons/app-icon-192.png" style={{ width: 80, height: 80, borderRadius: 20, marginBottom: 20, animation: "pop 0.8s ease infinite alternate", boxShadow: "0 4px 20px rgba(0,0,0,0.3)" }} />
            <div style={{ color: "white", fontSize: 24, fontWeight: 800, marginBottom: 8 }}>BookQuest</div>
            <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 14 }}>데이터 불러오는 중...</div>
          </div>
        );
      }

      return (
        <div style={{ maxWidth: 430, margin: "0 auto", background: "#f7f7fa", minHeight: "100vh", fontFamily: "'Noto Sans KR', -apple-system, sans-serif", paddingTop: profile ? 16 : 0, position: "relative" }}>
          {!profile && ProfileSetupScreen()}
          {profile && screen === "home" && HomeScreen()}
          {profile && screen === "book" && BookScreen()}
          {profile && screen === "discussion" && DiscussionScreen()}
          {profile && screen === "askbook" && AskBookScreen()}
          {profile && screen === "recommend" && RecommendScreen()}
          {profile && screen === "avatar" && AvatarScreen()}
          {profile && screen === "schedule" && ScheduleScreen()}

          <TabBar />
          <RewardModal />
          <QuizResultModal />
          <ShopModal />

          {showInstallBanner && (
            <div style={{
              position: "fixed", bottom: 70, left: 12, right: 12, zIndex: 200,
              background: "linear-gradient(135deg, #667eea, #764ba2)", borderRadius: 20,
              padding: "16px 18px", display: "flex", alignItems: "center", gap: 14,
              boxShadow: "0 8px 32px rgba(102,126,234,0.4)", animation: "pop 0.4s ease"
            }}>
              <img src="icons/app-icon-192.png" style={{ width: 52, height: 52, borderRadius: 14, flexShrink: 0, boxShadow: "0 2px 8px rgba(0,0,0,0.2)" }} />
              <div style={{ flex: 1 }}>
                <div style={{ color: "white", fontSize: 14, fontWeight: 800 }}>BookQuest 설치하기</div>
                <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 11, marginTop: 2 }}>홈 화면에 추가하면 더 빠르게!</div>
              </div>
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                <button onClick={() => { setShowInstallBanner(false); localStorage.setItem("bq_install_dismissed", "1"); }}
                  style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 12, padding: "8px 12px", color: "white", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                  닫기
                </button>
                <button onClick={async () => {
                  if (installPrompt) {
                    installPrompt.prompt();
                    const result = await installPrompt.userChoice;
                    if (result.outcome === "accepted") setShowInstallBanner(false);
                    setInstallPrompt(null);
                  }
                }}
                  style={{ background: "white", border: "none", borderRadius: 12, padding: "8px 16px", color: "#667eea", fontSize: 12, fontWeight: 800, cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.1)" }}>
                  설치
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BookQuest />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
